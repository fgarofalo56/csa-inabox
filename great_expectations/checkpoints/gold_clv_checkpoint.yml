# Gold CLV Checkpoint
#
# Validates the Customer Lifetime Value model in the Gold layer after
# dbt Gold model materialisation.  Maps to gold_clv_suite in
# quality-rules.yaml.
#
# Usage (Databricks notebook):
#   context = ge.get_context("great_expectations/")
#   result = context.run_checkpoint(checkpoint_name="gold_clv_checkpoint")

name: gold_clv_checkpoint
config_version: 1.0
class_name: SimpleCheckpoint
module_name: great_expectations.checkpoint

validations:
  - batch_request:
      datasource_name: adls_gold
      data_connector_name: gold_connector
      data_asset_name: gold_clv
      batch_identifiers:
        table_name: gold.customer_lifetime_value
    expectation_suite_name: gold_clv_suite

action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction

  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
