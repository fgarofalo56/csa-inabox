# Bronze Customers Checkpoint
#
# Validates raw customer data in the Bronze layer after ingestion.
# Maps to the bronze_customers_suite in quality-rules.yaml.
#
# Usage (Databricks notebook):
#   context = ge.get_context("great_expectations/")
#   result = context.run_checkpoint(checkpoint_name="bronze_customers_checkpoint")
#
# Usage (CLI fallback):
#   python -m governance.dataquality.run_quality_checks --ge-only --suite bronze

name: bronze_customers_checkpoint
config_version: 1.0
class_name: SimpleCheckpoint
module_name: great_expectations.checkpoint

validations:
  - batch_request:
      datasource_name: adls_bronze
      data_connector_name: bronze_connector
      data_asset_name: bronze_customers
      batch_identifiers:
        table_name: bronze.customers
    expectation_suite_name: bronze_customers_suite

action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction

  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
