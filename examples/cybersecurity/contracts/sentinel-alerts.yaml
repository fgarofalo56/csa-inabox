# Data product contract — cybersecurity.sentinel_alerts
#
# Authoritative interface for the Cybersecurity domain's normalised
# Sentinel alert data product.  Declares schema, SLAs, and quality
# rules for threat-detection analytics.

apiVersion: csa.microsoft.com/v1
kind: DataProductContract

metadata:
  name: cybersecurity.sentinel_alerts
  domain: cybersecurity
  owner: security-operations-center@contoso.com
  version: "1.0.0"
  description: >
    Normalized security alerts from Azure Sentinel enriched with
    MITRE ATT&CK technique mapping and composite risk scoring.
    Primary data product for threat landscape and compliance reporting.

schema:
  primary_key: [alert_id]
  columns:
    - name: alert_id
      type: string
      nullable: false
      description: Unique Sentinel alert identifier

    - name: alert_name
      type: string
      nullable: false
      description: Human-readable alert title

    - name: severity_level
      type: integer
      nullable: false
      description: "Numeric severity: 1=Low, 2=Medium, 3=High, 4=Critical"

    - name: severity_label
      type: string
      nullable: false
      description: Text severity label

    - name: provider_name
      type: string
      nullable: false
      description: Security provider that generated the alert

    - name: time_generated
      type: timestamp
      nullable: false
      description: UTC timestamp when the alert was generated

    - name: technique_id
      type: string
      nullable: true
      description: MITRE ATT&CK technique ID (e.g., T1059.001)

    - name: tactic_name
      type: string
      nullable: true
      description: MITRE ATT&CK tactic name

    - name: composite_risk_score
      type: double
      nullable: false
      description: Combined risk score from severity and MITRE weight (0-4)

    - name: host_entities
      type: array
      nullable: true
      description: Array of affected host entities

    - name: account_entities
      type: array
      nullable: true
      description: Array of affected account entities (PII)

    - name: ip_entities
      type: array
      nullable: true
      description: Array of related IP address entities

sla:
  freshness:
    max_delay_minutes: 15
    description: Alerts must appear in Silver within 15 minutes of generation
  availability:
    target_percentage: 99.9
    measurement_window: monthly
  latency:
    p95_query_ms: 5000
    description: Gold layer queries respond within 5s at p95

quality_rules:
  - rule_name: alert_id_not_null
    rule_type: not_null
    column: alert_id
    severity: error
    description: Every alert must have a unique identifier

  - rule_name: severity_range
    rule_type: range
    column: severity_level
    parameters:
      min: 1
      max: 4
    severity: error
    description: Severity must be 1-4

  - rule_name: time_generated_not_null
    rule_type: not_null
    column: time_generated
    severity: error
    description: Alert timestamp is mandatory

  - rule_name: mitre_technique_format
    rule_type: regex
    column: technique_id
    parameters:
      pattern: "^T\\d{4}(\\.\\d{3})?$"
    severity: warning
    description: Technique IDs must follow MITRE ATT&CK format

  - rule_name: completeness_threshold
    rule_type: completeness
    column: alert_id
    parameters:
      min_percentage: 99.5
    severity: error
    description: No more than 0.5% alert loss during ingestion
