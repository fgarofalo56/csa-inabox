# ─── Query: All products with pagination ─────────────────────────────────────

query AllProducts($first: Int = 10, $after: String) {
  dataProducts(first: $first, after: $after) {
    items {
      id
      name
      description
      domain
      owner_team
      quality_score
      status
      version
    }
    hasNextPage
    endCursor
  }
}

# ─── Query: Single product with nested quality metrics ───────────────────────

query ProductWithQuality($id: Int!) {
  dataProduct_by_pk(id: $id) {
    id
    name
    description
    domain
    owner_name
    owner_team
    classification
    quality_score
    freshness_hours
    completeness
    availability
    status
    version
    qualityMetrics {
      items {
        date
        quality_score
        completeness
        freshness_hours
        row_count
        accuracy
        consistency
      }
    }
    domain_info {
      name
      description
      owner_team
      product_count
    }
  }
}

# ─── Query: Products filtered by domain ──────────────────────────────────────

query ProductsByDomain($domain: String!) {
  dataProducts(filter: { domain: { eq: $domain }, status: { eq: "active" } }) {
    items {
      id
      name
      quality_score
      owner_team
      classification
    }
  }
}

# ─── Query: All domains with product counts ──────────────────────────────────

query AllDomains {
  domains {
    items {
      id
      name
      description
      owner_team
      product_count
    }
  }
}

# ─── Mutation: Create a new data product ─────────────────────────────────────

mutation CreateProduct($input: CreateDataProductInput!) {
  createDataProduct(item: $input) {
    id
    name
    domain
    status
    version
  }
}

