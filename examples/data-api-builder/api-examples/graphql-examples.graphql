# ─── Mutation: Update an existing product ────────────────────────────────────

mutation UpdateProduct($id: Int!, $input: UpdateDataProductInput!) {
  updateDataProduct(id: $id, item: $input) {
    id
    name
    quality_score
    version
    status
  }
}

