name: 'csa_commerce'
version: '1.0.0'
config-version: 2
require-dbt-version: [">=1.7.0", "<2.0.0"]

profile: 'csa_analytics'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["../../../domains/shared/dbt/macros"]

vars:
  bronze_database: "bronze"
  silver_database: "silver"
  gold_database: "gold"
  file_format: "delta"
  incremental_strategy: "merge"
  freshness_warn_hours: 24
  freshness_error_hours: 48

  # Commerce-specific variables
  current_analysis_year: 2024
  historical_years_analysis: 10
  gdp_base_year: 2017             # BEA chained dollar base year
  gdp_outlier_threshold: 3.0      # Standard deviations for outlier detection

  # Economic resilience scoring weights
  employment_diversity_weight: 0.35
  hhi_weight: 0.35
  gdp_stability_weight: 0.30

  # Trade analysis thresholds
  significant_trade_partner_threshold: 1000000000  # $1B annual trade
  hs_code_depth: 6                                   # HS code granularity

  # Business growth model parameters
  survival_analysis_years: 5
  growth_score_lookback_years: 3

  # Geographic scope
  all_states: ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA',
               'HI','ID','IL','IN','IA','KS','KY','LA','ME','MD',
               'MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ',
               'NM','NY','NC','ND','OH','OK','OR','PA','RI','SC',
               'SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC']

  # Major industry NAICS sectors
  major_naics_sectors: ['11','21','22','23','31-33','42','44-45',
                        '48-49','51','52','53','54','55','56',
                        '61','62','71','72','81','92']

models:
  csa_commerce:
    bronze:
      +materialized: incremental
      +file_format: delta
      +schema: bronze
      +tags: ['bronze', 'commerce', 'raw']
      +unique_key: ['source_system', 'ingestion_timestamp', 'record_hash']
    silver:
      +materialized: incremental
      +file_format: delta
      +schema: silver
      +tags: ['silver', 'commerce', 'cleaned']
      +incremental_strategy: merge
      +on_schema_change: "sync_all_columns"
    gold:
      +materialized: table
      +file_format: delta
      +schema: gold
      +tags: ['gold', 'commerce', 'analytics']
      +post-hook: "OPTIMIZE {{ this }} ZORDER BY (year)"

seeds:
  csa_commerce:
    +schema: seeds
    +tags: ['seed', 'commerce']

sources:
  - name: commerce
    description: Department of Commerce data sources
    tables:
      - name: census_demographics
        description: Census Bureau ACS demographic and economic data
        freshness:
          warn_after: {count: 30, period: day}
          error_after: {count: 90, period: day}
      - name: bea_gdp
        description: BEA GDP and economic indicator data
        freshness:
          warn_after: {count: 7, period: day}
          error_after: {count: 30, period: day}
      - name: trade_transactions
        description: International trade flow data
        freshness:
          warn_after: {count: 7, period: day}
          error_after: {count: 14, period: day}

snapshots:
  csa_commerce:
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: processed_timestamp
