# Azure ML training environment for the loan-default model.
#
# Pinned versions match the CSA dev image (Python 3.10, sklearn 1.4+).
# This file is referenced by ``mlproject.yaml`` and by the
# ``az ml environment create`` call in ``deploy/register_model.sh``.
name: csa-ml-lifecycle-loan-default
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip=24.0
  - pip:
      - numpy>=1.26,<3.0
      - pandas>=2.0,<3.0
      - scikit-learn>=1.4,<2.0
      - joblib>=1.3,<2.0
      - evidently>=0.4,<1.0
      # Azure ML runtime deps (inference server)
      - azureml-inference-server-http>=1.0
      - azure-ai-ml>=1.16,<2.0
      - azure-identity>=1.17,<2.0
