# CSA data contract -- ml-lifecycle.loan_training_features
#
# Consumed by:
#   * examples/ml-lifecycle/training/train.py
#   * examples/ml-lifecycle/domains/dbt/models/gold/gld_training_features.sql

apiVersion: csa.microsoft.com/v1
kind: DataProductContract

metadata:
  name: ml-lifecycle.loan_training_features
  domain: ml-lifecycle
  owner: csa-ml-lifecycle@example.com
  version: "1.0.0"
  description: >
    Feature set consumed by the loan-default classifier. One row per
    loan application. Target column is `defaulted` (binary).
    Distribution is intentionally imbalanced (~20% positive) to
    exercise class-weighted learning paths.
  classification: unrestricted
  pii: false

schema:
  primary_key: [application_id]
  columns:
    - name: applicant_age
      type: integer
      nullable: false
      description: Applicant age in years (18-80).
    - name: annual_income
      type: number
      nullable: false
      description: Self-reported annual income in USD (10000-500000).
    - name: loan_amount
      type: number
      nullable: false
      description: Requested loan principal in USD (1000-250000).
    - name: loan_term_months
      type: integer
      nullable: false
      description: Loan term. Allowed values [12, 24, 36, 48, 60].
    - name: credit_score
      type: integer
      nullable: false
      description: FICO credit score (300-850).
    - name: employment_years
      type: number
      nullable: false
      description: Years at current employer (0-40).
    - name: debt_to_income
      type: number
      nullable: false
      description: Total monthly debt / monthly income (0.0-1.5).
    - name: home_ownership
      type: string
      nullable: false
      description: Allowed values [OWN, RENT, MORTGAGE].
    - name: loan_purpose
      type: string
      nullable: false
      description: Allowed values [AUTO, HOME_IMPROVEMENT, DEBT_CONSOLIDATION, BUSINESS, EDUCATION].
    - name: delinquencies_2yr
      type: integer
      nullable: false
      description: Count of delinquencies in trailing 24 months (0-10).
    - name: defaulted
      type: integer
      nullable: false
      description: Target label (1 = default within 24 months, 0 otherwise).

sla:
  # Training feature set is rebuilt nightly by the gold dbt model.
  freshness_minutes: 1440
  valid_row_ratio: 1.0
  support_window_days: 365

quality_rules:
  - rule: expect_column_values_to_not_be_null
    column: credit_score
  - rule: expect_column_values_to_not_be_null
    column: annual_income
  - rule: expect_column_values_to_not_be_null
    column: defaulted
  - rule: expect_column_values_to_be_in_set
    column: defaulted
    value_set: [0, 1]
  - rule: expect_column_values_to_be_between
    column: credit_score
    min_value: 300
    max_value: 850
  - rule: expect_column_values_to_be_in_set
    column: home_ownership
    value_set: [OWN, RENT, MORTGAGE]
  - rule: expect_column_values_to_be_in_set
    column: loan_purpose
    value_set: [AUTO, HOME_IMPROVEMENT, DEBT_CONSOLIDATION, BUSINESS, EDUCATION]

# Model-quality bar asserted by training tests (test_train.py)
training_targets:
  auc_minimum: 0.70
