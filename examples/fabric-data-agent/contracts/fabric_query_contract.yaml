# CSA data contract -- fabric-data-agent.fabric_query
#
# Describes the read-class query surface exposed by the Fabric Data Agent.
# Used by reviewers, SREs, and automated CI checks to verify the agent
# cannot exceed its scope (no writes, row cap, citation mandatory).

apiVersion: csa.microsoft.com/v1
kind: DataProductContract

metadata:
  name: fabric-data-agent.fabric_query
  domain: fabric-data-agent
  owner: csa-fabric-reference@example.com
  version: "1.0.0"
  description: >
    The Fabric Data Agent answers natural-language questions over a
    registered set of Fabric Lakehouse tables. The agent is strictly
    read-class: any SQL statement that is not a bare SELECT/WITH is
    rejected by the retriever before execution.
  classification: unrestricted
  pii: false

# Combined request + response schema. The validator only requires
# `columns[*].name` and `columns[*].type` for each column. Request fields
# are flagged with description prefixes for clarity.
schema:
  primary_key: [request_id]
  columns:
    # ---- correlation key ----
    - name: request_id
      type: string
      nullable: false
      description: "[KEY] Stable identifier for one question/answer round-trip."
    # ---- request side ----
    - name: question
      type: string
      nullable: false
      description: "[REQUEST] Natural-language question posed by the user."
    - name: table_alias
      type: string
      nullable: false
      description: "[REQUEST] Registered alias in the agent's `table_registry`."
    # ---- response side ----
    - name: answer
      type: string
      nullable: false
      description: "[RESPONSE] Grounded natural-language answer with citation block."
    - name: citation_source_type
      type: string
      nullable: false
      description: "[RESPONSE] Allowed values [lakehouse_sql, semantic_model]."
    - name: citation_table_or_model
      type: string
      nullable: false
      description: "[RESPONSE] Fully-qualified Fabric resource cited by the agent."
    - name: citation_columns
      type: string
      nullable: false
      description: "[RESPONSE] JSON-encoded list of columns referenced by the executed SQL (e.g. '[\"col_a\",\"col_b\"]')."
    - name: citation_sql
      type: string
      nullable: false
      description: "[RESPONSE] Executed read-class SQL (auditable)."
    - name: row_count
      type: integer
      nullable: false
      description: "[RESPONSE] Number of rows returned (0..max_rows_per_query)."
    - name: error
      type: string
      nullable: true
      description: "[RESPONSE] Populated when the agent refused the request."

sla:
  # Synchronous request/response surface; freshness is bounded by Fabric
  # Lakehouse refresh cadence rather than this contract.
  freshness_minutes: 0
  valid_row_ratio: 1.0
  support_window_days: 180
  p99_latency_ms: 5000
  availability_percent: 99.0

quality_rules:
  - rule: expect_column_values_to_not_be_null
    column: question
  - rule: expect_column_values_to_not_be_null
    column: table_alias
  - rule: expect_column_values_to_be_in_set
    column: citation_source_type
    value_set: [lakehouse_sql, semantic_model]
  - rule: expect_column_values_to_be_between
    column: row_count
    min_value: 0
    max_value: 500

safety:
  read_only: true
  blocked_sql_keywords:
    - INSERT
    - UPDATE
    - DELETE
    - MERGE
    - DROP
    - ALTER
    - CREATE
    - TRUNCATE
    - GRANT
    - REVOKE
    - EXEC
    - EXECUTE
  max_rows_per_query: 500
  query_timeout_seconds: 30
  multi_statement_rejected: true

observability:
  log_fields:
    - question
    - table_alias
    - citation_table_or_model
    - citation_sql
    - row_count
    - error
  retention_days: 90
