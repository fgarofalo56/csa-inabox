# Data product contract — noaa.ocean_buoys
#
# This file is the authoritative interface for the NOAA ocean buoy
# data product. It declares the schema, SLAs, and quality rules
# for ocean observation analytics and maritime weather monitoring.

apiVersion: csa.noaa.gov/v1
kind: DataProductContract

metadata:
  name: noaa.ocean_buoys
  domain: noaa
  owner: noaa-data-engineering@contoso.com
  version: "1.0.0"
  description: >
    Ocean observation data from NOAA's National Data Buoy Center (NDBC).
    Provides real-time and historical meteorological and oceanographic
    measurements from moored buoys and coastal stations including wind,
    waves, pressure, temperature, and water level. Used for maritime
    forecasting, coastal hazard assessment, and ocean research.

schema:
  primary_key: [station_id, observation_datetime]
  columns:
    - name: station_id
      type: string
      nullable: false
      description: NDBC station identifier
    - name: station_name
      type: string
      nullable: false
      description: Station descriptive name
    - name: station_type
      type: string
      nullable: false
      description: Station platform type
      allowed_values:
        - Buoy
        - C-MAN
    - name: latitude
      type: decimal(8,4)
      nullable: false
      description: Station latitude in decimal degrees
    - name: longitude
      type: decimal(9,4)
      nullable: false
      description: Station longitude in decimal degrees
    - name: water_depth_m
      type: decimal(8,2)
      nullable: true
      description: Water depth at station location in meters
    - name: observation_datetime
      type: timestamp
      nullable: false
      description: Observation date and time (UTC)
    - name: observation_date
      type: date
      nullable: false
      description: Observation date (UTC)
    - name: wind_direction_deg
      type: integer
      nullable: true
      description: Wind direction in degrees (0-360, true north)
    - name: wind_speed_ms
      type: decimal(6,2)
      nullable: true
      description: Wind speed in meters per second
    - name: wind_gust_ms
      type: decimal(6,2)
      nullable: true
      description: Wind gust speed in meters per second
    - name: wave_height_m
      type: decimal(6,2)
      nullable: true
      description: Significant wave height in meters
    - name: dominant_wave_period_s
      type: decimal(5,1)
      nullable: true
      description: Dominant wave period in seconds
    - name: average_wave_period_s
      type: decimal(5,1)
      nullable: true
      description: Average wave period in seconds
    - name: mean_wave_direction_deg
      type: integer
      nullable: true
      description: Mean wave direction in degrees
    - name: pressure_hpa
      type: decimal(7,1)
      nullable: true
      description: Atmospheric pressure in hectopascals (millibars)
    - name: air_temperature_c
      type: decimal(5,1)
      nullable: true
      description: Air temperature in degrees Celsius
    - name: dewpoint_c
      type: decimal(5,1)
      nullable: true
      description: Dewpoint temperature in degrees Celsius
    - name: visibility_nmi
      type: decimal(5,1)
      nullable: true
      description: Visibility in nautical miles
    - name: sea_surface_temp_c
      type: decimal(5,1)
      nullable: true
      description: Sea surface temperature in degrees Celsius
    - name: salinity_psu
      type: decimal(5,2)
      nullable: true
      description: Salinity in practical salinity units
    - name: ocean_current_speed_ms
      type: decimal(5,2)
      nullable: true
      description: Ocean current speed in meters per second
    - name: ocean_current_direction_deg
      type: integer
      nullable: true
      description: Ocean current direction in degrees
    - name: water_level_m
      type: decimal(6,3)
      nullable: true
      description: Water level relative to MLLW in meters
    - name: load_time
      type: timestamp
      nullable: false
      description: Timestamp when the record was loaded into the data warehouse

sla:
  freshness_minutes: 60  # Hourly observations
  valid_row_ratio: 0.90
  supported_until: "2027-12-31"
  update_frequency: "Hourly"

quality_rules:
  - rule: expect_column_values_to_not_be_null
    column: station_id
  - rule: expect_column_values_to_not_be_null
    column: observation_datetime
  - rule: expect_column_values_to_not_be_null
    column: latitude
  - rule: expect_column_values_to_not_be_null
    column: longitude
  - rule: expect_column_values_to_be_in_set
    column: station_type
    value_set: [Buoy, C-MAN]
  - rule: expect_column_values_to_be_between
    column: wind_direction_deg
    min_value: 0
    max_value: 360
    mostly: 0.99
  - rule: expect_column_values_to_be_between
    column: wind_speed_ms
    min_value: 0
    max_value: 100
    mostly: 0.99
  - rule: expect_column_values_to_be_between
    column: wave_height_m
    min_value: 0
    max_value: 30
    mostly: 0.99
  - rule: expect_column_values_to_be_between
    column: pressure_hpa
    min_value: 870
    max_value: 1084
    mostly: 0.99
  - rule: expect_column_values_to_be_between
    column: air_temperature_c
    min_value: -60
    max_value: 60
    mostly: 0.99
  - rule: expect_column_values_to_be_between
    column: sea_surface_temp_c
    min_value: -5
    max_value: 40
    mostly: 0.99
  - rule: expect_column_values_to_be_between
    column: salinity_psu
    min_value: 0
    max_value: 45
    mostly: 0.95
  - rule: expect_column_pair_values_a_to_be_greater_than_or_equal_to_b
    column_a: wind_gust_ms
    column_b: wind_speed_ms
    mostly: 0.95

data_lineage:
  upstream_sources:
    - name: "NOAA National Data Buoy Center"
      url: "https://www.ndbc.noaa.gov/"
      description: "Real-time and historical buoy observations"
      refresh_schedule: "Hourly"
    - name: "NOAA CO-OPS Tides and Currents"
      url: "https://tidesandcurrents.noaa.gov/"
      description: "Water level and tidal current data"

  downstream_consumers:
    - name: "Maritime Weather Dashboard"
      description: "Real-time ocean conditions and forecasting display"
    - name: "Coastal Hazard Models"
      description: "Storm surge, wave, and flooding prediction models"
    - name: "Ocean Research APIs"
      description: "APIs for oceanographic research and climate studies"

usage_notes: |
  - Buoy observations are typically hourly; some stations report every 10 minutes
  - C-MAN stations are coastal and may lack some ocean measurements
  - Missing sensor readings are common due to equipment malfunctions
  - Valid_row_ratio is set lower (0.90) due to frequent sensor gaps
  - Wind gust should always be >= wind speed when both are present
  - Pressure values in hPa (1 hPa = 1 millibar)
  - Water depth is static metadata; water level varies with tides

contact:
  technical: noaa-data-team@contoso.com
  business: noaa-analytics-lead@contoso.com
