[project]
name = "csa-inabox"
version = "0.1.0"
description = "Cloud-Scale Analytics in-a-Box — Azure Data Mesh Platform"
requires-python = ">=3.10"
license = {text = "MIT"}

dependencies = []

[project.optional-dependencies]
dev = [
    "ruff>=0.3.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0",
    "bandit>=1.7.5",
    "pre-commit>=3.5.0",
    # structlog is a governance runtime dep but tests for the shared
    # logging helper need it available in the dev env too.
    "structlog>=24.1.0",
]
governance = [
    "pyyaml>=6.0",
    "azure-monitor-ingestion>=1.0.0",
    # Structured JSON logging with trace/correlation context — see
    # governance/common/logging.py and docs/LOG_SCHEMA.md.
    "structlog>=24.1.0",
]

[tool.ruff]
target-version = "py310"
line-length = 120
src = ["domains", "scripts", "governance", "agent-harness"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "W",      # pycodestyle warnings
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "COM",    # flake8-commas
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "ISC",    # flake8-implicit-str-concat
    "PIE",    # flake8-pie
    "PT",     # flake8-pytest-style
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "ARG",    # flake8-unused-arguments
    "ERA",    # eradicate
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "COM812", # missing trailing comma (conflicts with formatter)
    "ISC001", # single-line implicit string concat (conflicts with formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["domains", "governance"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
addopts = "--tb=short -q --strict-markers"

[tool.coverage.run]
# Only measure the code under test today.  As new areas grow a real test
# suite (dbt Python runners, Azure Functions, agent harness gates),
# add them to this list alongside their tests.
source = ["governance/common"]
branch = true
omit = [
    "tests/*",
    "**/__init__.py",
    "**/conftest.py",
    "**/test_*.py",
]

[tool.coverage.report]
# CI fails the job if total coverage for the source packages above drops
# below this threshold (see .github/workflows/test.yml).  The threshold
# ratchets upward as the test suite grows — do not lower it without an
# explicit justification in the commit message.
fail_under = 80
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.coverage.xml]
output = "coverage.xml"

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
