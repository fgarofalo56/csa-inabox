apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csa-portal
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: csa-inabox
  source:
    repoURL: https://github.com/your-org/csa-inabox.git
    targetRevision: main
    path: portal/kubernetes/helm/csa-portal
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: csa-portal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
