# CSA-in-a-Box Portal — Local Development Docker Compose
#
# Usage:
#   cd portal/kubernetes/docker
#   docker compose up --build
#
# This compose file builds from the repository root context.
# Run from the repo root with:
#   docker compose -f portal/kubernetes/docker/docker-compose.yml up --build

services:
  # ─── Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../../  # repo root
      dockerfile: portal/kubernetes/docker/frontend/Dockerfile
    container_name: csa-portal-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - csa-portal

  # ─── Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../../  # repo root
      dockerfile: portal/kubernetes/docker/backend/Dockerfile
    container_name: csa-portal-backend
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # ENVIRONMENT=local is required to keep the demo Reader identity
      # active without real Entra ID. "development" is NOT an allow-listed
      # value (CSA-0019) and will cause auth safety-gate to fail fast when
      # AZURE_TENANT_ID is blank.
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - AUTH_DISABLED=${AUTH_DISABLED:-true}
      # CSA-0021: REDIS_PASSWORD is required — no insecure fallback.
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required — see .env.example}@redis:6379/0
      - LOG_LEVEL=debug
      # Entra ID (formerly Azure AD) — renamed from AZURE_AD_* per CSA-0001.
      # Pydantic Settings reads AZURE_TENANT_ID / AZURE_CLIENT_ID directly.
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - csa-portal

  # ─── Redis ─────────────────────────────────────────────────────────────
  redis:
    # redis:7-alpine (pinned 2026-04-17)
    image: redis:7-alpine@sha256:cfb3c5629ec846b1665d348f8c82ed160c911cab5a2cc88053f4219ab4b5835c
    container_name: csa-portal-redis
    # CSA-0021: No host port publish — Redis is only reachable on the
    # internal compose network. Override via a docker-compose.override.yml
    # for ad-hoc local debugging.
    expose:
      - "6379"
    # CSA-0021: REDIS_PASSWORD is mandatory — no "changeme" fallback.
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required — see .env.example} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - csa-portal

volumes:
  redis-data:
    driver: local

networks:
  csa-portal:
    driver: bridge
