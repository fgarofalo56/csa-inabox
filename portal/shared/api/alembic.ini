# Alembic configuration for the CSA portal backend (CSA-0046).
#
# Run migrations from the repository root:
#
#     alembic -c portal/shared/api/alembic.ini upgrade head
#
# The ``DATABASE_URL`` is resolved at runtime from the application
# ``Settings`` object (``portal.shared.api.config``) so no credentials
# are embedded here.  When running against Azure Database for
# PostgreSQL Flexible Server with managed identity, set
# ``POSTGRES_USE_MANAGED_IDENTITY=true`` — the env.py script injects a
# fresh AAD access token per connection.

[alembic]
# Location of the migration scripts.  %(here)s expands to the directory
# containing this ini file so Alembic can be invoked from any CWD
# (e.g. the repo root during CI).
script_location = %(here)s/alembic

# Template used when generating new migrations.
file_template = %%(rev)s_%%(slug)s

# Set to 'true' to run the environment during `alembic init` (we don't).
prepend_sys_path = ../../../..

# Timezone to use for naming of new migration files.
timezone = UTC

# URL is *not* set here — env.py loads it from the application Settings
# at runtime so local SQLite and staging/production Postgres share the
# same ini file.  Override via `ALEMBIC_DATABASE_URL` or CI env vars
# if needed.
sqlalchemy.url =

[post_write_hooks]
# No hooks today.  Future: `ruff format` on generated revisions.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
