# Gitleaks configuration
# =======================
# Use the default gitleaks v8 rules, then narrow down false positives that
# arise from public-reference identifiers and non-secret hash fingerprints
# this repo commits for deployment and diagnostic reference.
#
# Anything added here has been reviewed and is explicitly NOT a secret.
# Real leaks must still be rotated and removed from history.

[extend]
# Start from the built-in ruleset.
useDefault = true

[allowlist]
description = "False-positive allowlist for public reference identifiers."

# Allowlisted regexes — these patterns are matched against the leaked secret
# value (case-insensitive). Azure built-in role definition IDs are public,
# documented identifiers (NOT secrets) and they trip the generic-api-key
# entropy heuristic.
regexes = [
    # Azure built-in role definition GUIDs — see
    # https://learn.microsoft.com/azure/role-based-access-control/built-in-roles
    # Specific roles used in this repo's Bicep (KV Secrets User, AOAI User,
    # Storage Blob Data Reader/Contributor, Search Index Data Reader, etc.)
    '''4633458b-17de-408a-b874-0445c86b69e6''',  # Key Vault Secrets User
    '''00482a5a-887f-4fb3-b363-3b7fe8e74483''',  # Key Vault Administrator
    '''b86a8fe4-44ce-4948-aee5-eccb2c155cd7''',  # Key Vault Secrets Officer
    '''5e0bd9bd-7b93-4f28-af87-19fc36ad61bd''',  # Cognitive Services OpenAI User
    '''a001fd3d-188f-4b5d-821b-7da978bf7442''',  # Cognitive Services OpenAI Contributor
    '''ba92f5b4-2d11-453d-a403-e96b0029c9fe''',  # Storage Blob Data Contributor
    '''2a2b9908-6ea1-4ae2-8e65-a410df84e7d1''',  # Storage Blob Data Reader
    '''b24988ac-6180-42a0-ab88-20f7382dd24c''',  # Contributor
    '''8ebe5a00-799e-43f5-a45b-b3b502350a71''',  # Search Index Data Reader
    '''1407120a-92aa-4202-b7e9-c0e197c71c8f''',  # Search Index Data Contributor
    '''5bd9cd88-fe45-4216-938b-f97437e15450''',  # DocumentDB Account Contributor (Cosmos keys)
    '''312a565d-c81f-4fd8-895a-4e21e48d571c''',  # API Management Service Contributor
    '''87a39d53-fc1b-424a-814c-f7e04687dc9e''',  # Logic App Contributor
    '''673868aa-7521-48a0-acc6-0f60742d39f5''',  # Data Factory Contributor

    # Fake/example values (tests, parity docs, code defaults) that trip the
    # generic-api-key entropy heuristic but are NON-secret identifiers:
    '''0{8}-0{4}-0{4}-0{4}-0{12}''',                          # all-zeros example subscription/tenant GUID
    '''[a-z]+-csa-loom-[a-z0-9]+''',                          # CSA Loom Azure resource names (apim-csa-loom-eastus2)
    '''(syn|adf|dbx|kv|st|cosmos|fd|acr|loom)-?loom[a-z0-9-]*-[a-z0-9]+''',  # other Loom resource-name shapes
]

paths = [
    # Azure built-in role GUIDs — published by Microsoft, safe to commit.
    # https://learn.microsoft.com/azure/role-based-access-control/built-in-roles
    '''(csa_platform/)?governance/rbac/rbac-matrix\.json''',

    # Synapse / Storage diagnostic logging notebooks contain Azure log
    # output with an "AuthenticationHash" field.  That field is a SHA-256
    # fingerprint of the auth token used for a request — it is one-way
    # and cannot be reversed back into a credential.  Published by Azure
    # Storage diagnostics, not a secret.
    '''scripts/monitor/.*\.ipynb''',

    # Migration documentation contains code examples with placeholder
    # connection strings, SAS keys, and SQL column names (e.g. "match_key")
    # that trip the generic-api-key entropy heuristic.  These are
    # illustrative samples in markdown, not real credentials.
    '''docs/migrations/.*\.md''',

    # App Insights browser SDK loader for the docs site.  Contains an
    # Application Insights connection string + InstrumentationKey GUID
    # which is *public by design* (Microsoft documents these as
    # client-side-safe — see
    # https://learn.microsoft.com/azure/azure-monitor/app/sdk-connection-string).
    # The ingestion endpoint is rate-limited per resource and a daily
    # cap bounds cost; if someone abuses the key they pollute our
    # telemetry, not steal data.
    '''docs/javascripts/app-insights\.js''',

    # CSA Loom one-shot bootstrap workflow — references public Azure
    # resource names (APIM_NAME, SYNAPSE_WS, DBX_WS, UAMI principal id,
    # workspace IDs). These are not secrets; they are tenant-visible
    # resource identifiers. Real credentials are pulled via
    # ${{ secrets.AZURE_CLIENT_SECRET }} GitHub Actions secret.
    '''\.github/workflows/csa-loom-post-deploy-bootstrap\.yml''',

    # Vitest/Jest backend contract tests set FAKE Azure resource *names* and
    # zero/example GUIDs (e.g. LOOM_APIM_NAME='apim-csa-loom-eastus2',
    # LOOM_SUBSCRIPTION_ID='00000000-0000-0000-0000-000000000000') to exercise
    # the provisioned vs not-provisioned honest gates. These are non-secret
    # resource identifiers in test code, never real credentials.
    '''apps/fiab-console/.*/__tests__/.*\.(ts|tsx)$''',
    '''apps/fiab-console/.*\.(test|spec)\.(ts|tsx)$''',

    # Per-editor parity docs (docs/fiab/parity/*.md) document the real Azure
    # resource NAMES + env-var names each control calls (e.g. "Backend APIM:
    # apim-csa-loom-eastus2 (override LOOM_APIM_NAME)"). Non-secret resource
    # identifiers in generated inventory tables; trip the entropy heuristic.
    '''docs/fiab/parity/.*\.md$''',
]
