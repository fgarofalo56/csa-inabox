# Gitleaks configuration
# =======================
# Use the default gitleaks v8 rules, then narrow down false positives that
# arise from public-reference identifiers and non-secret hash fingerprints
# this repo commits for deployment and diagnostic reference.
#
# Anything added here has been reviewed and is explicitly NOT a secret.
# Real leaks must still be rotated and removed from history.

[extend]
# Start from the built-in ruleset.
useDefault = true

[allowlist]
description = "False-positive allowlist for public reference identifiers."

# Allowlisted regexes — these patterns are matched against the leaked secret
# value (case-insensitive). Azure built-in role definition IDs are public,
# documented identifiers (NOT secrets) and they trip the generic-api-key
# entropy heuristic.
regexes = [
    # Azure built-in role definition GUIDs — see
    # https://learn.microsoft.com/azure/role-based-access-control/built-in-roles
    # Specific roles used in this repo's Bicep (KV Secrets User, AOAI User,
    # Storage Blob Data Reader/Contributor, Search Index Data Reader, etc.)
    '''4633458b-17de-408a-b874-0445c86b69e6''',  # Key Vault Secrets User
    '''00482a5a-887f-4fb3-b363-3b7fe8e74483''',  # Key Vault Administrator
    '''b86a8fe4-44ce-4948-aee5-eccb2c155cd7''',  # Key Vault Secrets Officer
    '''5e0bd9bd-7b93-4f28-af87-19fc36ad61bd''',  # Cognitive Services OpenAI User
    '''a001fd3d-188f-4b5d-821b-7da978bf7442''',  # Cognitive Services OpenAI Contributor
    '''ba92f5b4-2d11-453d-a403-e96b0029c9fe''',  # Storage Blob Data Contributor
    '''2a2b9908-6ea1-4ae2-8e65-a410df84e7d1''',  # Storage Blob Data Reader
    '''b24988ac-6180-42a0-ab88-20f7382dd24c''',  # Contributor
    '''8ebe5a00-799e-43f5-a45b-b3b502350a71''',  # Search Index Data Reader
    '''1407120a-92aa-4202-b7e9-c0e197c71c8f''',  # Search Index Data Contributor
]

paths = [
    # Azure built-in role GUIDs — published by Microsoft, safe to commit.
    # https://learn.microsoft.com/azure/role-based-access-control/built-in-roles
    '''(csa_platform/)?governance/rbac/rbac-matrix\.json''',

    # Synapse / Storage diagnostic logging notebooks contain Azure log
    # output with an "AuthenticationHash" field.  That field is a SHA-256
    # fingerprint of the auth token used for a request — it is one-way
    # and cannot be reversed back into a credential.  Published by Azure
    # Storage diagnostics, not a secret.
    '''scripts/monitor/.*\.ipynb''',
]
