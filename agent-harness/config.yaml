# Agent Harness Configuration — Ralph Loop
# Controls autonomous task execution, validation gates, and escalation

loop:
  max_iterations: 3          # Max fix-validate cycles per task before escalation
  timeout_minutes: 120       # Max time per task before timeout
  auto_commit: false  # SAFETY: Require human review before committing
  auto_advance: true         # Auto-pick next task after completion

validation_gates:
  bicep:
    script: "gates/validate-bicep.ps1"
    triggers: ["*.bicep", "*.bicepparam"]
    required: true
    timeout_seconds: 300

  python:
    script: "gates/validate-python.ps1"
    triggers: ["*.py"]
    required: true
    timeout_seconds: 120

  dbt:
    script: "gates/validate-dbt.ps1"
    triggers: ["*.sql", "*.yml"]
    paths: ["domains/*/dbt/**"]
    required: false           # Only required if dbt models changed

  deployment:
    script: "gates/validate-deployment.ps1"
    triggers: ["deploy/bicep/**"]
    required: false           # Only for infra changes
    timeout_seconds: 600

  all:
    script: "gates/validate-all.ps1"
    always_run: true
    required: true

escalation:
  on_max_iterations: "review"  # Mark task for human review
  on_timeout: "review"
  on_error: "pause"            # Pause loop, notify human
  review_assignee: "User"      # Archon assignee for review tasks

archon:
  project_id: "1bd59749-db0a-4009-82c7-f1a56d24a820"
  task_filter:
    status: "todo"
    assignee: "Coding Agent"

notifications:
  on_completion: true
  on_escalation: true
  on_error: true

