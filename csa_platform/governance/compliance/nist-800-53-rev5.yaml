# NIST SP 800-53 Rev 5 — Control Mapping Manifest
# CSA-in-a-Box control implementation / coverage registry.
#
# Authoritative catalog: https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final
# Baseline reference: NIST SP 800-53B "Control Baselines for Information Systems and Organizations"
#
# Status codes:
#   IMPLEMENTED             Evidence exists in repo and materially satisfies the control.
#   PARTIALLY_IMPLEMENTED   Some evidence; enhancements or follow-up controls outstanding.
#   PLANNED                 Tracked gap; no evidence yet. See `gaps:` and linked CSA-XXXX findings.
#   NOT_APPLICABLE          Control does not apply to this system's scope / role.
#   INHERITED               Satisfied by an underlying layer (e.g. Azure shared responsibility).
#
# Evidence kinds:
#   bicep     Infrastructure-as-code module / template.
#   policy    Azure Policy definition / assignment.
#   code      Application-layer Python/TypeScript implementation.
#   script    Operational script (deploy, teardown, validation).
#   ci        CI/CD workflow YAML.
#   doc       Narrative documentation (reference only — not primary evidence).
#   config    Configuration file (YAML/JSON) that enforces a rule.
#
# Audit: CSA-0012 Phase 1 (2026-04-18). This manifest is machine-readable;
# see docs/compliance/nist-800-53-rev5.md for the narrative companion.

framework: "NIST 800-53 Rev 5"
