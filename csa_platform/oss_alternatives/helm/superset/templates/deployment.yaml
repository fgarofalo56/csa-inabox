apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-superset
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: superset
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: superset
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: superset
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      initContainers:
        - name: superset-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              superset db upgrade && \
              superset fab create-admin \
                --username {{ .Values.init.adminUser }} \
                --firstname {{ .Values.init.adminFirstName }} \
                --lastname {{ .Values.init.adminLastName }} \
                --email {{ .Values.init.adminEmail }} \
                --password "$ADMIN_PASSWORD" || true && \
              superset init
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-superset-secret
                  key: admin-password
            - name: SUPERSET_CONFIG_PATH
              value: /app/superset_config.py
          volumeMounts:
            - name: superset-config
              mountPath: /app/superset_config.py
              subPath: superset_config.py
      containers:
        - name: superset
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["gunicorn"]
          args:
            - "--bind=0.0.0.0:8088"
            - "--workers=4"
            - "--timeout=120"
            - "superset.app:create_app()"
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
          env:
            - name: SUPERSET_CONFIG_PATH
              value: /app/superset_config.py
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: 8088
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 8088
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          volumeMounts:
            - name: superset-config
              mountPath: /app/superset_config.py
              subPath: superset_config.py
            {{- if .Values.persistence.enabled }}
            - name: superset-data
              mountPath: /app/superset_home
            {{- end }}
      volumes:
        - name: superset-config
          configMap:
            name: {{ .Release.Name }}-superset-config
        {{- if .Values.persistence.enabled }}
        - name: superset-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-superset-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-superset-data
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
