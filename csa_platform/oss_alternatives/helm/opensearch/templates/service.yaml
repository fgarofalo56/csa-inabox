# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-opensearch-headless
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: opensearch
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 9200
      targetPort: 9200
      protocol: TCP
      name: http
    - port: 9300
      targetPort: 9300
      protocol: TCP
      name: transport
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: opensearch
---
# Client-facing service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-opensearch
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: opensearch
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: 9200
      protocol: TCP
      name: http
    - port: {{ .Values.service.transportPort }}
      targetPort: 9600
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: opensearch
---
{{- if .Values.dashboards.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-opensearch-dashboards
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: opensearch-dashboards
spec:
  type: {{ .Values.dashboards.service.type }}
  ports:
    - port: {{ .Values.dashboards.service.port }}
      targetPort: 5601
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: opensearch-dashboards
{{- end }}
