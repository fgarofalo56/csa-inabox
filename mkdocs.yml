site_name: Cloud Scale Analytics in a Box
site_description: Azure-native reference implementation for Data Mesh, Data Fabric, and Data Lakehouse
site_url: https://fgarofalo56.github.io/csa-inabox/
repo_url: https://github.com/fgarofalo56/csa-inabox
repo_name: fgarofalo56/csa-inabox
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/logo.svg
  favicon: assets/images/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

exclude_docs: |
  tutorials/_template/
  _includes/
  learn/examples/solution_refrances/azure-realtime-analytics/example_mds/
  learn/examples/solution_refrances/azure-realtime-analytics/TASK_LIST.md
  learn/images/README.md
  learn/images/architecture/serverless-sql-architecture.md
  learn/images/architecture/shared-metadata-architecture.md
  learn/images/diagrams/README.md
  learn/images/troubleshooting/troubleshooting-process.md
  learn/images/troubleshooting-process.md
  learn/versioning/
  prp/
  # Temporarily excluded: stray "</>" on line 13 crashes the markdown HTML
  # parser. Move back into nav after the markdown content is fixed.
  fiab/apim-policy-parity-spec.md

plugins:
  - search
  - minify:
      minify_html: true
  # mkdocs-material's social card plugin auto-generates per-page OG /
  # Twitter card PNGs at build time using the site brand. The plugin
  # depends on cairosvg + Pillow which are already installed in CI.
  # Gated on the CSA_SOCIAL_CARDS env var so local dev builds (which
  # don't need cards) skip the ~30s extra build cost.
  - social:
      enabled: !ENV [CSA_SOCIAL_CARDS, true]
      cards_layout_options:
        background_color: "#0A1126"
        color: "#FFFFFF"
  - include-markdown:
      rewrite_relative_urls: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      skip_classes:
        - no-lightbox
        - twemoji
      auto_caption: false
      caption_position: bottom

hooks:
  - docs/hooks/rewrite_example_links.py
  - docs/hooks/relocate_architecture_hero.py

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      # Register `azurecli` as a fence language Pygments will highlight
      # using the bash lexer. Without this, ```azurecli blocks fall
      # through to the `text` lexer and the wrapper renders as
      # ``<div class="language-text">``, which the Cloud Shell button
      # selector can't pick up.
      extend_pygments_lang:
        - name: azurecli
          lang: bash
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets:
      base_path:
        - docs
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.betterem

extra_css:
  - stylesheets/copilot-chat.css
  - stylesheets/cloud-shell.css
  - stylesheets/docs.css
  - stylesheets/diagram-zoom.css

extra_javascript:
  - javascripts/app-insights.js
  - javascripts/copilot-chat.js
  - javascripts/cloud-shell.js
  - https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js
  - javascripts/diagram-zoom.js

