<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Cloud Scale Analytics in a Box">
  <defs>
    <linearGradient id="csaLogoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1126"/>
      <stop offset="1" stop-color="#161B45"/>
    </linearGradient>
    <linearGradient id="csaLogoCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square container (the "box") -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#csaLogoBg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#22D3EE" stroke-opacity="0.35" stroke-width="1"/>
  <!-- 3 stacked layers — the Bronze/Silver/Gold medallion abstracted -->
  <rect x="14" y="16" width="36" height="6" rx="3" fill="url(#csaLogoCyan)" fill-opacity="0.95"/>
  <rect x="14" y="28" width="36" height="6" rx="3" fill="#A78BFA" fill-opacity="0.85"/>
  <rect x="14" y="40" width="36" height="6" rx="3" fill="#FBBF24" fill-opacity="0.85"/>
  <!-- Tiny connection dots between layers -->
  <circle cx="20" cy="25" r="1.2" fill="#22D3EE" fill-opacity="0.7"/>
  <circle cx="32" cy="25" r="1.2" fill="#22D3EE" fill-opacity="0.7"/>
  <circle cx="44" cy="25" r="1.2" fill="#22D3EE" fill-opacity="0.7"/>
  <circle cx="20" cy="37" r="1.2" fill="#A78BFA" fill-opacity="0.7"/>
  <circle cx="32" cy="37" r="1.2" fill="#A78BFA" fill-opacity="0.7"/>
  <circle cx="44" cy="37" r="1.2" fill="#A78BFA" fill-opacity="0.7"/>
</svg>
