<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="csa-hero-title csa-hero-desc" font-family="'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title id="csa-hero-title">Cloud Scale Analytics in a Box — Azure-native reference platform</title>
  <desc id="csa-hero-desc">Azure-native reference implementation of Data Mesh, Data Fabric, and Data Lakehouse paradigms. Eight building blocks: domain mesh, governance fabric, Delta lakehouse, streaming, AI and ML, APIs and integration, compliance, and infrastructure as code.</desc>

  <defs>
    <linearGradient id="csa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1126"/>
      <stop offset="0.45" stop-color="#161B45"/>
      <stop offset="1" stop-color="#0B1132"/>
    </linearGradient>

    <radialGradient id="csa-glow-title" cx="0.18" cy="0.55" r="0.45">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="csa-glow-tiles" cx="0.78" cy="0.5" r="0.4">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="csa-tile-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E2A4A"/>
      <stop offset="1" stop-color="#0A1A33"/>
    </linearGradient>
    <linearGradient id="csa-tile-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A1A4D"/>
      <stop offset="1" stop-color="#170A33"/>
    </linearGradient>
    <linearGradient id="csa-tile-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D3A3D"/>
      <stop offset="1" stop-color="#0A1F26"/>
