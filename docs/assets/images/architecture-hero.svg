    <text x="20" y="19" fill="#A5F3FC" font-size="12" font-weight="600" letter-spacing="2.5" font-family="'JetBrains Mono', ui-monospace, monospace">DATA MESH &#183; DATA FABRIC &#183; DATA LAKEHOUSE</text>
  </g>

  <g transform="translate(48, 130)">
    <text x="0" y="60" fill="#FFFFFF" font-size="60" font-weight="700" letter-spacing="-1.5">Cloud Scale Analytics</text>
    <text x="0" y="125" fill="#FFFFFF" font-size="60" font-weight="700" letter-spacing="-1.5">in a Box</text>
  </g>

