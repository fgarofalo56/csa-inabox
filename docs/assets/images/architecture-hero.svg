    <linearGradient id="csa-tile-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3D2A0D"/>
      <stop offset="1" stop-color="#1F1505"/>
    </linearGradient>

    <pattern id="csa-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#3B4670" fill-opacity="0.35"/>
    </pattern>

    <pattern id="csa-grid-lines" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 0 L40 0 M0 0 L0 40" stroke="#22D3EE" stroke-opacity="0.06" stroke-width="0.5"/>
