  <rect width="1600" height="420" fill="url(#csa-bg)"/>
  <rect width="1600" height="420" fill="url(#csa-dots)"/>
  <rect width="1600" height="420" fill="url(#csa-glow-title)"/>
  <rect width="1600" height="420" fill="url(#csa-glow-tiles)"/>

  <line x1="48" y1="48" x2="200" y2="48" stroke="#22D3EE" stroke-opacity="0.5" stroke-width="1.5"/>

  <g transform="translate(48, 64)">
