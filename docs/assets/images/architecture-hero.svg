    <linearGradient id="csa-chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.15"/>
    </linearGradient>
