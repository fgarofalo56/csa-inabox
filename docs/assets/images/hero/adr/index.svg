<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">Architecture Decisions</title>
  <desc id="d">Durable rationale behind every platform choice — ADF over Airflow to APIM as integration fabric.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#155E75"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#A5F3FC"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h-title { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:600; font-size:64px; fill:#FFFFFF; letter-spacing:-1.2px; }
      .h-sub   { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:400; font-size:22px; fill:#FFFFFF; fill-opacity:0.82; letter-spacing:-0.2px; }
      .h-chip  { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:13px; letter-spacing:2.5px; fill:#FFFFFF; }
      .g-label { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:13px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-num   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:14px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-cap   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:10px; fill:#FFFFFF; fill-opacity:0.6; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Base gradient -->
  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- Single bold vertical accent stripe on the left edge -->
  <rect x="0" y="0" width="6" height="420" fill="#A5F3FC"/>
  <rect x="0" y="0" width="6" height="120" fill="#22D3EE"/>

  <!-- Subtle horizontal scan-line at bottom for structure -->
  <rect x="0" y="408" width="1600" height="2" fill="#A5F3FC" fill-opacity="0.25"/>

  <!-- Chip (top-left) -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="61" height="32" rx="0" fill="#67E8F9" fill-opacity="0.08" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="32" fill="#67E8F9"/>
    <text class="h-chip" x="41.5" y="21.5" text-anchor="middle" fill="#67E8F9">ADR</text>
  </g>

  <!-- Title -->
  <text class="h-title" x="80" y="200">Architecture Decisions</text>

  <!-- Subtitle -->
  <text class="h-sub" x="80" y="248">Durable rationale behind every platform choice — ADF over Airflow to APIM as integration fabric.</text>

  <!-- Coordinate marker tag below subtitle (technical-drawing flavor) -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="56" height="20" fill="#67E8F9" fill-opacity="0.1" stroke="#67E8F9" stroke-opacity="0.3" stroke-width="1"/>
    <text class="g-cap" x="28" y="14" text-anchor="middle" fill="#67E8F9">CSA-IN-A-BOX</text>
  </g>
  <text class="g-cap" x="146" y="314" fill="#A5F3FC" fill-opacity="0.65">v0.6.9 · azure-native</text>

  <!-- Schematic composition on the right (x≈960-1540, y≈70-360) -->
  <rect x="980" y="80" width="560" height="22" fill="#67E8F9" fill-opacity="0.27" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="80" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="95" fill="#A5F3FC" font-size="11">10</text>
  <text class="g-label" x="1030" y="95" fill="#FFFFFF" font-size="11">COMPLIANCE</text>
  <text class="g-cap" x="1530" y="95" fill="#A5F3FC" font-size="10" text-anchor="end">SIGN-OFF →</text>
  <rect x="980" y="108" width="560" height="22" fill="#67E8F9" fill-opacity="0.263" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="108" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="123" fill="#A5F3FC" font-size="11">09</text>
  <text class="g-label" x="1030" y="123" fill="#FFFFFF" font-size="11">COST MGMT</text>
  <rect x="980" y="136" width="560" height="22" fill="#67E8F9" fill-opacity="0.256" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="136" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="151" fill="#A5F3FC" font-size="11">08</text>
  <text class="g-label" x="1030" y="151" fill="#FFFFFF" font-size="11">OPERATIONAL</text>
  <rect x="980" y="164" width="560" height="22" fill="#67E8F9" fill-opacity="0.249" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="164" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="179" fill="#A5F3FC" font-size="11">07</text>
  <text class="g-label" x="1030" y="179" fill="#FFFFFF" font-size="11">GOVERNANCE</text>
  <rect x="980" y="192" width="560" height="22" fill="#67E8F9" fill-opacity="0.24200000000000002" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="192" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="207" fill="#A5F3FC" font-size="11">06</text>
  <text class="g-label" x="1030" y="207" fill="#FFFFFF" font-size="11">DR &amp; BC</text>
  <rect x="980" y="220" width="560" height="22" fill="#67E8F9" fill-opacity="0.23500000000000001" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="220" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="235" fill="#A5F3FC" font-size="11">05</text>
  <text class="g-label" x="1030" y="235" fill="#FFFFFF" font-size="11">OBSERVABILITY</text>
  <rect x="980" y="248" width="560" height="22" fill="#67E8F9" fill-opacity="0.228" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="248" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="263" fill="#A5F3FC" font-size="11">04</text>
  <text class="g-label" x="1030" y="263" fill="#FFFFFF" font-size="11">DATA PLATFORM</text>
  <rect x="980" y="276" width="560" height="22" fill="#67E8F9" fill-opacity="0.221" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="276" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="291" fill="#A5F3FC" font-size="11">03</text>
  <text class="g-label" x="1030" y="291" fill="#FFFFFF" font-size="11">SECURITY</text>
  <rect x="980" y="304" width="560" height="22" fill="#67E8F9" fill-opacity="0.21400000000000002" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="304" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="319" fill="#A5F3FC" font-size="11">02</text>
  <text class="g-label" x="1030" y="319" fill="#FFFFFF" font-size="11">INFRA HARDENING</text>
  <rect x="980" y="332" width="560" height="22" fill="#67E8F9" fill-opacity="0.20700000000000002" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="980" y="332" width="4" height="22" fill="#A5F3FC"/>
  <text class="g-num" x="996" y="347" fill="#A5F3FC" font-size="11">01</text>
  <text class="g-label" x="1030" y="347" fill="#FFFFFF" font-size="11">ENVIRONMENT</text>

</svg>
