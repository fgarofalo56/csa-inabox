<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 380" role="img" aria-label="Multi-Cloud — Azure as the architectural anchor for any cloud">
  <defs>
    <linearGradient id="mcBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1126"/>
      <stop offset="100%" stop-color="#1B2147"/>
    </linearGradient>
    <linearGradient id="mcAzure" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <radialGradient id="mcRing" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB100" stop-opacity="0.0"/>
      <stop offset="80%" stop-color="#FFB100" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#FFB100" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="380" fill="url(#mcBg)"/>

  <!-- subtle grid -->
  <g opacity="0.18" stroke="#7C7AE6" stroke-width="1">
    <line x1="0" y1="80" x2="1600" y2="80"/>
    <line x1="0" y1="160" x2="1600" y2="160"/>
    <line x1="0" y1="240" x2="1600" y2="240"/>
    <line x1="0" y1="320" x2="1600" y2="320"/>
  </g>

  <!-- Three orbits radiating around Azure core -->
  <g transform="translate(800,190)">
    <circle cx="0" cy="0" r="170" fill="none" stroke="#4F46E5" stroke-width="1.2" stroke-dasharray="4 6" opacity="0.55"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#7C7AE6" stroke-width="1.2" stroke-dasharray="4 6" opacity="0.65"/>
    <circle cx="0" cy="0" r="220" fill="url(#mcRing)"/>

    <!-- Azure core -->
    <circle cx="0" cy="0" r="62" fill="url(#mcAzure)" stroke="#FFFFFF" stroke-width="2"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Azure</text>
    <text x="0" y="22" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="11" fill="#E6E8FF">anchor</text>

    <!-- Three peer clouds -->
    <g>
      <circle cx="-170" cy="0" r="34" fill="#1B2147" stroke="#FF9900" stroke-width="2.5"/>
      <text x="-170" y="4" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#FF9900">AWS</text>
    </g>
    <g>
      <circle cx="120" cy="-90" r="34" fill="#1B2147" stroke="#34A853" stroke-width="2.5"/>
      <text x="120" y="-86" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#34A853">GCP</text>
    </g>
    <g>
      <circle cx="120" cy="90" r="34" fill="#1B2147" stroke="#EE0000" stroke-width="2.5"/>
      <text x="120" y="94" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#EE0000">OCI</text>
    </g>

    <!-- Federation lines -->
    <g stroke="#FFB100" stroke-width="1.5" opacity="0.7">
      <line x1="-62" y1="0" x2="-136" y2="0"/>
      <line x1="44" y1="-44" x2="92" y2="-76"/>
      <line x1="44" y1="44" x2="92" y2="76"/>
    </g>
  </g>

  <!-- Title strip -->
  <g transform="translate(60,140)">
    <text font-family="Segoe UI, Inter, Arial, sans-serif" font-size="44" font-weight="700" fill="#FFFFFF" y="0">Multi-Cloud</text>
    <text font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" fill="#C8CEFF" y="40">Avoid vendor lock-in. Design for portability.</text>
    <text font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#FFB100" y="80">Azure is the cloud built that way.</text>
  </g>

  <!-- Right pillars -->
  <g transform="translate(1280,80)" font-family="Segoe UI, Inter, Arial, sans-serif" fill="#E6E8FF">
    <text font-size="13" font-weight="600" y="0" fill="#FFB100">Open data</text>
    <text font-size="12" y="20">Delta Lake · Iceberg</text>
    <text font-size="13" font-weight="600" y="60" fill="#FFB100">Open identity</text>
    <text font-size="12" y="80">Entra ID · OIDC · SAML</text>
    <text font-size="13" font-weight="600" y="120" fill="#FFB100">Open infra</text>
    <text font-size="12" y="140">Bicep · Terraform · K8s</text>
    <text font-size="13" font-weight="600" y="180" fill="#FFB100">Open AI</text>
    <text font-size="12" y="200">OpenAI-compatible APIs</text>
  </g>
</svg>
