<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">Gov Service Matrix</title>
  <desc id="d">Azure Government service catalog — IL4 / IL5 / GCC / GCC-High availability per region.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="60%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h-title { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:600; font-size:64px; fill:#FFFFFF; letter-spacing:-1.2px; }
      .h-sub   { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:400; font-size:22px; fill:#FFFFFF; fill-opacity:0.82; letter-spacing:-0.2px; }
      .h-chip  { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:13px; letter-spacing:2.5px; fill:#FFFFFF; }
      .g-label { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:13px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-num   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:14px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-cap   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:10px; fill:#FFFFFF; fill-opacity:0.6; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Base gradient -->
  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- Single bold vertical accent stripe on the left edge -->
  <rect x="0" y="0" width="6" height="420" fill="#EDE9FE"/>
  <rect x="0" y="0" width="6" height="120" fill="#A78BFA"/>

  <!-- Subtle horizontal scan-line at bottom for structure -->
  <rect x="0" y="408" width="1600" height="2" fill="#EDE9FE" fill-opacity="0.25"/>

  <!-- Chip (top-left) -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="61" height="32" rx="0" fill="#DDD6FE" fill-opacity="0.08" stroke="#DDD6FE" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="32" fill="#DDD6FE"/>
    <text class="h-chip" x="41.5" y="21.5" text-anchor="middle" fill="#DDD6FE">GOV</text>
  </g>

  <!-- Title -->
  <text class="h-title" x="80" y="200">Gov Service Matrix</text>

  <!-- Subtitle -->
  <text class="h-sub" x="80" y="248">Azure Government service catalog — IL4 / IL5 / GCC / GCC-High availability per region.</text>

  <!-- Coordinate marker tag below subtitle (technical-drawing flavor) -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="56" height="20" fill="#DDD6FE" fill-opacity="0.1" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
    <text class="g-cap" x="28" y="14" text-anchor="middle" fill="#DDD6FE">CSA-IN-A-BOX</text>
  </g>
  <text class="g-cap" x="146" y="314" fill="#EDE9FE" fill-opacity="0.65">v0.6.9 · azure-native</text>

  <!-- Schematic composition on the right (x≈960-1540, y≈70-360) -->
  <rect x="980" y="100" width="180" height="220" fill="#DDD6FE" fill-opacity="0.18" stroke="#DDD6FE" stroke-opacity="0.7" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="980" y="100" width="180" height="6" fill="#EDE9FE"/>
  <text x="1070" y="140" text-anchor="middle" font-family="IBM Plex Sans" font-weight="700" font-size="18" fill="#FFFFFF">FABRIC</text>
  <text class="g-cap" x="1070" y="162" text-anchor="middle" fill="#EDE9FE">unified</text>
  <rect x="996" y="190" width="148" height="22" fill="#DDD6FE" fill-opacity="0.12" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="1070" y="205" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">OneLake</text>
  <rect x="996" y="222" width="148" height="22" fill="#DDD6FE" fill-opacity="0.12" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="1070" y="237" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">Direct Lake</text>
  <rect x="996" y="254" width="148" height="22" fill="#DDD6FE" fill-opacity="0.12" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="1070" y="269" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">OneSec</text>
  <rect x="1180" y="100" width="180" height="220" fill="#DDD6FE" fill-opacity="0.18" stroke="#DDD6FE" stroke-opacity="0.7" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1180" y="100" width="180" height="6" fill="#EDE9FE"/>
  <text x="1270" y="140" text-anchor="middle" font-family="IBM Plex Sans" font-weight="700" font-size="18" fill="#FFFFFF">DATABRICKS</text>
  <text class="g-cap" x="1270" y="162" text-anchor="middle" fill="#EDE9FE">spark-first</text>
  <rect x="1196" y="190" width="148" height="22" fill="#DDD6FE" fill-opacity="0.12" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="1270" y="205" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">Photon</text>
  <rect x="1196" y="222" width="148" height="22" fill="#DDD6FE" fill-opacity="0.12" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="1270" y="237" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">Unity Catalog</text>
  <rect x="1196" y="254" width="148" height="22" fill="#DDD6FE" fill-opacity="0.12" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="1270" y="269" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">MLflow</text>
  <rect x="1380" y="100" width="180" height="220" fill="#DDD6FE" fill-opacity="0.18" stroke="#DDD6FE" stroke-opacity="0.7" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1380" y="100" width="180" height="6" fill="#EDE9FE"/>
  <text x="1470" y="140" text-anchor="middle" font-family="IBM Plex Sans" font-weight="700" font-size="18" fill="#FFFFFF">SYNAPSE</text>
  <text class="g-cap" x="1470" y="162" text-anchor="middle" fill="#EDE9FE">warehouse</text>
  <rect x="1396" y="190" width="148" height="22" fill="#DDD6FE" fill-opacity="0.12" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="1470" y="205" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">Serverless SQL</text>
  <rect x="1396" y="222" width="148" height="22" fill="#DDD6FE" fill-opacity="0.12" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="1470" y="237" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">Dedicated SQL</text>
  <rect x="1396" y="254" width="148" height="22" fill="#DDD6FE" fill-opacity="0.12" stroke="#DDD6FE" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="1470" y="269" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">Spark Pool</text>

</svg>
