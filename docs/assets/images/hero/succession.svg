<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">Maintainer Succession</title>
  <desc id="d">Roles, escalation paths, knowledge transfer, contact tree, on-call rotation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="60%" stop-color="#7E22CE"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#FBCFE8"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h-title { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:600; font-size:64px; fill:#FFFFFF; letter-spacing:-1.2px; }
      .h-sub   { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:400; font-size:22px; fill:#FFFFFF; fill-opacity:0.82; letter-spacing:-0.2px; }
      .h-chip  { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:13px; letter-spacing:2.5px; fill:#FFFFFF; }
      .g-label { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:13px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-num   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:14px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-cap   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:10px; fill:#FFFFFF; fill-opacity:0.6; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Base gradient -->
  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- Single bold vertical accent stripe on the left edge -->
  <rect x="0" y="0" width="6" height="420" fill="#FBCFE8"/>
  <rect x="0" y="0" width="6" height="120" fill="#E879F9"/>

  <!-- Subtle horizontal scan-line at bottom for structure -->
  <rect x="0" y="408" width="1600" height="2" fill="#FBCFE8" fill-opacity="0.25"/>

  <!-- Chip (top-left) -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="138" height="32" rx="0" fill="#F0ABFC" fill-opacity="0.08" stroke="#F0ABFC" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="32" fill="#F0ABFC"/>
    <text class="h-chip" x="80.0" y="21.5" text-anchor="middle" fill="#F0ABFC">SUCCESSION</text>
  </g>

  <!-- Title -->
  <text class="h-title" x="80" y="200">Maintainer Succession</text>

  <!-- Subtitle -->
  <text class="h-sub" x="80" y="248">Roles, escalation paths, knowledge transfer, contact tree, on-call rotation.</text>

  <!-- Coordinate marker tag below subtitle (technical-drawing flavor) -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="56" height="20" fill="#F0ABFC" fill-opacity="0.1" stroke="#F0ABFC" stroke-opacity="0.3" stroke-width="1"/>
    <text class="g-cap" x="28" y="14" text-anchor="middle" fill="#F0ABFC">CSA-IN-A-BOX</text>
  </g>
  <text class="g-cap" x="146" y="314" fill="#FBCFE8" fill-opacity="0.65">v0.6.9 · azure-native</text>

  <!-- Schematic composition on the right (x≈960-1540, y≈70-360) -->
  <rect x="1000" y="100" width="140" height="100" fill="#F0ABFC" fill-opacity="0.12" stroke="#F0ABFC" stroke-opacity="0.55" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1000" y="100" width="140" height="6" fill="#FBCFE8"/>
  <text class="g-num" x="1014" y="138" fill="#FBCFE8">01</text>
  <text class="g-label" x="1014" y="172" fill="#FFFFFF">ORIENT</text>
  <rect x="1180" y="100" width="140" height="100" fill="#F0ABFC" fill-opacity="0.12" stroke="#F0ABFC" stroke-opacity="0.55" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1180" y="100" width="140" height="6" fill="#FBCFE8"/>
  <text class="g-num" x="1194" y="138" fill="#FBCFE8">02</text>
  <text class="g-label" x="1194" y="172" fill="#FFFFFF">PATH</text>
  <rect x="1360" y="100" width="140" height="100" fill="#F0ABFC" fill-opacity="0.12" stroke="#F0ABFC" stroke-opacity="0.55" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1360" y="100" width="140" height="6" fill="#FBCFE8"/>
  <text class="g-num" x="1374" y="138" fill="#FBCFE8">03</text>
  <text class="g-label" x="1374" y="172" fill="#FFFFFF">SETUP</text>
  <rect x="1000" y="240" width="140" height="100" fill="#F0ABFC" fill-opacity="0.12" stroke="#F0ABFC" stroke-opacity="0.55" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1000" y="240" width="140" height="6" fill="#FBCFE8"/>
  <text class="g-num" x="1014" y="278" fill="#FBCFE8">04</text>
  <text class="g-label" x="1014" y="312" fill="#FFFFFF">BUILD</text>
  <rect x="1180" y="240" width="140" height="100" fill="#F0ABFC" fill-opacity="0.12" stroke="#F0ABFC" stroke-opacity="0.55" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1180" y="240" width="140" height="6" fill="#FBCFE8"/>
  <text class="g-num" x="1194" y="278" fill="#FBCFE8">05</text>
  <text class="g-label" x="1194" y="312" fill="#FFFFFF">EXPLORE</text>
  <rect x="1360" y="240" width="140" height="100" fill="#F0ABFC" fill-opacity="0.12" stroke="#F0ABFC" stroke-opacity="0.55" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1360" y="240" width="140" height="6" fill="#FBCFE8"/>
  <text class="g-num" x="1374" y="278" fill="#FBCFE8">06</text>
  <text class="g-label" x="1374" y="312" fill="#FFFFFF">DEPLOY</text>
  <path d="M 1140 150 L 1180 150 M 1320 150 L 1360 150" stroke="#FBCFE8" stroke-width="1.5"/>
  <path d="M 1140 290 L 1180 290 M 1320 290 L 1360 290" stroke="#FBCFE8" stroke-width="1.5"/>
  <path d="M 1500 150 L 1530 150 L 1530 290 L 1500 290" stroke="#FBCFE8" stroke-width="1.5" fill="none"/>
  <text class="g-cap" x="960" y="380" fill="#FFFFFF" fill-opacity="0.7">6 MILESTONES · 30 MIN</text>

</svg>
