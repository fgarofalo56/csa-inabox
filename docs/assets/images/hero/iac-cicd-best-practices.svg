<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">IaC + CI/CD</title>
  <desc id="d">Bicep, GitHub Actions, drift detection, environment promotion, OIDC federated creds.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#082F49"/>
      <stop offset="60%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#082F49"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h-title { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:600; font-size:64px; fill:#FFFFFF; letter-spacing:-1.2px; }
      .h-sub   { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:400; font-size:22px; fill:#FFFFFF; fill-opacity:0.82; letter-spacing:-0.2px; }
      .h-chip  { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:13px; letter-spacing:2.5px; fill:#FFFFFF; }
      .g-label { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:13px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-num   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:14px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-cap   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:10px; fill:#FFFFFF; fill-opacity:0.6; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Base gradient -->
  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- Single bold vertical accent stripe on the left edge -->
  <rect x="0" y="0" width="6" height="420" fill="#BAE6FD"/>
  <rect x="0" y="0" width="6" height="120" fill="#38BDF8"/>

  <!-- Subtle horizontal scan-line at bottom for structure -->
  <rect x="0" y="408" width="1600" height="2" fill="#BAE6FD" fill-opacity="0.25"/>

  <!-- Chip (top-left) -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="171" height="32" rx="0" fill="#7DD3FC" fill-opacity="0.08" stroke="#7DD3FC" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="32" fill="#7DD3FC"/>
    <text class="h-chip" x="96.5" y="21.5" text-anchor="middle" fill="#7DD3FC">BEST PRACTICE</text>
  </g>

  <!-- Title -->
  <text class="h-title" x="80" y="200">IaC + CI/CD</text>

  <!-- Subtitle -->
  <text class="h-sub" x="80" y="248">Bicep, GitHub Actions, drift detection, environment promotion, OIDC federated creds.</text>

  <!-- Coordinate marker tag below subtitle (technical-drawing flavor) -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="56" height="20" fill="#7DD3FC" fill-opacity="0.1" stroke="#7DD3FC" stroke-opacity="0.3" stroke-width="1"/>
    <text class="g-cap" x="28" y="14" text-anchor="middle" fill="#7DD3FC">CSA-IN-A-BOX</text>
  </g>
  <text class="g-cap" x="146" y="314" fill="#BAE6FD" fill-opacity="0.65">v0.6.9 · azure-native</text>

  <!-- Schematic composition on the right (x≈960-1540, y≈70-360) -->
  <rect x="980" y="160" width="100" height="100" fill="#7DD3FC" fill-opacity="0.15" stroke="#7DD3FC" stroke-opacity="0.6" stroke-width="1.2"/>
  <rect x="980" y="160" width="100" height="6" fill="#BAE6FD"/>
  <text class="g-label" x="1030" y="200" text-anchor="middle" fill="#FFFFFF">COMMIT</text>
  <text class="g-cap" x="1030" y="220" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">git push</text>
  <text class="g-cap" x="1030" y="248" text-anchor="middle" fill="#BAE6FD">✓</text>
  <rect x="1100" y="160" width="100" height="100" fill="#7DD3FC" fill-opacity="0.15" stroke="#7DD3FC" stroke-opacity="0.6" stroke-width="1.2"/>
  <rect x="1100" y="160" width="100" height="6" fill="#BAE6FD"/>
  <text class="g-label" x="1150" y="200" text-anchor="middle" fill="#FFFFFF">LINT</text>
  <text class="g-cap" x="1150" y="220" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">ruff · mypy</text>
  <text class="g-cap" x="1150" y="248" text-anchor="middle" fill="#BAE6FD">✓</text>
  <rect x="1220" y="160" width="100" height="100" fill="#7DD3FC" fill-opacity="0.15" stroke="#7DD3FC" stroke-opacity="0.6" stroke-width="1.2"/>
  <rect x="1220" y="160" width="100" height="6" fill="#BAE6FD"/>
  <text class="g-label" x="1270" y="200" text-anchor="middle" fill="#FFFFFF">TEST</text>
  <text class="g-cap" x="1270" y="220" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">pytest</text>
  <text class="g-cap" x="1270" y="248" text-anchor="middle" fill="#BAE6FD">✓</text>
  <rect x="1340" y="160" width="100" height="100" fill="#7DD3FC" fill-opacity="0.15" stroke="#7DD3FC" stroke-opacity="0.6" stroke-width="1.2"/>
  <rect x="1340" y="160" width="100" height="6" fill="#BAE6FD"/>
  <text class="g-label" x="1390" y="200" text-anchor="middle" fill="#FFFFFF">BUILD</text>
  <text class="g-cap" x="1390" y="220" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">bicep · docker</text>
  <text class="g-cap" x="1390" y="248" text-anchor="middle" fill="#BAE6FD">✓</text>
  <rect x="1460" y="160" width="100" height="100" fill="#7DD3FC" fill-opacity="0.15" stroke="#7DD3FC" stroke-opacity="0.6" stroke-width="1.2"/>
  <rect x="1460" y="160" width="100" height="6" fill="#BAE6FD"/>
  <text class="g-label" x="1510" y="200" text-anchor="middle" fill="#FFFFFF">DEPLOY</text>
  <text class="g-cap" x="1510" y="220" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">az deploy</text>
  <text class="g-cap" x="1510" y="248" text-anchor="middle" fill="#BAE6FD">✓</text>
  <path d="M 1080 210 L 1100 210 M 1095 205 L 1100 210 L 1095 215" stroke="#BAE6FD" stroke-width="1.5" fill="none"/>
  <path d="M 1200 210 L 1220 210 M 1215 205 L 1220 210 L 1215 215" stroke="#BAE6FD" stroke-width="1.5" fill="none"/>
  <path d="M 1320 210 L 1340 210 M 1335 205 L 1340 210 L 1335 215" stroke="#BAE6FD" stroke-width="1.5" fill="none"/>
  <path d="M 1440 210 L 1460 210 M 1455 205 L 1460 210 L 1455 215" stroke="#BAE6FD" stroke-width="1.5" fill="none"/>
  <text class="g-cap" x="980" y="310" fill="#FFFFFF" fill-opacity="0.7">DRIFT DETECTION · ENV PROMOTION · OIDC</text>

</svg>
