<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">Identity &amp; Secrets</title>
  <desc id="d">Managed Identity, Key Vault, Entra ID — zero-secret propagation end-to-end.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#1F0408"/>
      <stop offset="60%" stop-color="#7F1D1D"/>
      <stop offset="100%" stop-color="#1F0408"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#FECACA"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h-title { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:600; font-size:64px; fill:#FFFFFF; letter-spacing:-1.2px; }
      .h-sub   { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:400; font-size:22px; fill:#FFFFFF; fill-opacity:0.82; letter-spacing:-0.2px; }
      .h-chip  { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:13px; letter-spacing:2.5px; fill:#FFFFFF; }
      .g-label { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:13px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-num   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:14px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-cap   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:10px; fill:#FFFFFF; fill-opacity:0.6; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Base gradient -->
  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- Single bold vertical accent stripe on the left edge -->
  <rect x="0" y="0" width="6" height="420" fill="#FECACA"/>
  <rect x="0" y="0" width="6" height="120" fill="#F87171"/>

  <!-- Subtle horizontal scan-line at bottom for structure -->
  <rect x="0" y="408" width="1600" height="2" fill="#FECACA" fill-opacity="0.25"/>

  <!-- Chip (top-left) -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="226" height="32" rx="0" fill="#FCA5A5" fill-opacity="0.08" stroke="#FCA5A5" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="32" fill="#FCA5A5"/>
    <text class="h-chip" x="124.0" y="21.5" text-anchor="middle" fill="#FCA5A5">REF · ARCHITECTURE</text>
  </g>

  <!-- Title -->
  <text class="h-title" x="80" y="200">Identity &amp; Secrets</text>

  <!-- Subtitle -->
  <text class="h-sub" x="80" y="248">Managed Identity, Key Vault, Entra ID — zero-secret propagation end-to-end.</text>

  <!-- Coordinate marker tag below subtitle (technical-drawing flavor) -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="56" height="20" fill="#FCA5A5" fill-opacity="0.1" stroke="#FCA5A5" stroke-opacity="0.3" stroke-width="1"/>
    <text class="g-cap" x="28" y="14" text-anchor="middle" fill="#FCA5A5">CSA-IN-A-BOX</text>
  </g>
  <text class="g-cap" x="146" y="314" fill="#FECACA" fill-opacity="0.65">v0.6.9 · azure-native</text>

  <!-- Schematic composition on the right (x≈960-1540, y≈70-360) -->
  <rect x="980" y="170" width="120" height="80" fill="#FCA5A5" fill-opacity="0.18" stroke="#FCA5A5" stroke-opacity="0.7" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="980" y="170" width="6" height="80" fill="#FECACA"/>
  <text class="g-label" x="1040" y="204" text-anchor="middle" fill="#FFFFFF">ENTRA ID</text>
  <text class="g-cap" x="1040" y="226" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">identity</text>
  <rect x="1140" y="170" width="120" height="80" fill="#FCA5A5" fill-opacity="0.18" stroke="#FCA5A5" stroke-opacity="0.7" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1140" y="170" width="6" height="80" fill="#FECACA"/>
  <text class="g-label" x="1200" y="204" text-anchor="middle" fill="#FFFFFF">MANAGED ID</text>
  <text class="g-cap" x="1200" y="226" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">no secret</text>
  <rect x="1300" y="170" width="120" height="80" fill="#FCA5A5" fill-opacity="0.18" stroke="#FCA5A5" stroke-opacity="0.7" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1300" y="170" width="6" height="80" fill="#FECACA"/>
  <text class="g-label" x="1360" y="204" text-anchor="middle" fill="#FFFFFF">KEY VAULT</text>
  <text class="g-cap" x="1360" y="226" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">secret store</text>
  <rect x="1460" y="170" width="120" height="80" fill="#FCA5A5" fill-opacity="0.18" stroke="#FCA5A5" stroke-opacity="0.7" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1460" y="170" width="6" height="80" fill="#FECACA"/>
  <text class="g-label" x="1520" y="204" text-anchor="middle" fill="#FFFFFF">RESOURCE</text>
  <text class="g-cap" x="1520" y="226" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">consumer</text>
  <path d="M 1100 210 L 1140 210 M 1135 205 L 1140 210 L 1135 215" stroke="#FECACA" stroke-width="1.5" fill="none"/>
  <path d="M 1260 210 L 1300 210 M 1295 205 L 1300 210 L 1295 215" stroke="#FECACA" stroke-width="1.5" fill="none"/>
  <path d="M 1420 210 L 1460 210 M 1455 205 L 1460 210 L 1455 215" stroke="#FECACA" stroke-width="1.5" fill="none"/>
  <g transform="translate(1500, 285)"><rect x="-20" y="-12" width="40" height="32" fill="#FECACA" fill-opacity="0.18" stroke="#FECACA" stroke-opacity="0.6" stroke-width="1"/></g>
  <text class="g-cap" x="1280" y="120" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">ZERO-SECRET PROPAGATION</text>

</svg>
