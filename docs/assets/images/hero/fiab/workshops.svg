<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">CSA Loom — Workshops</title>
  <desc id="d">5-day Federal CoE and 5-day Commercial CoE workshops to stand up your Loom Center of Excellence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3d2e80"/>
      <stop offset="55%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#d89f3d"/>
    </linearGradient>
    <radialGradient id="glow-tr" cx="0.9" cy="0.1" r="0.45" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bl" cx="0.1" cy="1.1" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d89f3d" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#d89f3d" stop-opacity="0"/>
    </radialGradient>
    <style>
      .h-title { font-family:'IBM Plex Sans','Segoe UI',sans-serif; font-weight:600; font-size:60px; fill:#FFFFFF; letter-spacing:-1.2px; }
      .h-sub   { font-family:'IBM Plex Sans','Segoe UI',sans-serif; font-weight:400; font-size:22px; fill:#FFFFFF; fill-opacity:0.92; }
      .h-chip  { font-family:'JetBrains Mono','Consolas',monospace; font-weight:700; font-size:13px; letter-spacing:2.5px; fill:#FFFFFF; }
      .g-label { font-family:'JetBrains Mono','Consolas',monospace; font-weight:700; font-size:14px; fill:#FFFFFF; letter-spacing:0.4px; }
      .g-day   { font-family:'JetBrains Mono','Consolas',monospace; font-weight:700; font-size:18px; fill:#aea0ff; }
      .g-cap   { font-family:'JetBrains Mono','Consolas',monospace; font-weight:500; font-size:10px; fill:#FFFFFF; fill-opacity:0.78; letter-spacing:1.2px; }
    </style>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>
  <rect width="1600" height="420" fill="url(#glow-tr)"/>
  <rect width="1600" height="420" fill="url(#glow-bl)"/>
  <rect x="0" y="0" width="6" height="420" fill="#e6b566"/>
  <rect x="0" y="0" width="6" height="120" fill="#aea0ff"/>
  <rect x="0" y="418" width="1600" height="2" fill="#aea0ff" fill-opacity="0.30"/>

  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="180" height="32" fill="#aea0ff" fill-opacity="0.10" stroke="#aea0ff" stroke-opacity="0.55" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="32" fill="#aea0ff"/>
    <text class="h-chip" x="98" y="21" text-anchor="middle" fill="#aea0ff">5-DAY COE</text>
  </g>

  <text class="h-title" x="80" y="200">Workshops</text>
  <text class="h-sub" x="80" y="248">Federal CoE + Commercial CoE — five days to stand up</text>
  <text class="h-sub" x="80" y="278" fill-opacity="0.72">your Loom Center of Excellence.</text>

  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="62" height="20" fill="#e6b566" fill-opacity="0.14" stroke="#e6b566" stroke-opacity="0.45" stroke-width="1"/>
    <text class="g-cap" x="31" y="14" text-anchor="middle" fill="#e6b566">5 DAYS</text>
  </g>
  <text class="g-cap" x="156" y="334" fill="#ffffff" fill-opacity="0.7">microsoft delivery · customer architects · live azure tenant</text>

  <!-- 5-day timeline on the right -->
  <g transform="translate(880, 100)" font-family="JetBrains Mono, Consolas, monospace">
    <text class="g-cap" x="320" y="-12" text-anchor="middle" fill="#aea0ff">5-DAY CURRICULUM</text>

    <!-- Day 1 -->
    <g transform="translate(0,0)">
      <circle cx="40" cy="40" r="34" fill="#aea0ff" fill-opacity="0.20" stroke="#aea0ff" stroke-opacity="0.85" stroke-width="2"/>
      <text class="g-day" x="40" y="46" text-anchor="middle">D1</text>
      <text class="g-label" x="40" y="100" text-anchor="middle">Architecture</text>
      <text class="g-cap" x="40" y="120" text-anchor="middle">Per-boundary</text>
      <text class="g-cap" x="40" y="138" text-anchor="middle">mapping</text>
    </g>
    <line x1="80" y1="40" x2="125" y2="40" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2"/>

    <!-- Day 2 -->
    <g transform="translate(130,0)">
      <circle cx="40" cy="40" r="34" fill="#aea0ff" fill-opacity="0.20" stroke="#aea0ff" stroke-opacity="0.85" stroke-width="2"/>
      <text class="g-day" x="40" y="46" text-anchor="middle">D2</text>
      <text class="g-label" x="40" y="100" text-anchor="middle">Lakehouse</text>
      <text class="g-cap" x="40" y="120" text-anchor="middle">Notebook</text>
      <text class="g-cap" x="40" y="138" text-anchor="middle">Warehouse</text>
    </g>
    <line x1="210" y1="40" x2="255" y2="40" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2"/>

    <!-- Day 3 -->
    <g transform="translate(260,0)">
      <circle cx="40" cy="40" r="34" fill="#e6b566" fill-opacity="0.22" stroke="#e6b566" stroke-opacity="0.85" stroke-width="2"/>
      <text class="g-day" x="40" y="46" text-anchor="middle" fill="#e6b566">D3</text>
      <text class="g-label" x="40" y="100" text-anchor="middle">Real-Time</text>
      <text class="g-cap" x="40" y="120" text-anchor="middle">Activator</text>
      <text class="g-cap" x="40" y="138" text-anchor="middle">Data Agents</text>
    </g>
    <line x1="340" y1="40" x2="385" y2="40" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2"/>

    <!-- Day 4 -->
    <g transform="translate(390,0)">
      <circle cx="40" cy="40" r="34" fill="#e6b566" fill-opacity="0.22" stroke="#e6b566" stroke-opacity="0.85" stroke-width="2"/>
      <text class="g-day" x="40" y="46" text-anchor="middle" fill="#e6b566">D4</text>
      <text class="g-label" x="40" y="100" text-anchor="middle">Forward</text>
      <text class="g-cap" x="40" y="120" text-anchor="middle">Migration</text>
      <text class="g-cap" x="40" y="138" text-anchor="middle">Planning</text>
    </g>
    <line x1="470" y1="40" x2="515" y2="40" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2"/>

    <!-- Day 5 -->
    <g transform="translate(520,0)">
      <circle cx="40" cy="40" r="34" fill="#e6b566" fill-opacity="0.22" stroke="#e6b566" stroke-opacity="0.85" stroke-width="2"/>
      <text class="g-day" x="40" y="46" text-anchor="middle" fill="#e6b566">D5</text>
      <text class="g-label" x="40" y="100" text-anchor="middle">Custom</text>
      <text class="g-cap" x="40" y="120" text-anchor="middle">Workload</text>
      <text class="g-cap" x="40" y="138" text-anchor="middle">Handoff</text>
    </g>
  </g>

  <text class="g-cap" x="880" y="396" fill="#FFFFFF" fill-opacity="0.7">FEDERAL COE · COMMERCIAL COE · SAME CURRICULUM · BOUNDARY-ADAPTED</text>
</svg>
