<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 380" preserveAspectRatio="xMidYMid slice" role="img" aria-label="CSA Loom — Microsoft Fabric experience for Azure tenants where Fabric isn't yet available">
  <!--
    Mirrors the live CSA Loom app home-page hero treatment from
    `apps/fiab-console/app/globals.css`:
      loom-hero-bg = linear-gradient(135deg,
                          #3d2e80 0%,    indigo-700 (primary brand)
                          #1f6feb 55%,   azure-600  (secondary)
                          #d89f3d 130%)  amber-500  (accent)
    Plus the two radial highlights from `heroPattern` in
    `apps/fiab-console/app/page.tsx`:
      - top-right    : white  18% glow, fades by 45%
      - bottom-left  : amber  30% glow, fades by 50%
    Same brand tokens, same composition — keeps the docs landing
    visually consistent with the live console.
  -->
  <defs>
    <linearGradient id="loom-hero-bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3d2e80"/>
      <stop offset="55%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#d89f3d"/>
    </linearGradient>
    <radialGradient id="loom-hero-tr" cx="0.9" cy="0.1" r="0.45" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="loom-hero-bl" cx="0.1" cy="1.1" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d89f3d" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#d89f3d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="loom-weave" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <line x1="0" y1="0" x2="0" y2="64" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="32" y1="0" x2="32" y2="64" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
      <line x1="0" y1="32" x2="64" y2="32" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="380" fill="url(#loom-hero-bg)"/>
  <rect width="1600" height="380" fill="url(#loom-weave)"/>
  <rect width="1600" height="380" fill="url(#loom-hero-tr)"/>
  <rect width="1600" height="380" fill="url(#loom-hero-bl)"/>
</svg>
