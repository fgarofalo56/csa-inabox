    <rect x="0" y="70" width="86" height="60" fill="#e6b566" fill-opacity="0.16" stroke="#e6b566" stroke-opacity="0.65" stroke-width="1"/>
    <rect x="0" y="70" width="86" height="4" fill="#e6b566"/>
    <text class="g-label" x="43" y="96" text-anchor="middle">NOTEBOOK</text>
