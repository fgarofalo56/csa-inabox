<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">Zero-Move Data</title>
  <desc id="d">Query in place — Delta Lake on ADLS shared by Databricks, Synapse, Fabric.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#082F49"/>
      <stop offset="60%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#082F49"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h-title { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:600; font-size:64px; fill:#FFFFFF; letter-spacing:-1.2px; }
      .h-sub   { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:400; font-size:22px; fill:#FFFFFF; fill-opacity:0.82; letter-spacing:-0.2px; }
      .h-chip  { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:13px; letter-spacing:2.5px; fill:#FFFFFF; }
      .g-label { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:13px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-num   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:14px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-cap   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:10px; fill:#FFFFFF; fill-opacity:0.6; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Base gradient -->
  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- Single bold vertical accent stripe on the left edge -->
  <rect x="0" y="0" width="6" height="420" fill="#BAE6FD"/>
  <rect x="0" y="0" width="6" height="120" fill="#38BDF8"/>

  <!-- Subtle horizontal scan-line at bottom for structure -->
  <rect x="0" y="408" width="1600" height="2" fill="#BAE6FD" fill-opacity="0.25"/>

  <!-- Chip (top-left) -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="171" height="32" rx="0" fill="#7DD3FC" fill-opacity="0.08" stroke="#7DD3FC" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="32" fill="#7DD3FC"/>
    <text class="h-chip" x="96.5" y="21.5" text-anchor="middle" fill="#7DD3FC">BEST PRACTICE</text>
  </g>

  <!-- Title -->
  <text class="h-title" x="80" y="200">Zero-Move Data</text>

  <!-- Subtitle -->
  <text class="h-sub" x="80" y="248">Query in place — Delta Lake on ADLS shared by Databricks, Synapse, Fabric.</text>

  <!-- Coordinate marker tag below subtitle (technical-drawing flavor) -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="56" height="20" fill="#7DD3FC" fill-opacity="0.1" stroke="#7DD3FC" stroke-opacity="0.3" stroke-width="1"/>
    <text class="g-cap" x="28" y="14" text-anchor="middle" fill="#7DD3FC">CSA-IN-A-BOX</text>
  </g>
  <text class="g-cap" x="146" y="314" fill="#BAE6FD" fill-opacity="0.65">v0.6.9 · azure-native</text>

  <!-- Schematic composition on the right (x≈960-1540, y≈70-360) -->
  <rect x="1140" y="170" width="240" height="120" fill="#7DD3FC" fill-opacity="0.2" stroke="#7DD3FC" stroke-opacity="0.7" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1140" y="170" width="6" height="120" fill="#BAE6FD"/>
  <text class="g-label" x="1260" y="210" text-anchor="middle" fill="#FFFFFF" font-size="16">ADLS GEN2</text>
  <text class="g-cap" x="1260" y="232" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">Delta · Parquet</text>
  <text class="g-cap" x="1260" y="252" text-anchor="middle" fill="#BAE6FD">SINGLE SOURCE</text>
  <rect x="980" y="130" width="130" height="50" fill="#7DD3FC" fill-opacity="0.1" stroke="#7DD3FC" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1045" y="162" text-anchor="middle" fill="#BAE6FD">DATABRICKS</text>
  <rect x="980" y="280" width="130" height="50" fill="#7DD3FC" fill-opacity="0.1" stroke="#7DD3FC" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1045" y="312" text-anchor="middle" fill="#BAE6FD">SYNAPSE</text>
  <rect x="1430" y="130" width="130" height="50" fill="#7DD3FC" fill-opacity="0.1" stroke="#7DD3FC" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1495" y="162" text-anchor="middle" fill="#BAE6FD">FABRIC</text>
  <rect x="1430" y="280" width="130" height="50" fill="#7DD3FC" fill-opacity="0.1" stroke="#7DD3FC" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1495" y="312" text-anchor="middle" fill="#BAE6FD">TRINO</text>
  <path d="M 1110 155 L 1140 200 M 1130 195 L 1140 200 L 1135 190" stroke="#BAE6FD" stroke-width="1.5" fill="none"/>
  <path d="M 1110 305 L 1140 260 M 1130 265 L 1140 260 L 1135 270" stroke="#BAE6FD" stroke-width="1.5" fill="none"/>
  <path d="M 1430 155 L 1380 200 M 1390 195 L 1380 200 L 1385 190" stroke="#BAE6FD" stroke-width="1.5" fill="none"/>
  <path d="M 1430 305 L 1380 260 M 1390 265 L 1380 260 L 1385 270" stroke="#BAE6FD" stroke-width="1.5" fill="none"/>

</svg>
