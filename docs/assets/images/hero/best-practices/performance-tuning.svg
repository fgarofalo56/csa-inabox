<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">Performance Tuning</title>
  <desc id="d">Cluster sizing, Delta optimize/zorder, query plans, hot/cold tiers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#082F49"/>
      <stop offset="60%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#082F49"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h-title { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:600; font-size:64px; fill:#FFFFFF; letter-spacing:-1.2px; }
      .h-sub   { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:400; font-size:22px; fill:#FFFFFF; fill-opacity:0.82; letter-spacing:-0.2px; }
      .h-chip  { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:13px; letter-spacing:2.5px; fill:#FFFFFF; }
      .g-label { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:13px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-num   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:14px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-cap   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:10px; fill:#FFFFFF; fill-opacity:0.6; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Base gradient -->
  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- Single bold vertical accent stripe on the left edge -->
  <rect x="0" y="0" width="6" height="420" fill="#BAE6FD"/>
  <rect x="0" y="0" width="6" height="120" fill="#38BDF8"/>

  <!-- Subtle horizontal scan-line at bottom for structure -->
  <rect x="0" y="408" width="1600" height="2" fill="#BAE6FD" fill-opacity="0.25"/>

  <!-- Chip (top-left) -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="171" height="32" rx="0" fill="#7DD3FC" fill-opacity="0.08" stroke="#7DD3FC" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="32" fill="#7DD3FC"/>
    <text class="h-chip" x="96.5" y="21.5" text-anchor="middle" fill="#7DD3FC">BEST PRACTICE</text>
  </g>

  <!-- Title -->
  <text class="h-title" x="80" y="200">Performance Tuning</text>

  <!-- Subtitle -->
  <text class="h-sub" x="80" y="248">Cluster sizing, Delta optimize/zorder, query plans, hot/cold tiers.</text>

  <!-- Coordinate marker tag below subtitle (technical-drawing flavor) -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="56" height="20" fill="#7DD3FC" fill-opacity="0.1" stroke="#7DD3FC" stroke-opacity="0.3" stroke-width="1"/>
    <text class="g-cap" x="28" y="14" text-anchor="middle" fill="#7DD3FC">CSA-IN-A-BOX</text>
  </g>
  <text class="g-cap" x="146" y="314" fill="#BAE6FD" fill-opacity="0.65">v0.6.9 · azure-native</text>

  <!-- Schematic composition on the right (x≈960-1540, y≈70-360) -->
  <rect x="980" y="90" width="120" height="90" fill="#7DD3FC" fill-opacity="0.15" stroke="#7DD3FC" stroke-opacity="0.6" stroke-width="1.2"/>
  <rect x="980" y="90" width="120" height="6" fill="#BAE6FD"/>
  <text class="g-cap" x="1040" y="120" text-anchor="middle" fill="#BAE6FD">P50</text>
  <text x="1040" y="152" text-anchor="middle" font-family="IBM Plex Sans" font-weight="700" font-size="22" fill="#FFFFFF">84 ms</text>
  <rect x="1120" y="90" width="120" height="90" fill="#7DD3FC" fill-opacity="0.15" stroke="#7DD3FC" stroke-opacity="0.6" stroke-width="1.2"/>
  <rect x="1120" y="90" width="120" height="6" fill="#BAE6FD"/>
  <text class="g-cap" x="1180" y="120" text-anchor="middle" fill="#BAE6FD">P99</text>
  <text x="1180" y="152" text-anchor="middle" font-family="IBM Plex Sans" font-weight="700" font-size="22" fill="#FFFFFF">412 ms</text>
  <rect x="1260" y="90" width="120" height="90" fill="#7DD3FC" fill-opacity="0.15" stroke="#7DD3FC" stroke-opacity="0.6" stroke-width="1.2"/>
  <rect x="1260" y="90" width="120" height="6" fill="#BAE6FD"/>
  <text class="g-cap" x="1320" y="120" text-anchor="middle" fill="#BAE6FD">QPS</text>
  <text x="1320" y="152" text-anchor="middle" font-family="IBM Plex Sans" font-weight="700" font-size="22" fill="#FFFFFF">1.2 K</text>
  <rect x="1400" y="90" width="120" height="90" fill="#7DD3FC" fill-opacity="0.15" stroke="#7DD3FC" stroke-opacity="0.6" stroke-width="1.2"/>
  <rect x="1400" y="90" width="120" height="6" fill="#BAE6FD"/>
  <text class="g-cap" x="1460" y="120" text-anchor="middle" fill="#BAE6FD">ERR</text>
  <text x="1460" y="152" text-anchor="middle" font-family="IBM Plex Sans" font-weight="700" font-size="22" fill="#FFFFFF">0.04%</text>
  <rect x="980" y="210" width="560" height="24" fill="#7DD3FC" fill-opacity="0.08" stroke="#7DD3FC" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="996" y="226" fill="#FFFFFF" fill-opacity="0.7">PHOTON ENABLED</text>
  <text class="g-cap" x="1525" y="226" text-anchor="end" fill="#BAE6FD">+2.4×</text>
  <rect x="980" y="240" width="560" height="24" fill="#7DD3FC" fill-opacity="0.08" stroke="#7DD3FC" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="996" y="256" fill="#FFFFFF" fill-opacity="0.7">Z-ORDER · OPTIMIZE</text>
  <text class="g-cap" x="1525" y="256" text-anchor="end" fill="#BAE6FD">-38% scan</text>
  <rect x="980" y="270" width="560" height="24" fill="#7DD3FC" fill-opacity="0.08" stroke="#7DD3FC" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="996" y="286" fill="#FFFFFF" fill-opacity="0.7">AUTO-SCALE COOLDOWN</text>
  <text class="g-cap" x="1525" y="286" text-anchor="end" fill="#BAE6FD">60 s</text>
  <rect x="980" y="300" width="560" height="24" fill="#7DD3FC" fill-opacity="0.08" stroke="#7DD3FC" stroke-opacity="0.3" stroke-width="1"/>
  <text class="g-cap" x="996" y="316" fill="#FFFFFF" fill-opacity="0.7">CACHE HIT RATE</text>
  <text class="g-cap" x="1525" y="316" text-anchor="end" fill="#BAE6FD">94.2%</text>

</svg>
