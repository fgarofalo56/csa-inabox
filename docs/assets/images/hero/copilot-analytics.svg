  <polyline points="1007,201.0 1031,177.0 1055,209.0 1079,153.0 1103,185.0 1127,169.0 1151,193.0 1175,173.0 1199,201.0 1223,161.0 1247,189.0 1271,185.0" fill="none" stroke="#A7F3D0" stroke-width="2"/>
  <rect x="1320" y="80" width="110" height="80" fill="#6EE7B7" fill-opacity="0.12" stroke="#6EE7B7" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="1375" y="118" text-anchor="middle" font-family="IBM Plex Sans" font-weight="700" font-size="20" fill="#FFFFFF">99.97%</text>
  <text class="g-cap" x="1375" y="142" text-anchor="middle" fill="#A7F3D0">UPTIME</text>
  <rect x="1320" y="170" width="110" height="80" fill="#6EE7B7" fill-opacity="0.12" stroke="#6EE7B7" stroke-opacity="0.5" stroke-width="1.2"/>
