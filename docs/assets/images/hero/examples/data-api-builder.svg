<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid slice">
  <title id="t">Data API Builder</title>
  <desc id="d">Auto-generate REST + GraphQL APIs over the Lakehouse.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#155E75"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#A5F3FC"/>
    </linearGradient>
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h-title { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:600; font-size:64px; fill:#FFFFFF; letter-spacing:-1.2px; }
      .h-sub   { font-family:'IBM Plex Sans','Helvetica Neue','Segoe UI',sans-serif; font-weight:400; font-size:22px; fill:#FFFFFF; fill-opacity:0.82; letter-spacing:-0.2px; }
      .h-chip  { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:13px; letter-spacing:2.5px; fill:#FFFFFF; }
      .g-label { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:13px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-num   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:700; font-size:14px; fill:#FFFFFF; letter-spacing:0.5px; }
      .g-cap   { font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-weight:500; font-size:10px; fill:#FFFFFF; fill-opacity:0.6; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Base gradient -->
  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- Single bold vertical accent stripe on the left edge -->
  <rect x="0" y="0" width="6" height="420" fill="#A5F3FC"/>
  <rect x="0" y="0" width="6" height="120" fill="#22D3EE"/>

  <!-- Subtle horizontal scan-line at bottom for structure -->
  <rect x="0" y="408" width="1600" height="2" fill="#A5F3FC" fill-opacity="0.25"/>

  <!-- Chip (top-left) -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="105" height="32" rx="0" fill="#67E8F9" fill-opacity="0.08" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="0" y="0" width="6" height="32" fill="#67E8F9"/>
    <text class="h-chip" x="63.5" y="21.5" text-anchor="middle" fill="#67E8F9">EXAMPLE</text>
  </g>

  <!-- Title -->
  <text class="h-title" x="80" y="200">Data API Builder</text>

  <!-- Subtitle -->
  <text class="h-sub" x="80" y="248">Auto-generate REST + GraphQL APIs over the Lakehouse.</text>

  <!-- Coordinate marker tag below subtitle (technical-drawing flavor) -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="56" height="20" fill="#67E8F9" fill-opacity="0.1" stroke="#67E8F9" stroke-opacity="0.3" stroke-width="1"/>
    <text class="g-cap" x="28" y="14" text-anchor="middle" fill="#67E8F9">CSA-IN-A-BOX</text>
  </g>
  <text class="g-cap" x="146" y="314" fill="#A5F3FC" fill-opacity="0.65">v0.6.9 · azure-native</text>

  <!-- Schematic composition on the right (x≈960-1540, y≈70-360) -->
  <rect x="1200" y="150" width="180" height="120" fill="#67E8F9" fill-opacity="0.2" stroke="#67E8F9" stroke-opacity="0.7" stroke-width="1.5" filter="url(#depth)"/>
  <rect x="1200" y="150" width="180" height="6" fill="#A5F3FC"/>
  <text class="g-label" x="1290" y="178" text-anchor="middle" fill="#FFFFFF" font-size="14">APIM</text>
  <text class="g-cap" x="1290" y="200" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">policy · authn</text>
  <text class="g-cap" x="1290" y="220" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">rate-limit · cache</text>
  <text class="g-cap" x="1290" y="240" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7">audit · transform</text>
  <rect x="960" y="120" width="100" height="40" fill="#67E8F9" fill-opacity="0.1" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1010" y="145" text-anchor="middle" fill="#A5F3FC">MOBILE</text>
  <line x1="1060" y1="140" x2="1200" y2="210" stroke="#A5F3FC" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="960" y="200" width="100" height="40" fill="#67E8F9" fill-opacity="0.1" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1010" y="225" text-anchor="middle" fill="#A5F3FC">SPA</text>
  <line x1="1060" y1="220" x2="1200" y2="210" stroke="#A5F3FC" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="960" y="280" width="100" height="40" fill="#67E8F9" fill-opacity="0.1" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1010" y="305" text-anchor="middle" fill="#A5F3FC">AGENT</text>
  <line x1="1060" y1="300" x2="1200" y2="210" stroke="#A5F3FC" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="1440" y="130" width="100" height="40" fill="#67E8F9" fill-opacity="0.1" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1490" y="155" text-anchor="middle" fill="#A5F3FC">LAKE</text>
  <line x1="1380" y1="210" x2="1440" y2="150" stroke="#A5F3FC" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="1440" y="200" width="100" height="40" fill="#67E8F9" fill-opacity="0.1" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1490" y="225" text-anchor="middle" fill="#A5F3FC">MESH</text>
  <line x1="1380" y1="210" x2="1440" y2="220" stroke="#A5F3FC" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="1440" y="270" width="100" height="40" fill="#67E8F9" fill-opacity="0.1" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1.2"/>
  <text class="g-label" x="1490" y="295" text-anchor="middle" fill="#A5F3FC">MODELS</text>
  <line x1="1380" y1="210" x2="1440" y2="290" stroke="#A5F3FC" stroke-width="1" stroke-opacity="0.5"/>

</svg>
