# Copilot golden set — in-corpus Q&A.
#
# Every golden below is expected to be answered by the Copilot with a
# grounded response citing the listed source paths. Authors should
# keep the per-case thresholds realistic: the CI gate compares
# aggregates against the committed baseline, so inflating thresholds
# here makes the gate brittle without improving real quality.
goldens:
