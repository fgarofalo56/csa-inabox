# Copilot golden set — multi-turn conversation cases.
#
# Each entry represents a SINGLE turn in a pre-primed conversation.
# The harness ties turns together via the ``conversation_id`` field;
# turns with the same id run sequentially so later turns see the prior
# state.  All other rubrics apply as usual.
goldens:
  - id: multiturn-followup-private-endpoints
    conversation_id: conv-arch-001
    question: "Tell me about CSA architecture."
    expected_citations:
      - docs/ARCHITECTURE.md
    expected_phrases:
      - "architecture"
    must_refuse: false
    thresholds:
      groundedness: 0.50
      citation_accuracy: 0.65
      answer_relevance: 0.60
    tags: [multiturn, architecture]

  - id: multiturn-followup-why-private
