# Pre-commit hooks for CSA-in-a-Box
# Install: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^portal/kubernetes/helm/.*/templates/.*\.yaml$'
      - id: check-json
        exclude: '(bicepconfig\.json|\.ipynb)$'
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  - repo: local
    hooks:
      - id: bicep-lint
        name: Bicep Lint
        entry: bicep lint
        language: system
        files: '\.bicep$'
        pass_filenames: true

      # Vertical conformance lint -- the same script the
      # Vertical Conformance / Lint Verticals CI job runs.
      # Catches missing Directory Structure sections, missing deploy/
      # templates, missing contracts/, etc., before they reach CI.
      - id: lint-verticals
        name: Lint Verticals
        entry: bash scripts/lint-vertical.sh
        language: system
        # Re-run when any vertical README, deploy template, contract,
        # dbt project, or generator changes.
        files: '^examples/[^/]+/(README\.md|deploy/.*|contracts/.*|domains/dbt/.*|data/generators/.*)$'
        pass_filenames: false
        # The script discovers verticals itself when called with the glob.
        args: ['examples/']

      # Data contract validator -- the same checker the
      # Validate Data Contracts CI job runs. Stops broken-schema
      # contracts (missing apiVersion/kind/metadata/sla/quality_rules)
      # from sneaking in.
      - id: validate-contracts
        name: Validate Data Contracts
        entry: python scripts/precommit_validate_contracts.py
        language: system
        files: '^(examples/[^/]+/contracts/.*\.ya?ml|domains/.*/data-products/.*/contract\.yaml)$'
        pass_filenames: false

      # Build mkdocs in --strict mode so any nav / link / build warning
      # fails the commit. Baseline is now 0 warnings; keep it that way.
      - id: mkdocs-strict
        name: mkdocs build --strict
        entry: bash -c 'mkdocs build --strict --quiet'
        language: system
        files: '^(mkdocs\.yml|docs/.*|examples/.*/README\.md)$'
        pass_filenames: false

      # Compile every Bicep module so syntax breakage is caught at
      # commit time, not in CI 5 minutes later.
      - id: bicep-build
        name: Bicep build (compile check)
        entry: bash scripts/precommit_bicep_build.sh
        language: system
        files: '\.bicep$'
        pass_filenames: true

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [types-cachetools]
        args: [--config-file=pyproject.toml]
        pass_filenames: false
