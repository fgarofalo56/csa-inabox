      - name: Verify failback
        run: "echo 'TODO: wire verification'"

  storage-failover:
    needs: pre-flight
    if: contains(needs.pre-flight.outputs.scenarios, 'all') || contains(needs.pre-flight.outputs.scenarios, 'storage-failover')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ needs.pre-flight.outputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_SCRATCH }}
      - name: Initiate storage account failover
        run: "echo 'TODO: wire to scripts/drill/storage-failover.sh'"
      - name: Verify failback
        run: echo "TODO"

  keyvault-restore:
    needs: pre-flight
    if: contains(needs.pre-flight.outputs.scenarios, 'all') || contains(needs.pre-flight.outputs.scenarios, 'keyvault-restore')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ needs.pre-flight.outputs.environment }}
    steps:
