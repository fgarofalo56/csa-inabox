name: dr-drill

# CSA-0073 — Quarterly DR drill workflow.
# Exercises failover/failback paths against a scratch subscription so
# the runbooks in docs/DR.md and docs/runbooks/dr-drill.md stay honest
# instead of rotting between real incidents.
#
# See docs/runbooks/dr-drill.md for cadence, required permissions,
# scenario behaviours, verification steps, and rollback paths.

on:
  schedule:
    # Quarterly: 1st day of Jan/Apr/Jul/Oct at 10:00 UTC.
    - cron: "0 10 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Target drill environment
        options:
          - scratch
          - staging
        default: scratch
      scenarios:
        type: string
        description: Comma-separated scenarios to run (all | cosmos-failover | storage-failover | keyvault-restore | bicep-rollback)
        default: all

permissions:
  id-token: write
  contents: read

jobs:
  pre-flight:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      scenarios: ${{ steps.resolve.outputs.scenarios }}
      drill_id: ${{ steps.resolve.outputs.drill_id }}
    steps:
      - id: resolve
        run: |
          ENV="${{ inputs.environment || 'scratch' }}"
          SCEN="${{ inputs.scenarios || 'all' }}"
          DRILL_ID="drill-$(date -u +%Y%m%dT%H%M%SZ)"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "scenarios=$SCEN" >> $GITHUB_OUTPUT
          echo "drill_id=$DRILL_ID" >> $GITHUB_OUTPUT
          echo "DR drill $DRILL_ID targeting $ENV, scenarios: $SCEN"

  cosmos-failover:
    needs: pre-flight
    if: contains(needs.pre-flight.outputs.scenarios, 'all') || contains(needs.pre-flight.outputs.scenarios, 'cosmos-failover')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ needs.pre-flight.outputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_SCRATCH }}
      - name: Trigger Cosmos DB region failover
