        run: "echo 'TODO: wire to scripts/drill/bicep-rollback.sh'"

  report:
    needs: [pre-flight, cosmos-failover, storage-failover, keyvault-restore, bicep-rollback]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Aggregate drill results
        run: |
          echo "DR drill ${{ needs.pre-flight.outputs.drill_id }} complete."
          echo "cosmos-failover:   ${{ needs.cosmos-failover.result }}"
          echo "storage-failover:  ${{ needs.storage-failover.result }}"
          echo "keyvault-restore:  ${{ needs.keyvault-restore.result }}"
          echo "bicep-rollback:    ${{ needs.bicep-rollback.result }}"
