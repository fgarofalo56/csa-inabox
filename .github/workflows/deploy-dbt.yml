# Deploy dbt models to Databricks
# Supports per-vertical and full-platform deployment
name: Deploy dbt Models

on:
  push:
    branches: [main]
    paths:
      - 'examples/*/domains/dbt/**'
      - 'domains/*/dbt/**'
  workflow_dispatch:
    inputs:
      vertical:
        description: 'Vertical to deploy (or "all" for all verticals)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - usda
          - dot
          - usps
          - noaa
          - epa
          - commerce
          - interior
          - tribal-health
          - casino-analytics
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      full_refresh:
        description: 'Run full refresh (drop and recreate)'
        required: false
        default: false
        type: boolean

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  detect-changes:
    name: Detect Changed Verticals
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      verticals: ${{ steps.detect.outputs.verticals }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 2

      - id: detect
        name: Find changed dbt projects
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD | \
            grep -oP 'examples/\K[^/]+(?=/domains/dbt)' | \
            sort -u | jq -R -s -c 'split("\n")[:-1]')

          # Include shared domains if changed
          if git diff --name-only HEAD~1 HEAD | grep -q 'domains/dbt/'; then
            changed=$(echo "$changed" | jq -c '. + ["shared"]')
          fi

          echo "verticals=$changed" >> "$GITHUB_OUTPUT"
          echo "Changed verticals: $changed"

  deploy:
    name: Deploy ${{ matrix.vertical }}
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (needs.detect-changes.result == 'success' &&
        needs.detect-changes.outputs.verticals != '[]'))
    strategy:
      matrix:
        vertical: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.vertical == 'all' && fromJSON('["usda","dot","usps","noaa","epa","commerce","interior","tribal-health","casino-analytics"]') || fromJSON(format('["{0}"]', github.event.inputs.vertical))) || fromJSON(needs.detect-changes.outputs.verticals) }}
      fail-fast: false
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: |
          pip install dbt-databricks==1.8.* dbt-core==1.8.*

      - name: Configure dbt profiles
        run: |
          mkdir -p $DBT_PROFILES_DIR
          cat > $DBT_PROFILES_DIR/profiles.yml << 'PROFILES'
          csa_${{ matrix.vertical }}:
            target: ${{ github.event.inputs.environment || 'dev' }}
            outputs:
              dev:
                type: databricks
                host: ${{ env.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_SQL_PATH }}
                token: ${{ env.DATABRICKS_TOKEN }}
                catalog: csa_${{ matrix.vertical }}_dev
                schema: analytics
                threads: 4
              staging:
                type: databricks
                host: ${{ env.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_SQL_PATH }}
                token: ${{ env.DATABRICKS_TOKEN }}
                catalog: csa_${{ matrix.vertical }}_stg
                schema: analytics
                threads: 4
              prod:
                type: databricks
                host: ${{ env.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_SQL_PATH }}
                token: ${{ env.DATABRICKS_TOKEN }}
                catalog: csa_${{ matrix.vertical }}_prod
                schema: analytics
                threads: 8
          PROFILES

      - name: Determine dbt project path
        id: dbt-path
        run: |
          if [ "${{ matrix.vertical }}" = "shared" ]; then
            echo "path=domains/shared/dbt" >> "$GITHUB_OUTPUT"
          else
            echo "path=examples/${{ matrix.vertical }}/domains/dbt" >> "$GITHUB_OUTPUT"
          fi

      - name: dbt deps
        working-directory: ${{ steps.dbt-path.outputs.path }}
        run: dbt deps

      - name: dbt seed
        working-directory: ${{ steps.dbt-path.outputs.path }}
        run: dbt seed --target ${{ github.event.inputs.environment || 'dev' }}
        if: github.event.inputs.environment != 'prod'

      - name: dbt run
        working-directory: ${{ steps.dbt-path.outputs.path }}
        run: |
          ARGS="--target ${{ github.event.inputs.environment || 'dev' }}"
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            ARGS="$ARGS --full-refresh"
          fi
          dbt run $ARGS

      - name: dbt test
        working-directory: ${{ steps.dbt-path.outputs.path }}
        run: dbt test --target ${{ github.event.inputs.environment || 'dev' }}

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        if: always()
        with:
          name: dbt-artifacts-${{ matrix.vertical }}
          path: |
            ${{ steps.dbt-path.outputs.path }}/target/manifest.json
            ${{ steps.dbt-path.outputs.path }}/target/run_results.json
          retention-days: 30
