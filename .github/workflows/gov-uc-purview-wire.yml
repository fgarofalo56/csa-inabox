name: gov-uc-purview-wire

# One-shot Gov wiring for the two missing Azure-native governance backends
# (operator ask 2026-07-14):
#
#   1. OSS Unity Catalog â€” Databricks Unity Catalog has NO Azure Government
#      endpoint, so Gov runs the self-hosted OSS Unity Catalog server
#      (apps/loom-unity + platform/fiab/bicep/modules/compute/loom-unity-app.bicep,
#      out-of-band because admin-plane/main.bicep is at the 256-param ceiling).
#      This job builds the loom-unity image on the Gov ACR, deploys the Container
#      App into the Gov CAE, then sets LOOM_UC_BACKEND=oss + LOOM_UNITY_URL on
#      the Gov console so uc-backend.ts routes to it.
#
#   2. Purview â€” a Purview account is ALREADY deployed in the Gov sub but the
#      console never had LOOM_PURVIEW_ACCOUNT set, so every governance surface
#      honest-gates. This job discovers the account, sets the env var (the
#      purview-client resolves *.purview.azure.us via isGovCloud()), and prints
#      the exact data-plane role grant the console UAMI still needs if the Atlas
#      probe fails (root-collection Data Reader/Curator are granted inside
#      Purview's own portal/REST, not ARM).
#
# Non-interactive: uses the same Gov deploy SP + endpoints as gov-console-roll.
# Safe to re-run (idempotent bicep + env upserts).
on:
  workflow_dispatch:
    inputs:
      skip_unity:
        description: 'Skip the OSS Unity Catalog arm'
        required: false
        default: 'false'
      skip_purview:
        description: 'Skip the Purview wiring arm'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  RG: rg-csa-loom-admin-usgovvirginia
  ACR: acrloomdcmt6cqoezlgs
  ACR_LOGIN: acrloomdcmt6cqoezlgs.azurecr.us
  APP: loom-console
  UNITY_APP: loom-unity

jobs:
  wire:
    name: Wire OSS Unity Catalog + Purview into the Gov console
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (Gov sub) â€” deploy SP
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_GOV_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_GOV_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_GOV_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}",
              "activeDirectoryEndpointUrl": "https://login.microsoftonline.us",
              "resourceManagerEndpointUrl": "https://management.usgovcloudapi.net/",
              "sqlManagementEndpointUrl": "https://management.core.usgovcloudapi.net:8443/",
              "galleryEndpointUrl": "https://gallery.usgovcloudapi.net/",
              "managementEndpointUrl": "https://management.core.usgovcloudapi.net/"
            }
          environment: AzureUSGovernment

      - name: Set Azure cloud to Gov
        run: az cloud set --name AzureUSGovernment

      - name: Discover Gov console environment (CAE, UAMI, current env)
        run: |
          set -euo pipefail
          CAE_ID=$(az containerapp show -n "$APP" -g "$RG" --query properties.environmentId -o tsv | tr -d '\r')
          UAMI_ID=$(az containerapp show -n "$APP" -g "$RG" --query 'identity.userAssignedIdentities | keys(@) | [0]' -o tsv | tr -d '\r')
          LOCATION=$(az containerapp show -n "$APP" -g "$RG" --query location -o tsv | tr -d '\r' | tr '[:upper:] ' '[:lower:]' | tr -d ' ')
          echo "CAE_ID=$CAE_ID" >> "$GITHUB_ENV"
          echo "UAMI_ID=$UAMI_ID" >> "$GITHUB_ENV"
          echo "LOCATION=$LOCATION" >> "$GITHUB_ENV"
          echo "::notice::CAE=$CAE_ID UAMI=$UAMI_ID location=$LOCATION"

      - name: Build loom-unity image on the Gov ACR
        if: ${{ inputs.skip_unity != 'true' }}
        run: |
          set -euo pipefail
          SHA=$(git rev-parse --short=8 HEAD)
          echo "SHA=$SHA" >> "$GITHUB_ENV"
          az acr update -n "$ACR" --public-network-enabled true --default-action Allow -o none
          for i in $(seq 1 12); do az acr login -n "$ACR" >/dev/null 2>&1 && break; sleep 15; done
          az acr build --registry "$ACR" --no-logs \
            --image "loom-unity:$SHA" --image "loom-unity:latest" \
            --file apps/loom-unity/Dockerfile \
            apps/loom-unity
          az acr update -n "$ACR" --default-action Deny --public-network-enabled false -o none

      - name: Deploy the OSS Unity Catalog Container App (loom-unity-app.bicep)
        if: ${{ inputs.skip_unity != 'true' }}
        run: |
          set -euo pipefail
          az deployment group create -g "$RG" \
            -n "loom-unity-$(date -u +%Y%m%d%H%M%S)" \
            -f platform/fiab/bicep/modules/compute/loom-unity-app.bicep \
            -p location="$LOCATION" \
               environmentId="$CAE_ID" \
               unityUamiId="$UAMI_ID" \
               acrLoginServer="$ACR_LOGIN" \
               image="$ACR_LOGIN/loom-unity:$SHA" \
               complianceTags='{"env":"gov","boundary":"usgovvirginia"}' \
            -o none
          FQDN=$(az containerapp show -n "$UNITY_APP" -g "$RG" --query properties.configuration.ingress.fqdn -o tsv | tr -d '\r')
          echo "UNITY_FQDN=$FQDN" >> "$GITHUB_ENV"
          echo "::notice::loom-unity internal FQDN: $FQDN"

      - name: Discover the Gov Purview account
        if: ${{ inputs.skip_purview != 'true' }}
        run: |
          set -euo pipefail
          PVW=$(az resource list --resource-type Microsoft.Purview/accounts --query '[0].name' -o tsv | tr -d '\r')
          if [ -z "$PVW" ]; then
            echo "::error::No Purview account found in the Gov subscription â€” cannot wire LOOM_PURVIEW_ACCOUNT."
            exit 1
          fi
          echo "PVW=$PVW" >> "$GITHUB_ENV"
          echo "::notice::Gov Purview account: $PVW"

      - name: Set console env (LOOM_UC_BACKEND / LOOM_UNITY_URL / LOOM_PURVIEW_ACCOUNT) + roll
        run: |
          set -euo pipefail
          VARS=""
          if [ "${{ inputs.skip_unity }}" != "true" ] && [ -n "${UNITY_FQDN:-}" ]; then
            VARS="$VARS LOOM_UC_BACKEND=oss LOOM_UNITY_URL=https://$UNITY_FQDN"
          fi
          if [ "${{ inputs.skip_purview }}" != "true" ] && [ -n "${PVW:-}" ]; then
            VARS="$VARS LOOM_PURVIEW_ACCOUNT=$PVW"
          fi
          if [ -z "$VARS" ]; then echo "::notice::nothing to set"; exit 0; fi
          echo "::notice::setting on $APP:$VARS"
          # shellcheck disable=SC2086
          az containerapp update -n "$APP" -g "$RG" --set-env-vars $VARS -o none

      - name: Health-gate the new console revision
        run: |
          set -euo pipefail
          NEWREV=$(az containerapp show -n "$APP" -g "$RG" --query properties.latestRevisionName -o tsv | tr -d '\r')
          H=""
          for i in $(seq 1 24); do
            H=$(az containerapp revision show -n "$APP" -g "$RG" --revision "$NEWREV" \
              --query properties.healthState -o tsv 2>/dev/null | tr -d '\r')
            echo "$(date -u +%H:%M:%S) $NEWREV=$H"
            [ "$H" = "Healthy" ] && break
            sleep 15
          done
          if [ "$H" != "Healthy" ]; then
            echo "::error::New revision $NEWREV did not reach Healthy â€” inspect and roll back via gov-console-roll (lastgood)."
            exit 1
          fi

      - name: Probe the wired backends from inside the console
        run: |
          set -euo pipefail
          # The console is behind Front Door with MSAL; probe the UNAUTH health route
          # for liveness, and use the self-audit checks for the two new backends on
          # the next operator sign-in. Here we verify the loom-unity app itself
          # answers on its catalog root (internal ingress â€” reachable only in-VNet,
          # so we exec a curl inside the console container).
          if [ "${{ inputs.skip_unity }}" != "true" ] && [ -n "${UNITY_FQDN:-}" ]; then
            REP=$(az containerapp replica list -n "$APP" -g "$RG" --query '[0].name' -o tsv | tr -d '\r')
            OUT=$(az containerapp exec -n "$APP" -g "$RG" --replica "$REP" --container "$APP" \
              --command "node -e \"fetch('https://$UNITY_FQDN/api/2.1/unity-catalog/catalogs').then(r=>r.text().then(t=>console.log('UC',r.status,t.slice(0,200)))).catch(e=>console.log('UC ERR',e.message))\"" 2>/dev/null || true)
            echo "$OUT"
            echo "$OUT" | grep -q "UC 200" || echo "::warning::OSS UC probe did not return 200 â€” check loom-unity logs (first boot can take ~1 min)."
          fi
          echo "::notice::Purview + UC wiring applied. Operator: open the Gov console â†’ Governance; the Purview gates should be gone. If Atlas calls 403, grant the console UAMI Data Reader + Data Curator on the Purview ROOT collection (Purview portal â†’ Data Map â†’ Collections â†’ Role assignments)."
