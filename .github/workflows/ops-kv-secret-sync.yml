name: ops-kv-secret-sync

# Sync a Container App secret value into its Key Vault mirror — IN-VNET.
#
# WHY THIS EXISTS (S1/S2, loom-next-level): the hub Key Vault is
# private-endpoint-locked (publicNetworkAccess=Disabled, policy-enforced), so a
# workstation rotation that updates the app registration + the Container App
# secret CANNOT update the KV mirror — exactly how the KV copy went stale
# before the 2026-07-19 sign-in outage, and again at the 2026-07-23 rotation.
# A stale KV mirror is a time bomb: the next full bicep deploy re-resolves the
# Container App secret FROM the vault and would roll the app back onto the
# dead credential.
#
# This job runs on the in-VNet self-hosted runner (gh-aca-runner), where the
# vault's private endpoint resolves, reads the LIVE value from the Container
# App secret store, and writes it to the vault. Values are masked and never
# echoed.
#
# Run after any manual/workstation secret rotation:
#   gh workflow run ops-kv-secret-sync.yml \
#     -f aca_secret=loom-msal-client-secret -f kv_secret=loom-msal-client-secret

on:
  workflow_dispatch:
    inputs:
      containerapp:
        description: 'Container App holding the source secret'
        type: string
        default: 'loom-console'
      aca_secret:
        description: 'Container App secret name (source of truth after a rotation)'
        type: string
        default: 'loom-msal-client-secret'
      kv_secret:
        description: 'Key Vault secret name to sync (the mirror)'
        type: string
        default: 'loom-msal-client-secret'
      kv_name:
        description: 'Key Vault name (blank = auto-discover the kv-loom-* vault in the app RG)'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  sync:
    name: 'Sync ACA secret → Key Vault mirror (in-VNet)'
    runs-on: [self-hosted, loom-aca]
    timeout-minutes: 15
    steps:
      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Sync secret
        shell: bash
        run: |
          set -euo pipefail
          APP='${{ inputs.containerapp }}'
          RG=$(az containerapp list --query "[?name=='$APP'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then echo "::error::Container App $APP not found"; exit 1; fi
          KV='${{ inputs.kv_name }}'
          if [ -z "$KV" ]; then
            KV=$(az keyvault list -g "$RG" --query "[?starts_with(name, 'kv-loom')].name | [0]" -o tsv)
          fi
          if [ -z "$KV" ]; then echo "::error::No kv-loom-* vault found in $RG"; exit 1; fi
          echo "Syncing $APP secret '${{ inputs.aca_secret }}' -> $KV/'${{ inputs.kv_secret }}'"
          VAL=$(az containerapp secret list -n "$APP" -g "$RG" --show-values \
            --query "[?name=='${{ inputs.aca_secret }}'].value | [0]" -o tsv)
          if [ -z "$VAL" ]; then echo "::error::ACA secret '${{ inputs.aca_secret }}' not found or empty"; exit 1; fi
          echo "::add-mask::$VAL"
          az keyvault secret set --vault-name "$KV" --name '${{ inputs.kv_secret }}' --value "$VAL" -o none
          unset VAL
          # Verify the mirror matches (compare hashes only — values never printed).
          ACA_HASH=$(az containerapp secret list -n "$APP" -g "$RG" --show-values \
            --query "[?name=='${{ inputs.aca_secret }}'].value | [0]" -o tsv | sha256sum | cut -c1-16)
          KV_HASH=$(az keyvault secret show --vault-name "$KV" --name '${{ inputs.kv_secret }}' \
            --query value -o tsv | sha256sum | cut -c1-16)
          if [ "$ACA_HASH" = "$KV_HASH" ]; then
            echo "SYNCED — mirror verified (hash $ACA_HASH)"
          else
            echo "::error::hash mismatch after write ($ACA_HASH vs $KV_HASH)"; exit 1
          fi
