name: csa-loom-grant-uami-roles

# One-shot: grant Loom Console UAMI the missing downstream RBAC
# (Foundry AzureML role + Power Platform / Copilot Studio Graph perms)
# via the limitlessdata_deploy SP. Idempotent — re-runs are safe.
#
# Trigger: workflow_dispatch from gh.

on:
  workflow_dispatch:
    inputs:
      uami_principal_id:
        description: "Loom Console UAMI principal id (object id)"
        required: true
        default: "e61f3eb3-c646-4183-8198-4c4a34cd9a01"
      foundry_workspace_id:
        description: "AI Foundry workspace ARM id"
        required: true
        default: "/subscriptions/363ef5d1-0e77-4594-a530-f51af23dbf8c/resourceGroups/rg-csa-loom-admin-eastus2/providers/Microsoft.MachineLearningServices/workspaces/aifoundry-csa-loom-eastus2"
      admin_rg:
        description: "Loom admin RG"
        required: true
        default: "rg-csa-loom-admin-eastus2"
      subscription_id:
        description: "Sub id"
        required: true
        default: "363ef5d1-0e77-4594-a530-f51af23dbf8c"

permissions:
  id-token: write
  contents: read

jobs:
  grant:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (limitlessdata_deploy SP)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Verify SP context
        run: |
          az account show --query "{sub:id, name:name}"
          echo "Will grant roles to UAMI principal: ${{ inputs.uami_principal_id }}"

      - name: Grant Reader on admin RG (so /admin/capacity ARM list works)
        run: |
          az role assignment create \
            --assignee-object-id "${{ inputs.uami_principal_id }}" \
            --assignee-principal-type ServicePrincipal \
            --role "Reader" \
            --scope "/subscriptions/${{ inputs.subscription_id }}/resourceGroups/${{ inputs.admin_rg }}" \
            --output none 2>&1 | grep -v "already exists" || true
          echo "  Reader on $RG — done (or already present)."

      - name: Grant AzureML Data Scientist on Foundry workspace
        run: |
          az role assignment create \
            --assignee-object-id "${{ inputs.uami_principal_id }}" \
            --assignee-principal-type ServicePrincipal \
            --role "AzureML Data Scientist" \
            --scope "${{ inputs.foundry_workspace_id }}" \
            --output none 2>&1 | grep -v "already exists" || true
          echo "  AzureML Data Scientist on Foundry workspace — done."

      - name: Grant Storage Blob Data Reader on Foundry storage (for datastores list)
        run: |
          # Find the Foundry storage account in the admin RG
          STG=$(az storage account list -g "${{ inputs.admin_rg }}" \
            --query "[?contains(name,'aifound') || contains(name,'foundry') || contains(name,'aml')].id" -o tsv | head -1)
          if [ -n "$STG" ]; then
            az role assignment create \
              --assignee-object-id "${{ inputs.uami_principal_id }}" \
              --assignee-principal-type ServicePrincipal \
              --role "Storage Blob Data Reader" \
              --scope "$STG" \
              --output none 2>&1 | grep -v "already exists" || true
            echo "  Storage Blob Data Reader on $STG — done."
          else
            echo "  No Foundry storage account found in $RG — skipping."
          fi

      - name: Summarize UAMI role assignments
        run: |
          echo "=== Final assignments for UAMI ${{ inputs.uami_principal_id }} ==="
          az role assignment list --assignee "${{ inputs.uami_principal_id }}" \
            --all --query "[].{role:roleDefinitionName, scope:scope}" -o table || true

      - name: Notes — what this workflow does NOT do
        run: |
          echo ""
          echo "NOT GRANTED (need separate manual steps):"
          echo "  • Power Platform Admin role — requires PPAC console (admin.powerplatform.microsoft.com)"
          echo "    Add the SP at id ${{ inputs.uami_principal_id }} as Power Platform Administrator."
          echo "  • Copilot Studio environment access — implicit if Power Platform Admin granted."
          echo "  • Power BI Admin / workspace SP enablement — done separately via Fabric admin portal."
          echo ""
          echo "After this workflow:"
          echo "  • Re-run tests/service-health.mjs — Foundry workspace + datastores should turn GREEN."
          echo "  • /admin/capacity should list resources from BOTH admin + DLZ resource groups."
