# CSA Loom — scale the shared self-hosted IR (SHIR) VMSS to zero when idle.
#
# The SHIR (shir.bicep) runs on a VMSS deployed at scale-to-zero. Loom's Manage
# hub "Start" button (or a pipeline trigger) scales it up to run a pipeline; this
# scheduled job is the other half of the cost model — it scales the VMSS back to
# 0 once there are no in-progress / queued ADF pipeline runs, so idle nodes never
# burn money. Runs every 15 minutes.
#
# Honest + safe by design:
#   - If the VMSS doesn't exist (no SHIR deployed) the job no-ops and exits 0.
#   - If it's already at 0, no-op.
#   - It ONLY scales down when ADF reports zero active runs in the idle window —
#     never interrupts a running pipeline.
#   - Real `az` calls against the live factory + VMSS; no mock state.
name: csa-loom SHIR idle-stop

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch:
    inputs:
      idle_minutes:
        description: 'Minutes with no active runs before scaling to 0'
        required: false
        default: '30'

permissions:
  contents: read

env:
  SUB: 00000000-0000-0000-0000-000000000000
  DLZ_RG: rg-csa-loom-dlz-default-eastus2
  ADF: adf-loom-default-eastus2
  VMSS: vmss-loom-shir-default
  # Shared admin-zone Purview SHIR (separate VMSS in the admin RG — a Purview
  # SHIR can't share a machine with the ADF SHIR). Scaled down when no Purview
  # scan run is active. Leave PURVIEW_ACCOUNT empty to skip this arm entirely.
  ADMIN_RG: rg-csa-loom-admin-eastus2
  PURVIEW_VMSS: vmss-loom-pvw-shir-default
  PURVIEW_ACCOUNT: ''

concurrency:
  group: shir-idle-stop
  cancel-in-progress: false

jobs:
  idle-stop:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Azure login (limitlessdata_deploy SP)
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ env.SUB }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Scale SHIR VMSS to zero when idle
        env:
          IDLE_MIN: ${{ github.event.inputs.idle_minutes || '30' }}
        run: |
          set -uo pipefail
          az account set --subscription "$SUB"

          # 1) Does the SHIR VMSS exist + what's its current capacity?
          CAP="$(az vmss show -g "$DLZ_RG" -n "$VMSS" --query 'sku.capacity' -o tsv 2>/dev/null || echo '')"
          if [ -z "$CAP" ]; then
            echo "::notice::SHIR VMSS '$VMSS' not found in $DLZ_RG — no SHIR deployed. No-op."
            exit 0
          fi
          echo "SHIR VMSS '$VMSS' current capacity: $CAP"
          if [ "$CAP" = "0" ]; then
            echo "::notice::Already scaled to zero. No-op."
            exit 0
          fi

          # 2) Any in-progress / queued ADF pipeline runs in the idle window?
          AFTER="$(date -u -d "-${IDLE_MIN} minutes" +%Y-%m-%dT%H:%M:%SZ)"
          BEFORE="$(date -u -d '+5 minutes' +%Y-%m-%dT%H:%M:%SZ)"
          ACTIVE="$(az datafactory pipeline-run query-by-factory \
            --factory-name "$ADF" --resource-group "$DLZ_RG" \
            --last-updated-after "$AFTER" --last-updated-before "$BEFORE" \
            --query "length(value[?status=='InProgress' || status=='Queued'])" -o tsv 2>/dev/null || echo 'ERR')"

          if [ "$ACTIVE" = "ERR" ]; then
            echo "::warning::Could not query ADF runs (factory missing or no permission). Leaving VMSS as-is (fail-safe — never scale down on uncertainty)."
            exit 0
          fi
          echo "Active (InProgress/Queued) runs in last ${IDLE_MIN}m: $ACTIVE"

          if [ "$ACTIVE" != "0" ]; then
            echo "::notice::$ACTIVE active run(s) — keeping the SHIR up."
            exit 0
          fi

          # 3) Idle → scale to zero.
          echo "Idle — scaling SHIR VMSS '$VMSS' to 0."
          az vmss scale -g "$DLZ_RG" -n "$VMSS" --new-capacity 0
          echo "::notice::SHIR VMSS '$VMSS' scaled to 0 (idle ${IDLE_MIN}m+)."

      - name: Scale Purview SHIR VMSS to zero when no scan is running
        if: ${{ env.PURVIEW_ACCOUNT != '' }}
        run: |
          set -uo pipefail
          az account set --subscription "$SUB"

          # 1) Does the Purview SHIR VMSS exist + what's its current capacity?
          CAP="$(az vmss show -g "$ADMIN_RG" -n "$PURVIEW_VMSS" --query 'sku.capacity' -o tsv 2>/dev/null || echo '')"
          if [ -z "$CAP" ]; then
            echo "::notice::Purview SHIR VMSS '$PURVIEW_VMSS' not found in $ADMIN_RG — no Purview SHIR deployed. No-op."
            exit 0
          fi
          echo "Purview SHIR VMSS '$PURVIEW_VMSS' current capacity: $CAP"
          if [ "$CAP" = "0" ]; then
            echo "::notice::Already scaled to zero. No-op."
            exit 0
          fi

          # 2) Any Purview scan run in a non-terminal state across all sources?
          #    Enumerate data sources → scans → runs via the scanning data plane.
          #    Same fail-safe contract as the ADF arm: on ANY query error we
          #    leave the VMSS UP (never scale down on uncertainty).
          PVW_HOST="https://${PURVIEW_ACCOUNT}.purview.azure.com"
          API="api-version=2022-07-01-preview"
          RES="https://purview.azure.net"

          SOURCES="$(az rest --method get --resource "$RES" \
            --url "${PVW_HOST}/scan/datasources?${API}" \
            --query "value[].name" -o tsv 2>/dev/null || echo 'ERR')"
          if [ "$SOURCES" = "ERR" ]; then
            echo "::warning::Could not list Purview data sources (host/perm). Leaving VMSS as-is (fail-safe)."
            exit 0
          fi

          ACTIVE=0
          QUERY_FAILED=0
          for SRC in $SOURCES; do
            SCANS="$(az rest --method get --resource "$RES" \
              --url "${PVW_HOST}/scan/datasources/${SRC}/scans?${API}" \
              --query "value[].name" -o tsv 2>/dev/null || echo 'ERR')"
            if [ "$SCANS" = "ERR" ]; then QUERY_FAILED=1; break; fi
            for SCAN in $SCANS; do
              RUNNING="$(az rest --method get --resource "$RES" \
                --url "${PVW_HOST}/scan/datasources/${SRC}/scans/${SCAN}/runs?${API}" \
                --query "length(value[?status=='Running' || status=='Queued' || status=='InProgress' || status=='Accepted'])" -o tsv 2>/dev/null || echo 'ERR')"
              if [ "$RUNNING" = "ERR" ]; then QUERY_FAILED=1; break; fi
              ACTIVE=$((ACTIVE + RUNNING))
            done
            if [ "$QUERY_FAILED" = "1" ]; then break; fi
          done

          if [ "$QUERY_FAILED" = "1" ]; then
            echo "::warning::Could not query Purview scan runs. Leaving VMSS as-is (fail-safe — never scale down on uncertainty)."
            exit 0
          fi
          echo "Active (Running/Queued/InProgress) Purview scan runs: $ACTIVE"
          if [ "$ACTIVE" != "0" ]; then
            echo "::notice::$ACTIVE active scan run(s) — keeping the Purview SHIR up."
            exit 0
          fi

          # 3) Idle → scale to zero.
          echo "No active scans — scaling Purview SHIR VMSS '$PURVIEW_VMSS' to 0."
          az vmss scale -g "$ADMIN_RG" -n "$PURVIEW_VMSS" --new-capacity 0
          echo "::notice::Purview SHIR VMSS '$PURVIEW_VMSS' scaled to 0 (no active scans)."
