# Check for broken links in documentation.
#
# Runs weekly and on PRs that touch docs. Uses lychee for fast, parallel
# link checking with sensible defaults (retry, timeout, exclude patterns).
#
# Failures are advisory — the check surfaces dead links but does not block
# merges, since external sites can have transient outages.
name: Link Check

on:
  schedule:
    - cron: "23 7 * * 1"   # Monday ~07:23 UTC — off-minute to avoid fleet spikes
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/link-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check links
        uses: lycheeverse/lychee-action@f81112d0d2814ded911bd23e3beaa9dda9f8ca55 # v2.3.0
        with:
          args: >-
            --verbose
            --no-progress
            --timeout 30
            --max-retries 2
            --exclude-path docs/_includes
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            --exclude 'example\.com'
            --exclude 'your-org'
            --exclude 'YOUR_'
            --exclude '<capacity-name>'
            --exclude '<sub-id>'
            --exclude '<rg>'
            --exclude '<action-group-id>'
            --exclude 'aka\.ms/'
            docs/**/*.md
          fail: false    # advisory — don't block PRs on transient external failures

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: lychee/out.md
          retention-days: 14
