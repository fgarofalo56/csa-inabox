name: csa-loom-memory-consolidate

# ---------------------------------------------------------------------------
# CTS-13 — nightly Copilot memory consolidation ("sleep cycle").
#
# Merges near-duplicate memories, flags contradictions into the review queue, and
# promotes recurring tags into topic pages across every memory scope. Runs as an
# EXTERNAL timer that pings the internal-token-gated consolidation endpoint — the
# SAME proven pattern as csa-loom-spark-keepwarm (the console reaches Cosmos +
# AI Search in-VNet; this only triggers the pass).
#
# Auth: LOOM_INTERNAL_TOKEN (GitHub secret) as a Bearer token. The console is
# reachable via Front Door.
# ---------------------------------------------------------------------------

on:
  schedule:
    - cron: '17 7 * * *'   # 07:17 UTC nightly (off-peak; avoids top-of-hour contention)
  workflow_dispatch:
    inputs:
      console_url:
        description: 'Console base URL (default the Commercial vanity)'
        type: string
        default: 'https://csa-loom.limitlessdata.ai'
        required: false

concurrency:
  group: memory-consolidate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  consolidate:
    name: 'Nightly memory consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger consolidation
        env:
          CONSOLE_URL: ${{ inputs.console_url || 'https://csa-loom.limitlessdata.ai' }}
          INTERNAL_TOKEN: ${{ secrets.LOOM_INTERNAL_TOKEN }}
        run: |
          if [ -z "$INTERNAL_TOKEN" ]; then
            echo "::warning::LOOM_INTERNAL_TOKEN secret not set — cannot run memory consolidation. Add it to repo secrets."
            exit 0
          fi
          code=$(curl -sS -o /tmp/mc.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $INTERNAL_TOKEN" \
            -H 'Content-Type: application/json' \
            --max-time 540 \
            "${CONSOLE_URL}/api/internal/copilot/memory/consolidate" || echo 000)
          echo "consolidate HTTP $code"
          cat /tmp/mc.json 2>/dev/null | head -c 800 || true
          echo ""
          case "$code" in
            200) echo "consolidation pass complete";;
            401) echo "::error::consolidate 401 — LOOM_INTERNAL_TOKEN mismatch between the secret and the console env"; exit 1;;
            000) echo "::warning::console unreachable ($CONSOLE_URL) — transient; next nightly tick retries";;
            *)   echo "::warning::consolidate returned $code — see body above";;
          esac
