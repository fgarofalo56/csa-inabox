# Deploy portal application (shared backend + chosen frontend)
# Supports App Service, Container Apps, Static Web Apps, and AKS
name: Deploy Portal

on:
  push:
    branches: [main]
    paths:
      - 'portal/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - container-apps
          - app-service
          - aks
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      frontend:
        description: 'Frontend to deploy'
        required: true
        default: 'react'
        type: choice
        options:
          - react

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        # CSA-0039: Use the canonical backend Dockerfile with repo-root
        # context. The legacy portal/shared/Dockerfile has been removed —
        # it drifted (different UID/healthcheck/module path) from the
        # Helm/compose-consumed image.
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: .
          file: portal/kubernetes/docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal-backend:latest

      - id: meta
        run: echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal-backend:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine frontend path
        id: frontend
        run: |
          echo "path=portal/react-webapp" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend
        # CSA-0039: Repo-root context — the Dockerfile references paths
        # relative to the repo root (portal/react-webapp/...).
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: portal/kubernetes/docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal-frontend:latest

      - id: meta
        run: echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal-frontend:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy-container-apps:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-backend, build-frontend]
    if: github.event.inputs.target == 'container-apps'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Backend
        run: |
          az containerapp update \
            --name csa-portal-backend \
            --resource-group rg-csa-portal-${{ github.event.inputs.environment }} \
            --image ${{ needs.build-backend.outputs.image }}

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name csa-portal-frontend \
            --resource-group rg-csa-portal-${{ github.event.inputs.environment }} \
            --image ${{ needs.build-frontend.outputs.image }}

  # deploy-static-web-app job removed — SvelteKit/SWA frontend archived on 2026-04-15

  deploy-aks:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-backend, build-frontend]
    if: github.event.inputs.target == 'aks'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-csa-aks-${{ github.event.inputs.environment }} \
            --name csa-aks-${{ github.event.inputs.environment }}

      - name: Deploy with Helm
        # CSA-0044: Helm chart hard-fails without global.domain and
        # global.azureAdTenantId (see templates/backend.yaml). Wire both
        # from inputs/secrets here — previously the first AKS deploy
        # would abort at chart render time.
        env:
          PORTAL_DOMAIN: portal-${{ github.event.inputs.environment }}.csa-platform.example.com
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          helm upgrade --install csa-portal \
            portal/kubernetes/helm/csa-portal \
            --namespace csa-portal \
            --create-namespace \
            --set global.domain="${PORTAL_DOMAIN}" \
            --set global.azureAdTenantId="${AZURE_AD_TENANT_ID}" \
            --set frontend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal-frontend \
            --set frontend.image.tag=${{ github.sha }} \
            --set backend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/portal-backend \
            --set backend.image.tag=${{ github.sha }} \
            --set ingress.hosts[0].host="${PORTAL_DOMAIN}" \
            --wait --timeout 5m
