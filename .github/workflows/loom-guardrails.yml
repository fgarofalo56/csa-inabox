name: Loom Guardrails

# Merge-blocking guardrails that turn CSA Loom's recurring bug-classes into
# CI failures. See scripts/ci/*.mjs for each rule + how to add an allowlist.
on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

permissions:
  contents: read

concurrency:
  group: loom-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node.js 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: env-sync (LOOM_* read-but-not-emitted)
        run: node scripts/ci/check-env-sync.mjs
      - name: route-guards (cross-tenant BFF authorization)
        run: node scripts/ci/check-route-guards.mjs
      - name: no-freeform (raw-JSON config surfaces)
        run: node scripts/ci/check-no-freeform.mjs
      - name: bicep-sync (orphan modules + env-sync core)
        run: node scripts/ci/check-bicep-sync.mjs
