name: gov-console-roll

# Targeted Gov console image build + roll using the Gov deploy SP (the same
# creds deploy-fiab-gcch.yml uses). Replaces the local `temp/gov-roll.sh` when a
# local interactive Gov az session isn't available. Builds apps/fiab-console at
# the dispatched ref on the Gov ACR (server-side az acr build) and rolls the
# loom-console Container App to it, then health-gates. Non-interactive.
#
# SC1 supply-chain gate: after the build (while the ACR data plane is still
# open for the tarball upload), the pushed image is Trivy-scanned (CRITICAL
# CVEs FAIL the run before anything rolls), cosign-signed keylessly via GitHub
# Actions OIDC, and the signature is cosign-VERIFIED against the trusted-
# workflow identity BEFORE the roll step ships it. Sigstore (Fulcio/Rekor) is
# reached from the GitHub-hosted runner, not from inside the Gov boundary, so
# this is cloud-invariant. Emergency valve (mirrors loom-roll-and-validate's
# skip_uat): the `skip_supply_chain` dispatch input skips scan+sign+verify
# with a loud warning — this workflow is dispatch-only, so the input is always
# available and no repo-variable valve is needed. The `lastgood` rollback path
# intentionally stays unverified: it re-ships the image that was already
# running. See docs/SUPPLY_CHAIN.md §7.
on:
  workflow_dispatch:
    inputs:
      lastgood:
        description: 'Fallback image tag to roll back to if the new rev is unhealthy'
        required: false
        default: '26e7f3db'
      skip_supply_chain:
        description: 'EMERGENCY VALVE — skip the SC1 Trivy CRITICAL gate + cosign sign/verify (mirrors skip_uat semantics). The roll ships WITHOUT supply-chain verification.'
        type: boolean
        default: false

permissions:
  contents: read
  # SC1: keyless cosign signing exchanges the Actions OIDC token for a
  # short-lived Fulcio certificate.
  id-token: write

env:
  RG: rg-csa-loom-admin-usgovvirginia
  ACR: acrloomdcmt6cqoezlgs
  ACR_LOGIN: acrloomdcmt6cqoezlgs.azurecr.us
  APP: loom-console

jobs:
  roll:
    name: Build + roll Gov console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (Gov sub) — deploy SP
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_GOV_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_GOV_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_GOV_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}",
              "activeDirectoryEndpointUrl": "https://login.microsoftonline.us",
              "resourceManagerEndpointUrl": "https://management.usgovcloudapi.net/",
              "sqlManagementEndpointUrl": "https://management.core.usgovcloudapi.net:8443/",
              "galleryEndpointUrl": "https://gallery.usgovcloudapi.net/",
              "managementEndpointUrl": "https://management.core.usgovcloudapi.net/"
            }
          environment: AzureUSGovernment

      - name: Set Azure cloud to Gov
        run: az cloud set --name AzureUSGovernment

      - name: Build + push console image on the Gov ACR
        run: |
          set -euo pipefail
          SHA=$(git rev-parse --short=8 HEAD)
          echo "SHA=$SHA" >> "$GITHUB_ENV"
          echo "::notice::Building loom-console:$SHA on $ACR"
          az acr update -n "$ACR" --public-network-enabled true --default-action Allow -o none
          for i in $(seq 1 12); do az acr login -n "$ACR" >/dev/null 2>&1 && break; sleep 15; done
          # 2026-07-16: console builds run on a dedicated 16 GB S3 agent pool —
          # the default 8 GB agent cgroup-OOM-SIGKILLs the compile. Agent pools
          # are available in USGov Arizona/Texas/Virginia. Pool builds don't get
          # the trusted-service bypass, so the ACR stays open through the build
          # (it already is for the tarball upload).
          az acr agentpool show -r "$ACR" -n loombuild -o none 2>/dev/null \
            || az acr agentpool create -r "$ACR" -n loombuild --tier S3 -o none
          CNT=$(az acr agentpool show -r "$ACR" -n loombuild --query count -o tsv | tr -d '\r')
          [ "${CNT:-0}" -ge 1 ] || az acr agentpool update -r "$ACR" -n loombuild --count 1 -o none
          STAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          az acr build --registry "$ACR" --no-logs --agent-pool loombuild \
            --image "loom-console:$SHA" --image "loom-console:latest" \
            --file apps/fiab-console/Dockerfile \
            --build-arg "LOOM_BUILD_SHA=$SHA" --build-arg "LOOM_BUILD_TIMESTAMP=$STAMP" \
            apps/fiab-console
          q=$(az acr agentpool show -r "$ACR" -n loombuild --queue-count -o tsv 2>/dev/null | tr -d '\r' || echo 1)
          [ "${q:-1}" = "0" ] && az acr agentpool update -r "$ACR" -n loombuild --count 0 --no-wait -o none || true
          # NOTE (SC1): the ACR re-lock moved to a dedicated `if: always()` step
          # below so (a) the supply-chain gate can pull the image + push the
          # signature while the data plane is still open, and (b) a failed
          # build/scan no longer leaves the ACR open.

      # ── SC1: supply-chain gate — scan, sign, verify BEFORE the roll ──
      - name: Supply-chain — resolve image digest
        id: sc
        if: ${{ !inputs.skip_supply_chain }}
        run: |
          set -euo pipefail
          az acr login -n "$ACR" >/dev/null
          DIGEST=$(az acr repository show --name "$ACR" --image "loom-console:$SHA" --query digest -o tsv | tr -d '\r')
          if [ -z "$DIGEST" ]; then
            echo "::error::Could not resolve the manifest digest for loom-console:$SHA on $ACR — cannot scan/sign/verify."
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "::notice::loom-console:$SHA → $DIGEST"

      - name: Supply-chain — Trivy gate (fail on CRITICAL CVEs)
        if: ${{ !inputs.skip_supply_chain }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.ACR_LOGIN }}/loom-console:${{ env.SHA }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

      - name: Supply-chain — install cosign
        if: ${{ !inputs.skip_supply_chain }}
        uses: sigstore/cosign-installer@v3.7.0

      - name: Supply-chain — cosign sign (keyless OIDC) + verify-before-roll
        if: ${{ !inputs.skip_supply_chain }}
        run: |
          set -euo pipefail
          REF="$ACR_LOGIN/loom-console@${{ steps.sc.outputs.digest }}"
          echo "Signing $REF keylessly (GitHub Actions OIDC → Fulcio/Rekor) ..."
          if ! cosign sign --yes "$REF"; then
            echo "::error::cosign signing FAILED for $REF — refusing to roll an unsigned image. Re-run (transient Sigstore outage) or (emergency only) re-dispatch with skip_supply_chain=true."
            exit 1
          fi
          echo "Verifying $REF before the roll ..."
          IDENTITY_RE="^https://github\\.com/${{ github.repository }}/\\.github/workflows/(build-fiab-images-acr-tasks\\.yml|full-app-deploy-commercial\\.yml|gov-console-roll\\.yml)@"
          if ! cosign verify "$REF" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --certificate-identity-regexp "$IDENTITY_RE" \
              --output text; then
            echo "::error::SC1 SUPPLY-CHAIN GATE FAILED — $REF has NO valid cosign signature from a trusted build workflow. Refusing to roll. Emergency only: re-dispatch with skip_supply_chain=true."
            exit 1
          fi
          echo "::notice::SC1 supply-chain gate PASSED — $REF scanned (Trivy CRITICAL), signed, and verified. Proceeding to roll."

      - name: Supply-chain — skip notice
        if: ${{ inputs.skip_supply_chain }}
        run: |
          echo "::warning::skip_supply_chain is set — SKIPPING the SC1 Trivy CRITICAL gate + cosign sign/verify. This roll ships an UNSCANNED, UNSIGNED image; a later commercial-style roll of this tag will be rejected by the verification gates."

      - name: Re-lock ACR (always)
        if: always()
        run: |
          az acr update -n "$ACR" --default-action Deny --public-network-enabled false -o none || true
          echo "::notice::Gov ACR $ACR re-locked (private endpoint only)."

      - name: Roll loom-console + health-gate
        run: |
          set -euo pipefail
          IMG="$ACR_LOGIN/loom-console:$SHA"
          az containerapp update -n "$APP" -g "$RG" --image "$IMG" -o none
          NEWREV=$(az containerapp revision list -n "$APP" -g "$RG" \
            --query "[?properties.template.containers[0].image=='$IMG'].name | [0]" -o tsv | tr -d '\r')
          echo "::notice::New revision $NEWREV"
          H=""
          for i in $(seq 1 24); do
            H=$(az containerapp revision show -n "$APP" -g "$RG" --revision "$NEWREV" \
              --query properties.healthState -o tsv 2>/dev/null | tr -d '\r')
            echo "$(date -u +%H:%M:%S) $NEWREV=$H"
            case "$H" in
              Healthy) echo "::notice::GOV-CONSOLE-ROLL $SHA HEALTHY"; exit 0 ;;
              Unhealthy) echo "::error::Unhealthy — rolling back to ${{ inputs.lastgood }}"; az containerapp update -n "$APP" -g "$RG" --image "$ACR_LOGIN/loom-console:${{ inputs.lastgood }}" -o none; exit 1 ;;
            esac
            sleep 30
          done
          echo "::error::Did not reach Healthy"; exit 1
