name: deploy-fiab-gcch

# CSA Loom — nightly deploy validation against GCC-High / IL4
# (Azure Government). Per PRP-11.
#
# Manual approval gate (per environment protection rule) since this
# deploys into a Gov sub.

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC daily
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode — whatif-only validates Bicep + auth without provisioning; full does provision + smoke + teardown.'
        type: choice
        default: whatif-only
        options:
          - whatif-only
          - full
      topology:
        description: 'Explicit topology (audit-t156). Overrides deployment_mode. single-sub=dev/demo; tenant=DMLZ console+shared only; dlz-attach=landing zone only (no second console). Empty=derive.'
        type: choice
        default: ''
        options:
          - ''
          - single-sub
          - tenant
          - dlz-attach
      target_subscription:
        description: 'dlz-attach: the NEW subscription the DLZ is provisioned into.'
        type: string
        required: false

permissions:
  contents: read
  issues: write

env:
  AZURE_CLOUD: AzureUSGovernment
  AZURE_LOCATION: usgovvirginia
  CSA_LOOM_BOUNDARY: GCC-High
  CSA_LOOM_DEPLOYMENT_MODE: single-sub   # CI default; multi-sub via dispatch input
  CSA_LOOM_TOPOLOGY: ${{ inputs.topology || '' }}
  CSA_LOOM_CAPACITY_SKU: F8
  CSA_LOOM_TARGET_SUBSCRIPTION: ${{ inputs.target_subscription }}

jobs:
  precheck:
    name: Verify Gov secrets are configured
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          C: ${{ secrets.AZURE_GOV_CLIENT_ID }}
          S: ${{ secrets.AZURE_GOV_CLIENT_SECRET }}
          T: ${{ secrets.AZURE_GOV_TENANT_ID }}
          U: ${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}
        run: |
          if [[ -z "$C" || -z "$S" || -z "$T" || -z "$U" ]]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::AZURE_GOV_* secrets not configured — skipping."
            echo "::warning::Bootstrap per docs/fiab/runbooks/secrets-bootstrap.md"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

  deploy-validate:
    name: Deploy + validate CSA Loom in GCC-High
    needs: precheck
    if: needs.precheck.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: gcc-high-deploy   # requires manual approval

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (Gov sub) — limitlessdata_deploy SP
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_GOV_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_GOV_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_GOV_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}",
              "activeDirectoryEndpointUrl": "https://login.microsoftonline.us",
              "resourceManagerEndpointUrl": "https://management.usgovcloudapi.net/",
              "sqlManagementEndpointUrl": "https://management.core.usgovcloudapi.net:8443/",
              "galleryEndpointUrl": "https://gallery.usgovcloudapi.net/",
              "managementEndpointUrl": "https://management.core.usgovcloudapi.net/"
            }
          environment: AzureUSGovernment

      - name: Set Azure cloud to Gov
        run: az cloud set --name AzureUSGovernment

      - name: Setup azd
        uses: Azure/setup-azd@v2

      - name: Setup Bicep
        run: az bicep install

      # audit-t157: same "second Console is impossible" invariant as Commercial,
      # enforced at the CI layer. topology=tenant is rejected when an Admin Plane
      # (hub) RG already exists in the target sub; dlz-attach must name a NEW
      # subscription via target_subscription.
      - name: Topology guard
        id: topology_guard
        run: |
          set -e
          TOPOLOGY="${CSA_LOOM_TOPOLOGY:-tenant}"
          echo "topology=$TOPOLOGY"
          if [ "$TOPOLOGY" = "dlz-attach" ]; then
            if [ -z "$CSA_LOOM_TARGET_SUBSCRIPTION" ]; then
              echo "::error::dlz-attach requires target_subscription (the new DLZ subscription)."; exit 1
            fi
          else
            EXISTING=$(az graph query -q "ResourceContainers | where type == 'microsoft.resources/subscriptions/resourcegroups' | where name startswith 'rg-csa-loom-admin-' | project name" --query "data | length(@)" -o tsv 2>/dev/null || echo "0")
            if [ "${EXISTING:-0}" != "0" ]; then
              echo "::error::A CSA Loom hub already exists (found $EXISTING rg-csa-loom-admin-* RG). A second Console cannot be deployed — use topology=dlz-attach with target_subscription."; exit 1
            fi
          fi

      - name: Bicep what-if
        run: |
          az deployment sub what-if \
            --name csa-loom-gcch-ci-${{ github.run_id }} \
            --location $AZURE_LOCATION \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--subscription "$CSA_LOOM_TARGET_SUBSCRIPTION"} \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/gcc-high.bicepparam \
            --parameters adminEntraGroupId=${{ secrets.FIAB_GOV_ADMIN_GROUP_ID }} \
            ${CSA_LOOM_TOPOLOGY:+--parameters topology="$CSA_LOOM_TOPOLOGY"} \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION"}

      - name: Deploy-verification evidence receipt (§7)
        # Captures the GCC-High deploy-verification acceptance receipt as an
        # artifact: deterministic ARM tests + sovereign-endpoint sweep + the §4
        # host matrix, plus a live what-if line (already on the Gov sub + bicep).
        # Live full-stack smoke is honestly BLOCKED by runbook gap #2 (no in-repo
        # AKS workload deployment for the Loom apps). Never fails the job.
        run: |
          bash scripts/csa-loom/gov-verify-evidence.sh \
            --boundary gcc-high --live \
            --out "$RUNNER_TEMP/gov-verify-receipt-gcch-${{ github.run_id }}.txt" || true

      - name: Upload GCC-High verification receipt
        uses: actions/upload-artifact@v4
        with:
          name: gov-verify-receipt-gcch-${{ github.run_id }}
          path: ${{ runner.temp }}/gov-verify-receipt-gcch-${{ github.run_id }}.txt
          if-no-files-found: warn

      - name: Provision (with full Gov dispatch)
        if: github.event_name == 'schedule' || inputs.run_mode == 'full'
        run: |
          set -e
          if [ "$CSA_LOOM_TOPOLOGY" = "dlz-attach" ]; then
            # dlz-attach: provision the DLZ directly INTO the new target sub,
            # mirroring Commercial. azd would deploy into the logged-in (hub) sub,
            # so the DLZ RG/module (single-arg resourceGroup()) would land in the
            # wrong subscription. az deployment sub create scoped to the target sub
            # makes subscription() resolve to it, per main.bicep's dlz-attach scope.
            az deployment sub create \
              --name csa-loom-gcch-ci-${{ github.run_id }} \
              --location "$AZURE_LOCATION" \
              --subscription "$CSA_LOOM_TARGET_SUBSCRIPTION" \
              --template-file "$GITHUB_WORKSPACE/platform/fiab/bicep/main.bicep" \
              --parameters "$GITHUB_WORKSPACE/platform/fiab/bicep/params/gcc-high.bicepparam" \
              --parameters adminEntraGroupId=${{ secrets.FIAB_GOV_ADMIN_GROUP_ID }} \
              --parameters topology="$CSA_LOOM_TOPOLOGY" \
              --parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION"
          else
            azd env new csa-loom-gcch-ci-${{ github.run_id }} --no-prompt
            azd env set AZURE_CLOUD $AZURE_CLOUD
            azd env set AZURE_LOCATION $AZURE_LOCATION
            azd env set CSA_LOOM_BOUNDARY $CSA_LOOM_BOUNDARY
            azd env set CSA_LOOM_DEPLOYMENT_MODE $CSA_LOOM_DEPLOYMENT_MODE
            azd env set CSA_LOOM_TOPOLOGY $CSA_LOOM_TOPOLOGY
            azd env set CSA_LOOM_CAPACITY_SKU $CSA_LOOM_CAPACITY_SKU
            azd env set CSA_LOOM_ADMIN_GROUP_ID ${{ secrets.FIAB_GOV_ADMIN_GROUP_ID }}
            azd env set CSA_LOOM_OPENAI_LOCATION usgovvirginia
            azd env set CSA_LOOM_EMBEDDINGS_LOCATION usgovarizona
            azd provision --no-prompt
          fi
        working-directory: platform/fiab/azd

      - name: Smoke test (Gov-specific)
        if: github.event_name == 'schedule' || inputs.run_mode == 'full'
        run: bash .github/scripts/fiab-smoke-test.sh
        env:
          CONSOLE_URL: $(azd env get-values | grep CONSOLE_URL | cut -d= -f2)
          BOUNDARY: GCC-High

      - name: Teardown
        if: success() && (github.event_name == 'schedule' || inputs.run_mode == 'full')
        run: bash .github/scripts/fiab-teardown.sh
        env:
          RG_NAME: rg-csa-loom-admin-${{ env.AZURE_LOCATION }}

      - name: Note dry-run completion
        if: success() && inputs.run_mode == 'whatif-only'
        run: |
          echo "✅ whatif-only run complete. Bicep + auth validated; no resources provisioned."

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 279,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Nightly deploy-fiab-gcch failed in run ${context.runId}. Federal CSU should investigate.`
            })
