name: deploy-fiab-gcch

# CSA Loom — nightly deploy validation against GCC-High / IL4
# (Azure Government). Per PRP-11.
#
# Manual approval gate (per environment protection rule) since this
# deploys into a Gov sub.

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC daily
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLOUD: AzureUSGovernment
  AZURE_LOCATION: usgovvirginia
  CSA_LOOM_BOUNDARY: GCC-High
  CSA_LOOM_DEPLOYMENT_MODE: single-sub   # CI default; multi-sub via dispatch input
  CSA_LOOM_CAPACITY_SKU: F8

jobs:
  deploy-validate:
    name: Deploy + validate CSA Loom in GCC-High
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: gcc-high-deploy   # requires manual approval

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (Gov sub) — limitlessdata_deploy SP
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_GOV_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_GOV_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}
          environment: AzureUSGovernment

      - name: Set Azure cloud to Gov
        run: az cloud set --name AzureUSGovernment

      - name: Setup azd
        uses: Azure/setup-azd@v2

      - name: Setup Bicep
        run: az bicep install

      - name: Bicep what-if
        run: |
          az deployment sub what-if \
            --name csa-loom-gcch-ci-${{ github.run_id }} \
            --location $AZURE_LOCATION \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/gcc-high.bicepparam \
            --parameters adminEntraGroupId=${{ secrets.FIAB_GOV_ADMIN_GROUP_ID }}

      - name: Provision (with full Gov dispatch)
        run: |
          azd env new csa-loom-gcch-ci-${{ github.run_id }} --no-prompt
          azd env set AZURE_CLOUD $AZURE_CLOUD
          azd env set AZURE_LOCATION $AZURE_LOCATION
          azd env set CSA_LOOM_BOUNDARY $CSA_LOOM_BOUNDARY
          azd env set CSA_LOOM_DEPLOYMENT_MODE $CSA_LOOM_DEPLOYMENT_MODE
          azd env set CSA_LOOM_CAPACITY_SKU $CSA_LOOM_CAPACITY_SKU
          azd env set CSA_LOOM_ADMIN_GROUP_ID ${{ secrets.FIAB_GOV_ADMIN_GROUP_ID }}
          azd env set CSA_LOOM_OPENAI_LOCATION usgovvirginia
          azd env set CSA_LOOM_EMBEDDINGS_LOCATION usgovarizona
          azd provision --no-prompt
        working-directory: platform/fiab/azd

      - name: Smoke test (Gov-specific)
        run: bash .github/scripts/fiab-smoke-test.sh
        env:
          CONSOLE_URL: $(azd env get-values | grep CONSOLE_URL | cut -d= -f2)
          BOUNDARY: GCC-High

      - name: Teardown
        if: success()
        run: bash .github/scripts/fiab-teardown.sh
        env:
          RG_NAME: rg-csa-loom-admin-${{ env.AZURE_LOCATION }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 279,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Nightly deploy-fiab-gcch failed in run ${context.runId}. Federal CSU should investigate.`
            })
