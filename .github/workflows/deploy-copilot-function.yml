# Auto-deploy the docs-site Copilot Azure Function on backend changes.
#
# Triggers: push to main with any change under azure-functions/copilot-chat/,
# or manual dispatch.
#
# Auth: Service-principal-based via the `limitlessdata_deploy` SP. The
# old publish-profile path stopped working when SCM basic publishing
# credentials were disabled on the Function App (deploy fails with HTTP
# 401 from Kudu). The SP must hold ``Website Contributor`` on
# ``func-csa-inabox-copilot-fg`` (granted 2026-05-06).
#
# Required repo secrets:
#   AZURE_CLIENT_ID           — limitlessdata_deploy client/app ID
#   AZURE_CLIENT_SECRET       — current secret for the SP
#   AZURE_TENANT_ID           — limitlessdata.ai tenant
#   AZURE_SUBSCRIPTION_ID     — FedCiv ATU FFL - DLZ
#
# Follow-up: migrate to OIDC federated credential to drop the long-lived
# client secret. Tracked under SEC-COPILOT in Archon.
name: Deploy Copilot Function

on:
  push:
    branches: [main]
    paths:
      - "azure-functions/copilot-chat/**"
      - ".github/workflows/deploy-copilot-function.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Only one deploy at a time; cancel an in-flight deploy if a newer commit lands
  group: deploy-copilot-function
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: copilot-function-prod
    env:
      FUNCTION_APP_NAME: func-csa-inabox-copilot-fg
      FUNCTION_PATH: azure-functions/copilot-chat
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install function dependencies (test-visible + runtime layout)
        working-directory: ${{ env.FUNCTION_PATH }}
        run: |
          python -m pip install --upgrade pip
          # 1. Regular install so pytest can find azure.functions, openai, etc.
          pip install -r requirements.txt
          pip install pytest pytest-mock
          # 2. Mirror into .python_packages/ so the Functions host loads them
          #    from the package layout it expects.
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Syntax-check function source
        run: python -m py_compile ${{ env.FUNCTION_PATH }}/function_app.py

      - name: Run unit tests
        working-directory: ${{ env.FUNCTION_PATH }}
        run: python -m pytest tests/ -v

      - name: Azure login (SP-based RBAC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2.3.0
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@c9cc8ee93d1285e2a17312cc8357dc1775955272 # v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ${{ env.FUNCTION_PATH }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: Sync MS Learn MCP feature-flag app settings
        # CSA-0162 Phase 2 — enable Microsoft Learn fallback grounding
        # on the deployed Function. These settings are idempotent: re-
        # running the workflow re-applies the same flag value, which is
        # the desired behaviour. To roll back, set COPILOT_MS_LEARN_ENABLED
        # to "false" here and re-run the workflow.
        run: |
          set -e
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group rg-dlz-aiml-stack-dev \
            --settings \
              COPILOT_MS_LEARN_ENABLED=true \
              COPILOT_MS_LEARN_MCP_URL=https://learn.microsoft.com/api/mcp \
            --output none
          echo "MS Learn fallback enabled on $FUNCTION_APP_NAME"

      - name: Smoke test the deployed endpoint
        # Hits /api/health with a valid request token. Doesn't call the OpenAI
        # backend — only exercises origin / token / rate-limit / app-settings
        # readiness.
        run: |
          set -e
          # /api/health doesn't need a token (it's the liveness probe), but
          # calls go through the same origin allowlist + CORS path.
          status=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X GET "https://$FUNCTION_APP_NAME.azurewebsites.net/api/health" \
            -H "Origin: https://fgarofalo56.github.io")
          echo "Smoke test HTTP $status"
          head -c 400 /tmp/resp.json || true
          case "$status" in
            2*) echo "Function is responding"; exit 0 ;;
            *) echo "Unhealthy response: $status"; exit 1 ;;
          esac

      - name: Azure logout
        if: always()
        run: az logout
        continue-on-error: true
