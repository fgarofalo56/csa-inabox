# Auto-deploy the docs-site Copilot Azure Function on backend changes.
#
# Triggers: push to main with any change under azure-functions/copilot-chat/,
# or manual dispatch.
#
# Required repo secret:
#   COPILOT_FUNCTION_PUBLISH_PROFILE  -- the Function App publish profile XML.
#
# How to get it (one-time setup):
#   1. az login --tenant limitlessdata.ai
#   2. az account set --subscription "FedCiv ATU FFL - DLZ"
#   3. az functionapp deployment list-publishing-profiles \
#        --resource-group rg-dlz-aiml-stack-dev \
#        --name func-csa-inabox-copilot-fg --xml > publish.xml
#   4. gh secret set COPILOT_FUNCTION_PUBLISH_PROFILE < publish.xml
#   5. rm publish.xml
#
# Rotation: rerun the same commands when the publish profile is reset (e.g.
# after a function-app password reset or a tenant migration).
#
# See azure-functions/copilot-chat/DEPLOYMENT.md for the full provenance.
name: Deploy Copilot Function

on:
  push:
    branches: [main]
    paths:
      - "azure-functions/copilot-chat/**"
      - ".github/workflows/deploy-copilot-function.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Only one deploy at a time; cancel an in-flight deploy if a newer commit lands
  group: deploy-copilot-function
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: copilot-function-prod
    env:
      FUNCTION_APP_NAME: func-csa-inabox-copilot-fg
      FUNCTION_PATH: azure-functions/copilot-chat
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install function dependencies
        working-directory: ${{ env.FUNCTION_PATH }}
        run: |
          python -m pip install --upgrade pip
          # Install into a local .python_packages directory so the publish
          # profile path picks them up without needing Oryx remote build.
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Syntax-check function source
        run: python -m py_compile ${{ env.FUNCTION_PATH }}/function_app.py

      - name: Deploy to Azure Functions
        # NOTE: pin to a SHA on next maintenance pass — currently using the
        # major-version tag for the official Microsoft-maintained action.
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ${{ env.FUNCTION_PATH }}
          publish-profile: ${{ secrets.COPILOT_FUNCTION_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: Smoke test the deployed endpoint
        # Uses a minimal valid token (current 30s window) to confirm the deploy
        # is healthy. Does NOT call the OpenAI backend — just exercises the
        # request-token validation + origin-allowlist + rate-limit path.
        run: |
          set -e
          window=$(($(date +%s)/30))
          # 'csa-copilot-2024' is the documented default token secret; if the
          # COPILOT_TOKEN_SECRET env var is set on the function it will reject
          # this and we'll see HTTP 403, which is still a healthy "function is
          # responding" signal.
          payload=$(printf '%s:csa-copilot-2024' "$window")
          token_hash=$(printf '%s' "$payload" | openssl dgst -sha256 -hex | awk '{print $2}' | cut -c1-16)
          token="$window:$token_hash"

          status=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://$FUNCTION_APP_NAME.azurewebsites.net/api/chat" \
            -H "Content-Type: application/json" \
            -H "Origin: https://fgarofalo56.github.io" \
            -H "X-Copilot-Token: $token" \
            -d '{"message":"ping","history":[],"pageContext":{}}')
          echo "Smoke test HTTP $status"
          head -c 400 /tmp/resp.json || true
          # Accept any 2xx, plus 403 (token mismatch — function is up + rejecting)
          # and 429 (rate-limited — function is up + throttling). Fail on 5xx.
          case "$status" in
            2*|403|429) echo "Function is responding"; exit 0 ;;
            *) echo "Unhealthy response: $status"; exit 1 ;;
          esac
