name: gov-provision-dbx-sql-invnet
# In-VNet provisioner for the Databricks SQL warehouse (closes svc-databricks-sql).
# The Gov Databricks workspace is private-link-locked, so a public GitHub runner
# gets "403 Unauthorized network access to workspace". This runs the
# warehouse-create from a one-shot Container App JOB inside the Gov CAE (which is
# VNet-injected and reaches the private workspace), which then wires
# LOOM_DATABRICKS_SQL_WAREHOUSE_ID on the console.
#
# The job runs a TINY BAKED IMAGE (apps/loom-dbx-init: azure-cli + curl + python3
# with /init.sh baked in) — no base64-script-in-args gymnastics (that produced no
# console output and was undebuggable). The script reads SP creds + RG from env.
# Idempotent. No security-posture change to the workspace.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'false = build image + plan only; true = build + run job + wire.'
        required: false
        default: 'false'
permissions:
  contents: read
env:
  RG: rg-csa-loom-admin-usgovvirginia
  ACR: acrloomdcmt6cqoezlgs
  ACR_LOGIN: acrloomdcmt6cqoezlgs.azurecr.us
  APP: loom-console
  JOB: loom-dbx-warehouse-init
jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Azure Gov Login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_GOV_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_GOV_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_GOV_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}",
              "activeDirectoryEndpointUrl": "https://login.microsoftonline.us",
              "resourceManagerEndpointUrl": "https://management.usgovcloudapi.net/",
              "sqlManagementEndpointUrl": "https://management.core.usgovcloudapi.net:8443/",
              "galleryEndpointUrl": "https://gallery.usgovcloudapi.net/",
              "managementEndpointUrl": "https://management.core.usgovcloudapi.net/"
            }
          environment: AzureUSGovernment
      - name: Set Azure cloud to Gov
        run: az cloud set --name AzureUSGovernment

      - name: Discover CAE + UAMI
        run: |
          set -euo pipefail
          CAE_ID=$(az containerapp show -n "$APP" -g "$RG" --query properties.environmentId -o tsv | tr -d '\r')
          UAMI_ID=$(az containerapp show -n "$APP" -g "$RG" --query 'identity.userAssignedIdentities | keys(@) | [0]' -o tsv | tr -d '\r')
          { echo "CAE_ID=$CAE_ID"; echo "UAMI_ID=$UAMI_ID"; } >> "$GITHUB_ENV"
          echo "::notice::CAE=$CAE_ID UAMI=$UAMI_ID"
          [ -n "$CAE_ID" ] && [ -n "$UAMI_ID" ] || { echo "::error::missing CAE/UAMI"; exit 1; }

      - name: Build loom-dbx-init image on the Gov ACR
        if: ${{ inputs.apply == 'true' }}
        run: |
          set -euo pipefail
          SHA=$(git rev-parse --short=8 HEAD)
          echo "SHA=$SHA" >> "$GITHUB_ENV"
          az acr update -n "$ACR" --public-network-enabled true --default-action Allow -o none
          for i in $(seq 1 12); do az acr login -n "$ACR" >/dev/null 2>&1 && break; sleep 15; done
          az acr build --registry "$ACR" --no-logs \
            --image "loom-dbx-init:$SHA" --image "loom-dbx-init:latest" \
            apps/loom-dbx-init
          az acr update -n "$ACR" --default-action Deny -o none || true
          echo "::notice::loom-dbx-init:$SHA built on Gov ACR."

      - name: Run the warehouse-create job in-VNet + wait
        if: ${{ inputs.apply == 'true' }}
        run: |
          set -euo pipefail
          IMG="$ACR_LOGIN/loom-dbx-init:${SHA:-latest}"
          # Create (or update) a one-shot manual job in the CAE that runs the baked
          # image (ENTRYPOINT /init.sh). SP creds + RG passed via env; no args.
          if ! az containerapp job show -n "$JOB" -g "$RG" -o none 2>/dev/null; then
            az containerapp job create -n "$JOB" -g "$RG" --environment "$CAE_ID" \
              --trigger-type Manual --replica-timeout 900 --replica-retry-limit 1 --parallelism 1 \
              --image "$IMG" \
              --registry-server "$ACR_LOGIN" --registry-identity "$UAMI_ID" \
              --mi-user-assigned "$UAMI_ID" \
              --cpu 0.5 --memory 1.0Gi \
              --secrets sp-secret="${{ secrets.AZURE_GOV_CLIENT_SECRET }}" \
              --env-vars SP_ID="${{ secrets.AZURE_GOV_CLIENT_ID }}" SP_SECRET=secretref:sp-secret \
                         TENANT="${{ secrets.AZURE_GOV_TENANT_ID }}" SUB="${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}" RG="$RG" \
              -o none
          else
            az containerapp job update -n "$JOB" -g "$RG" --image "$IMG" -o none
          fi
          EXEC=$(az containerapp job start -n "$JOB" -g "$RG" --query name -o tsv | tr -d '\r')
          echo "::notice::started in-VNet job execution: $EXEC"
          ST=""
          for i in $(seq 1 50); do
            ST=$(az containerapp job execution show -n "$JOB" -g "$RG" --job-execution-name "$EXEC" --query properties.status -o tsv 2>/dev/null | tr -d '\r')
            echo "job status=$ST"; { [ "$ST" = "Succeeded" ] || [ "$ST" = "Failed" ]; } && break; sleep 15
          done
          echo "----- job console logs -----"
          az containerapp job logs show -n "$JOB" -g "$RG" --container "$JOB" --execution "$EXEC" --tail 120 2>&1 | tail -120 || true
          [ "$ST" = "Succeeded" ] && echo "::notice::warehouse wired in-VNet — re-run gov-selfaudit." || { echo "::error::in-VNet warehouse job did not succeed (status=$ST)"; exit 1; }
