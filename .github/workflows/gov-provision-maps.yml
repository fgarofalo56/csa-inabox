name: gov-provision-maps
# Incremental Gov provisioner for the OSS MapLibre tile server (closes
# svc-azure-maps — Azure Maps has no Government data plane). Same out-of-band,
# what-if-gated pattern as gov-provision-dbt.yml: build the loom-maps-tileserver
# image (tileserver-gl + a public-domain Natural Earth basemap + Open Sans glyphs
# + maplibre-gl assets, Caddy-fronted) on the Gov ACR, deploy ONLY the
# loom-maps-tiles Container App (compute/loom-maps-app.bicep) into the existing
# Gov CAE (--mode Incremental, what-if first), then set LOOM_MAPS_BACKEND=maplibre
# + LOOM_MAPS_TILE_URL on the console. The geo canvases already render the
# aggregate rows; this lights up the basemap under them. Idempotent.
#
# SAFETY: apply=build-only builds + validates the image (the uncertain step:
# in-ACR downloads of NE data / fonts / maplibre). apply=full builds, deploys,
# and wires. The env is wired ONLY after the tile server revision is Healthy AND
# its /style.json returns 200 — a broken image never reaches the console.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'build-only = build + validate the image; whatif = + ACA what-if; full = build + deploy + wire (only if /style.json is 200).'
        required: false
        default: 'build-only'
        type: choice
        options: [build-only, whatif, full]
permissions:
  contents: read
env:
  RG: rg-csa-loom-admin-usgovvirginia
  ACR: acrloomdcmt6cqoezlgs
  ACR_LOGIN: acrloomdcmt6cqoezlgs.azurecr.us
  APP: loom-console
  TILE_APP: loom-maps-tiles
jobs:
  provision:
    name: Provision loom-maps-tiles into the Gov CAE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Azure Gov Login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_GOV_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_GOV_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_GOV_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}",
              "activeDirectoryEndpointUrl": "https://login.microsoftonline.us",
              "resourceManagerEndpointUrl": "https://management.usgovcloudapi.net/",
              "sqlManagementEndpointUrl": "https://management.core.usgovcloudapi.net:8443/",
              "galleryEndpointUrl": "https://gallery.usgovcloudapi.net/",
              "managementEndpointUrl": "https://management.core.usgovcloudapi.net/"
            }
          environment: AzureUSGovernment
      - name: Set Azure cloud to Gov
        run: az cloud set --name AzureUSGovernment

      - name: Discover Gov console context (CAE / UAMI / App Insights)
        run: |
          set -euo pipefail
          CAE_ID=$(az containerapp show -n "$APP" -g "$RG" --query properties.environmentId -o tsv | tr -d '\r')
          UAMI_ID=$(az containerapp show -n "$APP" -g "$RG" --query 'identity.userAssignedIdentities | keys(@) | [0]' -o tsv | tr -d '\r')
          UAMI_CLIENT_ID=$(az identity show --ids "$UAMI_ID" --query clientId -o tsv | tr -d '\r')
          LOCATION=$(az containerapp show -n "$APP" -g "$RG" --query location -o tsv | tr -d '\r' | tr '[:upper:]' '[:lower:]' | tr -d ' ')
          AI_CONN=$(az containerapp show -n "$APP" -g "$RG" --query "properties.template.containers[0].env[?name=='APPLICATIONINSIGHTS_CONNECTION_STRING'].value | [0]" -o tsv | tr -d '\r')
          { echo "CAE_ID=$CAE_ID"; echo "UAMI_ID=$UAMI_ID"; echo "UAMI_CLIENT_ID=$UAMI_CLIENT_ID"; echo "LOCATION=$LOCATION"; echo "AI_CONN=$AI_CONN"; } >> "$GITHUB_ENV"
          echo "::notice::CAE=$CAE_ID UAMI=$UAMI_ID location=$LOCATION"
          [ -n "$CAE_ID" ] && [ -n "$UAMI_ID" ] || { echo "::error::missing CAE/UAMI"; exit 1; }

      - name: Build loom-maps-tileserver image on the Gov ACR
        run: |
          set -euo pipefail
          SHA=$(git rev-parse --short=8 HEAD)
          echo "SHA=$SHA" >> "$GITHUB_ENV"
          az acr update -n "$ACR" --public-network-enabled true --default-action Allow -o none
          for i in $(seq 1 12); do az acr login -n "$ACR" >/dev/null 2>&1 && break; sleep 15; done
          # The basemap bake (Natural Earth + tippecanoe) + tileserver base is a
          # large build — allow a generous timeout.
          az acr build --registry "$ACR" --timeout 3600 \
            --image "loom-maps-tileserver:$SHA" --image "loom-maps-tileserver:v1" \
            apps/loom-maps-tileserver
          az acr update -n "$ACR" --default-action Deny -o none || true
          echo "::notice::loom-maps-tileserver:$SHA built + pushed."

      - name: What-if the loom-maps-tiles deployment
        if: ${{ inputs.apply != 'build-only' }}
        run: |
          set -euo pipefail
          az deployment group what-if -g "$RG" \
            -f platform/fiab/bicep/modules/compute/loom-maps-app.bicep \
            -p location="$LOCATION" caeId="$CAE_ID" acrLoginServer="$ACR_LOGIN" imageTag="$SHA" \
               uamiId="$UAMI_ID" uamiClientId="$UAMI_CLIENT_ID" appInsightsConnectionString="$AI_CONN" \
               complianceTags='{"env":"gov","boundary":"usgovvirginia","app":"maps-tiles"}' \
            --mode Incremental 2>&1 | tail -40 || true

      - name: Deploy loom-maps-tiles + validate /style.json + wire env
        if: ${{ inputs.apply == 'full' }}
        run: |
          set -euo pipefail
          az deployment group create -g "$RG" -n "loom-maps-tiles-$(date -u +%Y%m%d%H%M%S)" \
            -f platform/fiab/bicep/modules/compute/loom-maps-app.bicep \
            -p location="$LOCATION" caeId="$CAE_ID" acrLoginServer="$ACR_LOGIN" imageTag="$SHA" \
               uamiId="$UAMI_ID" uamiClientId="$UAMI_CLIENT_ID" appInsightsConnectionString="$AI_CONN" \
               complianceTags='{"env":"gov","boundary":"usgovvirginia","app":"maps-tiles"}' \
            --mode Incremental -o none
          FQDN=$(az containerapp show -n "$TILE_APP" -g "$RG" --query properties.configuration.ingress.fqdn -o tsv | tr -d '\r')
          echo "::notice::loom-maps-tiles internal FQDN: $FQDN"
          # Wait for Healthy, then probe /style.json FROM INSIDE the CAE (internal ingress)
          # via an exec on the console container — the env is wired ONLY on a 200.
          for i in $(seq 1 24); do
            REV=$(az containerapp show -n "$TILE_APP" -g "$RG" --query properties.latestRevisionName -o tsv | tr -d '\r')
            H=$(az containerapp revision show -n "$TILE_APP" -g "$RG" --revision "$REV" --query properties.healthState -o tsv 2>/dev/null | tr -d '\r')
            echo "loom-maps-tiles health=$H"; [ "$H" = "Healthy" ] && break; sleep 15
          done
          CODE=$(az containerapp exec -n "$APP" -g "$RG" --command "sh -c 'curl -s -o /dev/null -w %{http_code} http://$FQDN/style.json'" 2>/dev/null | tr -dc '0-9' | tail -c 3 || echo "000")
          echo "::notice::/style.json probe HTTP=$CODE"
          if [ "$CODE" = "200" ]; then
            az containerapp update -n "$APP" -g "$RG" \
              --set-env-vars "LOOM_MAPS_BACKEND=maplibre" "LOOM_MAPS_TILE_URL=https://$FQDN/style.json" -o none
            echo "::notice::wired LOOM_MAPS_BACKEND=maplibre + LOOM_MAPS_TILE_URL — re-run gov-selfaudit to confirm svc-azure-maps."
          else
            echo "::error::/style.json did not return 200 (got $CODE) — NOT wiring the console (no broken map). Inspect loom-maps-tiles logs."
            exit 1
          fi
