name: csa-loom-post-deploy-bootstrap

# Runs as the limitlessdata_deploy SP (the Synapse + Databricks
# workspace admin) to perform one-time RBAC bootstraps that can't be
# done via bicep:
#   1. Grant Console UAMI Synapse Administrator data-plane role.
#   2. Register Console UAMI as Databricks workspace SP (SCIM).
#   3. Grant Console UAMI APIM Service Contributor (if APIM exists).

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  SUB: 363ef5d1-0e77-4594-a530-f51af23dbf8c
  ADMIN_RG: rg-csa-loom-admin-eastus2
  DLZ_RG: rg-csa-loom-dlz-single-eastus2
  SYNAPSE_WS: syn-loom-default-eastus2
  DBX_WS: adb-loom-default-eastus2
  DBX_HOST: adb-7405613013893759.19.azuredatabricks.net
  APIM_NAME: apim-csa-loom-eastus2
  CONSOLE_UAMI_PRINCIPAL: e61f3eb3-c646-4183-8198-4c4a34cd9a01
  CONSOLE_UAMI_CLIENT: c6272de5-3c4e-4b72-8b57-71b2e950209b
  # MSAL Web App SP — used as Dataverse Application User (UAMIs can't be one)
  LOOM_MSAL_CLIENT_ID: 9844c28c-3b3a-4949-8d63-9eefa3b50a9d

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (limitlessdata_deploy SP)
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ env.SUB }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }
      - name: Verify SP identity
        run: |
          set -e
          az account show --query "{user:user.name, sub:id}" -o table
          echo "Acting as Synapse initial admin (b9c3cc65-522e-49c9-ad02-914676aa5a6b)"

      - name: Enable Synapse public access (temp)
        run: |
          set -e
          az resource update --ids "/subscriptions/$SUB/resourceGroups/$DLZ_RG/providers/Microsoft.Synapse/workspaces/$SYNAPSE_WS" \
            --api-version 2021-06-01 --set properties.publicNetworkAccess=Enabled \
            --query "properties.publicNetworkAccess" -o tsv
          sleep 30
          # Allow GHA runner IP through firewall
          GHA_IP=$(curl -sS https://ifconfig.me)
          echo "GHA IP: $GHA_IP"
          az synapse workspace firewall-rule create -g $DLZ_RG --workspace-name $SYNAPSE_WS \
            --name allow-gha-bootstrap-$(date +%s) --start-ip-address "$GHA_IP" --end-ip-address "$GHA_IP" || true
          sleep 30

      - name: Grant Console UAMI Synapse Administrator
        run: |
          set -e
          az synapse role assignment create \
            --workspace-name $SYNAPSE_WS \
            --role "Synapse Administrator" \
            --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
            --assignee-principal-type ServicePrincipal \
            -o table || echo "Already assigned or partial"
          # Also grant SQL Administrator just for sanity (SQL pool access)
          az synapse role assignment create \
            --workspace-name $SYNAPSE_WS \
            --role "Synapse SQL Administrator" \
            --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
            --assignee-principal-type ServicePrincipal \
            -o table || true

      - name: SQL-level grants via sqlcmd (Serverless)
        run: |
          set -e
          # Acquire AAD token for Synapse SQL
          TOKEN=$(az account get-access-token --resource https://database.windows.net --query accessToken -o tsv)
          # Install sqlcmd
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          export PATH="$PATH:/opt/mssql-tools18/bin"
          # Connect to Serverless master, create UAMI as login + user
          sqlcmd -S "$SYNAPSE_WS-ondemand.sql.azuresynapse.net" -d master -G -P "$TOKEN" -Q "
          IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = 'uami-loom-console-eastus2')
            CREATE LOGIN [uami-loom-console-eastus2] FROM EXTERNAL PROVIDER;
          IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = 'uami-loom-console-eastus2')
            CREATE USER [uami-loom-console-eastus2] FROM LOGIN [uami-loom-console-eastus2];
          ALTER SERVER ROLE sysadmin ADD MEMBER [uami-loom-console-eastus2];
          " || echo "Some grants may have failed (already exist or other) — continuing"

      - name: Restore Synapse public access disabled
        if: always()
        run: |
          az resource update --ids "/subscriptions/$SUB/resourceGroups/$DLZ_RG/providers/Microsoft.Synapse/workspaces/$SYNAPSE_WS" \
            --api-version 2021-06-01 --set properties.publicNetworkAccess=Disabled \
            --query "properties.publicNetworkAccess" -o tsv

      - name: Enable Databricks public access (temp, so GHA can reach SCIM)
        run: |
          set -e
          # The Databricks workspace lives behind a private endpoint. The
          # GHA runner can't reach `/api/2.0/preview/scim/v2/...` without
          # publicNetworkAccess=Enabled. We flip it on, do the SCIM PATCH,
          # and restore disabled in the always-run cleanup step below.
          DBX_RID=$(az resource list -g $DLZ_RG --resource-type Microsoft.Databricks/workspaces --query "[?name=='$DBX_WS'].id" -o tsv)
          if [ -z "$DBX_RID" ]; then
            DBX_RID=$(az resource list -g $ADMIN_RG --resource-type Microsoft.Databricks/workspaces --query "[?name=='$DBX_WS'].id" -o tsv)
          fi
          echo "DBX_RID=$DBX_RID"
          if [ -n "$DBX_RID" ]; then
            az resource update --ids "$DBX_RID" --api-version 2024-05-01 \
              --set properties.publicNetworkAccess=Enabled \
              --query "properties.publicNetworkAccess" -o tsv || true
            sleep 30
          fi

      - name: Bootstrap Databricks SCIM (Console UAMI as SP)
        run: |
          set -e
          TOKEN=$(az account get-access-token --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d --query accessToken -o tsv)
          # All four entitlements needed for full editor parity:
          # workspace-access + databricks-sql-access = browse, run notebooks, SQL warehouses
          # allow-cluster-create = POST /api/2.1/clusters/create (fixes the 403 in
          #   the Cluster editor reported 2026-05-27; PR #366)
          # allow-instance-pool-create = POST /api/2.0/instance-pools/create
          PAYLOAD=$(cat <<EOF
          {
            "schemas":["urn:ietf:params:scim:schemas:core:2.0:ServicePrincipal"],
            "applicationId":"$CONSOLE_UAMI_CLIENT",
            "displayName":"uami-loom-console-eastus2",
            "groups":[],
            "entitlements":[
              {"value":"workspace-access"},
              {"value":"databricks-sql-access"},
              {"value":"allow-cluster-create"},
              {"value":"allow-instance-pool-create"}
            ]
          }
          EOF
          )
          # Try POST; on 409 (SP already exists from a prior bootstrap that
          # only granted 2 entitlements), look up the SP id and PATCH the
          # entitlements list to all four. Idempotent on re-run.
          STATUS=$(curl -sS -w "%{http_code}" -o /tmp/scim.json -X POST \
            "https://$DBX_HOST/api/2.0/preview/scim/v2/ServicePrincipals" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/scim+json" \
            -d "$PAYLOAD")
          echo "SCIM POST status: $STATUS"
          cat /tmp/scim.json
          echo
          if [[ "$STATUS" == "409" ]] || grep -q "already exists\|exists" /tmp/scim.json 2>/dev/null; then
            echo "SP already exists — looking up id + PATCHing entitlements"
            SP_LOOKUP=$(curl -sS \
              "https://$DBX_HOST/api/2.0/preview/scim/v2/ServicePrincipals?filter=applicationId%20eq%20%22$CONSOLE_UAMI_CLIENT%22" \
              -H "Authorization: Bearer $TOKEN")
            SP_ID=$(echo "$SP_LOOKUP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Resources'][0]['id'])")
            echo "Existing SP id: $SP_ID"
            PATCH_RESP=$(curl -sS -w "%{http_code}" -o /tmp/scim_patch.json -X PATCH \
              "https://$DBX_HOST/api/2.0/preview/scim/v2/ServicePrincipals/$SP_ID" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/scim+json" \
              -d '{"schemas":["urn:ietf:params:scim:api:messages:2.0:PatchOp"],"Operations":[{"op":"replace","path":"entitlements","value":[{"value":"workspace-access"},{"value":"databricks-sql-access"},{"value":"allow-cluster-create"},{"value":"allow-instance-pool-create"}]}]}')
            echo "SCIM PATCH status: $PATCH_RESP"
            cat /tmp/scim_patch.json
            echo
          fi

      - name: Restore Databricks public access disabled
        if: always()
        run: |
          DBX_RID=$(az resource list -g $DLZ_RG --resource-type Microsoft.Databricks/workspaces --query "[?name=='$DBX_WS'].id" -o tsv)
          if [ -z "$DBX_RID" ]; then
            DBX_RID=$(az resource list -g $ADMIN_RG --resource-type Microsoft.Databricks/workspaces --query "[?name=='$DBX_WS'].id" -o tsv)
          fi
          if [ -n "$DBX_RID" ]; then
            az resource update --ids "$DBX_RID" --api-version 2024-05-01 \
              --set properties.publicNetworkAccess=Disabled \
              --query "properties.publicNetworkAccess" -o tsv || true
          fi

      - name: Grant Console UAMI APIM Service Contributor (if APIM exists)
        run: |
          set -e
          APIM_STATE=$(az apim show -n $APIM_NAME -g $ADMIN_RG --query provisioningState -o tsv 2>/dev/null || echo "Missing")
          echo "APIM state: $APIM_STATE"
          if [[ "$APIM_STATE" == "Succeeded" ]]; then
            az role assignment create \
              --assignee $CONSOLE_UAMI_PRINCIPAL \
              --role "API Management Service Contributor" \
              --scope "/subscriptions/$SUB/resourceGroups/$ADMIN_RG/providers/Microsoft.ApiManagement/service/$APIM_NAME" \
              -o table || echo "Already assigned"
          else
            echo "APIM not provisioned yet — skipping RBAC grant"
          fi

      - name: Grant Console UAMI Reader on admin RG (unblocks /admin/capacity full inventory)
        run: |
          az role assignment create \
            --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
            --assignee-principal-type ServicePrincipal \
            --role "Reader" \
            --scope "/subscriptions/$SUB/resourceGroups/$ADMIN_RG" \
            -o table 2>&1 | grep -v "already exists" || echo "Already assigned"

      - name: Grant Console UAMI AzureML Data Scientist on Foundry workspace (unblocks Foundry editors)
        run: |
          FOUNDRY_WS=$(az resource list -g $ADMIN_RG --resource-type Microsoft.MachineLearningServices/workspaces --query "[0].id" -o tsv)
          if [ -n "$FOUNDRY_WS" ]; then
            echo "Foundry workspace: $FOUNDRY_WS"
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "AzureML Data Scientist" \
              --scope "$FOUNDRY_WS" \
              -o table 2>&1 | grep -v "already exists" || echo "Already assigned"
          else
            echo "No Foundry workspace in $ADMIN_RG — skipping"
          fi

      - name: Grant Console UAMI Storage Blob Data Reader on Foundry storage (unblocks datastores)
        run: |
          STG=$(az storage account list -g $ADMIN_RG --query "[?contains(name,'aifound') || contains(name,'foundry') || contains(name,'aml')].id" -o tsv | head -1)
          if [ -n "$STG" ]; then
            echo "Foundry storage: $STG"
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "Storage Blob Data Reader" \
              --scope "$STG" \
              -o table 2>&1 | grep -v "already exists" || echo "Already assigned"
          else
            echo "No Foundry storage in $ADMIN_RG — skipping"
          fi

      - name: Grant Console UAMI Cognitive Services User on Content Safety (unblocks /items/content-safety)
        run: |
          CS=$(az cognitiveservices account list -g $ADMIN_RG --query "[?kind=='ContentSafety'].id" -o tsv | head -1)
          if [ -n "$CS" ]; then
            echo "Content Safety: $CS"
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "Cognitive Services User" \
              --scope "$CS" \
              -o table 2>&1 | grep -v "already exists" || echo "Already assigned"
          else
            echo "No Content Safety in $ADMIN_RG — skipping"
          fi

      - name: Register Console UAMI as Power Platform Management App (unblocks PP + Copilot Studio editors)
        run: |
          # PP admin API for SP access requires the SP to be registered as a
          # tenant-wide PP management app — separate from the Power Platform
          # Admin Entra role. PUT is idempotent (returns 200 on re-run).
          PP_TOKEN=$(az account get-access-token --resource https://api.bap.microsoft.com --query accessToken -o tsv)
          R=$(curl -sS -w "%{http_code}" -o /tmp/pp.json -X PUT \
            "https://api.bap.microsoft.com/providers/Microsoft.BusinessAppPlatform/adminApplications/$CONSOLE_UAMI_CLIENT?api-version=2020-10-01" \
            -H "Authorization: Bearer $PP_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "PP management app PUT: $R"
          cat /tmp/pp.json
          echo
          if [[ "$R" == "200" ]] || [[ "$R" == "201" ]]; then
            echo "  Power Platform + Copilot Studio editors unlocked."
          else
            echo "  PP registration returned $R — deploy SP may lack PP Admin role."
          fi

      - name: Register MSAL SP as Dataverse Application User in every env that has Dataverse
        run: |
          # For each env with Dataverse, register the MSAL Web App SP as an
          # Application User with System Administrator. Idempotent — skips
          # envs where the AppUser already exists. Requires the caller to
          # already be SA on each env (Default env needs one-time Promote To
          # Admin click; see docs/fiab/dataverse-app-user.md Step 1).
          if [ -z "${LOOM_MSAL_CLIENT_ID:-}" ]; then
            echo "  LOOM_MSAL_CLIENT_ID not set — skipping Dataverse AppUser registration"
          else
            LOOM_MSAL_CLIENT_ID="$LOOM_MSAL_CLIENT_ID" \
              bash scripts/csa-loom/dataverse-add-appuser.sh || true
          fi

      - name: Summary
        if: always()
        run: |
          echo "==== Bootstrap complete ===="
          echo "Synapse: UAMI granted Synapse Administrator + SQL Administrator + SQL-level sysadmin"
          echo "Databricks: UAMI registered as SP via SCIM (workspace-access + databricks-sql-access + allow-cluster-create + allow-instance-pool-create)"
          echo "APIM: Service Contributor granted (if APIM provisioned)"
          echo "Admin RG: Reader granted (for /admin/capacity full inventory)"
          echo "Foundry workspace: AzureML Data Scientist granted (unblocks /api/foundry/workspace + datastores)"
          echo "Foundry storage: Blob Data Reader granted"
          echo "Content Safety: Cognitive Services User granted"
          echo "Power Platform: UAMI registered as Management App (unblocks PP + Copilot Studio)"
          echo "Dataverse: MSAL SP registered as Application User w/ SA role on every env with Dataverse (idempotent)"
          echo ""
          echo "Still needs manual steps (not grantable via SP):"
          echo "  • Power Platform Admin — grant at https://admin.powerplatform.microsoft.com"
          echo "    Add SP id $CONSOLE_UAMI_PRINCIPAL as Power Platform Administrator."
          echo "  • Power BI tenant SP enablement — Fabric admin portal"
          echo "  • Dataverse System Administrator on Default env — one-time Promote To Admin click"
          echo "    at https://<org>.crm.dynamics.com/main.aspx?settingsonly=true&pagetype=entitylist&etn=systemuser"
          echo "    (only needed for envs Dataverse was added to AFTER bootstrap; new custom envs don't need this)"
