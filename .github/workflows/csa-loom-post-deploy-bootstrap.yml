name: csa-loom-post-deploy-bootstrap

# Runs as the limitlessdata_deploy SP (the Synapse + Databricks
# workspace admin) to perform one-time RBAC bootstraps that can't be
# done via bicep:
#   1. Grant Console UAMI Synapse Administrator data-plane role.
#   2. Register Console UAMI as Databricks workspace SP (SCIM).
#   3. Grant Console UAMI APIM Service Contributor (if APIM exists).

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Azure region the deploy landed in (e.g. eastus2, centralus). Every RG / workspace / UAMI name below DERIVES from this — rg-csa-loom-admin-<region>, syn-loom-default-<region>, apim-csa-loom-<region>, uami-loom-console-<region>, etc. Defaults to eastus2 to back-comp the original estate.'
        type: string
        default: eastus2
        required: false
      admin_subscription:
        description: 'Subscription id holding the ADMIN plane (hub) — Console UAMI, Key Vault, APIM, Purview, Foundry. Empty → falls back to dlz_subscription / the login subscription, which is correct for a single-sub deploy where admin + DLZ share a subscription.'
        type: string
        required: false
      dlz_subscription:
        description: 'Subscription id holding the Data Landing Zone (Synapse / Databricks / ADLS). Empty → defaults to the legacy DLZ sub (363ef5d1) for back-comp; set it for any cross-sub / non-eastus2 deploy. In a single-sub deploy set it equal to admin_subscription.'
        type: string
        required: false
      dlz_domain:
        description: 'DLZ domain segment for the DLZ resource-group name: rg-csa-loom-dlz-<dlz_domain>-<region>. Defaults to "single" (the single-sub / single-DLZ convention).'
        type: string
        default: single
        required: false

permissions:
  id-token: write
  contents: read

env:
  # Region drives every region-stamped name below. Overridable via the `region`
  # input; defaults to eastus2 so the original estate keeps working with no input.
  REGION: ${{ inputs.region || 'eastus2' }}
  # ADMIN (hub) sub holds the Console UAMI / KV / APIM / Purview / Foundry.
  # DLZ sub holds Synapse / Databricks / ADLS. They are the SAME in single-sub.
  # admin_subscription empty → fall back to dlz_subscription, then the legacy sub.
  # dlz_subscription empty → legacy DLZ sub (363ef5d1) for back-comp.
  ADMIN_SUB: ${{ inputs.admin_subscription || inputs.dlz_subscription || '363ef5d1-0e77-4594-a530-f51af23dbf8c' }}
  DLZ_SUB: ${{ inputs.dlz_subscription || '363ef5d1-0e77-4594-a530-f51af23dbf8c' }}
  # SUB kept as an alias of the ADMIN sub for the many steps that scope grants /
  # role assignments to the admin plane (Cost/Security/Monitor, APIM, Reader, …).
  # The "Resolve deploy coordinates" step re-points SUB to the admin sub at runtime.
  SUB: ${{ inputs.admin_subscription || inputs.dlz_subscription || '363ef5d1-0e77-4594-a530-f51af23dbf8c' }}
  ADMIN_RG: rg-csa-loom-admin-${{ inputs.region || 'eastus2' }}
  DLZ_RG: rg-csa-loom-dlz-${{ inputs.dlz_domain || 'single' }}-${{ inputs.region || 'eastus2' }}
  SYNAPSE_WS: syn-loom-default-${{ inputs.region || 'eastus2' }}
  DBX_WS: adb-loom-default-${{ inputs.region || 'eastus2' }}
  # DBX_HOST is deploy-specific (per-workspace adb-<id>.<n>.azuredatabricks.net) and
  # CANNOT be derived from region — the "Resolve deploy coordinates" step resolves it
  # at runtime from the workspace's workspaceUrl. Default tracks the eastus2 estate.
  DBX_HOST: adb-7405613013893759.19.azuredatabricks.net
  APIM_NAME: apim-csa-loom-${{ inputs.region || 'eastus2' }}
  # Console UAMI principal (object) id + client (app) id. De-hardcoded so a
  # non-eastus2 / non-Commercial / different-tenant deploy grants the RIGHT
  # identity. Precedence: repo var (explicit BYO) → RUNTIME RESOLUTION (the
  # "Resolve deploy coordinates" step queries `az identity show -n
  # uami-loom-console-<region> -g rg-csa-loom-admin-<region>` and overrides these
  # in $GITHUB_ENV) → the live eastus2 defaults below (so the original estate
  # keeps working with no var + no resolution). Every grant step references these,
  # so the runtime resolution re-targets the whole bootstrap (incl. Purview).
  CONSOLE_UAMI_PRINCIPAL: ${{ vars.LOOM_CONSOLE_UAMI_PRINCIPAL || 'e61f3eb3-c646-4183-8198-4c4a34cd9a01' }}
  CONSOLE_UAMI_CLIENT: ${{ vars.LOOM_CONSOLE_UAMI_CLIENT || 'c6272de5-3c4e-4b72-8b57-71b2e950209b' }}
  # Console UAMI display NAME used for the Synapse SQL CREATE LOGIN/USER FROM
  # EXTERNAL PROVIDER steps. identity.bicep names it uami-loom-console-<region>,
  # so a non-eastus2 deploy MUST grant the right name or the Console UAMI gets
  # "Login failed for user" (ELOGIN). Default now DERIVES from the region input;
  # the "Resolve Console UAMI SQL name" step below still OVERRIDES this with the
  # actual UAMI discovered in the admin RG so it is correct even for a renamed
  # identity. Override via repo var LOOM_CONSOLE_UAMI_NAME to pin it explicitly.
  CONSOLE_SQL_UAMI: ${{ vars.LOOM_CONSOLE_UAMI_NAME || format('uami-loom-console-{0}', inputs.region || 'eastus2') }}
  # Weave (Semantic Ontology) graph store — the Console UAMI's Entra principal
  # NAME registered in PostgreSQL (must match LOOM_POSTGRES_AAD_USER on the
  # Console, default loom-console). The PG server name is resolved at runtime.
  CONSOLE_UAMI_NAME: loom-console
  # MSAL Web App client (app) id. NO hardcoded shared app reg — the
  # "Provision MSAL app registration" step below creates/reconciles a
  # per-deployment app registration (redirect URIs reconciled to the console
  # host, secret + SESSION_SECRET written to Key Vault) and exports
  # LOOM_MSAL_CLIENT_ID for the Dataverse AppUser step. Set the repo var to BYO
  # an existing app registration instead.
  LOOM_MSAL_CLIENT_ID: ${{ vars.LOOM_MSAL_CLIENT_ID || '' }}
  # Console host(s) (no scheme) whose https://<host>/auth/callback redirect URIs
  # are reconciled onto the app registration. Defaults to the vanity domain.
  CSA_LOOM_CONSOLE_HOSTS: ${{ vars.CSA_LOOM_VANITY_DOMAIN || '' }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (limitlessdata_deploy SP)
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ env.SUB }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }
      - name: Verify SP identity
        run: |
          set -e
          az account show --query "{user:user.name, sub:id}" -o table
          echo "Acting as Synapse initial admin (b9c3cc65-522e-49c9-ad02-914676aa5a6b)"

      - name: Resolve deploy coordinates (region-correct Console UAMI principal/client + Databricks host)
        # Region-parameterize the OLD eastus2 hardcodes. The env: block derives every
        # RG / workspace name from the `region` input; this step resolves the values
        # that can ONLY be known at runtime against the live admin sub:
        #   - Console UAMI principalId + clientId (az identity show on uami-loom-console-<region>)
        #   - the actual UAMI display NAME (for the SQL CREATE LOGIN steps)
        #   - the Databricks workspace host (per-workspace adb-<id>.<n>.azuredatabricks.net)
        # Repo vars LOOM_CONSOLE_UAMI_PRINCIPAL / _CLIENT / _NAME still WIN (explicit
        # BYO override); otherwise these overwrite the eastus2 defaults in $GITHUB_ENV
        # so every downstream grant targets the identity this deploy actually created.
        run: |
          set -uo pipefail
          echo "region=$REGION  admin_sub=$ADMIN_SUB  dlz_sub=$DLZ_SUB  admin_rg=$ADMIN_RG  dlz_rg=$DLZ_RG"
          # --- Console UAMI (admin sub) ---
          az account set --subscription "$ADMIN_SUB" 2>/dev/null || true
          UAMI_NAME="uami-loom-console-$REGION"
          # Discover the real UAMI in the admin RG (tolerates a renamed identity).
          DISCOVERED_NAME=$(az identity list -g "$ADMIN_RG" \
            --query "[?contains(name,'console')].name | [0]" -o tsv 2>/dev/null || true)
          [ -n "${DISCOVERED_NAME:-}" ] && [ "$DISCOVERED_NAME" != "None" ] && UAMI_NAME="$DISCOVERED_NAME"
          UAMI_JSON=$(az identity show -n "$UAMI_NAME" -g "$ADMIN_RG" 2>/dev/null || true)
          if [ -n "${UAMI_JSON:-}" ]; then
            RES_PRINCIPAL=$(echo "$UAMI_JSON" | python3 -c "import sys,json;print(json.load(sys.stdin).get('principalId',''))" 2>/dev/null || true)
            RES_CLIENT=$(echo "$UAMI_JSON"   | python3 -c "import sys,json;print(json.load(sys.stdin).get('clientId',''))"   2>/dev/null || true)
          fi
          # Repo-var override wins; else runtime-resolved; else keep the env default.
          if [ -n "${{ vars.LOOM_CONSOLE_UAMI_PRINCIPAL }}" ]; then
            echo "Using repo var LOOM_CONSOLE_UAMI_PRINCIPAL (override)"
          elif [ -n "${RES_PRINCIPAL:-}" ]; then
            echo "CONSOLE_UAMI_PRINCIPAL=$RES_PRINCIPAL" >> "$GITHUB_ENV"
            echo "Resolved Console UAMI principalId: $RES_PRINCIPAL ($UAMI_NAME)"
          else
            echo "::warning::Could not resolve Console UAMI in $ADMIN_RG — keeping default CONSOLE_UAMI_PRINCIPAL. Set LOOM_CONSOLE_UAMI_PRINCIPAL or check region/admin_subscription."
          fi
          if [ -n "${{ vars.LOOM_CONSOLE_UAMI_CLIENT }}" ]; then
            echo "Using repo var LOOM_CONSOLE_UAMI_CLIENT (override)"
          elif [ -n "${RES_CLIENT:-}" ]; then
            echo "CONSOLE_UAMI_CLIENT=$RES_CLIENT" >> "$GITHUB_ENV"
            echo "Resolved Console UAMI clientId: $RES_CLIENT"
          fi
          # Display NAME for the SQL CREATE LOGIN steps (repo var still wins).
          if [ -z "${{ vars.LOOM_CONSOLE_UAMI_NAME }}" ]; then
            echo "CONSOLE_SQL_UAMI=$UAMI_NAME" >> "$GITHUB_ENV"
            echo "Resolved Console UAMI SQL name: $UAMI_NAME"
          fi
          # --- Databricks host (dlz sub) ---
          az account set --subscription "$DLZ_SUB" 2>/dev/null || true
          DBX_URL=$(az databricks workspace show -g "$DLZ_RG" -n "$DBX_WS" --query workspaceUrl -o tsv 2>/dev/null \
                    || az databricks workspace show -g "$ADMIN_RG" -n "$DBX_WS" --query workspaceUrl -o tsv 2>/dev/null || true)
          if [ -n "${DBX_URL:-}" ] && [ "$DBX_URL" != "None" ]; then
            echo "DBX_HOST=$DBX_URL" >> "$GITHUB_ENV"
            echo "Resolved Databricks host: $DBX_URL"
          else
            echo "::notice::Could not resolve Databricks workspaceUrl for $DBX_WS — keeping default DBX_HOST (SCIM step is best-effort)."
          fi
          # Restore the admin sub as the active context for the grant steps.
          az account set --subscription "$SUB" 2>/dev/null || true

      - name: Provision MSAL app registration (sign-in app + redirect URIs + secret in KV)
        # Day-one deploy-readiness (GH #1383): create/reconcile the per-deployment
        # Entra app registration, write the client secret + a stable SESSION_SECRET
        # to Key Vault, and wire LOOM_MSAL_CLIENT_ID + secretRefs onto the Console
        # Container App — so interactive login works on first sign-in. Idempotent;
        # safe to re-run. Best-effort (|| true) so a Graph-consent gap doesn't fail
        # the whole bootstrap. Requires the deploy SP to hold the Graph Application
        # Administrator directory role + KV Secrets Officer.
        run: |
          set -uo pipefail
          # Resolve the Loom Key Vault in the admin RG (kv-loom-*).
          KV_NAME=$(az keyvault list -g "$ADMIN_RG" --query "[?starts_with(name,'kv-loom')].name | [0]" -o tsv 2>/dev/null || true)
          if [ -z "${KV_NAME:-}" ]; then
            KV_NAME=$(az keyvault list -g "$ADMIN_RG" --query "[0].name" -o tsv 2>/dev/null || true)
          fi
          if [ -z "${KV_NAME:-}" ]; then
            echo "::warning::No Key Vault found in $ADMIN_RG — skipping MSAL app-reg provisioning"
            exit 0
          fi
          # REACHABILITY: the Loom Key Vault is deployed with
          # publicNetworkAccess=Disabled (private), so the `az keyvault secret set`
          # calls the script makes (loom-msal-client-secret + session-secret) are
          # NOT reachable from this public ubuntu-latest runner and would fail
          # silently, leaving login broken AFTER a "successful" deploy. Mirror the
          # Purview/Synapse steps: temporarily flip the KV to public for the write
          # window and RESTORE it to Disabled/Deny via a trap so it runs even on
          # failure. NOTE: use the CORRECT flag --public-network-access (NOT
          # --public-network-enabled).
          KV_ORIG_PNA=""
          restore_kv_pna() {
            if [ -n "${KV_NAME:-}" ] && [ "${KV_ORIG_PNA:-Enabled}" != "Enabled" ]; then
              echo "-> restoring Key Vault $KV_NAME publicNetworkAccess=Disabled"
              az keyvault update -n "$KV_NAME" --public-network-access Disabled --default-action Deny -o none || true
            fi
          }
          trap restore_kv_pna EXIT
          KV_ORIG_PNA="$(az keyvault show -n "$KV_NAME" --query "properties.publicNetworkAccess" -o tsv 2>/dev/null || echo Enabled)"
          echo "Key Vault $KV_NAME publicNetworkAccess=$KV_ORIG_PNA"
          if [ "$KV_ORIG_PNA" != "Enabled" ]; then
            echo "-> temporarily enabling Key Vault public access for the secret-write window"
            az keyvault update -n "$KV_NAME" --public-network-access Enabled --default-action Allow -o none || \
              echo "::warning::Could not enable Key Vault public access — secret writes may be unreachable from the runner."
            sleep 20
          fi
          # Resolve the Console Container App's runtime FQDN to add to redirect URIs.
          CONSOLE_FQDN=$(az containerapp show -n loom-console -g "$ADMIN_RG" --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)
          HOSTS="${CSA_LOOM_CONSOLE_HOSTS:-}"
          if [ -n "${CONSOLE_FQDN:-}" ]; then
            HOSTS="${HOSTS:+$HOSTS,}$CONSOLE_FQDN"
          fi
          UAMI_ID=$(az identity list -g "$ADMIN_RG" --query "[?contains(name,'console')].id | [0]" -o tsv 2>/dev/null || true)
          chmod +x scripts/csa-loom/bootstrap-msal-app-reg.sh
          OUT=$(KEYVAULT_NAME="$KV_NAME" \
            CONSOLE_HOSTS="$HOSTS" \
            EXISTING_CLIENT_ID="${LOOM_MSAL_CLIENT_ID:-}" \
            CONSOLE_APP_NAME=loom-console CONSOLE_RG="$ADMIN_RG" \
            UAMI_RESOURCE_ID="${UAMI_ID:-}" \
            bash scripts/csa-loom/bootstrap-msal-app-reg.sh 2>&1) || echo "::warning::MSAL app-reg provisioning incomplete (Graph admin consent may be required)"
          echo "$OUT"
          # Export the resolved app id for the Dataverse AppUser step below.
          APP_ID=$(echo "$OUT" | sed -n 's/^LOOM_MSAL_CLIENT_ID=//p' | tail -1)
          if [ -n "${APP_ID:-}" ]; then
            echo "LOOM_MSAL_CLIENT_ID=$APP_ID" >> "$GITHUB_ENV"
          fi

      - name: Grant Console UAMI Purview Data Map roles (data-plane)
        env:
          # De-hardcoded so a non-eastus2 / non-Commercial deploy grants the right
          # account on the right host. Override via repo var LOOM_PURVIEW_ACCOUNT
          # (the bicep output catalog.purviewAccountName, e.g. purview-csa-loom-<region>).
          # When the var is UNSET we DISCOVER the provisioned account in the admin RG
          # below rather than falling back to a hardcoded eastus2 name that would not
          # exist in a different-region deploy (which left the grant failing after a
          # "successful" deploy). PURVIEW_CLOUD drives the Data Map host TLD (.us in
          # US Gov); the token audience stays https://purview.azure.net in all clouds.
          PURVIEW_ACCOUNT: ${{ vars.LOOM_PURVIEW_ACCOUNT || '' }}
          PURVIEW_CLOUD: ${{ vars.LOOM_CLOUD || vars.AZURE_CLOUD || 'AzureCloud' }}
        run: |
          set -uo pipefail
          # When LOOM_PURVIEW_ACCOUNT is not pinned, discover the account this deploy
          # provisioned (catalog.bicep names it purview-csa-loom-<region>). Prefer the
          # admin RG, then any account in the subscription. Skip the grants cleanly
          # when none exists (Purview opted out / reused account in another sub).
          if [ -z "${PURVIEW_ACCOUNT:-}" ]; then
            PURVIEW_ACCOUNT="$(az purview account list -g "$ADMIN_RG" --query "[?starts_with(name,'purview-csa-loom')].name | [0]" -o tsv 2>/dev/null || true)"
            [ -z "$PURVIEW_ACCOUNT" ] && PURVIEW_ACCOUNT="$(az resource list --resource-type Microsoft.Purview/accounts --query "[?starts_with(name,'purview-csa-loom')].name | [0]" -o tsv 2>/dev/null || true)"
          fi
          if [ -z "${PURVIEW_ACCOUNT:-}" ]; then
            echo "No CSA Loom Purview account found (purviewEnabled=false or reused cross-sub) — skipping Data Map grants."
            exit 0
          fi
          echo "Targeting Purview account: $PURVIEW_ACCOUNT"
          # Classic Purview Data Map permissions are data-plane (collection
          # metadata policy), not ARM RBAC — so they can't be set in bicep. The
          # deploy SP created the Purview account, so it is the root Collection
          # Admin and can grant the Console UAMI the roles it needs for the
          # catalog/scan/glossary/lineage surfaces (fixes the /admin/security +
          # /governance scan + sources "Not authorized to access account" 403).
          # data-reader is included for the F5 lakehouse MIP-label-on-download
          # lookup (reading the sensitivity label scanned onto an ADLS path).
          # Idempotent.
          #
          # REACHABILITY: catalog.bicep deploys the Purview account with
          # publicNetworkAccess='Disabled', so the data plane
          # ({account}.purview.azure.{tld}/policystore/metadataPolicies) is NOT
          # reachable from this public ubuntu-latest runner — the grant PUT (and
          # the metadata-policy GET it depends on) would silently fail and the
          # `|| echo ::warning::` would swallow it, leaving the UAMI unauthorized
          # and the pane stuck on a permanent 403 AFTER a "successful" deploy.
          # We therefore temporarily flip publicNetworkAccess=Enabled for the
          # grant window (mirrors the Synapse/Databricks steps below) and RESTORE
          # it via a trap so it returns to Disabled even if the grant fails.
          PURVIEW_API_VERSION="2024-04-01-preview"
          PURVIEW_ID="$(az resource list --resource-type Microsoft.Purview/accounts \
            --query "[?name=='$PURVIEW_ACCOUNT'].id | [0]" -o tsv 2>/dev/null)"
          if [ -z "$PURVIEW_ID" ]; then
            PURVIEW_ID="$(az purview account show -n "$PURVIEW_ACCOUNT" -g "$ADMIN_RG" --query id -o tsv 2>/dev/null || true)"
          fi
          ORIG_PNA=""
          restore_purview_pna() {
            if [ -n "$PURVIEW_ID" ] && [ "${ORIG_PNA:-Enabled}" != "Enabled" ]; then
              echo "-> restoring Purview publicNetworkAccess=Disabled"
              az resource update --ids "$PURVIEW_ID" --api-version "$PURVIEW_API_VERSION" \
                --set properties.publicNetworkAccess=Disabled --query "properties.publicNetworkAccess" -o tsv || true
            fi
          }
          trap restore_purview_pna EXIT
          if [ -n "$PURVIEW_ID" ]; then
            ORIG_PNA="$(az resource show --ids "$PURVIEW_ID" --api-version "$PURVIEW_API_VERSION" \
              --query "properties.publicNetworkAccess" -o tsv 2>/dev/null || echo Enabled)"
            echo "Purview account $PURVIEW_ACCOUNT publicNetworkAccess=$ORIG_PNA"
            if [ "$ORIG_PNA" != "Enabled" ]; then
              echo "-> temporarily enabling Purview public access for the grant window"
              az resource update --ids "$PURVIEW_ID" --api-version "$PURVIEW_API_VERSION" \
                --set properties.publicNetworkAccess=Enabled --query "properties.publicNetworkAccess" -o tsv || \
                echo "::warning::Could not enable Purview public access — grant may be unreachable from the runner."
              sleep 30
            fi
          else
            echo "::warning::Could not resolve a Microsoft.Purview/accounts id for '$PURVIEW_ACCOUNT' — proceeding (account may be public, in a different RG, or absent)."
          fi
          chmod +x scripts/csa-loom/grant-purview-datamap-role.sh
          for ROLE in data-reader data-curator data-source-administrator collection-administrator; do
            echo "== granting Console UAMI '$ROLE' on $PURVIEW_ACCOUNT root collection (cloud=$PURVIEW_CLOUD) =="
            PURVIEW_ACCOUNT="$PURVIEW_ACCOUNT" PURVIEW_CLOUD="$PURVIEW_CLOUD" \
              CONSOLE_UAMI_PRINCIPAL="$CONSOLE_UAMI_PRINCIPAL" ROLE="$ROLE" \
              bash scripts/csa-loom/grant-purview-datamap-role.sh \
              || echo "::warning::Purview '$ROLE' grant failed — the deploy SP may not be Collection Admin on $PURVIEW_ACCOUNT (add it once in the Purview portal, then re-run)."
          done

      - name: Purview Unified Catalog governance-domain + Data Product Owner (guidance)
        # Day-one gap closure plan §D3/§D4. The Purview UNIFIED Catalog
        # (purview.microsoft.com) governance-domain creation AND its role grants
        # (Data Product Owner / Data Steward / Catalog Reader) have NO public
        # data-plane REST / az CLI surface as of 2026-06 — they are portal-only.
        # The classic Data Map grants above are fully automated; this unified path
        # is an honest, documented gate (plan §D4) that fires ONLY when an operator
        # has opted into the unified-catalog data-products backend. We print the
        # exact, ordered portal runbook (create domain → add the Console UAMI as
        # Data Product Owner + Catalog Reader) via the existing guidance script so
        # the operator has the steps in the workflow log; the Console renders the
        # matching honest-gate MessageBar until the grant lands. Nothing here fails
        # the deploy — the data-products surface falls through to the Cosmos
        # adapter by default (no Fabric/Power BI dependency).
        if: ${{ vars.LOOM_DATAPRODUCTS_BACKEND == 'unified-catalog' }}
        env:
          LOOM_PURVIEW_UNIFIED_ACCOUNT: ${{ vars.LOOM_PURVIEW_UNIFIED_ACCOUNT || '' }}
          LOOM_PURVIEW_UC_ENDPOINT: ${{ vars.LOOM_PURVIEW_UC_ENDPOINT || '' }}
          LOOM_PURVIEW_GOVERNANCE_DOMAIN_ID: ${{ vars.LOOM_PURVIEW_GOVERNANCE_DOMAIN_ID || '' }}
        run: |
          set -uo pipefail
          echo "== Purview Unified Catalog: governance-domain + Data Product Owner grant =="
          echo "   (unified-catalog backend opted in via LOOM_DATAPRODUCTS_BACKEND)"
          chmod +x scripts/csa-loom/grant-purview-uc-role.sh
          CONSOLE_UAMI_PRINCIPAL="$CONSOLE_UAMI_PRINCIPAL" \
            LOOM_PURVIEW_UNIFIED_ACCOUNT="$LOOM_PURVIEW_UNIFIED_ACCOUNT" \
            LOOM_PURVIEW_UC_ENDPOINT="$LOOM_PURVIEW_UC_ENDPOINT" \
            LOOM_PURVIEW_GOVERNANCE_DOMAIN_ID="$LOOM_PURVIEW_GOVERNANCE_DOMAIN_ID" \
            bash scripts/csa-loom/grant-purview-uc-role.sh \
            || echo "::warning::Unified Catalog role grant is portal-only — follow the printed runbook, then the data-products surface activates."

      - name: Seed default governance taxonomy (classifications / labels / domains)
        env:
          # Deploy-readiness (#229): make /governance + /admin/security POPULATED
          # on first login instead of empty. Seeds GLOBAL Cosmos defaults that the
          # console BFF copies into each tenant on first access. Azure-native; the
          # optional Purview push only fires when LOOM_PURVIEW_ACCOUNT is set.
          LOOM_PURVIEW_ACCOUNT: ${{ vars.LOOM_PURVIEW_ACCOUNT || '' }}
        run: |
          set -uo pipefail
          # The governance docs live in the CONSOLE Cosmos `loom` DB (tenant-settings
          # + governance-domains containers). In tenant mode the console Cosmos is in
          # the ADMIN RG; discover it there first, then fall back to the DLZ RG.
          COSMOS_ACCT="$(az cosmosdb list --subscription "$ADMIN_SUB" -g "$ADMIN_RG" --query "[?starts_with(name,'cosmos-loom')].name | [0]" -o tsv 2>/dev/null || true)"
          COSMOS_RG="$ADMIN_RG"; COSMOS_SUB="$ADMIN_SUB"
          if [ -z "$COSMOS_ACCT" ]; then
            COSMOS_ACCT="$(az cosmosdb list --subscription "$DLZ_SUB" -g "$DLZ_RG" --query "[?starts_with(name,'cosmos-loom')].name | [0]" -o tsv 2>/dev/null || true)"
            COSMOS_RG="$DLZ_RG"; COSMOS_SUB="$DLZ_SUB"
          fi
          if [ -z "$COSMOS_ACCT" ]; then
            echo "::warning::Could not resolve a cosmos-loom* account in $ADMIN_RG or $DLZ_RG — skipping governance seed."
            exit 0
          fi
          echo "== seeding governance taxonomy into $COSMOS_ACCT (rg=$COSMOS_RG, db=loom) =="
          chmod +x scripts/csa-loom/seed-governance.sh
          LOOM_SUBSCRIPTION_ID="$COSMOS_SUB" LOOM_COSMOS_ACCOUNT="$COSMOS_ACCT" LOOM_COSMOS_RG="$COSMOS_RG" \
            LOOM_COSMOS_DATABASE="loom" LOOM_PURVIEW_ACCOUNT="$LOOM_PURVIEW_ACCOUNT" \
            bash scripts/csa-loom/seed-governance.sh \
            || echo "::warning::governance seed failed (Cosmos Data Contributor RBAC on $COSMOS_ACCT for the deploy SP?) — surfaces start empty until re-run."

      - name: Grant Console UAMI subscription RBAC (Monitor / Cost / Security)
        run: |
          set -uo pipefail
          # Security Reader (Defender reads), Resource Policy Contributor
          # (Defender "Fix via Loom" remediations), Cost Management Reader
          # (Monitor → Cost), Monitoring Contributor (diagnostics-on), Reader.
          # Baked in here so a fresh deploy's Monitor surfaces work without the
          # operator hunting for grants. Idempotent.
          chmod +x scripts/csa-loom/grant-console-rbac.sh
          CONSOLE_UAMI_PRINCIPAL="$CONSOLE_UAMI_PRINCIPAL" SUBS="$SUB" \
            bash scripts/csa-loom/grant-console-rbac.sh \
            || echo "::warning::Some Console UAMI RBAC grants failed — the deploy SP needs Owner / User Access Administrator on the subscription."

      - name: Fix Synapse Spark storage access (Hive metastore abfss)
        run: |
          set -uo pipefail
          # Grant the Synapse workspace MSI Storage Blob Data Contributor on the
          # default ADLS account + create/approve the managed private endpoints
          # so Spark notebooks can initialize the Hive metastore (otherwise
          # SHOW NAMESPACES fails with InvalidAbfsRestOperationException -1).
          chmod +x scripts/csa-loom/fix-synapse-spark-storage-access.sh
          SYNAPSE_WS="$SYNAPSE_WS" SYNAPSE_RG="$DLZ_RG" SUBSCRIPTION="$DLZ_SUB" \
            bash scripts/csa-loom/fix-synapse-spark-storage-access.sh \
            || echo "::warning::Synapse Spark storage fix incomplete — check the deploy SP's rights on the default storage account."

      - name: Enable Synapse public access (temp)
        run: |
          set -e
          az resource update --ids "/subscriptions/$DLZ_SUB/resourceGroups/$DLZ_RG/providers/Microsoft.Synapse/workspaces/$SYNAPSE_WS" \
            --api-version 2021-06-01 --set properties.publicNetworkAccess=Enabled \
            --query "properties.publicNetworkAccess" -o tsv
          sleep 30
          # Allow GHA runner IP through firewall
          GHA_IP=$(curl -sS https://ifconfig.me)
          echo "GHA IP: $GHA_IP"
          az synapse workspace firewall-rule create --subscription "$DLZ_SUB" -g $DLZ_RG --workspace-name $SYNAPSE_WS \
            --name allow-gha-bootstrap-$(date +%s) --start-ip-address "$GHA_IP" --end-ip-address "$GHA_IP" || true
          sleep 30

      - name: Grant Console UAMI Synapse Administrator
        run: |
          set -e
          az synapse role assignment create \
            --workspace-name $SYNAPSE_WS \
            --role "Synapse Administrator" \
            --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
            --assignee-principal-type ServicePrincipal \
            -o table || echo "Already assigned or partial"
          # Also grant SQL Administrator just for sanity (SQL pool access)
          az synapse role assignment create \
            --workspace-name $SYNAPSE_WS \
            --role "Synapse SQL Administrator" \
            --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
            --assignee-principal-type ServicePrincipal \
            -o table || true

      - name: Resolve Console UAMI SQL name (region-correct, not hardcoded)
        run: |
          set -uo pipefail
          # identity.bicep names the Console UAMI uami-loom-console-<region>. The
          # hardcoded eastus2 default in env: would create the SQL login for the
          # WRONG name in any other region, leaving the Console UAMI with
          # "Login failed for user" (ELOGIN) on every Synapse SQL call. Discover
          # the real UAMI in the admin RG and derive the region from ADMIN_RG so
          # CREATE LOGIN/USER targets the identity that actually runs the console.
          DISCOVERED=$(az identity list -g "$ADMIN_RG" \
            --query "[?contains(name,'console')].name | [0]" -o tsv 2>/dev/null || true)
          if [ -n "${DISCOVERED:-}" ] && [ "$DISCOVERED" != "None" ]; then
            echo "CONSOLE_SQL_UAMI=$DISCOVERED" >> "$GITHUB_ENV"
            echo "Resolved Console UAMI SQL name from admin RG: $DISCOVERED"
          else
            # Fallback: derive region from the admin RG suffix (rg-csa-loom-admin-<region>).
            REGION_FROM_RG="${ADMIN_RG##*-}"
            if [ -n "$REGION_FROM_RG" ] && [ "$REGION_FROM_RG" != "$ADMIN_RG" ]; then
              echo "CONSOLE_SQL_UAMI=uami-loom-console-$REGION_FROM_RG" >> "$GITHUB_ENV"
              echo "Derived Console UAMI SQL name from admin RG region: uami-loom-console-$REGION_FROM_RG"
            else
              echo "Keeping configured CONSOLE_SQL_UAMI=$CONSOLE_SQL_UAMI"
            fi
          fi

      - name: SQL-level grants via sqlcmd (Serverless)
        run: |
          set -e
          # Acquire AAD token for Synapse SQL
          TOKEN=$(az account get-access-token --resource https://database.windows.net --query accessToken -o tsv)
          # Install sqlcmd
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          export PATH="$PATH:/opt/mssql-tools18/bin"
          # Connect to Serverless master, create UAMI as login + user (region-correct name).
          sqlcmd -S "$SYNAPSE_WS-ondemand.sql.azuresynapse.net" -d master -G -P "$TOKEN" -Q "
          IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = '$CONSOLE_SQL_UAMI')
            CREATE LOGIN [$CONSOLE_SQL_UAMI] FROM EXTERNAL PROVIDER;
          IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = '$CONSOLE_SQL_UAMI')
            CREATE USER [$CONSOLE_SQL_UAMI] FROM LOGIN [$CONSOLE_SQL_UAMI];
          ALTER SERVER ROLE sysadmin ADD MEMBER [$CONSOLE_SQL_UAMI];
          " || echo "Some grants may have failed (already exist or other) — continuing"

      - name: SQL-level grants via sqlcmd (Dedicated pool — F13 table/column/row security)
        run: |
          set -e
          # The Permissions dialog's Table/Column/Row tabs run real
          # GRANT SELECT / CREATE SECURITY POLICY against the Dedicated SQL
          # pool. The Console UAMI must be a db_owner contained user there to
          # CREATE USER … FROM EXTERNAL PROVIDER + manage object/RLS security.
          # We also pre-create the LoomSecurity schema the RLS predicates live
          # in (Dedicated pools reject the inline CREATE SCHEMA IF NOT EXISTS
          # form, so the client guards it; pre-creating here is belt-and-braces).
          POOL="${LOOM_SYNAPSE_DEDICATED_POOL:-loompool}"
          TOKEN=$(az account get-access-token --resource https://database.windows.net --query accessToken -o tsv)
          export PATH="$PATH:/opt/mssql-tools18/bin"
          # The dedicated pool (the Azure-native "warehouse" backend) must be
          # running (resumed) for this to connect. Use the region-correct UAMI
          # name resolved above so the login matches the identity the console runs
          # as (fixes ELOGIN on non-eastus2 deploys).
          sqlcmd -S "$SYNAPSE_WS.sql.azuresynapse.net" -d "$POOL" -G -P "$TOKEN" -I -b -Q "
          IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = '$CONSOLE_SQL_UAMI')
            CREATE USER [$CONSOLE_SQL_UAMI] FROM EXTERNAL PROVIDER;
          IF IS_ROLEMEMBER('db_owner','$CONSOLE_SQL_UAMI') = 0
            EXEC sp_addrolemember 'db_owner', '$CONSOLE_SQL_UAMI';
          IF NOT EXISTS (SELECT 1 FROM sys.schemas WHERE name = 'LoomSecurity')
            EXEC('CREATE SCHEMA LoomSecurity');
          " || echo "::warning::Dedicated-pool F13 grants incomplete — ensure the pool '$POOL' is resumed and the UAMI is Synapse SQL Administrator."

      - name: SQL-level grants via sqlcmd (Serverless user databases — warehouse/lakehouse SQL endpoints)
        run: |
          set -uo pipefail
          # The serverless master login (above) authenticates the Console UAMI to
          # the on-demand endpoint, but per-database SQL (warehouse/lakehouse
          # logical DBs exposed as serverless databases, e.g. SELECT over external
          # tables / OPENROWSET views) needs a CONTAINED USER in each user DB.
          # Without it the Console UAMI connects to master fine but gets ELOGIN /
          # "principal not found" against the warehouse DB. Create the user +
          # db_owner in every non-system serverless database. Idempotent.
          export PATH="$PATH:/opt/mssql-tools18/bin"
          TOKEN=$(az account get-access-token --resource https://database.windows.net --query accessToken -o tsv)
          ONDEMAND="$SYNAPSE_WS-ondemand.sql.azuresynapse.net"
          # Enumerate user databases on the serverless endpoint.
          DBS=$(sqlcmd -S "$ONDEMAND" -d master -G -P "$TOKEN" -h -1 -W -Q \
            "SET NOCOUNT ON; SELECT name FROM sys.databases WHERE database_id > 4 AND name <> 'master';" 2>/dev/null | grep -vE '^\s*$' || true)
          if [ -z "${DBS:-}" ]; then
            echo "No serverless user databases yet (warehouse/lakehouse SQL endpoints are created on first item) — master login is sufficient for now. Re-run after creating a warehouse to grant per-DB access."
            exit 0
          fi
          for DB in $DBS; do
            echo "Granting [$CONSOLE_SQL_UAMI] db_owner on serverless DB: $DB"
            sqlcmd -S "$ONDEMAND" -d "$DB" -G -P "$TOKEN" -I -b -Q "
            IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = '$CONSOLE_SQL_UAMI')
              CREATE USER [$CONSOLE_SQL_UAMI] FROM EXTERNAL PROVIDER;
            IF IS_ROLEMEMBER('db_owner','$CONSOLE_SQL_UAMI') = 0
              EXEC sp_addrolemember 'db_owner', '$CONSOLE_SQL_UAMI';
            " || echo "::warning::Per-DB grant on serverless DB '$DB' incomplete (continuing)."
          done

      - name: Restore Synapse public access disabled
        if: always()
        run: |
          az resource update --ids "/subscriptions/$DLZ_SUB/resourceGroups/$DLZ_RG/providers/Microsoft.Synapse/workspaces/$SYNAPSE_WS" \
            --api-version 2021-06-01 --set properties.publicNetworkAccess=Disabled \
            --query "properties.publicNetworkAccess" -o tsv

      - name: Enable Databricks public access (temp, so GHA can reach SCIM)
        run: |
          set -e
          # The Databricks workspace lives behind a private endpoint. The
          # GHA runner can't reach `/api/2.0/preview/scim/v2/...` without
          # publicNetworkAccess=Enabled. We flip it on, do the SCIM PATCH,
          # and restore disabled in the always-run cleanup step below.
          DBX_RID=$(az resource list --subscription "$DLZ_SUB" -g $DLZ_RG --resource-type Microsoft.Databricks/workspaces --query "[?name=='$DBX_WS'].id" -o tsv)
          if [ -z "$DBX_RID" ]; then
            DBX_RID=$(az resource list --subscription "$ADMIN_SUB" -g $ADMIN_RG --resource-type Microsoft.Databricks/workspaces --query "[?name=='$DBX_WS'].id" -o tsv)
          fi
          echo "DBX_RID=$DBX_RID"
          if [ -n "$DBX_RID" ]; then
            az resource update --ids "$DBX_RID" --api-version 2024-05-01 \
              --set properties.publicNetworkAccess=Enabled \
              --query "properties.publicNetworkAccess" -o tsv || true
            sleep 30
          fi

      - name: Bootstrap Databricks SCIM (Console UAMI as SP)
        run: |
          set -e
          TOKEN=$(az account get-access-token --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d --query accessToken -o tsv)
          # All four entitlements needed for full editor parity:
          # workspace-access + databricks-sql-access = browse, run notebooks, SQL warehouses
          # allow-cluster-create = POST /api/2.1/clusters/create (fixes the 403 in
          #   the Cluster editor reported 2026-05-27; PR #366)
          # allow-instance-pool-create = POST /api/2.0/instance-pools/create
          PAYLOAD=$(cat <<EOF
          {
            "schemas":["urn:ietf:params:scim:schemas:core:2.0:ServicePrincipal"],
            "applicationId":"$CONSOLE_UAMI_CLIENT",
            "displayName":"$CONSOLE_SQL_UAMI",
            "groups":[],
            "entitlements":[
              {"value":"workspace-access"},
              {"value":"databricks-sql-access"},
              {"value":"allow-cluster-create"},
              {"value":"allow-instance-pool-create"}
            ]
          }
          EOF
          )
          # Try POST; on 409 (SP already exists from a prior bootstrap that
          # only granted 2 entitlements), look up the SP id and PATCH the
          # entitlements list to all four. Idempotent on re-run.
          STATUS=$(curl -sS -w "%{http_code}" -o /tmp/scim.json -X POST \
            "https://$DBX_HOST/api/2.0/preview/scim/v2/ServicePrincipals" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/scim+json" \
            -d "$PAYLOAD")
          echo "SCIM POST status: $STATUS"
          cat /tmp/scim.json
          echo
          if [[ "$STATUS" == "409" ]] || grep -q "already exists\|exists" /tmp/scim.json 2>/dev/null; then
            echo "SP already exists — looking up id + PATCHing entitlements"
            SP_LOOKUP=$(curl -sS \
              "https://$DBX_HOST/api/2.0/preview/scim/v2/ServicePrincipals?filter=applicationId%20eq%20%22$CONSOLE_UAMI_CLIENT%22" \
              -H "Authorization: Bearer $TOKEN")
            SP_ID=$(echo "$SP_LOOKUP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Resources'][0]['id'])")
            echo "Existing SP id: $SP_ID"
            PATCH_RESP=$(curl -sS -w "%{http_code}" -o /tmp/scim_patch.json -X PATCH \
              "https://$DBX_HOST/api/2.0/preview/scim/v2/ServicePrincipals/$SP_ID" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/scim+json" \
              -d '{"schemas":["urn:ietf:params:scim:api:messages:2.0:PatchOp"],"Operations":[{"op":"replace","path":"entitlements","value":[{"value":"workspace-access"},{"value":"databricks-sql-access"},{"value":"allow-cluster-create"},{"value":"allow-instance-pool-create"}]}]}')
            echo "SCIM PATCH status: $PATCH_RESP"
            cat /tmp/scim_patch.json
            echo
          fi

      - name: Enable Unity Catalog (metastore + default catalog + UAMI account-admin)
        # Default-on UC enablement. Runs against the Databricks ACCOUNT API
        # (accounts.azuredatabricks.net, NOT the network-locked workspace) to
        # create/assign the metastore + grant the Console UAMI account-admin, and
        # against the WORKSPACE REST (reachable here because public access is
        # temporarily Enabled above) to create + pin the DEFAULT CATALOG so
        # Browse > Unity Catalog shows a real configured catalog. Requires:
        #   - var/secret DATABRICKS_ACCOUNT_ID (the account GUID), AND
        #   - the deploy SP to be a Databricks ACCOUNT ADMIN (one-time human step).
        # If either is absent the step prints how to do it and continues — UC
        # enablement is never a hard deploy blocker.
        env:
          DATABRICKS_ACCOUNT_ID: ${{ vars.DATABRICKS_ACCOUNT_ID || secrets.DATABRICKS_ACCOUNT_ID }}
          # OPTIONAL sovereign override. Leave unset for Commercial/GCC (defaults to
          # accounts.azuredatabricks.net); set to accounts.azuredatabricks.us for
          # Azure US Government. enable-unity-catalog.sh reads this as its host default.
          DATABRICKS_ACCOUNT_HOST: ${{ vars.DATABRICKS_ACCOUNT_HOST }}
        run: |
          if [ -z "$DATABRICKS_ACCOUNT_ID" ]; then
            echo "::notice::DATABRICKS_ACCOUNT_ID not set — skipping UC auto-enable."
            echo "To automate: set repo var DATABRICKS_ACCOUNT_ID (account console → ⊙ menu → Account ID)"
            echo "and make the deploy SP a Databricks account admin once. Or assign the metastore manually:"
            echo "  docs/fiab/catalog/metastores.md#enabling-unity-catalog"
            exit 0
          fi
          WS_ID=$(az databricks workspace show --subscription "$DLZ_SUB" -g "$DLZ_RG" -n "$DBX_WS" --query workspaceId -o tsv 2>/dev/null \
                  || az databricks workspace show --subscription "$ADMIN_SUB" -g "$ADMIN_RG" -n "$DBX_WS" --query workspaceId -o tsv 2>/dev/null)
          DBX_REGION=$(az databricks workspace show --subscription "$DLZ_SUB" -g "$DLZ_RG" -n "$DBX_WS" --query location -o tsv 2>/dev/null \
                   || az databricks workspace show --subscription "$ADMIN_SUB" -g "$ADMIN_RG" -n "$DBX_WS" --query location -o tsv 2>/dev/null)
          if [ -z "$WS_ID" ] || [ -z "$DBX_REGION" ]; then
            echo "::warning::Could not resolve Databricks workspaceId/region — skipping UC auto-enable."; exit 0
          fi
          chmod +x scripts/csa-loom/enable-unity-catalog.sh
          # --workspace-host is reachable because public access is Enabled above;
          # it lets the script CREATE + pin the default catalog so Browse shows a
          # real configured catalog. Tolerate non-account-admin deploy SP: warn,
          # don't fail the bootstrap.
          bash scripts/csa-loom/enable-unity-catalog.sh \
            --region "$DBX_REGION" --workspace-id "$WS_ID" --uami-app-id "$CONSOLE_UAMI_CLIENT" \
            --workspace-host "$DBX_HOST" --default-catalog main \
            || echo "::warning::UC auto-enable failed (deploy SP likely not a Databricks account admin). See docs/fiab/catalog/metastores.md"

      - name: Restore Databricks public access disabled
        if: always()
        run: |
          DBX_RID=$(az resource list --subscription "$DLZ_SUB" -g $DLZ_RG --resource-type Microsoft.Databricks/workspaces --query "[?name=='$DBX_WS'].id" -o tsv)
          if [ -z "$DBX_RID" ]; then
            DBX_RID=$(az resource list --subscription "$ADMIN_SUB" -g $ADMIN_RG --resource-type Microsoft.Databricks/workspaces --query "[?name=='$DBX_WS'].id" -o tsv)
          fi
          if [ -n "$DBX_RID" ]; then
            az resource update --ids "$DBX_RID" --api-version 2024-05-01 \
              --set properties.publicNetworkAccess=Disabled \
              --query "properties.publicNetworkAccess" -o tsv || true
          fi

      - name: Grant Console UAMI APIM Service Contributor (if APIM exists)
        run: |
          set -e
          APIM_STATE=$(az apim show -n $APIM_NAME -g $ADMIN_RG --query provisioningState -o tsv 2>/dev/null || echo "Missing")
          echo "APIM state: $APIM_STATE"
          if [[ "$APIM_STATE" == "Succeeded" ]]; then
            az role assignment create \
              --assignee $CONSOLE_UAMI_PRINCIPAL \
              --role "API Management Service Contributor" \
              --scope "/subscriptions/$SUB/resourceGroups/$ADMIN_RG/providers/Microsoft.ApiManagement/service/$APIM_NAME" \
              -o table || echo "Already assigned"
          else
            echo "APIM not provisioned yet — skipping RBAC grant"
          fi

      - name: Grant Console UAMI Reader on admin RG (unblocks /admin/capacity full inventory)
        run: |
          az role assignment create \
            --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
            --assignee-principal-type ServicePrincipal \
            --role "Reader" \
            --scope "/subscriptions/$SUB/resourceGroups/$ADMIN_RG" \
            -o table 2>&1 | grep -v "already exists" || echo "Already assigned"

      - name: Grant Console UAMI Cost Management Reader + Security Reader (Monitor Cost + Security tabs)
        # Sub-scope, so the /monitor Cost tab (Microsoft.CostManagement query) and
        # Security/Defender tab (Microsoft.Security secureScores/assessments/alerts)
        # show real data instead of an honest "grant X" gate. Idempotent.
        run: |
          for ROLE in "Cost Management Reader" "Security Reader"; do
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "$ROLE" \
              --scope "/subscriptions/$SUB" \
              -o table 2>&1 | grep -v "already exists" || echo "$ROLE already assigned"
          done

      - name: Enable diagnostics on ALL Loom resources → Loom Log Analytics
        # "All logs ON by default, routed to the Loom LAW." Deploy-time bicep
        # wires the first-class resources; this sweep covers everything created
        # at runtime (installed-app resources, ADX DBs, etc.) and any drift.
        # First grant the Console UAMI Monitoring Contributor so the in-console
        # Monitor → Diagnostics tab's "Enable" buttons work at runtime too.
        run: |
          # ADMIN_RG lives in the admin sub; DLZ_RG may live in a DIFFERENT sub on a
          # cross-sub dlz-attach. Pair each RG with its sub so the scope is correct.
          for PAIR in "$ADMIN_SUB:$ADMIN_RG" "$DLZ_SUB:$DLZ_RG"; do
            RG_SUB="${PAIR%%:*}"; RG="${PAIR##*:}"
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "Monitoring Contributor" \
              --scope "/subscriptions/$RG_SUB/resourceGroups/$RG" \
              -o table 2>&1 | grep -v "already exists" || echo "Monitoring Contributor already assigned on $RG"
          done
          # Idempotent sweep — skips resources already routing to the LAW and
          # types that don't support diagnostic settings.
          bash scripts/csa-loom/enable-all-diagnostics.sh --resource-groups "$ADMIN_RG $DLZ_RG" || \
            echo "WARN: diagnostics sweep reported issues (non-fatal)"

      - name: Grant Console UAMI constrained RBAC Admin (Governance access-policy enforcement)
        # Lets the Governance → Policies "Access" wizard ENFORCE policies as real
        # Storage RBAC grants (Blob Data Reader/Contributor/Owner) on the DLZ.
        # Least-privilege: "Role Based Access Control Administrator" with a
        # condition restricting it to ONLY assign/remove the 3 Storage Blob Data
        # roles. Without this the access policy records with an honest error.
        run: |
          COND="((!(ActionMatches{'Microsoft.Authorization/roleAssignments/write'})) OR (@Request[Microsoft.Authorization/roleAssignments:RoleDefinitionId] ForAnyOfAnyValues:GuidEquals {2a2b9908-6ea1-4ae2-8e65-a410df84e7d1, ba92f5b4-2d11-453d-a403-e96b0029c9fe, b7e6dc6d-f1e8-4753-8033-0f276bb0955b})) AND ((!(ActionMatches{'Microsoft.Authorization/roleAssignments/delete'})) OR (@Resource[Microsoft.Authorization/roleAssignments:RoleDefinitionId] ForAnyOfAnyValues:GuidEquals {2a2b9908-6ea1-4ae2-8e65-a410df84e7d1, ba92f5b4-2d11-453d-a403-e96b0029c9fe, b7e6dc6d-f1e8-4753-8033-0f276bb0955b}))"
          az role assignment create \
            --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
            --assignee-principal-type ServicePrincipal \
            --role "Role Based Access Control Administrator" \
            --scope "/subscriptions/$DLZ_SUB/resourceGroups/$DLZ_RG" \
            --condition "$COND" --condition-version "2.0" \
            -o table 2>&1 | grep -v "already exists" || echo "RBAC Admin (constrained) already assigned on $DLZ_RG"

      - name: Grant Console UAMI Microsoft Graph roles (Directory.Read.All + User.Read.All)
        # Unblocks /admin/users displayName + department + license
        # enrichment so the page shows real Entra identity data instead of
        # falling back to UPN-only Cosmos activity. Idempotent — only POSTs
        # the assignment when it isn't already present.
        run: |
          export LOOM_UAMI_OBJECT_ID=$CONSOLE_UAMI_PRINCIPAL
          export AZURE_TENANT_ID=$(az account show --query tenantId -o tsv)
          # Pull optional extra roles from repo variable so adminstrators
          # can extend the set without re-coding the workflow.
          if [ -n "${{ vars.LOOM_GRAPH_EXTRA_ROLES }}" ]; then
            export LOOM_GRAPH_EXTRA_ROLES="${{ vars.LOOM_GRAPH_EXTRA_ROLES }}"
          fi
          bash scripts/csa-loom/grant-uami-graph-roles.sh

      - name: Grant Console UAMI AzureML Data Scientist on Foundry workspace (unblocks Foundry editors)
        run: |
          FOUNDRY_WS=$(az resource list -g $ADMIN_RG --resource-type Microsoft.MachineLearningServices/workspaces --query "[0].id" -o tsv)
          if [ -n "$FOUNDRY_WS" ]; then
            echo "Foundry workspace: $FOUNDRY_WS"
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "AzureML Data Scientist" \
              --scope "$FOUNDRY_WS" \
              -o table 2>&1 | grep -v "already exists" || echo "Already assigned"
          else
            echo "No Foundry workspace in $ADMIN_RG — skipping"
          fi

      - name: Grant Console UAMI AzureML Compute Operator on Foundry workspace (unblocks CI list/start/status)
        run: |
          FOUNDRY_WS=$(az resource list -g $ADMIN_RG --resource-type Microsoft.MachineLearningServices/workspaces --query "[0].id" -o tsv)
          if [ -n "$FOUNDRY_WS" ]; then
            echo "Foundry workspace: $FOUNDRY_WS"
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "AzureML Compute Operator" \
              --scope "$FOUNDRY_WS" \
              -o table 2>&1 | grep -v "already exists" || echo "Already assigned"
          else
            echo "No Foundry workspace in $ADMIN_RG — skipping"
          fi

      - name: Grant Console UAMI Storage Blob Data Reader on Foundry storage (unblocks datastores)
        run: |
          STG=$(az storage account list -g $ADMIN_RG --query "[?contains(name,'aifound') || contains(name,'foundry') || contains(name,'aml')].id" -o tsv | head -1)
          if [ -n "$STG" ]; then
            echo "Foundry storage: $STG"
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "Storage Blob Data Reader" \
              --scope "$STG" \
              -o table 2>&1 | grep -v "already exists" || echo "Already assigned"
          else
            echo "No Foundry storage in $ADMIN_RG — skipping"
          fi

      - name: Grant Console UAMI Storage Blob Data Contributor on DLZ (lakehouse writes + notebook .ipynb backup)
        # The Console UAMI writes Delta files (lakehouse provisioner) AND backs up
        # published Synapse notebooks as .ipynb into ADLS silver/loom/notebooks/
        # (synapse-notebook PUT route → adls-client.uploadFile). Both need Storage
        # Blob Data Contributor on the DLZ data-lake account. Idempotent.
        run: |
          DLZ_STG=$(az storage account list --subscription "$DLZ_SUB" -g $DLZ_RG --query "[?contains(name,'dls') || contains(name,'lake') || contains(name,'adls')].id" -o tsv | head -1)
          [ -z "$DLZ_STG" ] && DLZ_STG=$(az storage account list --subscription "$DLZ_SUB" -g $DLZ_RG --query "[0].id" -o tsv)
          if [ -n "$DLZ_STG" ]; then
            echo "DLZ data-lake storage: $DLZ_STG"
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "Storage Blob Data Contributor" \
              --scope "$DLZ_STG" \
              -o table 2>&1 | grep -v "already exists" || echo "Already assigned"
          else
            echo "No data-lake storage in $DLZ_RG — skipping"
          fi

      - name: Wire org-visuals (F22/F23) — Storage Blob Delegator grant + LOOM_ORG_VISUALS_URL env on console
        # Deploy-readiness: in tenant / dlz-attach topology the admin plane is NOT
        # redeployed, so admin-plane/main.bicep leaves loomStorageAccount empty and
        # neither the org-visuals env (LOOM_ORG_VISUALS_URL + medallion/CSV URLs)
        # nor the Storage Blob Delegator grant lands → Embed codes (F22) + Org
        # visuals (F23) 503 not-configured. The account-wide Storage Blob Data
        # Contributor grant above already covers the org-visuals CONTAINER writes;
        # the only extra grant needed is Storage Blob Delegator (account scope) so
        # getUserDelegationKey() can mint the read-only embed SAS. This step adds
        # that grant and wires the storage env vars onto the live console app —
        # mirroring scripts/csa-loom/patch-navigator-env.sh's storage block. The
        # single-sub path already gets all of this from bicep; this is the
        # tenant/dlz-attach bridge. Idempotent. Skips cleanly if no DLZ HNS account.
        # Honors loomBackends.orgVisuals=disabled via the LOOM_ORG_VISUALS_DISABLED
        # repo var (set it to '1' to keep the panes honestly gated after a deploy).
        if: always()
        continue-on-error: true
        run: |
          set -uo pipefail
          if [ "${LOOM_ORG_VISUALS_DISABLED:-0}" = "1" ]; then
            echo "::notice::LOOM_ORG_VISUALS_DISABLED=1 — leaving Embed codes / Org visuals honestly gated (opt-out)."
            exit 0
          fi
          # Discover the DLZ HNS (Data Lake) account — reuse-first via repo var.
          SA_ACCT="${EXISTING_LOOM_STORAGE_ACCOUNT:-}"
          if [ -z "$SA_ACCT" ]; then
            SA_ACCT=$(az storage account list --subscription "$DLZ_SUB" -g "$DLZ_RG" \
              --query "[?starts_with(name,'saloom') && isHnsEnabled].name | [0]" -o tsv 2>/dev/null)
            [ -z "$SA_ACCT" ] && SA_ACCT=$(az storage account list --subscription "$DLZ_SUB" -g "$DLZ_RG" \
              --query "[?isHnsEnabled].name | [0]" -o tsv 2>/dev/null)
          fi
          if [ -z "$SA_ACCT" ]; then
            echo "::notice::No HNS (Data Lake) account in $DLZ_RG — Embed codes / Org visuals stay honestly gated."
            exit 0
          fi
          echo "DLZ ADLS account: $SA_ACCT"
          SA_ID=$(az storage account show --subscription "$DLZ_SUB" -n "$SA_ACCT" -g "$DLZ_RG" --query id -o tsv)
          # Storage Blob Delegator (account scope) — getUserDelegationKey for embed SAS.
          az role assignment create \
            --assignee-object-id "$CONSOLE_UAMI_PRINCIPAL" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Delegator" \
            --scope "$SA_ID" \
            -o table 2>&1 | grep -v "already exists" || echo "Storage Blob Delegator already assigned"
          # Wire the storage env on the live console app (single merged revision).
          SA_BLOB=$(az storage account show --subscription "$DLZ_SUB" -n "$SA_ACCT" -g "$DLZ_RG" --query "primaryEndpoints.blob" -o tsv)
          SA_DFS=$(az storage account show --subscription "$DLZ_SUB" -n "$SA_ACCT" -g "$DLZ_RG"  --query "primaryEndpoints.dfs"  -o tsv)
          SA_BLOB="${SA_BLOB%/}"; SA_DFS="${SA_DFS%/}"
          CONSOLE_APP="${LOOM_CONSOLE_APP:-loom-console}"
          az containerapp update -g "$ADMIN_RG" -n "$CONSOLE_APP" --set-env-vars \
            "LOOM_ADLS_ACCOUNT=$SA_ACCT" \
            "LOOM_ORG_VISUALS_URL=$SA_BLOB/org-visuals" \
            "LOOM_BRONZE_URL=$SA_DFS/bronze" \
            "LOOM_SILVER_URL=$SA_DFS/silver" \
            "LOOM_GOLD_URL=$SA_DFS/gold" \
            "LOOM_LANDING_URL=$SA_DFS/landing" \
            "LOOM_CSV_IMPORTS_URL=$SA_DFS/csv-imports" \
            -o none 2>&1 | tail -2 \
            && echo "Wired LOOM_ORG_VISUALS_URL + medallion URLs on $CONSOLE_APP" \
            || echo "::warning::Could not update $CONSOLE_APP env — run scripts/csa-loom/patch-navigator-env.sh manually."

      - name: Grant Console UAMI Cognitive Services User on Content Safety (unblocks /items/content-safety)
        run: |
          CS=$(az cognitiveservices account list -g $ADMIN_RG --query "[?kind=='ContentSafety'].id" -o tsv | head -1)
          if [ -n "$CS" ]; then
            echo "Content Safety: $CS"
            az role assignment create \
              --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
              --assignee-principal-type ServicePrincipal \
              --role "Cognitive Services User" \
              --scope "$CS" \
              -o table 2>&1 | grep -v "already exists" || echo "Already assigned"
          else
            echo "No Content Safety in $ADMIN_RG — skipping"
          fi

      - name: Verify AOAI account + gpt-4o deployment, self-heal Console UAMI grants (unblocks Copilot / data-agent / AI functions)
        run: |
          # Deploy-readiness safety-net (PRP gap #6). The dedicated AOAI account
          # aifndry-loom-<region> + its chat/embedding deployments are provisioned
          # by bicep (agentFoundryEnabled defaults true). This step VERIFIES the
          # account + a gpt-4o-class chat deployment exist and RE-GRANTS the three
          # Console UAMI inference roles (idempotent) so a partial deploy (account
          # created but a role grant raced/failed) self-heals — Copilot,
          # data-agents and AI functions then work on first login. If the account
          # is missing entirely, it prints the exact remediation (re-run the
          # deploy with agentFoundryEnabled=true) rather than silently passing.
          AOAI=$(az cognitiveservices account list -g $ADMIN_RG \
            --query "[?kind=='AIServices' && starts_with(name,'aifndry-loom')].name" -o tsv | head -1)
          if [ -z "$AOAI" ]; then
            AOAI=$(az cognitiveservices account list -g $ADMIN_RG \
              --query "[?kind=='AIServices' || kind=='OpenAI'].name" -o tsv | head -1)
          fi
          if [ -z "$AOAI" ]; then
            echo "::warning::No AOAI (AIServices) account in $ADMIN_RG. Copilot / data-agent / AI-functions will honest-gate. Re-run the deploy with agentFoundryEnabled=true (default) to provision aifndry-loom-<region> + gpt-4o + embeddings."
          else
            AOAI_ID=$(az cognitiveservices account show -n "$AOAI" -g $ADMIN_RG --query id -o tsv)
            echo "AOAI account: $AOAI"
            CHAT=$(az cognitiveservices account deployment list -n "$AOAI" -g $ADMIN_RG \
              --query "[?contains(to_string(properties.model.name) || '','gpt-4')].name | [0]" -o tsv 2>/dev/null || true)
            if [ -z "$CHAT" ]; then
              echo "::warning::AOAI account $AOAI has no gpt-4o-class chat deployment. Re-run the deploy (agentFoundryEnabled=true deploys 'chat' = gpt-4o) or deploy a gpt-4o model to it."
            else
              echo "AOAI chat deployment present: $CHAT"
            fi
            # Re-grant the three Console UAMI inference roles (idempotent).
            for ROLE in "Azure AI Developer" "Cognitive Services User" "Cognitive Services OpenAI User"; do
              az role assignment create \
                --assignee-object-id $CONSOLE_UAMI_PRINCIPAL \
                --assignee-principal-type ServicePrincipal \
                --role "$ROLE" \
                --scope "$AOAI_ID" \
                -o none 2>&1 | grep -v "already exists" || echo "  $ROLE: already assigned"
            done
            # Self-heal the Spark MSI grants (Synapse workspace MSI + Databricks
            # Access Connector) so notebook ai.* functions can call AOAI.
            SYN_MI=$(az synapse workspace list --query "[?contains(name,'syn') || contains(name,'loom')].identity.principalId | [0]" -o tsv 2>/dev/null || true)
            if [ -n "$SYN_MI" ] && [ "$SYN_MI" != "None" ]; then
              az role assignment create \
                --assignee-object-id "$SYN_MI" \
                --assignee-principal-type ServicePrincipal \
                --role "Cognitive Services OpenAI User" \
                --scope "$AOAI_ID" \
                -o none 2>&1 | grep -v "already exists" || echo "  Synapse MSI OpenAI User: already assigned"
            fi
          fi

      - name: Register Console UAMI as Power Platform Management App (unblocks PP + Copilot Studio editors)
        run: |
          # PP admin API for SP access requires the SP to be registered as a
          # tenant-wide PP management app — separate from the Power Platform
          # Admin Entra role. PUT is idempotent (returns 200 on re-run).
          PP_TOKEN=$(az account get-access-token --resource https://api.bap.microsoft.com --query accessToken -o tsv)
          R=$(curl -sS -w "%{http_code}" -o /tmp/pp.json -X PUT \
            "https://api.bap.microsoft.com/providers/Microsoft.BusinessAppPlatform/adminApplications/$CONSOLE_UAMI_CLIENT?api-version=2020-10-01" \
            -H "Authorization: Bearer $PP_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "PP management app PUT: $R"
          cat /tmp/pp.json
          echo
          if [[ "$R" == "200" ]] || [[ "$R" == "201" ]]; then
            echo "  Power Platform + Copilot Studio editors unlocked."
          else
            echo "  PP registration returned $R — deploy SP may lack PP Admin role."
          fi

      - name: Register MSAL SP as Dataverse Application User in every env that has Dataverse
        run: |
          # For each env with Dataverse, register the MSAL Web App SP as an
          # Application User with System Administrator. Idempotent — skips
          # envs where the AppUser already exists. Requires the caller to
          # already be SA on each env (Default env needs one-time Promote To
          # Admin click; see docs/fiab/dataverse-app-user.md Step 1).
          if [ -z "${LOOM_MSAL_CLIENT_ID:-}" ]; then
            echo "  LOOM_MSAL_CLIENT_ID not set — skipping Dataverse AppUser registration"
          else
            LOOM_MSAL_CLIENT_ID="$LOOM_MSAL_CLIENT_ID" \
              bash scripts/csa-loom/dataverse-add-appuser.sh || true
          fi

      - name: Grant MIP+DLP Graph AppRoles (Information Protection + DLP for /admin/security)
        run: |
          # Grant the Console UAMI four Microsoft Graph application
          # permissions required by /admin/security:
          #   - InformationProtectionPolicy.Read.All  (MIP labels + policies)
          #   - SensitivityLabel.Evaluate              (apply-label action)
          #   - Policy.Read.All                        (DLP policies + rules)
          #   - SecurityAlert.Read.All                 (DLP alerts)
          #
          # Each grant is idempotent — the script re-runs cleanly. After
          # this job completes, a Tenant Administrator MUST click "Grant
          # admin consent" in Entra → Enterprise applications → Console
          # UAMI → Permissions for the AppRoles to take effect. Until
          # consent is issued, every Graph call returns 403 and the
          # /admin/security panels render an explicit remediation
          # MessageBar.
          set -e
          GRAPH_SP_ID=$(az ad sp list --filter "appId eq '00000003-0000-0000-c000-000000000000'" --query "[0].id" -o tsv)
          if [ -z "$GRAPH_SP_ID" ]; then
            echo "  Could not resolve Microsoft Graph SP — skipping AppRole grants"
          else
            echo "Microsoft Graph SP object id: $GRAPH_SP_ID"
            for ROLE in \
              "InformationProtectionPolicy.Read.All:19da66cb-0fb0-4390-b071-ebc76a349482" \
              "SensitivityLabel.Evaluate:57f0b71b-a759-45a0-9a0f-cc099fbd9a44" \
              "Policy.Read.All:246dd0d5-5bd0-4def-940b-0421030a5b68" \
              "SecurityAlert.Read.All:bf394140-e372-4bf9-a898-299cfc7564e5" \
            ; do
              NAME="${ROLE%%:*}"
              APPROLE_ID="${ROLE##*:}"
              echo "Granting Graph AppRole $NAME ($APPROLE_ID) to Console UAMI..."
              PAYLOAD=$(printf '{"principalId":"%s","resourceId":"%s","appRoleId":"%s"}' \
                "$CONSOLE_UAMI_PRINCIPAL" "$GRAPH_SP_ID" "$APPROLE_ID")
              R=$(curl -sS -w "%{http_code}" -o /tmp/approle.json -X POST \
                "https://graph.microsoft.com/v1.0/servicePrincipals/$CONSOLE_UAMI_PRINCIPAL/appRoleAssignments" \
                -H "Authorization: Bearer $(az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")
              if [[ "$R" == "201" ]]; then
                echo "  $NAME granted"
              elif grep -q "Permission being assigned already exists" /tmp/approle.json 2>/dev/null; then
                echo "  $NAME already granted (idempotent)"
              else
                echo "  $NAME grant returned $R: $(cat /tmp/approle.json)"
              fi
            done
            echo ""
            echo "  Tenant Administrator action required:"
            echo "    Open Entra ID → Enterprise applications → Console UAMI → Permissions"
            echo "    Click 'Grant admin consent for <tenant>'"
            echo "    Without consent, /admin/security MIP+DLP tabs render the NotConfigured MessageBar."
          fi

      - name: Provision SCC labels + DLP sidecar (label, label-policy & DLP CRUD)
        if: always()
        continue-on-error: true
        run: |
          # Sets up the Security & Compliance PowerShell sidecar that backs
          # sensitivity-label + label-policy CRUD AND DLP compliance-policy CRUD
          # (create/edit/delete) on /admin/security. Microsoft Graph has no write
          # surface for labels, label policies, OR DLP policies, so all of these
          # run through SCC PowerShell (New-/Set-/Remove-Label, *-LabelPolicy, and
          # Get/New/Set/Remove-DlpCompliancePolicy + *-DlpComplianceRule) via the
          # azure-functions/scc-labels Function app (labels/ + dlp/ functions),
          # authenticated with the SAME certificate-based app (Exchange.ManageAsApp
          # + Compliance Administrator — those rights cover both label and DLP
          # cmdlets, so no extra grant is needed for DLP CRUD).
          #
          # This step performs the automatable parts (app registration, the
          # Exchange.ManageAsApp grant, the Compliance Administrator role
          # assignment, and — when the Function app exists — publishing the
          # code, which now includes the dlp/ function). The auth certificate
          # upload + Tenant Admin consent + the re-deploy with
          # loomMipAdminEnabled=true and/or loomDlpAdminEnabled=true remain
          # one-time manual actions, printed at the end of the script. Until
          # then label/DLP-policy READS work and CRUD returns the honest
          # 'mip_admin_not_configured' / 'dlp_admin_not_configured' gate (no vaporware).
          set +e
          SCC_FUNCTION_APP=$(az functionapp list -g "$ADMIN_RG" --query "[?starts_with(name,'func-scclbl-')].name | [0]" -o tsv 2>/dev/null)
          if [ -n "$SCC_FUNCTION_APP" ]; then
            echo "Found SCC labels Function app: $SCC_FUNCTION_APP — provisioning + publishing code (labels + dlp functions)."
            SCC_FUNCTION_APP="$SCC_FUNCTION_APP" SCC_FUNCTION_RG="$ADMIN_RG" \
              bash scripts/csa-loom/provision-scc-labels-sidecar.sh || true
          else
            echo "No func-scclbl-* Function app found in $ADMIN_RG."
            echo "Deploy with loomMipAdminEnabled=true (label CRUD) and/or loomDlpAdminEnabled=true (DLP CRUD) to create it, then re-run this job."
            echo "Running the app/role provisioning portion now so the SCC app exists ahead of the next deploy:"
            bash scripts/csa-loom/provision-scc-labels-sidecar.sh || true
          fi

      - name: Publish Govern posture-refresh Function code (if the app exists)
        if: always()
        run: |
          # Publishes the azure-functions/posture-refresh code to the Function
          # App provisioned by azure-functions/posture-refresh/deploy/main.bicep.
          # Pre-computes the Govern → Admin view (F2) posture aggregates into the
          # Cosmos posture-aggregates container every 5 min. The Console BFF still
          # computes live values, so this is a latency pre-warm, not a hard
          # dependency — the step is best-effort (skips cleanly if the app or the
          # func CLI is absent).
          set +e
          POSTURE_FUNC=$(az functionapp list --query "[?starts_with(name, 'func-loom-posture')].name | [0]" -o tsv 2>/dev/null)
          if [ -z "$POSTURE_FUNC" ]; then
            echo "  No posture-refresh Function App found — skipping (deploy azure-functions/posture-refresh/deploy/main.bicep to enable the pre-compute path)."
            exit 0
          fi
          if ! command -v func >/dev/null 2>&1; then
            echo "  Azure Functions Core Tools (func) not installed on this runner — skipping code publish for $POSTURE_FUNC."
            exit 0
          fi
          echo "Publishing posture-refresh code to $POSTURE_FUNC ..."
          ( cd azure-functions/posture-refresh && func azure functionapp publish "$POSTURE_FUNC" --python ) || \
            echo "  posture-refresh publish returned non-zero — re-run manually: cd azure-functions/posture-refresh && func azure functionapp publish $POSTURE_FUNC --python"

      - name: Grant Identity Picker Graph AppRoles (User/Group/Application Read.All for the reusable picker)
        run: |
          # Grant the Console UAMI the three Microsoft Graph application
          # permissions required by the reusable Identity Picker
          # (/api/governance/identities/search + <IdentityPicker>):
          #   - User.Read.All        (search users by displayName / UPN)
          #   - Group.Read.All       (search groups + expand transitiveMembers)
          #   - Application.Read.All (search service principals / managed ids)
          #
          # Idempotent — re-runs cleanly. Until a Tenant Administrator grants
          # admin consent, the picker renders its honest-gate MessageBar
          # naming exactly these grants. Delegates to the shared script so the
          # grant logic stays in one place.
          set -e
          export CONSOLE_UAMI_PRINCIPAL="$CONSOLE_UAMI_PRINCIPAL"
          bash scripts/csa-loom/grant-identity-graph-approles.sh || \
            echo "  Identity Picker AppRole grant step reported a non-zero status (likely already granted)."

          # Grant the Console UAMI the two Microsoft Graph application
          # permissions required by OneLake shortcuts to SharePoint / OneDrive
          # (lakehouse editor -> New shortcut -> SharePoint / OneDrive):
          #   - Sites.Read.All (enumerate SharePoint sites + document libraries)
          #   - Files.Read.All (list + read OneDrive / SharePoint drive items)
          #
          # Azure-native parity with Fabric OneLake OneDrive/SharePoint shortcuts;
          # NO Fabric dependency. Idempotent — re-runs cleanly. Until a Tenant
          # Administrator grants admin consent, the SharePoint source renders its
          # honest-gate MessageBar naming exactly these grants.
          bash scripts/csa-loom/grant-shortcut-graph-approles.sh || \
            echo "  SharePoint shortcut AppRole grant step reported a non-zero status (likely already granted)."


      - name: Bootstrap Weave ontology PostgreSQL + Apache AGE (graph + extension + UAMI principal)
        if: always()
        continue-on-error: true
        run: |
          # Weave (Semantic Ontology) Phase 1 — data-plane setup for the PG + AGE
          # graph store that backs object/link/action instance write-back. Bicep
          # (modules/landing-zone/postgres-weave.bicep) provisions the server +
          # shared_preload_libraries=AGE + azure.extensions=AGE; this step runs the
          # one-time CREATE EXTENSION AGE + create_graph + pgaadauth_create_principal
          # that cannot be done in bicep. Idempotent — re-runs cleanly.
          set -uo pipefail
          WEAVE_PG_SERVER=$(az postgres flexible-server list --subscription "$DLZ_SUB" -g "$DLZ_RG" \
            --query "[?starts_with(name,'psql-loom-weave')].name | [0]" -o tsv 2>/dev/null)
          if [ -z "$WEAVE_PG_SERVER" ]; then
            echo "::notice::No psql-loom-weave-* server in $DLZ_RG — deploy with weaveOntologyEnabled=true to create it, then re-run this job."
            exit 0
          fi
          echo "Weave PG server: $WEAVE_PG_SERVER"
          # The deploy SP must be a PG Entra admin to run pgaadauth_create_principal.
          # bicep set the Console UAMI as admin; add the deploy SP as a co-admin so
          # this job can bootstrap. (Idempotent — PUT returns 200 on re-run.)
          DEPLOY_OID=$(az ad signed-in-user show --query id -o tsv 2>/dev/null \
            || az account show --query user.name -o tsv 2>/dev/null)
          DEPLOY_SP_OID=$(az ad sp show --id "$(az account show --query user.name -o tsv)" --query id -o tsv 2>/dev/null || echo "")
          if [ -n "$DEPLOY_SP_OID" ]; then
            az postgres flexible-server ad-admin create --subscription "$DLZ_SUB" -g "$DLZ_RG" -s "$WEAVE_PG_SERVER" \
              --object-id "$DEPLOY_SP_OID" --display-name "loom-deploy-sp" --type ServicePrincipal \
              -o none 2>/dev/null || echo "  (deploy SP may already be a PG admin — continuing)"
            sleep 20
            export PG_ADMIN_USER="loom-deploy-sp"
          fi
          chmod +x scripts/csa-loom/bootstrap-weave-pg.sh
          SUB="$DLZ_SUB" DLZ_RG="$DLZ_RG" WEAVE_PG_SERVER="$WEAVE_PG_SERVER" \
            CONSOLE_UAMI_NAME="$CONSOLE_UAMI_NAME" \
            bash scripts/csa-loom/bootstrap-weave-pg.sh \
            || echo "::warning::Weave PG bootstrap incomplete — ensure the deploy SP is a PG Entra admin on $WEAVE_PG_SERVER, then re-run."

      - name: Create Govern/Usage Grafana dashboards (F2 + F21 embed, day-one)
        if: always()
        continue-on-error: true
        run: |
          # Day-one Govern (F2) + Usage (F21) embedded analytics. bicep deploys
          # Azure Managed Grafana (managedGrafanaEnabled) and wires the console env
          # LOOM_REPORT_KIND=grafana / LOOM_USAGE_REPORT_KIND=grafana + the stable
          # UIDs (loom-governance / loom-usage). This step creates the two real
          # dashboards (over the OOB Azure Monitor data source) so the embeds
          # resolve immediately. Idempotent — re-runs with --overwrite. The UIDs
          # MUST match the bicep defaults + platform/fiab/grafana/*.json.
          set -uo pipefail
          az account set --subscription "$ADMIN_SUB" 2>/dev/null || true
          GRAFANA_NAME=$(az grafana list -g "$ADMIN_RG" --query "[?starts_with(name,'grafana-csa-loom')].name | [0]" -o tsv 2>/dev/null)
          if [ -z "${GRAFANA_NAME:-}" ] || [ "$GRAFANA_NAME" = "None" ]; then
            echo "::notice::No grafana-csa-loom-* instance in $ADMIN_RG — deploy with managedGrafanaEnabled=true to create it, then re-run this job."
            exit 0
          fi
          echo "Managed Grafana: $GRAFANA_NAME"
          az extension add -n amg -y 2>/dev/null || az extension update -n amg 2>/dev/null || true
          GRAFANA_ID=$(az grafana show -n "$GRAFANA_NAME" -g "$ADMIN_RG" --query id -o tsv 2>/dev/null)
          # The deploy SP must be a Grafana Admin to create dashboards via the API.
          DEPLOY_SP_OID=$(az ad sp show --id "$(az account show --query user.name -o tsv)" --query id -o tsv 2>/dev/null || echo "")
          if [ -n "$DEPLOY_SP_OID" ] && [ -n "${GRAFANA_ID:-}" ]; then
            az role assignment create --assignee-object-id "$DEPLOY_SP_OID" --assignee-principal-type ServicePrincipal \
              --role "22926164-76b3-42b3-bc55-97df8dab3e41" --scope "$GRAFANA_ID" \
              -o none 2>&1 | grep -v "already exists" || echo "  (deploy SP Grafana Admin already assigned)"
          fi
          # The Grafana managed identity needs Monitoring Reader to read metrics/logs.
          GRAFANA_MI=$(az grafana show -n "$GRAFANA_NAME" -g "$ADMIN_RG" --query "identity.principalId" -o tsv 2>/dev/null)
          if [ -n "${GRAFANA_MI:-}" ] && [ "$GRAFANA_MI" != "None" ]; then
            for S in "$ADMIN_SUB" "$DLZ_SUB"; do
              [ -n "$S" ] && az role assignment create --assignee-object-id "$GRAFANA_MI" --assignee-principal-type ServicePrincipal \
                --role "Monitoring Reader" --scope "/subscriptions/$S" \
                -o none 2>&1 | grep -v "already exists" || true
            done
          fi
          sleep 30
          for D in loom-governance loom-usage; do
            if [ -f "platform/fiab/grafana/${D}.json" ]; then
              az grafana dashboard create -n "$GRAFANA_NAME" -g "$ADMIN_RG" --overwrite \
                --definition "@platform/fiab/grafana/${D}.json" \
                --query "{uid:uid,status:status}" -o tsv 2>&1 \
                && echo "  created/updated dashboard: $D" \
                || echo "::warning::Could not create dashboard $D — ensure the deploy SP has Grafana Admin on $GRAFANA_NAME, then re-run."
            else
              echo "::warning::platform/fiab/grafana/${D}.json not found — skipping."
            fi
          done

      - name: Verify console runtime (probes / resources / telemetry)
        if: always()
        continue-on-error: true
        run: |
          # Deploy-readiness guard for the "Console runtime" domain (#1382):
          # asserts loom-console came up Healthy, right-sized (>=1cpu/2Gi), with
          # relaxed probe timeouts (>=5s) and consistent telemetry wiring
          # (conn-string present iff LOOM_CONSOLE_TELEMETRY_ENABLED=true).
          # Non-fatal (continue-on-error) so it reports drift without blocking the
          # rest of bootstrap; flip to a hard gate once stable across boundaries.
          chmod +x scripts/csa-loom/verify-console-runtime.sh
          ADMIN_RG="$ADMIN_RG" CONSOLE_APP="${CONSOLE_UAMI_NAME:-loom-console}" \
            bash scripts/csa-loom/verify-console-runtime.sh \
            || echo "::warning::console-runtime verification reported drift — see log (probes/resources/telemetry)."

      - name: Summary
        if: always()
        run: |
          echo "==== Bootstrap complete ===="
          echo "Weave ontology: PG + Apache AGE graph 'loom_ontology' created; Console UAMI registered as PG principal (object/link/action instance write-back)"
          echo "Synapse: UAMI granted Synapse Administrator + SQL Administrator + SQL-level sysadmin"
          echo "Databricks: UAMI registered as SP via SCIM (workspace-access + databricks-sql-access + allow-cluster-create + allow-instance-pool-create)"
          echo "APIM: Service Contributor granted (if APIM provisioned)"
          echo "Admin RG: Reader granted (for /admin/capacity full inventory)"
          echo "Foundry workspace: AzureML Data Scientist granted (unblocks /api/foundry/workspace + datastores)"
          echo "Foundry workspace: AzureML Compute Operator granted (unblocks /api/foundry/computes list/start/status)"
          echo "Foundry storage: Blob Data Reader granted"
          echo "Content Safety: Cognitive Services User granted"
          echo "Power Platform: UAMI registered as Management App (unblocks PP + Copilot Studio)"
          echo "Dataverse: MSAL SP registered as Application User w/ SA role on every env with Dataverse (idempotent)"
          echo "MIP+DLP Graph: InformationProtectionPolicy.Read.All + SensitivityLabel.Evaluate + Policy.Read.All + SecurityAlert.Read.All granted to Console UAMI"
          echo ""
          echo "Still needs manual steps (not grantable via SP):"
          echo "  • Microsoft Graph admin consent — Tenant Administrator must click 'Grant admin consent'"
          echo "    in Entra ID → Enterprise applications → Console UAMI → Permissions. Required for"
          echo "    /admin/security MIP+DLP tabs to return real data instead of 403."
          echo "  • Power Platform Admin — grant at https://admin.powerplatform.microsoft.com"
          echo "    Add SP id $CONSOLE_UAMI_PRINCIPAL as Power Platform Administrator."
          echo "  • Power BI tenant SP enablement — Fabric admin portal"
          echo "  • Dataverse System Administrator on Default env — one-time Promote To Admin click"
          echo "    at https://<org>.crm.dynamics.com/main.aspx?settingsonly=true&pagetype=entitylist&etn=systemuser"
          echo "    (only needed for envs Dataverse was added to AFTER bootstrap; new custom envs don't need this)"
