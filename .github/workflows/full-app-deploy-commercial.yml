name: full-app-deploy-commercial

# CSA Loom — end-to-end deploy of container apps into a provisioned
# Admin Plane. Unblocks the chicken-and-egg ACR private-endpoint
# problem by temporarily enabling public access, building + pushing
# all images, then locking it back down. Finally re-deploys the
# Bicep with deployAppsEnabled=true so the Container Apps come up
# pointing at the new images.
#
# REQUIRES: a successful first deploy (run_mode=full) has already
# provisioned the Admin Plane RG with ACR + Container Apps Env.
#
# Spend warning: each app build runs ~3-8 min in ACR Tasks; the
# Container Apps stay up after the deploy (~$10-30/hr at F8).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default v0.1)'
        type: string
        default: v0.1
      skip_build:
        description: 'Skip build phase (images already in ACR)'
        type: boolean
        default: false
      enable_apps_after:
        description: 'Re-run deploy with deployAppsEnabled=true after build'
        type: boolean
        default: true
      region:
        description: 'Azure region of the target Admin Plane (e.g. eastus2, centralus).'
        type: string
        default: eastus2
      subscription:
        description: 'Target subscription id (defaults to AZURE_SUBSCRIPTION_ID secret).'
        type: string
        required: false
      skip_supply_chain:
        description: 'EMERGENCY VALVE — skip the SC1 Trivy CRITICAL gate + cosign sign/verify (mirrors skip_uat semantics). Images ship WITHOUT supply-chain verification.'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  # SC1: keyless cosign signing exchanges the Actions OIDC token for a
  # short-lived Fulcio certificate.
  id-token: write

env:
  AZURE_LOCATION: ${{ inputs.region || 'eastus2' }}

jobs:
  resolve:
    name: Resolve ACR + admin RG
    runs-on: ubuntu-latest
    outputs:
      acr_name: ${{ steps.acr.outputs.acr_name }}
      acr_login_server: ${{ steps.acr.outputs.acr_login_server }}
      rg: ${{ steps.acr.outputs.rg }}
      admin_sub: ${{ steps.acr.outputs.admin_sub }}
      region: ${{ steps.acr.outputs.region }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ inputs.subscription || secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - id: acr
        run: |
          RG="rg-csa-loom-admin-${AZURE_LOCATION}"
          ACR=$(az acr list --resource-group "$RG" --query "[?starts_with(name, 'acrloom')]|[0].name" -o tsv)
          if [[ -z "$ACR" ]]; then
            echo "::error::ACR not found in $RG — run deploy-fiab-commercial first."
            exit 1
          fi
          SERVER=$(az acr show --name "$ACR" --query "loginServer" -o tsv)
          echo "acr_name=$ACR" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$SERVER" >> "$GITHUB_OUTPUT"
          echo "rg=$RG" >> "$GITHUB_OUTPUT"
          # Coordinates for the chained post-deploy bootstrap (rel-T34).
          echo "admin_sub=$(az account show --query id -o tsv)" >> "$GITHUB_OUTPUT"
          echo "region=$AZURE_LOCATION" >> "$GITHUB_OUTPUT"
          echo "::notice::ACR=$ACR login=$SERVER rg=$RG"

  open-acr:
    name: Temporarily open ACR public access + grant AcrPush
    needs: resolve
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ inputs.subscription || secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - name: Enable ACR public access + admin user + disable quarantine/trust
        run: |
          ACR_NAME="${{ needs.resolve.outputs.acr_name }}"
          az acr update --name "$ACR_NAME" \
            --public-network-enabled true --default-action Allow \
            --admin-enabled true
          # Disable quarantine + trust policies — they block reads of
          # newly-pushed unsigned/unscanned images. NOTE (SC1): ACR
          # content-trust is Docker Content Trust (Notary v1) — NOT the
          # signing scheme Loom enforces. Supply-chain enforcement on this
          # deploy path is cosign keyless sign (in the build job below) +
          # cosign verify-before-roll (verify-images job); these registry
          # policy toggles stay disabled deliberately and are a tracked
          # drift item for the V5 scheduled what-if lane.
          az acr config content-trust update --registry "$ACR_NAME" --status disabled 2>&1 | tail -3 || true
          # quarantinePolicy can't be toggled via az acr config; via REST:
          ACR_ID=$(az acr show --name "$ACR_NAME" --query id -o tsv)
          az rest --method patch --uri "https://management.azure.com${ACR_ID}?api-version=2023-07-01" \
            --body '{"properties":{"policies":{"quarantinePolicy":{"status":"disabled"}}}}' \
            --output none 2>&1 || true
          echo "::warning::ACR $ACR_NAME public access + admin user OPENED; quarantine/trust DISABLED for build."
          # ACR network-rule changes propagate asynchronously (~30-90s). The
          # parallel build jobs were getting 'client IP not allowed' because
          # they started pushing before the open took effect. Poll the registry
          # token endpoint until it authorizes from this runner, then give the
          # change extra slack before the build matrix fans out.
          echo "Waiting for ACR public access to propagate…"
          ok=false
          for i in $(seq 1 24); do
            if az acr login --name "$ACR_NAME" >/dev/null 2>&1; then ok=true; echo "ACR reachable after ${i} attempt(s)."; break; fi
            sleep 10
          done
          $ok || echo "::warning::ACR login still failing after ~240s; builds may need a retry."
          sleep 20
      - name: Grant AcrPush to deploy SP + AcrPull to all app UAMIs (idempotent)
        run: |
          set +e
          ACR_ID=$(az acr show --name "${{ needs.resolve.outputs.acr_name }}" --query id -o tsv)
          RG="rg-csa-loom-admin-${AZURE_LOCATION}"

          # AcrPush to deploy SP (push images)
          SP_OID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)
          az role assignment create --assignee-object-id "$SP_OID" \
            --assignee-principal-type ServicePrincipal \
            --role 8311e382-0749-4cb8-b61a-304f252e45ec \
            --scope "$ACR_ID" 2>&1 | grep -vi "already" || true

          # AcrPull (7f951dda-4ed3-4680-a7ca-43fe172d538d) to every Loom UAMI
          for UAMI in $(az identity list --resource-group "$RG" \
              --query "[?starts_with(name, 'uami-loom-')].principalId" -o tsv); do
            az role assignment create --assignee-object-id "$UAMI" \
              --assignee-principal-type ServicePrincipal \
              --role 7f951dda-4ed3-4680-a7ca-43fe172d538d \
              --scope "$ACR_ID" 2>&1 | grep -vi "already" || true
          done

          echo "::notice::AcrPush + AcrPull roles granted."
          # 90s for Azure RBAC propagation across all assignments
          sleep 90

  build:
    name: Build ${{ matrix.app }} via Docker push
    needs: [resolve, open-acr]
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - app: loom-console
            ctx: ./apps/fiab-console
          - app: loom-setup-orchestrator
            ctx: ./apps/fiab-setup-orchestrator
          - app: loom-mcp
            ctx: ./apps/fiab-mcp-config
          - app: loom-mcp-bridge
            ctx: ./apps/fiab-mcp-bridge
          - app: loom-activator
            ctx: ./apps/fiab-activator-engine
          - app: loom-mirroring
            ctx: ./apps/fiab-mirroring-engine
          - app: loom-direct-lake-shim
            ctx: ./apps/fiab-direct-lake-shim
          - app: loom-copilot-maf
            ctx: ./apps/copilot-maf
          - app: loom-wrangler-host
            ctx: ./apps/fiab-wrangler-host
          # dbt execution runtime for the Synapse / opt-in Fabric dbt-job targets.
          - app: loom-dbt-runner
            ctx: ./apps/fiab-dbt-runner
          # N4 — dual-engine transformation runtime (dbt-core + SQLMesh + ODBC 18)
          # behind the transformation-project item. Both runner images must be in
          # ACR before the admin-plane activates them (dbtRunnerImageReady).
          - app: loom-transform-runner
            ctx: ./apps/loom-transform-runner
          # N2b/N3 — the DuckDB serving tier + Arrow Flight SQL wire. The image
          # bakes the azure/httpfs/delta/iceberg extensions in at build time, so
          # the running container needs no extension repository (IL5). Must be in
          # ACR before data-plane/duckdb-aca.bicep is deployed out-of-band.
          - app: loom-duckdb
            ctx: ./apps/loom-duckdb
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ inputs.subscription || secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      # Build + push via ACR Tasks (`az acr build`) — the image is built and
      # pushed SERVER-SIDE inside Azure by ACR, which is a trusted Azure service
      # (the registry has networkRuleBypassOptions: AzureServices). This works
      # even though the registry is publicNetworkAccess=Disabled, so it does NOT
      # depend on the runner's public IP being allow-listed — eliminating the
      # recurring "client with IP '…' is not allowed access" push failures that
      # an external private-by-default Azure Policy kept re-triggering by
      # reverting the temporary public-access toggle mid-build. SHA is stamped so
      # /build-marker.txt matches what loom-roll-and-validate probes. Retried 3×
      # for transient ACR Task scheduling hiccups.
      - name: Stage Copilot RAG corpus (loom-console only)
        if: matrix.app == 'loom-console'
        shell: bash
        run: |
          # Repo-root docs/ + PRPs/ are outside the apps/fiab-console build
          # context; stage a markdown copy in so the loom-docs Copilot index is
          # populated (otherwise it's empty — "No corpus chunks discovered").
          bash scripts/csa-loom/stage-copilot-corpus.sh

      - name: Build + push via ACR Tasks (az acr build)
        shell: bash
        run: |
          ACR_NAME="${{ needs.resolve.outputs.acr_name }}"
          APP="${{ matrix.app }}"; CTX="${{ matrix.ctx }}"; TAG="${{ inputs.tag || 'v0.1' }}"
          # 2026-07-16: the console compile outgrew the DEFAULT ACR Task agent
          # (8 GB) — consecutive builds were cgroup-OOM-SIGKILLed (runs
          # cjdq..cjdv) with no code change. loom-console builds on the
          # dedicated 16 GB S3 pool `loombuild` (scaled 0↔1 around the build;
          # proven on run cjdy). Other apps stay on default agents.
          POOL_ARGS=""
          if [ "$APP" = "loom-console" ]; then
            az acr agentpool show -r "$ACR_NAME" -n loombuild -o none 2>/dev/null \
              || az acr agentpool create -r "$ACR_NAME" -n loombuild --tier S3 -o none
            CNT=$(az acr agentpool show -r "$ACR_NAME" -n loombuild --query count -o tsv | tr -d '\r')
            [ "${CNT:-0}" -ge 1 ] || az acr agentpool update -r "$ACR_NAME" -n loombuild --count 1 -o none
            POOL_ARGS="--agent-pool loombuild"
          fi
          scale_down_pool() {
            [ -z "$POOL_ARGS" ] && return 0
            q=$(az acr agentpool show -r "$ACR_NAME" -n loombuild --queue-count -o tsv 2>/dev/null | tr -d '\r' || echo 1)
            [ "${q:-1}" = "0" ] && az acr agentpool update -r "$ACR_NAME" -n loombuild --count 0 --no-wait -o none || true
          }
          build() {
            az acr build --registry "$ACR_NAME" $POOL_ARGS \
              --image "$APP:$TAG" --image "$APP:${{ github.sha }}" --image "$APP:latest" \
              --build-arg "LOOM_BUILD_SHA=${{ github.sha }}" \
              --build-arg "LOOM_BUILD_TIMESTAMP=${{ github.run_id }}" \
              --file "$CTX/Dockerfile" "$CTX"
          }
          for attempt in 1 2 3; do
            if build; then echo "✓ $APP built+pushed by ACR Tasks on attempt $attempt"; scale_down_pool; exit 0; fi
            echo "::warning::$APP ACR build attempt $attempt failed — retrying"
            sleep 30
          done
          scale_down_pool
          echo "::error::$APP ACR build failed after 3 attempts"; exit 1

      # ── SC1: supply-chain gate — Trivy CRITICAL scan + keyless cosign sign ──
      # Runs while the ACR is still OPEN (open-acr ran; close-acr runs after
      # the whole build matrix + verify-images). The verify-images job below
      # re-verifies every image signature before the roll job may proceed.
      - name: Supply-chain — resolve image digest
        id: sc
        if: ${{ !inputs.skip_supply_chain }}
        shell: bash
        run: |
          set -euo pipefail
          ACR_NAME="${{ needs.resolve.outputs.acr_name }}"
          az acr login --name "$ACR_NAME" >/dev/null
          DIGEST=$(az acr repository show --name "$ACR_NAME" --image "${{ matrix.app }}:${{ github.sha }}" --query digest -o tsv | tr -d '\r')
          if [[ -z "$DIGEST" ]]; then
            echo "::error::Could not resolve the manifest digest for ${{ matrix.app }}:${{ github.sha }} — cannot scan/sign."
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "::notice::${{ matrix.app }}:${{ github.sha }} → $DIGEST"

      - name: Supply-chain — Trivy gate (fail on CRITICAL CVEs)
        if: ${{ !inputs.skip_supply_chain }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ needs.resolve.outputs.acr_login_server }}/${{ matrix.app }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

      - name: Supply-chain — install cosign
        if: ${{ !inputs.skip_supply_chain }}
        uses: sigstore/cosign-installer@v3.7.0

      - name: Supply-chain — cosign sign (keyless OIDC)
        if: ${{ !inputs.skip_supply_chain }}
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ needs.resolve.outputs.acr_login_server }}/${{ matrix.app }}@${{ steps.sc.outputs.digest }}"
          echo "Signing $REF keylessly (GitHub Actions OIDC → Fulcio/Rekor) ..."
          if ! cosign sign --yes "$REF"; then
            echo "::error::cosign signing FAILED for $REF. The image is built but UNSIGNED — the verify-images gate will reject the roll. Re-run (transient Sigstore outage), or (emergency only) re-dispatch with skip_supply_chain=true."
            exit 1
          fi
          echo "::notice::Signed $REF."

      - name: Supply-chain — skip notice
        if: ${{ inputs.skip_supply_chain }}
        shell: bash
        run: |
          echo "::warning::skip_supply_chain is set — SKIPPING the SC1 Trivy CRITICAL gate + cosign signing for ${{ matrix.app }}. This image is UNSCANNED and UNSIGNED."

  # ── SC1: verify-before-roll — every image the roll will ship must carry a
  # valid keyless cosign signature from a trusted build workflow before the
  # roll job may proceed. Runs while the ACR is still open (before close-acr).
  # `always()` preserves the pre-SC1 lenient behavior for PARTIAL build
  # failures (fail-fast is off; the roll ships whatever :TAG images exist) —
  # but each existing :TAG image must verify. When skip_build=true the deploy
  # rolls pre-existing images and this job is skipped — the roll step emits a
  # loud warning for that path.
  verify-images:
    name: Verify image signatures (cosign)
    needs: [resolve, build]
    if: ${{ always() && !inputs.skip_build && needs.resolve.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ inputs.subscription || secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - name: Install cosign
        if: ${{ !inputs.skip_supply_chain }}
        uses: sigstore/cosign-installer@v3.7.0
      - name: Verify every image the roll ships is signed by a trusted workflow
        run: |
          set -uo pipefail
          if [[ "${{ inputs.skip_supply_chain }}" == "true" ]]; then
            echo "::warning::skip_supply_chain is set — SKIPPING the SC1 verify-before-roll gate. The roll ships images WITHOUT supply-chain verification."
            exit 0
          fi
          ACR_NAME="${{ needs.resolve.outputs.acr_name }}"
          ACR_LOGIN="${{ needs.resolve.outputs.acr_login_server }}"
          TAG="${{ inputs.tag || 'v0.1' }}"
          if ! az acr login --name "$ACR_NAME" >/dev/null; then
            echo "::error::Cannot reach the ACR data plane on $ACR_NAME even though open-acr ran this run — cannot verify image signatures, refusing to roll blind. Check the ACR network toggle (an Azure Policy may have reverted it), or (emergency only) re-dispatch with skip_supply_chain=true."
            exit 1
          fi
          IDENTITY_RE="^https://github\\.com/${{ github.repository }}/\\.github/workflows/(build-fiab-images-acr-tasks\\.yml|full-app-deploy-commercial\\.yml|gov-console-roll\\.yml)@"
          # Keep in sync with the build matrix above. Verify the :TAG refs —
          # that is exactly what the redeploy-with-apps job rolls.
          APPS=(loom-console loom-setup-orchestrator loom-mcp loom-mcp-bridge loom-activator loom-mirroring loom-direct-lake-shim loom-copilot-maf loom-wrangler-host loom-dbt-runner loom-transform-runner loom-duckdb)
          FAILED=()
          for APP in "${APPS[@]}"; do
            DIGEST=$(az acr repository show --name "$ACR_NAME" --image "$APP:$TAG" --query digest -o tsv 2>/dev/null | tr -d '\r' || echo "")
            if [[ -z "$DIGEST" ]]; then
              echo "::warning::$APP:$TAG not found in $ACR_NAME (its build may have failed — fail-fast is off, and the roll step skips apps that are not deployed). Skipping its verification."
              continue
            fi
            REF="$ACR_LOGIN/$APP@$DIGEST"
            if cosign verify "$REF" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                --certificate-identity-regexp "$IDENTITY_RE" \
                --output text >/dev/null 2>&1; then
              echo "✓ $REF signature verified"
            else
              echo "::error::$REF ($APP:$TAG) has NO valid cosign signature from a trusted build workflow."
              FAILED+=("$APP")
            fi
          done
          if (( ${#FAILED[@]} > 0 )); then
            echo "::error::SC1 SUPPLY-CHAIN GATE FAILED — unsigned image(s): ${FAILED[*]}. The roll job is BLOCKED. These :$TAG images were not produced by the gated CI path (or predate SC1, e.g. a failed build leg left a stale pre-SC1 :$TAG behind). Fix: re-run this workflow so the build job scans+signs them (check the per-app 'Cosign sign' step logs), or (emergency only) re-dispatch with skip_supply_chain=true."
            exit 1
          fi
          echo "::notice::SC1 supply-chain gate PASSED — every existing :$TAG image is cosign-signed by a trusted workflow."

  close-acr:
    name: Re-lock ACR (private endpoint only)
    # verify-images is in `needs` so the re-lock only happens after the
    # signature pushes + verification reads are done; `always()` still
    # guarantees the ACR is re-locked even when a gate fails.
    needs: [resolve, build, verify-images]
    if: always() && !inputs.skip_build
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ inputs.subscription || secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - name: Disable ACR public access + admin user
        run: |
          az acr update --name "${{ needs.resolve.outputs.acr_name }}" \
            --public-network-enabled false --default-action Deny \
            --admin-enabled false
          echo "::notice::ACR ${{ needs.resolve.outputs.acr_name }} re-locked (private endpoint only, no admin user)."

  redeploy-with-apps:
    name: Roll Container Apps to new image
    needs: [resolve, close-acr, verify-images]
    # SC1: the roll additionally requires the verify-images gate to have
    # PASSED (it exits 0 with a loud warning when skip_supply_chain is set,
    # so the emergency valve still rolls). skip_build rolls pre-existing
    # images with no verification — the roll step warns loudly for that path.
    if: always() && inputs.enable_apps_after && (needs.close-acr.result == 'success' || inputs.skip_build) && (needs.verify-images.result == 'success' || inputs.skip_build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ inputs.subscription || secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      # Roll each Container App directly to the freshly-built image. This
      # deliberately does NOT run `az deployment sub create` (full main.bicep):
      # the live env is already provisioned, and re-running the template fights
      # pre-existing drift (RoleAssignmentExists, private-DNS vnet-link Conflict,
      # firewall-policy churn) — none of which has anything to do with rolling
      # an image. `az containerapp update --image` creates a new revision that
      # pulls the updated tag, which is all the app-roll needs.
      - name: Roll Container Apps
        run: |
          set -e
          if [[ "${{ inputs.skip_build }}" == "true" ]]; then
            echo "::warning::skip_build=true — rolling PRE-EXISTING images that were NOT signature-verified by this run (the SC1 verify-images gate only covers images built in-run). Use loom-roll-and-validate for a verified roll of an existing tag."
          fi
          RG='${{ needs.resolve.outputs.rg }}'
          ACR='${{ needs.resolve.outputs.acr_login_server }}'
          TAG='${{ inputs.tag || 'v0.1' }}'
          # Unique per run+attempt so the roll ALWAYS creates a fresh revision.
          # Critical: the image tag (:v0.1) is mutable and overwritten in place,
          # so on a redeploy the only change is the image *digest* behind the
          # unchanged tag. `az containerapp update --image …:v0.1` with an
          # otherwise-identical template is then a NO-OP — no new revision is
          # created and the running revision stays pinned to the OLD digest
          # (Container Apps pins digest at revision-creation). The deploy goes
          # green but Front Door serves stale code. A unique --revision-suffix
          # forces a new revision that re-pulls :v0.1 and gets the new digest.
          SUFFIX="r${{ github.run_id }}-${{ github.run_attempt }}"
          APPS=(loom-console loom-mcp loom-setup-orchestrator loom-activator loom-mirroring loom-direct-lake-shim)
          # Retry the update on the transient ContainerAppOperationInProgress
          # error (a prior provisioning op on the app is still settling). Up to
          # 6 attempts, 30s apart (~3 min), per app.
          roll() {
            local app="$1" attempt
            for attempt in 1 2 3 4 5 6; do
              if az containerapp update -g "$RG" -n "$app" --image "$ACR/$app:$TAG" --revision-suffix "$SUFFIX" -o none 2>/tmp/roll.err; then
                return 0
              fi
              if grep -qi "OperationInProgress\|active provisioning operation" /tmp/roll.err; then
                echo "::warning::$app busy (attempt $attempt/6) — waiting 30s for the in-progress op to finish"
                sleep 30
                continue
              fi
              cat /tmp/roll.err >&2; return 1
            done
            echo "::error::$app still busy after retries"; return 1
          }
          for app in "${APPS[@]}"; do
            if az containerapp show -g "$RG" -n "$app" -o none 2>/dev/null; then
              echo "::group::roll $app -> $ACR/$app:$TAG"
              roll "$app"
              echo "::endgroup::"
            else
              echo "::warning::container app $app not found in $RG — skipping"
            fi
          done
          CONSOLE_FQDN=$(az containerapp show -g "$RG" -n loom-console --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "")
          echo "::notice::Apps rolled to :$TAG. Console: https://$CONSOLE_FQDN"
      - name: From-cluster app health
        run: bash .github/scripts/fiab-post-provision-validate.sh
        env:
          RG_NAME: ${{ needs.resolve.outputs.rg }}
          BOUNDARY: Commercial

  # dlz-brownfield: publish the COMPILED main.json to the admin storage account
  # and wire LOOM_DLZ_TEMPLATE_URI / LOOM_SETUP_TEMPLATE_URI on the running apps.
  # This is what makes the DAY-ONE in-product "Add landing zone" deploy work: ARM
  # REST needs a compiled template (it can't compile .bicep), and the Console's
  # user-ARM tier only runs when LOOM_DLZ_TEMPLATE_URI is set — otherwise it falls
  # to the honest copy-paste gate. Wiring it here (not just a live patch) means a
  # FRESH from-scratch deploy stands the day-one path up. Idempotent + best-effort:
  # every step is guarded so it never fails the app roll (no-vaporware).
  publish-dlz-template:
    name: Publish DLZ template + wire deploy env
    needs: [resolve, redeploy-with-apps]
    if: ${{ always() && inputs.enable_apps_after && needs.redeploy-with-apps.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ inputs.subscription || secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - name: Setup Bicep
        run: az bicep install
      - name: Compile + publish main.json, wire LOOM_DLZ_TEMPLATE_URI / LOOM_SETUP_TEMPLATE_URI
        run: |
          set -e
          RG='${{ needs.resolve.outputs.rg }}'
          CONTAINER=arm-templates
          # 1) Compile the full template ARM REST will fetch via templateLink.
          az bicep build -f platform/fiab/bicep/main.bicep --outfile main.json
          # 2) Discover the admin storage account (deployment artifacts). Prefer a
          #    Loom-named account; fall back to the first account in the RG.
          SA=$(az storage account list -g "$RG" --query "[?starts_with(name,'stloom')||starts_with(name,'saloom')||starts_with(name,'stcsaloom')].name | [0]" -o tsv 2>/dev/null || echo "")
          if [[ -z "$SA" ]]; then SA=$(az storage account list -g "$RG" --query "[0].name" -o tsv 2>/dev/null || echo ""); fi
          if [[ -z "$SA" ]]; then
            echo "::warning::No storage account in $RG — cannot publish main.json; the day-one deploy stays on the honest copy-paste gate."; exit 0
          fi
          # Sovereign-safe blob base (handles Gov endpoints automatically).
          BLOB_BASE=$(az storage account show -g "$RG" -n "$SA" --query "primaryEndpoints.blob" -o tsv)
          BLOB_URL="${BLOB_BASE}${CONTAINER}/main.json"
          # 3) Upload (AAD auth; the deploy SP holds Storage Blob Data Contributor
          #    or the account key path below covers it).
          az storage container create --account-name "$SA" --name "$CONTAINER" --auth-mode login -o none 2>/dev/null || true
          if ! az storage blob upload --account-name "$SA" --container-name "$CONTAINER" --name main.json --file main.json --auth-mode login --overwrite -o none 2>/dev/null; then
            KEY=$(az storage account keys list -g "$RG" -n "$SA" --query "[0].value" -o tsv 2>/dev/null || echo "")
            az storage container create --account-name "$SA" --name "$CONTAINER" --account-key "$KEY" -o none 2>/dev/null || true
            az storage blob upload --account-name "$SA" --container-name "$CONTAINER" --name main.json --file main.json --account-key "$KEY" --overwrite -o none || { echo "::warning::main.json upload failed — day-one deploy stays gated."; exit 0; }
          fi
          # 4) Read SAS so ARM's templateLink can fetch a PRIVATE blob (long-lived).
          EXPIRY=$(date -u -d '+3 years' '+%Y-%m-%dT%H:%MZ' 2>/dev/null || date -u -v+3y '+%Y-%m-%dT%H:%MZ')
          KEY=${KEY:-$(az storage account keys list -g "$RG" -n "$SA" --query "[0].value" -o tsv 2>/dev/null || echo "")}
          SAS=""
          if [[ -n "$KEY" ]]; then
            SAS=$(az storage blob generate-sas --account-name "$SA" --account-key "$KEY" --container-name "$CONTAINER" --name main.json --permissions r --expiry "$EXPIRY" -o tsv 2>/dev/null || echo "")
          fi
          # 5) Wire the apps (idempotent). LOOM_DLZ_TEMPLATE_URI on the Console
          #    (day-one user-ARM tier) + LOOM_SETUP_TEMPLATE_URI on the orchestrator.
          CONSOLE_VARS="LOOM_DLZ_TEMPLATE_URI=$BLOB_URL LOOM_SETUP_TEMPLATE_URI=$BLOB_URL"
          if [[ -n "$SAS" ]]; then CONSOLE_VARS="$CONSOLE_VARS LOOM_DLZ_TEMPLATE_QUERY_STRING=?$SAS"; fi
          az containerapp update -g "$RG" -n loom-console --set-env-vars $CONSOLE_VARS -o none || echo "::warning::could not set loom-console template env"
          if az containerapp show -g "$RG" -n loom-setup-orchestrator -o none 2>/dev/null; then
            ORCH_VARS="LOOM_SETUP_TEMPLATE_URI=$BLOB_URL"
            if [[ -n "$SAS" ]]; then ORCH_VARS="$ORCH_VARS LOOM_DLZ_TEMPLATE_QUERY_STRING=?$SAS"; fi
            az containerapp update -g "$RG" -n loom-setup-orchestrator --set-env-vars $ORCH_VARS -o none || echo "::warning::could not set loom-setup-orchestrator template env"
          fi
          echo "::notice::Published main.json → $BLOB_URL and wired LOOM_DLZ_TEMPLATE_URI / LOOM_SETUP_TEMPLATE_URI (day-one Add-landing-zone deploy enabled)."

  # rel-T34: chain the post-deploy bootstrap after the apps are LIVE. This is the
  # true Commercial from-scratch completion — infra deploy (apps off) → this
  # workflow builds images + brings the Container Apps up → bootstrap wires
  # sign-in (MSAL) + data-plane grants. Runs the ONE reusable bootstrap
  # (secrets: inherit) so the logic isn't copy-pasted per cloud.
  post-deploy-bootstrap:
    name: Post-deploy bootstrap (Commercial)
    needs: [resolve, redeploy-with-apps]
    if: ${{ inputs.enable_apps_after && needs.redeploy-with-apps.result == 'success' }}
    uses: ./.github/workflows/csa-loom-post-deploy-bootstrap.yml
    secrets: inherit
    with:
      boundary: Commercial
      region: ${{ needs.resolve.outputs.region }}
      admin_subscription: ${{ needs.resolve.outputs.admin_sub }}

  # E4 (loom-next-level ws-copilot-cost): fire a post-deploy Copilot quality
  # eval run so EVERY roll re-baselines quality against the freshly-staged
  # corpus. Fire-and-forget + report: one short POST per surface (the HTTP
  # response has a ~230s ALB ceiling and a full run far exceeds it; the
  # Function keeps executing after the client disconnects, one surface per
  # invocation stays inside the Y1 execution window). Scores land in Cosmos
  # `loom-copilot-evals` (gating + sticky comments live in
  # copilot-quality-evals.yml; browse on /admin/copilot-quality once E5 lands).
  # Token spend is bounded by E2's LOOM_COPILOT_EVAL_JUDGE_DAILY_CAP. Never
  # fails the deploy (continue-on-error).
  post-deploy-evals:
    name: Post-deploy Copilot quality evals (fire-and-forget)
    needs: [resolve, redeploy-with-apps]
    if: ${{ always() && inputs.enable_apps_after && needs.redeploy-with-apps.result == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ inputs.subscription || secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - name: Dispatch per-surface eval runs on the copilot-evaluator Function
        run: |
          set -uo pipefail
          RG='${{ needs.resolve.outputs.rg }}'
          FUNC=$(az functionapp list -g "$RG" --query "[?starts_with(name,'func-cpeval-')].name | [0]" -o tsv 2>/dev/null | tr -d '\r' || true)
          if [ -z "$FUNC" ]; then
            echo "::warning::copilot-evaluator Function (func-cpeval-*) not found in $RG — svc-copilot-evaluator gate unresolved; post-deploy eval re-baseline skipped."
            exit 0
          fi
          HOST=$(az functionapp show -g "$RG" -n "$FUNC" --query defaultHostName -o tsv | tr -d '\r')
          KEY=$(az functionapp keys list -g "$RG" -n "$FUNC" --query "functionKeys.default || masterKey" -o tsv | tr -d '\r')
          if [ -z "$KEY" ]; then echo "::warning::no function key readable for $FUNC — eval dispatch skipped."; exit 0; fi
          echo "::add-mask::$KEY"
          DISPATCHED=""
          for F in content/evals/*.jsonl; do
            S=$(basename "$F" .jsonl)
            case "$S" in _*) continue ;; esac
            # fire-and-forget: a 15s client timeout only abandons the RESPONSE;
            # the invocation continues server-side to completion.
            curl -sS --max-time 15 -o /dev/null \
              -X POST "https://$HOST/api/copilotEvaluatorHttp?code=$KEY" \
              -H 'content-type: application/json' \
              -d "{\"surfaces\":[\"$S\"],\"trigger\":\"corpus\"}" || true
            DISPATCHED="$DISPATCHED $S"
          done
          echo "::notice::post-deploy eval runs dispatched for:$DISPATCHED — scores land in Cosmos loom-copilot-evals (runId trigger=corpus); the copilot-quality-evals workflow + /admin/copilot-quality read them."

  notify:
    name: Notify final state
    needs: [resolve, build, close-acr, redeploy-with-apps]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ needs.redeploy-with-apps.result }}';
            const emoji = conclusion === 'success' ? '🎉' : '⚠️';
            github.rest.issues.createComment({
              issue_number: 279,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} full-app-deploy-commercial run ${context.runId}: build=${'${{ needs.build.result }}'}, close-acr=${'${{ needs.close-acr.result }}'}, redeploy=${conclusion}`
            });
