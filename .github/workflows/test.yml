name: Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  # Needed by py-cov-action to post/update the coverage comment on PRs.
  pull-requests: write

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the project with dev extras so ruff / pytest /
          # pytest-cov / mypy all come from pyproject.toml.
          pip install -e ".[dev]"
          # Install any additional per-domain requirements.
          for req in $(find . -name "requirements.txt" -not -path "*/dbt-env/*" -not -path "*/.venv/*"); do
            pip install -r "$req" || true
          done

      - name: Lint with ruff
        run: |
          ruff check domains/ scripts/ governance/ --select E,F,W --ignore E501 --output-format github

      - name: Typecheck with mypy (strict)
        run: |
          # The default mypy config covers governance + tests. The two
          # Function apps both ship a flat function_app.py file, so they
          # are checked with explicit invocations (one per app) to avoid
          # module-path collisions.
          mypy
          mypy domains/sharedServices/aiEnrichment/functions/function_app.py
          mypy domains/sharedServices/eventProcessing/functions/function_app.py

      - name: Validate data product contracts
        run: |
          python -m governance.contracts.contract_validator --ci --repo-root .

      - name: Check dbt schema drift against contracts
        run: |
          python -m governance.contracts.dbt_test_generator --repo-root . --check

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=80

      - name: Upload coverage report (xml + html)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  dbt-compile:
    name: dbt Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: domains/shared/dbt
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-databricks dbt-core

      - name: dbt deps
        run: dbt deps --profiles-dir . || echo "dbt deps skipped (no packages)"

      - name: dbt compile
        run: dbt compile --profiles-dir . --target dev || echo "dbt compile requires Databricks connection"
        env:
          DBT_DATABRICKS_HOST: ${{ secrets.DBT_DATABRICKS_HOST }}
          DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_DATABRICKS_HTTP_PATH }}
          DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_DATABRICKS_TOKEN }}

  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep

      - name: Lint Bicep files
        run: |
          ERRORS=0
          for f in $(find deploy/bicep -name "*.bicep" -not -path "*/node_modules/*"); do
            echo "Building: $f"
            if ! bicep build "$f" 2>&1; then
              ERRORS=$((ERRORS + 1))
            else
              # Clean up generated ARM templates
              arm_file="${f%.bicep}.json"
              [ -f "$arm_file" ] && rm "$arm_file"
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS Bicep file(s) failed to build"
            exit 1
          fi

  powershell-lint:
    name: PowerShell Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Get-ChildItem -Recurse -Filter *.ps1 |
            Where-Object { $_.FullName -notmatch 'node_modules|\.venv' } |
            ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Severity Warning }
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Host "::warning::Found $($results.Count) PSScriptAnalyzer issues"
          }

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
