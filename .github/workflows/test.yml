name: Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '37 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Needed to post/update coverage and summary comments on PRs.
  pull-requests: write

jobs:
  python-tests:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the project with dev + governance + functions extras so
          # ruff / pytest / pytest-cov / mypy and all Azure SDK deps come
          # from pyproject.toml.
          pip install -e ".[dev,governance,functions]"
          # Install any additional per-domain requirements.
          for req in $(find . -name "requirements.txt" -not -path "*/dbt-env/*" -not -path "*/.venv/*"); do
            pip install -r "$req" || true
          done

      - name: Lint with ruff
        run: |
          ruff check domains/ scripts/ governance/ tools/ --output-format github

      - name: Security scan with Bandit
        run: |
          bandit -r governance/ domains/ scripts/ -c pyproject.toml

      - name: Typecheck with mypy (strict)
        run: |
          # The default mypy config covers governance + tests. The three
          # Function apps each ship a flat function_app.py file, so they
          # are checked with explicit invocations (one per app) to avoid
          # module-path collisions.
          mypy
          mypy domains/sharedServices/aiEnrichment/functions/function_app.py
          mypy domains/sharedServices/eventProcessing/functions/function_app.py
          mypy domains/sharedServices/secretRotation/functions/function_app.py

      - name: Validate data product contracts
        run: |
          python -m governance.contracts.contract_validator --ci --repo-root .

      - name: Check dbt schema drift against contracts
        run: |
          python -m governance.contracts.dbt_test_generator --repo-root . --check

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=80

      - name: Upload coverage report (xml + html)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

      - name: Coverage summary
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('coverage.xml', 'utf8');
            const match = xml.match(/line-rate="([\d.]+)"/);
            const pct = match ? (parseFloat(match[1]) * 100).toFixed(1) : 'N/A';
            const body = `## 📊 Coverage Report\n\nLine coverage: **${pct}%**\n\n> Full report available in the [coverage artifact](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;

            const marker = '## 📊 Coverage Report';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  dbt-compile:
    name: dbt Compile (${{ matrix.domain }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        domain: [shared, finance, inventory, sales]
    defaults:
      run:
        working-directory: domains/${{ matrix.domain }}/dbt
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt
        run: |
          pip install dbt-databricks dbt-core

      - name: dbt deps
        run: dbt deps --profiles-dir . || echo "dbt deps skipped (no packages)"

      - name: Compile dbt models
        run: |
          dbt compile --project-dir . --profiles-dir . 2>&1 || {
            exit_code=$?
            if [ $exit_code -eq 2 ]; then
              echo "::warning::dbt compile failed - may need database connection"
            else
              echo "::error::dbt compile failed with unexpected error"
              exit $exit_code
            fi
          }
        env:
          DBT_DATABRICKS_HOST: ${{ secrets.DBT_DATABRICKS_HOST }}
          DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_DATABRICKS_HTTP_PATH }}
          DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_DATABRICKS_TOKEN }}

  dbt-integration:
    name: dbt Integration (${{ matrix.domain }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        domain: [shared, finance, inventory, sales]
    defaults:
      run:
        working-directory: domains/${{ matrix.domain }}/dbt
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt + DuckDB adapter
        run: |
          pip install dbt-core dbt-duckdb

      - name: Create DuckDB profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'PROFILE'
          csa_analytics:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: ":memory:"
                schema: main
          PROFILE

      - name: dbt deps
        run: dbt deps || echo "dbt deps skipped (no packages)"

      - name: dbt seed
        run: dbt seed --target ci --profiles-dir ~/.dbt

      - name: dbt run
        run: dbt run --target ci --profiles-dir ~/.dbt

      - name: dbt test
        run: dbt test --target ci --profiles-dir ~/.dbt

  pr-summary:
    name: PR Summary
    if: github.event_name == 'pull_request' && always()
    needs: [python-tests, dbt-compile, dbt-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const jobs = [
              { name: 'Python Tests', id: 'python-tests' },
              { name: 'dbt Compile', id: 'dbt-compile' },
              { name: 'dbt Integration', id: 'dbt-integration' },
            ];
            const needs = ${{ toJSON(needs) }};
            const rows = jobs.map(j => {
              const result = needs[j.id]?.result || 'skipped';
              const emoji = { success: '✅', failure: '❌', skipped: '⏭️', cancelled: '🚫' }[result] || '❓';
              return `| ${j.name} | ${emoji} ${result} |`;
            }).join('\n');

            const body = [
              '## 🧪 CI Test Summary',
              '',
              '| Job | Status |',
              '|-----|--------|',
              rows,
              '',
              `> Run: [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            const marker = '## 🧪 CI Test Summary';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

