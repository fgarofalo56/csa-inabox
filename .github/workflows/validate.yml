# ==============================================================================
# CSA-in-a-Box: Bicep Validation & Security Scanning
# Runs on PRs and pushes to main
# ==============================================================================

name: Validate & Scan

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**/*.bicep'
      - 'deploy/**/*.json'
      - '*.bicep'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # -------------------------------------------------------------------------
  # Bicep Linting & Validation
  # -------------------------------------------------------------------------
  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/

      - name: Lint all Bicep files
        run: |
          echo "=== Linting Bicep files ==="
          ERROR_FILE=$(mktemp)
          echo "0" > "$ERROR_FILE"
          while IFS= read -r file; do
            echo "Linting: $file"
            if ! bicep lint "$file" 2>&1; then
              echo $(( $(cat "$ERROR_FILE") + 1 )) > "$ERROR_FILE"
            fi
          done < <(find . -name "*.bicep" -not -path "./codeqlDB/*" -not -path "*/node_modules/*" -not -path "*/landing-zone-alz/*")
          ERRORS=$(cat "$ERROR_FILE")
          rm -f "$ERROR_FILE"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS Bicep file(s) failed linting"
            exit 1
          fi

      - name: Build all Bicep files (compile check)
        run: |
          echo "=== Building Bicep files ==="
          ERROR_FILE=$(mktemp)
          echo "0" > "$ERROR_FILE"
          while IFS= read -r file; do
            echo "Building: $file"
            if ! bicep build "$file" --no-restore 2>&1; then
              echo $(( $(cat "$ERROR_FILE") + 1 )) > "$ERROR_FILE"
            fi
          done < <(find . -name "*.bicep" -not -path "./codeqlDB/*" -not -path "*/node_modules/*" -not -path "*/landing-zone-alz/*")
          ERRORS=$(cat "$ERROR_FILE")
          rm -f "$ERROR_FILE"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS Bicep file(s) failed to build"
            exit 1
          fi

  # -------------------------------------------------------------------------
  # Secret Scanning
  # -------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact --no-banner

  # -------------------------------------------------------------------------
  # IaC Security Scanning
  # -------------------------------------------------------------------------
  security-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@de2bfaecd21d58ef232e0d2a3391c33c32c460d7 # v12
        with:
          directory: deploy/
          framework: bicep,arm
          soft_fail: true
          output_format: sarif
          output_file_path: results.sarif
          skip_path: deploy/bicep/landing-zone-alz

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@6777c894e961d2f153d1ba129f67f775f81e39a1 # v3
        with:
          sarif_file: results.sarif
        continue-on-error: true  # Gracefully skip if code scanning is not enabled

  # -------------------------------------------------------------------------
  # PowerShell Linting
  # -------------------------------------------------------------------------
  powershell-lint:
    name: PowerShell Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Filter "*.ps1" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch 'node_modules|\.venv|dbt-env|codeqlDB' }
          $allResults = @()
          foreach ($file in $files) {
            Write-Host "Analyzing: $($file.FullName)"
            $results = Invoke-ScriptAnalyzer -Path $file.FullName -Severity Warning,Error
            if ($results) {
              $results | Format-Table -AutoSize
              $allResults += $results
            }
          }
          $errors = $allResults | Where-Object { $_.Severity -eq 'Error' }
          if ($errors) {
            Write-Host "::error::PSScriptAnalyzer found $($errors.Count) error(s)"
            exit 1
          }

  # -------------------------------------------------------------------------
  # Python Linting
  # -------------------------------------------------------------------------
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install ruff

      - name: Lint Python files
        run: |
          ruff check domains/ scripts/ governance/ tools/

  # -------------------------------------------------------------------------
  # Repository Hygiene Check
  # -------------------------------------------------------------------------
  hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Check for large files
        run: |
          # Notebook outputs are stripped via .gitattributes + nbstripout
          # so monitor notebooks no longer need a size exclusion.
          echo "=== Files larger than 5MB ==="
          FOUND_LARGE=0
          while read -r file; do
            SIZE=$(du -sh "$file" | cut -f1)
            echo "::warning::Large file: $file ($SIZE)"
            FOUND_LARGE=1
          done < <(find . -type f -size +5M -not -path "./.git/*")
          if [ "$FOUND_LARGE" -eq 1 ]; then
            echo "::error::Found files larger than 5MB"
            exit 1
          fi

      - name: Check for committed secrets patterns
        run: |
          echo "=== Checking for common secret patterns ==="
          PATTERNS="password|secret|api_key|apikey|access_key|private_key|client_secret"
          MATCHES=$(grep -rni "$PATTERNS" --include="*.json" --include="*.yaml" --include="*.yml" \
            --include="*.ps1" --include="*.py" \
            --exclude="*.bicep" \
            --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=codeqlDB \
            --exclude-dir=.git --exclude-dir=.github \
            . | grep -v "askForPassword" | grep -v "savePassword" \
            | grep -v ".gitignore" | grep -v "secretStorage" \
            | grep -v "# nosec" | grep -v "noqa" | head -20) || true
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "::error::Found potential secret patterns in committed files"
            exit 1
          fi
          echo "No patterns found"

      - name: Check for committed venvs/node_modules
        run: |
          FAILED=0
          for dir in node_modules .venv venv dbt-env __pycache__; do
            FOUND=$(find . -type d -name "$dir" -not -path "./.git/*" 2>/dev/null)
            if [ -n "$FOUND" ]; then
              echo "::error::Found committed $dir directory: $FOUND"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
