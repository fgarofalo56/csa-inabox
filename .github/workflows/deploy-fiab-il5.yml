name: deploy-fiab-il5

# CSA Loom — deploy validation against DoD IL5 (Azure Government, IL5-accredited
# services only). Sibling of deploy-fiab-gcch.yml (A-4 / PMF-64).
#
# whatif-only  — validates Bicep + Gov auth without provisioning (default, safe).
# full         — teardown -> redeploy -> RBAC grants -> smoke via the
#                scripts/csa-loom/redeploy-gov.sh orchestration, i.e. the
#                acceptance "teardown->redeploy in a clean Gov sub" run.
#
# Manual approval gate (il5-deploy environment protection) since this deploys
# into an IL5 Gov subscription.

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode — whatif-only validates Bicep + auth; full does teardown->redeploy->smoke.'
        type: choice
        default: whatif-only
        options:
          - whatif-only
          - full
      topology:
        description: 'tenant = first-run install (deploys the hub + DLZ). dlz-attach = add ONE DLZ to an existing hub (no Console).'
        type: choice
        default: tenant
        options:
          - tenant
          - dlz-attach
      target_subscription:
        description: 'dlz-attach: the NEW subscription the DLZ is provisioned into.'
        type: string
        required: false

permissions:
  contents: read
  issues: write

env:
  AZURE_CLOUD: AzureUSGovernment
  AZURE_LOCATION: usgovvirginia
  CSA_LOOM_BOUNDARY: IL5
  CSA_LOOM_TOPOLOGY: ${{ inputs.topology || 'tenant' }}
  CSA_LOOM_TARGET_SUBSCRIPTION: ${{ inputs.target_subscription }}

jobs:
  precheck:
    name: Verify Gov secrets are configured
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          C: ${{ secrets.AZURE_GOV_CLIENT_ID }}
          S: ${{ secrets.AZURE_GOV_CLIENT_SECRET }}
          T: ${{ secrets.AZURE_GOV_TENANT_ID }}
          U: ${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}
        run: |
          if [[ -z "$C" || -z "$S" || -z "$T" || -z "$U" ]]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::AZURE_GOV_* secrets not configured — skipping."
            echo "::warning::Bootstrap per docs/fiab/runbooks/secrets-bootstrap.md"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

  deploy-validate:
    name: Deploy + validate CSA Loom in IL5
    needs: precheck
    if: needs.precheck.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    environment: il5-deploy   # requires manual approval
    # Coordinates exported for the chained Gov post-deploy bootstrap (rel-T32).
    outputs:
      admin_sub: ${{ steps.bootstrap_coords.outputs.admin_sub }}
      dlz_sub: ${{ steps.bootstrap_coords.outputs.dlz_sub }}
      region: ${{ steps.bootstrap_coords.outputs.region }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (Gov sub) — limitlessdata_deploy SP
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_GOV_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_GOV_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_GOV_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_GOV_SUBSCRIPTION_ID }}",
              "activeDirectoryEndpointUrl": "https://login.microsoftonline.us",
              "resourceManagerEndpointUrl": "https://management.usgovcloudapi.net/",
              "sqlManagementEndpointUrl": "https://management.core.usgovcloudapi.net:8443/",
              "galleryEndpointUrl": "https://gallery.usgovcloudapi.net/",
              "managementEndpointUrl": "https://management.core.usgovcloudapi.net/"
            }
          environment: AzureUSGovernment

      - name: Set Azure cloud to Gov
        run: az cloud set --name AzureUSGovernment

      - name: Setup Bicep
        run: az bicep install

      # audit-t157: same "second Console is impossible" invariant as Commercial,
      # enforced at the CI layer. topology=tenant is rejected when an Admin Plane
      # (hub) RG already exists in the target sub; dlz-attach must name a NEW
      # subscription via target_subscription.
      - name: Topology guard
        id: topology_guard
        run: |
          set -e
          TOPOLOGY="${CSA_LOOM_TOPOLOGY:-tenant}"
          echo "topology=$TOPOLOGY"
          if [ "$TOPOLOGY" = "dlz-attach" ]; then
            if [ -z "$CSA_LOOM_TARGET_SUBSCRIPTION" ]; then
              echo "::error::dlz-attach requires target_subscription (the new DLZ subscription)."; exit 1
            fi
          else
            # Scope the hub check to the ACTIVE (deploy) subscription, not the
            # whole tenant, so a deliberate migration to a new hub sub is not
            # blocked by an old hub still running elsewhere as a UAT ring
            # (audit-t156 D3/Q10). Still blocks an accidental double-stamp into
            # the same sub.
            SCOPE_SUB=$(az account show --query id -o tsv)
            EXISTING=$(az graph query ${SCOPE_SUB:+--subscriptions "$SCOPE_SUB"} -q "ResourceContainers | where type == 'microsoft.resources/subscriptions/resourcegroups' | where name startswith 'rg-csa-loom-admin-' | project name" --query "data | length(@)" -o tsv 2>/dev/null || echo "0")
            if [ "${EXISTING:-0}" != "0" ]; then
              echo "::error::A CSA Loom hub already exists in the target subscription (found $EXISTING rg-csa-loom-admin-* RG). A second Console cannot be stamped into the same sub — use topology=dlz-attach with target_subscription."; exit 1
            fi
          fi

      - name: Bicep what-if (IL5 params)
        run: |
          az deployment sub what-if \
            --name csa-loom-il5-ci-${{ github.run_id }} \
            --location $AZURE_LOCATION \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--subscription "$CSA_LOOM_TARGET_SUBSCRIPTION"} \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/il5.bicepparam \
            --parameters adminEntraGroupId=${{ secrets.FIAB_GOV_ADMIN_GROUP_ID }} \
            --parameters topology="$CSA_LOOM_TOPOLOGY" \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION"}

      - name: Deploy-verification evidence receipt (§7)
        # Captures the IL5 deploy-verification acceptance receipt as an artifact:
        # deterministic ARM tests + sovereign-endpoint sweep + the §4 host matrix,
        # plus a live what-if line (we are already on the Gov sub + bicep here).
        # Honestly records the live full-stack smoke as BLOCKED by runbook gap #2
        # until the in-repo AKS workload deployment for the Loom apps lands.
        # Never fails the job (|| true) — the receipt is evidence, not a gate.
        run: |
          bash scripts/csa-loom/gov-verify-evidence.sh \
            --boundary il5 --live \
            --out "$RUNNER_TEMP/gov-verify-receipt-il5-${{ github.run_id }}.txt" || true

      - name: Upload IL5 verification receipt
        uses: actions/upload-artifact@v4
        with:
          name: gov-verify-receipt-il5-${{ github.run_id }}
          path: ${{ runner.temp }}/gov-verify-receipt-il5-${{ github.run_id }}.txt
          if-no-files-found: warn

      - name: Teardown -> redeploy -> smoke (full mode only)
        if: inputs.run_mode == 'full'
        env:
          FIAB_GOV_ADMIN_GROUP_ID: ${{ secrets.FIAB_GOV_ADMIN_GROUP_ID }}
          LOOM_MSAL_CLIENT_ID: ${{ secrets.LOOM_GOV_MSAL_CLIENT_ID }}
          LOOM_MSAL_CLIENT_SECRET: ${{ secrets.LOOM_GOV_MSAL_CLIENT_SECRET }}
        run: |
          set -e
          if [ "$CSA_LOOM_TOPOLOGY" = "dlz-attach" ]; then
            # dlz-attach adds ONE DLZ to an existing hub — it must NOT teardown the
            # hub (redeploy-gov.sh is teardown->redeploy and would wipe it). Deploy
            # the DLZ directly INTO the new target sub so subscription() resolves to
            # it (per main.bicep's dlz-attach scope), mirroring Commercial.
            az deployment sub create \
              --name csa-loom-il5-ci-${{ github.run_id }} \
              --location "$AZURE_LOCATION" \
              --subscription "$CSA_LOOM_TARGET_SUBSCRIPTION" \
              --template-file "$GITHUB_WORKSPACE/platform/fiab/bicep/main.bicep" \
              --parameters "$GITHUB_WORKSPACE/platform/fiab/bicep/params/il5.bicepparam" \
              --parameters adminEntraGroupId="$FIAB_GOV_ADMIN_GROUP_ID" \
              --parameters topology="$CSA_LOOM_TOPOLOGY" \
              --parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION"
          else
            bash scripts/csa-loom/redeploy-gov.sh --boundary il5 --yes
          fi

      - name: Export bootstrap coordinates (for the chained Gov bootstrap)
        id: bootstrap_coords
        # IL5 `full` runs teardown->redeploy and LEAVES the stack up, so the
        # bootstrap chains after it on the tenant (console-bearing) path.
        if: inputs.run_mode == 'full' && inputs.topology != 'dlz-attach'
        run: |
          ADMIN_SUB=$(az account show --query id -o tsv)
          echo "admin_sub=$ADMIN_SUB" >> "$GITHUB_OUTPUT"
          echo "dlz_sub=${CSA_LOOM_TARGET_SUBSCRIPTION:-$ADMIN_SUB}" >> "$GITHUB_OUTPUT"
          echo "region=$AZURE_LOCATION" >> "$GITHUB_OUTPUT"

      - name: Note dry-run completion
        if: success() && inputs.run_mode == 'whatif-only'
        run: echo "✅ whatif-only run complete. IL5 Bicep + auth validated; no resources provisioned."

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          # Parameterized: set the repo/org variable FIAB_GOV_DEPLOY_TRACKING_ISSUE
          # to an OPEN tracking issue. Previously hard-coded to #279 ("CSA Loom — v1
          # build roadmap"), which is CLOSED and generic — comments there were lost.
          # When unset, the step logs a warning instead of posting (the job is still
          # marked failed by `if: failure()`).
          TRACKING_ISSUE: ${{ vars.FIAB_GOV_DEPLOY_TRACKING_ISSUE }}
        with:
          script: |
            const issue = parseInt(process.env.TRACKING_ISSUE || '', 10);
            const body = `❌ deploy-fiab-il5 failed in run ${context.runId}. Federal CSU should investigate.`;
            if (Number.isInteger(issue) && issue > 0) {
              await github.rest.issues.createComment({
                issue_number: issue,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              core.warning('FIAB_GOV_DEPLOY_TRACKING_ISSUE repo variable not set — skipping issue comment. ' + body);
            }

  # rel-T32 (B8): IL5 post-deploy bootstrap — the SAME reusable bootstrap the
  # Commercial + GCC-High workflows call, boundary=IL5 (az cloud set
  # AzureUSGovernment + AZURE_GOV_* login + Gov BYO-MSAL secret). IL5 `full`
  # leaves the redeployed stack up, so the bootstrap chains after a tenant
  # (console-bearing) full run. dlz-attach adds no console → no bootstrap.
  post-deploy-bootstrap:
    name: Post-deploy bootstrap (IL5)
    needs: deploy-validate
    if: ${{ inputs.run_mode == 'full' && inputs.topology != 'dlz-attach' && needs.deploy-validate.result == 'success' }}
    uses: ./.github/workflows/csa-loom-post-deploy-bootstrap.yml
    secrets: inherit
    with:
      boundary: IL5
      region: ${{ needs.deploy-validate.outputs.region }}
      admin_subscription: ${{ needs.deploy-validate.outputs.admin_sub }}
      dlz_subscription: ${{ needs.deploy-validate.outputs.dlz_sub }}
