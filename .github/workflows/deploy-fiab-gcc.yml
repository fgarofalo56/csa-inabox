name: deploy-fiab-gcc

# CSA Loom — nightly deploy validation against GCC (Azure Commercial
# under M365 GCC identity). GCC limitations: no F-SKU, no Direct
# Lake parity.

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily (after Commercial run)
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode — whatif-only validates Bicep + auth without provisioning; full does provision + smoke + teardown.'
        type: choice
        default: whatif-only
        options:
          - whatif-only
          - full
      topology:
        description: 'Explicit topology (audit-t156). Overrides deployment_mode. single-sub=dev/demo; tenant=DMLZ console+shared only; dlz-attach=landing zone only (no second console). Empty=derive.'
        type: choice
        default: ''
        options:
          - ''
          - single-sub
          - tenant
          - dlz-attach
      target_subscription:
        description: 'dlz-attach: the NEW subscription the DLZ is provisioned into.'
        type: string
        required: false
      keep_resources:
        description: 'Keep resources up after provision AND run the post-deploy bootstrap (day-one: MSAL app-reg, Synapse SQL grants, Purview roles, Databricks SCIM, Spark PE). Skips teardown. Use for a real GCC install; leave false for the nightly validate-and-teardown ring.'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

env:
  AZURE_CLOUD: AzureCloud   # GCC = Azure public + GCC M365 identity
  AZURE_LOCATION: eastus
  CSA_LOOM_BOUNDARY: GCC
  CSA_LOOM_DEPLOYMENT_MODE: single-sub
  CSA_LOOM_TOPOLOGY: ${{ inputs.topology || '' }}
  CSA_LOOM_CAPACITY_SKU: F8
  CSA_LOOM_TARGET_SUBSCRIPTION: ${{ inputs.target_subscription }}

jobs:
  precheck:
    name: Verify GCC secrets are configured
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          C: ${{ secrets.AZURE_GCC_CLIENT_ID }}
          S: ${{ secrets.AZURE_GCC_CLIENT_SECRET }}
          T: ${{ secrets.AZURE_GCC_TENANT_ID }}
          U: ${{ secrets.AZURE_GCC_SUBSCRIPTION_ID }}
        run: |
          if [[ -z "$C" || -z "$S" || -z "$T" || -z "$U" ]]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::AZURE_GCC_* secrets not configured — skipping."
            echo "::warning::Bootstrap per docs/fiab/runbooks/secrets-bootstrap.md"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

  deploy-validate:
    name: Deploy + validate CSA Loom in GCC
    needs: precheck
    if: needs.precheck.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Coordinates exported for the chained Gov post-deploy bootstrap (rel-T32).
    outputs:
      admin_sub: ${{ steps.bootstrap_coords.outputs.admin_sub }}
      dlz_sub: ${{ steps.bootstrap_coords.outputs.dlz_sub }}
      region: ${{ steps.bootstrap_coords.outputs.region }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (GCC sub)
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_GCC_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_GCC_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_GCC_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_GCC_SUBSCRIPTION_ID }}"
            }

      - name: Setup azd
        uses: Azure/setup-azd@v2

      - name: Setup Bicep
        run: az bicep install

      # audit-t157: same "second Console is impossible" invariant as Commercial,
      # enforced at the CI layer. topology=tenant is rejected when an Admin Plane
      # (hub) RG already exists in the target sub; dlz-attach must name a NEW
      # subscription via target_subscription.
      - name: Topology guard
        id: topology_guard
        run: |
          set -e
          TOPOLOGY="${CSA_LOOM_TOPOLOGY:-tenant}"
          echo "topology=$TOPOLOGY"
          if [ "$TOPOLOGY" = "dlz-attach" ]; then
            if [ -z "$CSA_LOOM_TARGET_SUBSCRIPTION" ]; then
              echo "::error::dlz-attach requires target_subscription (the new DLZ subscription)."; exit 1
            fi
          else
            # Scope the hub check to the ACTIVE (deploy) subscription, not the
            # whole tenant, so a deliberate migration to a new hub sub is not
            # blocked by an old hub still running elsewhere as a UAT ring
            # (audit-t156 D3/Q10). Still blocks an accidental double-stamp into
            # the same sub.
            SCOPE_SUB=$(az account show --query id -o tsv)
            EXISTING=$(az graph query ${SCOPE_SUB:+--subscriptions "$SCOPE_SUB"} -q "ResourceContainers | where type == 'microsoft.resources/subscriptions/resourcegroups' | where name startswith 'rg-csa-loom-admin-' | project name" --query "data | length(@)" -o tsv 2>/dev/null || echo "0")
            if [ "${EXISTING:-0}" != "0" ]; then
              echo "::error::A CSA Loom hub already exists in the target subscription (found $EXISTING rg-csa-loom-admin-* RG). A second Console cannot be stamped into the same sub — use topology=dlz-attach with target_subscription."; exit 1
            fi
          fi

      - name: Bicep what-if
        run: |
          az deployment sub what-if \
            --name csa-loom-gcc-ci-${{ github.run_id }} \
            --location $AZURE_LOCATION \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--subscription "$CSA_LOOM_TARGET_SUBSCRIPTION"} \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/gcc.bicepparam \
            --parameters adminEntraGroupId=${{ secrets.FIAB_GCC_ADMIN_GROUP_ID }} \
            ${CSA_LOOM_TOPOLOGY:+--parameters topology="$CSA_LOOM_TOPOLOGY"} \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION"}

      - name: Provision
        if: github.event_name == 'schedule' || inputs.run_mode == 'full'
        run: |
          set -e
          if [ "$CSA_LOOM_TOPOLOGY" = "dlz-attach" ]; then
            # dlz-attach: provision the DLZ directly INTO the new target sub,
            # mirroring Commercial. azd would deploy into the logged-in (hub) sub,
            # so the DLZ RG/module (single-arg resourceGroup()) would land in the
            # wrong subscription. az deployment sub create scoped to the target sub
            # makes subscription() resolve to it, per main.bicep's dlz-attach scope.
            az deployment sub create \
              --name csa-loom-gcc-ci-${{ github.run_id }} \
              --location "$AZURE_LOCATION" \
              --subscription "$CSA_LOOM_TARGET_SUBSCRIPTION" \
              --template-file "$GITHUB_WORKSPACE/platform/fiab/bicep/main.bicep" \
              --parameters "$GITHUB_WORKSPACE/platform/fiab/bicep/params/gcc.bicepparam" \
              --parameters adminEntraGroupId=${{ secrets.FIAB_GCC_ADMIN_GROUP_ID }} \
              --parameters topology="$CSA_LOOM_TOPOLOGY" \
              --parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION"
          else
            azd env new csa-loom-gcc-ci-${{ github.run_id }} --no-prompt
            azd env set AZURE_CLOUD $AZURE_CLOUD
            azd env set AZURE_LOCATION $AZURE_LOCATION
            azd env set CSA_LOOM_BOUNDARY $CSA_LOOM_BOUNDARY
            azd env set CSA_LOOM_DEPLOYMENT_MODE $CSA_LOOM_DEPLOYMENT_MODE
            azd env set CSA_LOOM_TOPOLOGY $CSA_LOOM_TOPOLOGY
            azd env set CSA_LOOM_CAPACITY_SKU $CSA_LOOM_CAPACITY_SKU
            azd env set CSA_LOOM_ADMIN_GROUP_ID ${{ secrets.FIAB_GCC_ADMIN_GROUP_ID }}
            azd provision --no-prompt
          fi
        working-directory: platform/fiab/azd

      - name: Export bootstrap coordinates (for the chained Gov bootstrap)
        id: bootstrap_coords
        if: (github.event_name == 'schedule' || inputs.run_mode == 'full')
        run: |
          ADMIN_SUB=$(az account show --query id -o tsv)
          echo "admin_sub=$ADMIN_SUB" >> "$GITHUB_OUTPUT"
          echo "dlz_sub=${CSA_LOOM_TARGET_SUBSCRIPTION:-$ADMIN_SUB}" >> "$GITHUB_OUTPUT"
          echo "region=$AZURE_LOCATION" >> "$GITHUB_OUTPUT"

      - name: Smoke test (GCC-specific — no Direct Lake)
        if: github.event_name == 'schedule' || inputs.run_mode == 'full'
        run: bash .github/scripts/fiab-smoke-test.sh
        env:
          CONSOLE_URL: $(azd env get-values | grep CONSOLE_URL | cut -d= -f2)
          SKIP_DIRECT_LAKE_TEST: true   # No F-SKU in GCC

      - name: Teardown
        if: success() && (github.event_name == 'schedule' || inputs.run_mode == 'full') && !inputs.keep_resources
        run: bash .github/scripts/fiab-teardown.sh
        env:
          RG_NAME: rg-csa-loom-admin-${{ env.AZURE_LOCATION }}

      - name: Note dry-run completion
        if: success() && inputs.run_mode == 'whatif-only'
        run: |
          echo "✅ whatif-only run complete. Bicep + auth validated; no resources provisioned."

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 279,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Nightly deploy-fiab-gcc failed in run ${context.runId}.`
            })

  # rel-T32 (B8): GCC post-deploy bootstrap — the SAME reusable bootstrap the
  # Commercial + Gov workflows call, boundary=GCC (Azure public cloud, GCC
  # identity → AZURE_GCC_* login, no az cloud set). Only on a real, KEPT deploy.
  post-deploy-bootstrap:
    name: Post-deploy bootstrap (GCC)
    needs: deploy-validate
    if: ${{ inputs.keep_resources && (github.event_name == 'schedule' || inputs.run_mode == 'full') && needs.deploy-validate.result == 'success' }}
    uses: ./.github/workflows/csa-loom-post-deploy-bootstrap.yml
    secrets: inherit
    with:
      boundary: GCC
      region: ${{ needs.deploy-validate.outputs.region }}
      admin_subscription: ${{ needs.deploy-validate.outputs.admin_sub }}
      dlz_subscription: ${{ needs.deploy-validate.outputs.dlz_sub }}
