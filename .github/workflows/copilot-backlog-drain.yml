# Drains the Cosmos DB `copilot.backlog` container and creates GitHub
# Issues for any items in `status=open`, then flips them to
# `status=promoted`. Runs hourly + on-demand.
#
# Auth: client-secret-based via the `limitlessdata_deploy` SP. Required
# repo secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_CLIENT_SECRET
# The SP also needs Cosmos DB Built-in Data Contributor on the account
# (the Bicep grants this to the *Function App MI*; the drain uses the
# SP, so a separate role assignment is created at deploy time).
#
# Follow-up: migrate to OIDC federated credential to drop the
# long-lived client secret. Add a federated credential to the SP that
# trusts ``repo:fgarofalo56/csa-inabox:ref:refs/heads/main`` and
# ``repo:fgarofalo56/csa-inabox:environment:production``.
#
# The drain is idempotent: it only touches items where status='open',
# and it transitions them to 'promoted' atomically with a stamp of the
# created issue number.
name: Copilot Backlog Drain

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: copilot-backlog-drain
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COSMOS_ENDPOINT: ${{ vars.COPILOT_COSMOS_ENDPOINT }}
      COSMOS_DATABASE: copilot
      COSMOS_BACKLOG_CONTAINER: backlog
      COSMOS_MAX_BATCH: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Skip if Cosmos endpoint not configured
        id: gate
        run: |
          if [ -z "${COSMOS_ENDPOINT}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "COPILOT_COSMOS_ENDPOINT repo variable not set; nothing to drain."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        if: steps.gate.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install drain deps
        if: steps.gate.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install azure-cosmos==4.7.0 azure-identity==1.17.1 PyGithub==2.4.0

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        if: steps.gate.outputs.skip != 'true'
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Drain backlog → GitHub Issues
        if: steps.gate.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # DefaultAzureCredential picks up these env vars (SDK auth)
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          python .github/scripts/copilot_backlog_drain.py
