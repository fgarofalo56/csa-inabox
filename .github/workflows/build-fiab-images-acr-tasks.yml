name: build-fiab-images-acr-tasks

# CSA Loom — image build via Azure Container Registry Tasks.
#
# Why this exists alongside build-fiab-images.yml: the customer's
# Loom ACR is provisioned with publicNetworkAccess=Disabled (private
# endpoint only), so external GitHub runners can't reach it for
# `docker push`. ACR Tasks run *inside* Azure and reach ACR via
# its internal network — this avoids the chicken-and-egg of needing
# a self-hosted runner inside the VNet just to push images.
#
# Each app is built via `az acr build`. The source is uploaded as a
# tar archive to the Task and Docker builds inside ACR.
#
# SC1 (supply-chain enforcement on the REAL deploy path): after each image is
# built, this workflow now (1) Trivy-scans the pushed image and FAILS the build
# on CRITICAL CVEs, and (2) cosign-signs the image digest keylessly via GitHub
# Actions OIDC (Sigstore Fulcio + Rekor — no long-lived signing key to manage).
# The roll workflows (loom-roll-and-validate / gov-console-roll /
# full-app-deploy-commercial) cosign-VERIFY the signature before rolling, so an
# image that skipped this gate is rejected at deploy time. Emergency valve:
# the `skip_supply_chain` dispatch input or repo variable
# LOOM_BUILD_SKIP_SUPPLY_CHAIN=true skips scan+sign (loud warning) — the
# resulting UNSIGNED image will then be refused by the roll gates unless their
# own valves are also used. See docs/SUPPLY_CHAIN.md §7.

on:
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Image tag (default: v0.1)'
        type: string
        default: v0.1
      apps:
        description: 'Comma-separated app list, or "all"'
        type: string
        default: all
      skip_supply_chain:
        description: 'EMERGENCY VALVE — skip the Trivy CRITICAL gate + cosign signing (e.g. Trivy DB / Sigstore outage). The unsigned image will be REJECTED by the roll gates unless their skip valves are also set.'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'apps/fiab-*/**'
      - '.github/workflows/build-fiab-images-acr-tasks.yml'

permissions:
  contents: read
  # SC1: keyless cosign signing exchanges the Actions OIDC token for a
  # short-lived Fulcio certificate.
  id-token: write


# Serialize all runs of this workflow. Two parallel runs would race on
# the ACR publicNetworkAccess + networkRuleSet toggle — one would
# disable while the other's matrix builds were still mid-push, denying
# late finishers with "client with IP ... not allowed access". With
# cancel-in-progress=false we queue subsequent runs instead of dropping
# them, so every commit still gets its image build.
concurrency:
  group: build-fiab-images-acr-tasks
  cancel-in-progress: false
env:
  AZURE_LOCATION: eastus2

jobs:
  resolve:
    name: Resolve ACR + filter apps
    runs-on: ubuntu-latest
    outputs:
      acr_name: ${{ steps.acr.outputs.acr_name }}
      app_matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - id: acr
        run: |
          # Resolve the admin RG by PREFIX — it may or may not carry a region
          # suffix (rg-csa-loom-admin OR rg-csa-loom-admin-usgovvirginia). Try the
          # AZURE_LOCATION-suffixed name first, else fall back to the first
          # 'rg-csa-loom-admin' prefix match (mirrors console-bluegreen-roll).
          RG="rg-csa-loom-admin-${AZURE_LOCATION}"
          if ! az group show -n "$RG" -o none 2>/dev/null; then
            RG=$(az group list --query "[?starts_with(name, 'rg-csa-loom-admin')] | [0].name" -o tsv | tr -d '\r')
          fi
          if [[ -z "$RG" ]]; then echo "::error::Admin RG not found (prefix rg-csa-loom-admin)."; exit 1; fi
          echo "::notice::admin RG = $RG"
          ACR=$(az acr list --resource-group "$RG" --query "[?starts_with(name, 'acrloom')]|[0].name" -o tsv)
          if [[ -z "$ACR" ]]; then echo "::error::ACR not found"; exit 1; fi
          echo "acr_name=$ACR" >> "$GITHUB_OUTPUT"
      - id: matrix
        run: |
          INPUT="${{ inputs.apps || 'all' }}"
          if [[ "$INPUT" == "all" ]]; then
            APPS='[{"name":"loom-console","ctx":"./apps/fiab-console"},{"name":"loom-setup-orchestrator","ctx":"./apps/fiab-setup-orchestrator"},{"name":"loom-mcp","ctx":"./apps/fiab-mcp-config"},{"name":"loom-mcp-bridge","ctx":"./apps/fiab-mcp-bridge"},{"name":"loom-activator","ctx":"./apps/fiab-activator-engine"},{"name":"loom-mirroring","ctx":"./apps/fiab-mirroring-engine"},{"name":"loom-direct-lake-shim","ctx":"./apps/fiab-direct-lake-shim"},{"name":"loom-copilot-maf","ctx":"./apps/copilot-maf"}]'
          elif [[ "$INPUT" == "loom-copilot-maf" ]]; then
            # MAF tier lives at ./apps/copilot-maf (not the ./apps/fiab-* convention).
            APPS='[{"name":"loom-copilot-maf","ctx":"./apps/copilot-maf"}]'
          else
            APPS=$(echo "$INPUT" | jq -cR 'split(",") | map({name: ., ctx: ("./apps/fiab-" + (sub("^loom-"; "") | sub("loom-mcp"; "mcp-config") | sub("loom-setup-orchestrator"; "setup-orchestrator") | sub("loom-activator"; "activator-engine") | sub("loom-mirroring"; "mirroring-engine") | sub("loom-direct-lake-shim"; "direct-lake-shim")))})')
          fi
          echo "matrix={\"include\":$APPS}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }} via ACR Tasks
    needs: [resolve, acr_enable]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve.outputs.app_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Build + push via ACR Tasks
        run: |
          set -e
          TAG="${{ inputs.tag_override || 'v0.1' }}"
          STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          ACR="${{ needs.resolve.outputs.acr_name }}"
          # v3.28: pass LOOM_BUILD_SHA + LOOM_BUILD_TIMESTAMP as build args
          # so the Dockerfile stamps /public/build-marker.txt with the actual
          # commit being built. deploy-validation reads this file and refuses
          # to declare success unless the SHA matches.
          # 2026-07-16: the console compile outgrew the DEFAULT ACR Task agent
          # (8 GB) — five consecutive builds were cgroup-OOM-SIGKILLed with no
          # code change (runs cjdq..cjdv). The console builds on the dedicated
          # 16 GB S3 pool `loombuild` (scaled 0↔1 around the build; proven on
          # run cjdy). Other app images stay on default agents.
          POOL_ARGS=""
          if [ "${{ matrix.name }}" = "loom-console" ]; then
            az acr agentpool show -r "$ACR" -n loombuild -o none 2>/dev/null \
              || az acr agentpool create -r "$ACR" -n loombuild --tier S3 -o none
            CNT=$(az acr agentpool show -r "$ACR" -n loombuild --query count -o tsv | tr -d '\r')
            [ "${CNT:-0}" -ge 1 ] || az acr agentpool update -r "$ACR" -n loombuild --count 1 -o none
            POOL_ARGS="--agent-pool loombuild"
          fi
          az acr build \
            --registry "$ACR" $POOL_ARGS \
            --image "${{ matrix.name }}:${TAG}" \
            --image "${{ matrix.name }}:${{ github.sha }}" \
            --image "${{ matrix.name }}:latest" \
            --file "${{ matrix.ctx }}/Dockerfile" \
            --build-arg "LOOM_BUILD_SHA=${{ github.sha }}" \
            --build-arg "LOOM_BUILD_TIMESTAMP=${STAMP}" \
            "${{ matrix.ctx }}"
          echo "::notice::Built ${{ matrix.name }}:${TAG} via ACR Tasks (sha=${{ github.sha }})"
          # Export coordinates for the SC1 scan/sign steps below.
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "ACR_NAME=$ACR" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=${ACR}.azurecr.io" >> "$GITHUB_ENV"
          if [ -n "$POOL_ARGS" ]; then
            # Scale the pool back to 0 when nothing else is queued (pool
            # allocation is what bills; idle pools cost nothing at count 0).
            q=$(az acr agentpool show -r "$ACR" -n loombuild --queue-count -o tsv 2>/dev/null | tr -d '\r' || echo 1)
            [ "${q:-1}" = "0" ] && az acr agentpool update -r "$ACR" -n loombuild --count 0 --no-wait -o none || true
          fi

      # ── SC1: supply-chain gate — Trivy CRITICAL scan + keyless cosign sign ──
      # The ACR data plane is OPEN at this point (acr_enable ran before the
      # build matrix and acr_restore only runs after it), so the runner can
      # pull the just-pushed image to scan it and push the signature artifact.
      - name: Resolve supply-chain gate + image digest
        id: sc
        run: |
          set -e
          SKIP="false"
          if [[ "${{ inputs.skip_supply_chain }}" == "true" || "${{ vars.LOOM_BUILD_SKIP_SUPPLY_CHAIN }}" == "true" ]]; then
            SKIP="true"
            echo "::warning::skip_supply_chain/LOOM_BUILD_SKIP_SUPPLY_CHAIN is set — SKIPPING the Trivy CRITICAL gate AND cosign signing for ${{ matrix.name }}. This image is UNSIGNED and will be rejected by the roll verification gates unless their skip valves are also used."
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [[ "$SKIP" == "true" ]]; then exit 0; fi
          # Authenticate docker (Trivy + cosign both read ~/.docker/config.json).
          az acr login --name "$ACR_NAME"
          DIGEST=$(az acr repository show --name "$ACR_NAME" --image "${{ matrix.name }}:${{ github.sha }}" --query digest -o tsv | tr -d '\r')
          if [[ -z "$DIGEST" ]]; then
            echo "::error::Could not resolve the manifest digest for ${{ matrix.name }}:${{ github.sha }} — cannot scan/sign. The image build reported success but the manifest is unreadable."
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "::notice::${{ matrix.name }}:${{ github.sha }} → $DIGEST"

      - name: Trivy gate — fail on CRITICAL CVEs (pushed image)
        if: steps.sc.outputs.skip != 'true'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          # Vulnerability gating ONLY: trivy's secret scanner on minified Next.js
          # bundles flags UI placeholder strings (e.g. the GCS shortcut wizard's
          # example service-account JSON) as credentials — a known FP class.
          # Secret hygiene is covered by the repo Secret Scan lane on source.
          scanners: vuln
          # Reviewed baseline of base-image/vendored CVEs with burn-down notes.
          trivyignores: .trivyignore
          format: table

      - name: Install cosign
        if: steps.sc.outputs.skip != 'true'
        uses: sigstore/cosign-installer@v3.7.0

      - name: Cosign sign (keyless OIDC)
        if: steps.sc.outputs.skip != 'true'
        run: |
          set -e
          REF="${ACR_LOGIN_SERVER}/${{ matrix.name }}@${{ steps.sc.outputs.digest }}"
          echo "Signing $REF keylessly (GitHub Actions OIDC → Fulcio/Rekor) ..."
          if ! cosign sign --yes "$REF"; then
            echo "::error::cosign signing FAILED for $REF. The image is built but UNSIGNED — the roll gates will reject it. Re-run this workflow (transient Sigstore outage), or (emergency only) re-dispatch with skip_supply_chain=true AND use the roll workflow's skip valve."
            exit 1
          fi
          echo "::notice::Signed $REF (signature stored in ACR alongside the image; verified at roll time by loom-roll-and-validate / gov-console-roll / full-app-deploy-commercial)."

  # v3.41: toggle ACR publicNetworkAccess so `az acr build` can upload the
  # source tarball from the GHA runner. The ACR is provisioned with
  # publicNetworkAccess=Disabled by default (private endpoint), which was
  # blocking every build with "client with IP ... is not allowed access".
  acr_enable:
    name: Enable ACR public access (temp)
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - run: |
          ACR="${{ needs.resolve.outputs.acr_name }}"
          # Two distinct rules block GHA: publicNetworkAccess (the endpoint
          # itself) AND networkRuleSet.defaultAction (the IP-allowlist
          # default). Flip BOTH.
          az acr update --name "$ACR" --public-network-enabled true -o tsv --query "publicNetworkAccess" || true
          az acr update --name "$ACR" --default-action Allow -o tsv --query "networkRuleSet.defaultAction" || true
          sleep 30

  acr_restore:
    name: Restore ACR public access disabled
    needs: [resolve, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - run: |
          ACR="${{ needs.resolve.outputs.acr_name }}"
          az acr update --name "$ACR" --default-action Deny -o tsv --query "networkRuleSet.defaultAction" || true
          az acr update --name "$ACR" --public-network-enabled false -o tsv --query "publicNetworkAccess" || true
