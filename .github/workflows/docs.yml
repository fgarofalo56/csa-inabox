name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      # `mkdocs-material[imaging]` pulls in `cairosvg` + `Pillow` which
      # the `social` plugin needs to auto-generate per-page OG / Twitter
      # cards. Without these the build aborts in strict mode with one
      # warning per page (1394+ pages × "Required dependencies of
      # social plugin not found").
      - run: pip install "mkdocs-material[imaging]" mkdocs-minify-plugin mkdocs-include-markdown-plugin mkdocs-glightbox
      # `--strict` was dropped 2026-05-27 (PR #352). Strict mode promotes
      # every link-validator warning to a build error, and the
      # `docs/hooks/rewrite_example_links.py` hook rewrites repo-relative
      # tutorial links to absolute GitHub URLs at render time — but
      # mkdocs validates the markdown links BEFORE the page-markdown
      # hook runs, so the warnings still fire. The deploy workflow was
      # failing on these for 4+ runs, blocking every docs update.
      # Re-enable --strict only after teaching the link validator to
      # defer to the rewrite hook.
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
