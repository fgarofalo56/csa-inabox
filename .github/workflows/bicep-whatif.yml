# Bicep What-If Analysis — PR Comment Workflow
# Runs `az deployment sub what-if` on PRs that modify Bicep files and posts results as PR comments.
#
# V5 (loom-next-level WS-V, ground-truth #11): the lane now ALSO covers
# platform/fiab/bicep/** — where all Loom/FiaB infra lives — via the
# `whatif-fiab` job, which what-ifs the PR's template against the LIVE
# Commercial estate (sub AZURE_SUBSCRIPTION_ID, centralus). The scheduled
# cross-estate drift lane (Commercial + Gov weekly) is the sibling
# `.github/workflows/loom-drift-check.yml`. Runbook:
# docs/fiab/runbooks/bicep-drift.md

on:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/bicep/**/*.bicep'
      - 'deploy/bicep/**/*.json'
      - 'platform/fiab/bicep/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: bicep-whatif-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AZURE_LOCATION: 'eastus'

jobs:
  detect-changes:
    name: Detect Changed Landing Zones
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      alz_changed: ${{ steps.changes.outputs.alz }}
      dmlz_changed: ${{ steps.changes.outputs.dmlz }}
      dlz_changed: ${{ steps.changes.outputs.dlz }}
      fiab_changed: ${{ steps.changes.outputs.fiab }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            alz:
              - 'deploy/bicep/landing-zone-alz/**'
              - 'deploy/bicep/shared/**'
            dmlz:
              - 'deploy/bicep/DMLZ/**'
              - 'deploy/bicep/shared/**'
            dlz:
              - 'deploy/bicep/DLZ/**'
              - 'deploy/bicep/shared/**'
            fiab:
              - 'platform/fiab/bicep/**'

  bicep-build:
    name: Validate Bicep (${{ matrix.zone }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - zone: ALZ
            path: 'deploy/bicep/landing-zone-alz'
            main: main.bicep
            changed: ${{ needs.detect-changes.outputs.alz_changed }}
          - zone: DMLZ
            path: deploy/bicep/DMLZ
            main: main.bicep
            changed: ${{ needs.detect-changes.outputs.dmlz_changed }}
          - zone: DLZ
            path: deploy/bicep/DLZ
            main: main.bicep
            changed: ${{ needs.detect-changes.outputs.dlz_changed }}
          - zone: FIAB
            path: platform/fiab/bicep
            main: main.bicep
            changed: ${{ needs.detect-changes.outputs.fiab_changed }}
    steps:
      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Bicep Build
        if: matrix.changed == 'true'
        # Use the runner-native ``az`` CLI instead of the azure/CLI Docker action.
        # The Docker pull intermittently fails (BCP error tail in workflow logs),
        # and azure/CLI@v2 is on Node 20 (deprecated September 2026).
        run: |
          az bicep build --file "${{ matrix.path }}/${{ matrix.main }}" --stdout > /dev/null
          echo "✅ ${{ matrix.zone }}: Bicep build succeeded" >> $GITHUB_STEP_SUMMARY

  whatif:
    name: What-If (${{ matrix.zone }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, bicep-build]
    # Skip when OIDC credentials are not configured (e.g. community forks / PRs from forks).
    if: vars.AZURE_CREDENTIALS_CONFIGURED == 'true'
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - zone: DMLZ
            path: deploy/bicep/DMLZ
            main: main.bicep
            params: params.dev.json
            subscription_secret: AZURE_DMLZ_SUBSCRIPTION_ID
            changed: ${{ needs.detect-changes.outputs.dmlz_changed }}
          - zone: DLZ
            path: deploy/bicep/DLZ
            main: main.bicep
            params: params.dev.json
            subscription_secret: AZURE_DLZ_SUBSCRIPTION_ID
            changed: ${{ needs.detect-changes.outputs.dlz_changed }}
    steps:
      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Azure Login (OIDC)
        if: matrix.changed == 'true'
        uses: azure/login@d19a4f1b3c068b799dff7574ac265b0144f415fe # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets[matrix.subscription_secret] }}

      - name: Run What-If
        if: matrix.changed == 'true'
        id: whatif
        # Runner-native az; see Bicep Build step for rationale.
        run: |
          set +e
          RESULT=$(az deployment sub what-if \
            --location "${{ env.AZURE_LOCATION }}" \
            --template-file "${{ matrix.path }}/${{ matrix.main }}" \
            --parameters "${{ matrix.path }}/${{ matrix.params }}" \
            --no-pretty-print 2>&1)
          EXIT_CODE=$?
          set -e

          # Truncate if too large for PR comment (GitHub limit ~65535 chars)
          if [ ${#RESULT} -gt 60000 ]; then
            RESULT="${RESULT:0:60000}
          ... (output truncated, see workflow logs for full details)"
          fi

          # Escape for multiline output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "whatif_result<<$EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: matrix.changed == 'true' && always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          WHATIF_RESULT: ${{ steps.whatif.outputs.whatif_result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const zone = '${{ matrix.zone }}';
            const exitCode = '${{ steps.whatif.outputs.exit_code }}';
            const result = process.env.WHATIF_RESULT || '';
            const status = exitCode === '0' ? '✅' : '⚠️';

            const body = `## ${status} Bicep What-If: **${zone}**

            <details>
            <summary>Click to expand what-if results</summary>

            \`\`\`
            ${result}
            \`\`\`

            </details>

            ---
            *Generated by [Bicep What-If Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            // Find existing comment from this workflow for this zone
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(`Bicep What-If: **${zone}**`)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # ------------------------------------------------------------------
  # V5 — FIAB PR lane: what-if the PR's platform/fiab/bicep template
  # against the LIVE Commercial estate so infra PRs see their real delta
  # (and any pre-existing unmanaged drift) before merge. Uses the same
  # creds-JSON auth block every loom-* workflow uses (the Commercial
  # deploy SP has no OIDC federated credential — the `environment: dev`
  # OIDC path above is the deploy/bicep landing-zone ring only).
  # deployAppsEnabled=false: the app plane rolls continuously via
  # loom-roll-and-validate.yml (sha-tagged images churn by design), so
  # the Container Apps are excluded (changeType Ignore) — the lane
  # covers the INFRA estate. Runbook: docs/fiab/runbooks/bicep-drift.md
  # ------------------------------------------------------------------
  whatif-fiab:
    name: What-If (FIAB vs live Commercial estate)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [detect-changes, bicep-build]
    if: needs.detect-changes.outputs.fiab_changed == 'true'
    env:
      FIAB_LOCATION: centralus
      FIAB_VANITY_DOMAIN: csa-loom.limitlessdata.ai
    steps:
      - name: Check Commercial estate secrets are configured
        id: precheck
        env:
          C: ${{ secrets.AZURE_CLIENT_ID }}
          S: ${{ secrets.AZURE_CLIENT_SECRET }}
          T: ${{ secrets.AZURE_TENANT_ID }}
          U: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [[ -z "$C" || -z "$S" || -z "$T" || -z "$U" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AZURE_* secrets not configured (fork PR?) — skipping the FIAB live what-if. Bicep Build above still validates the template."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.precheck.outputs.configured == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Azure Login (Commercial — creds JSON, same block as loom-roll-and-validate.yml)
        if: steps.precheck.outputs.configured == 'true'
        uses: azure/login@d19a4f1b3c068b799dff7574ac265b0144f415fe # v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Run What-If vs live Commercial estate
        if: steps.precheck.outputs.configured == 'true'
        id: whatif
        run: |
          az bicep install
          set +e
          # commercial-full.bicepparam is the canonical from-scratch paramfile for
          # the live estate (no-vaporware three-step path); location + vanity
          # domain overridden to the live centralus deployment's values.
          # vars.LOOM_DRIFT_EXTRA_PARAMS lets the operator append
          # "--parameters k=v" overrides (e.g. LOOM_PURVIEW_LOCATION pins) without
          # a code change — shared with loom-drift-check.yml.
          az deployment sub what-if \
            --name loom-fiab-whatif-${{ github.run_id }} \
            --location "$FIAB_LOCATION" \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/commercial-full.bicepparam \
            --parameters location="$FIAB_LOCATION" \
            --parameters adminEntraGroupId=${{ secrets.FIAB_ADMIN_GROUP_ID }} \
            --parameters deployAppsEnabled=false \
            --parameters loomVanityDomain="$FIAB_VANITY_DOMAIN" \
            ${{ vars.LOOM_DRIFT_EXTRA_PARAMS }} \
            --no-pretty-print --only-show-errors > whatif-fiab.json 2> whatif-fiab.err
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [[ $EXIT_CODE -ne 0 ]] || ! jq -e '.changes' whatif-fiab.json >/dev/null 2>&1; then
            echo "status=Error" >> "$GITHUB_OUTPUT"
            echo "::error::FIAB what-if failed (exit $EXIT_CODE). stderr:"
            cat whatif-fiab.err || true
            head -c 4000 whatif-fiab.json || true
            {
              echo "summary<<WHATIF_EOF"
              echo "What-if FAILED (exit $EXIT_CODE):"
              head -c 8000 whatif-fiab.err
              echo ""
              echo "WHATIF_EOF"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          COUNTS=$(jq -c '[.changes[]?] | group_by(.changeType) | map({(.[0].changeType): length}) | add // {}' whatif-fiab.json)
          DELTA=$(jq '[.changes[]? | select(.changeType != "NoChange" and .changeType != "Ignore")] | length' whatif-fiab.json)
          echo "status=Ok" >> "$GITHUB_OUTPUT"
          echo "delta=$DELTA" >> "$GITHUB_OUTPUT"
          echo "counts=$COUNTS" >> "$GITHUB_OUTPUT"
          {
            echo "summary<<WHATIF_EOF"
            echo "Change counts: $COUNTS"
            echo ""
            echo "Deltas (changeType != NoChange/Ignore, first 150):"
            jq -r '.changes[]? | select(.changeType != "NoChange" and .changeType != "Ignore") | "\(.changeType)\t\(.resourceId)"' whatif-fiab.json | head -150
            echo "WHATIF_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "### FIAB what-if vs live Commercial estate — $DELTA delta(s), counts $COUNTS" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full what-if JSON
        if: steps.precheck.outputs.configured == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: whatif-fiab-${{ github.run_id }}
          path: |
            whatif-fiab.json
            whatif-fiab.err
          if-no-files-found: ignore

      - name: Post PR Comment
        if: steps.precheck.outputs.configured == 'true' && always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          WHATIF_SUMMARY: ${{ steps.whatif.outputs.summary }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const zone = 'FIAB';
            const status = '${{ steps.whatif.outputs.status }}' === 'Ok'
              ? ('${{ steps.whatif.outputs.delta }}' === '0' ? '✅' : '⚠️')
              : '❌';
            let result = process.env.WHATIF_SUMMARY || '(no output)';
            if (result.length > 60000) {
              result = result.slice(0, 60000) + '\n... (truncated — full JSON in the run artifact)';
            }

            const body = `## ${status} Bicep What-If: **${zone}** (live Commercial estate, centralus)

            Deltas vs live: **${{ steps.whatif.outputs.delta || 'n/a' }}** — expected deltas here are YOUR PR's intended changes; anything you did not change is pre-existing unmanaged drift (see docs/fiab/runbooks/bicep-drift.md).

            <details>
            <summary>Click to expand what-if summary (full JSON in run artifact)</summary>

            \`\`\`
            ${result}
            \`\`\`

            </details>

            ---
            *Generated by [Bicep What-If Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(`Bicep What-If: **${zone}**`)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  cost-estimate:
    name: Cost Estimate (${{ matrix.zone }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, whatif]
    if: always() && !cancelled() && vars.AZURE_CREDENTIALS_CONFIGURED == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - zone: DMLZ
            path: deploy/bicep/DMLZ
            main: main.bicep
            changed: ${{ needs.detect-changes.outputs.dmlz_changed }}
          - zone: DLZ
            path: deploy/bicep/DLZ
            main: main.bicep
            changed: ${{ needs.detect-changes.outputs.dlz_changed }}
    steps:
      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install dependencies
        if: matrix.changed == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq bc

      - name: Run Cost Estimate
        if: matrix.changed == 'true'
        id: cost
        run: |
          chmod +x scripts/deploy/estimate-costs.sh

          # Run in JSON mode; capture output
          set +e
          COST_JSON=$(./scripts/deploy/estimate-costs.sh \
            "${{ matrix.path }}/${{ matrix.main }}" \
            --format json \
            --environment dev \
            --region "${{ env.AZURE_LOCATION }}" 2>&1)
          EXIT_CODE=$?
          set -e

          # Extract total cost
          TOTAL=$(echo "$COST_JSON" | jq -r '.total_monthly_cost // "N/A"' 2>/dev/null || echo "N/A")
          RESOURCE_COUNT=$(echo "$COST_JSON" | jq -r '.resources | length // 0' 2>/dev/null || echo "0")

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "resource_count=$RESOURCE_COUNT" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Save full JSON for the comment
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "cost_json<<$EOF" >> $GITHUB_OUTPUT
          echo "$COST_JSON" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Post Cost Estimate PR Comment
        if: matrix.changed == 'true' && always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          COST_JSON: ${{ steps.cost.outputs.cost_json }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const zone = '${{ matrix.zone }}';
            const total = '${{ steps.cost.outputs.total }}';
            const resourceCount = '${{ steps.cost.outputs.resource_count }}';
            const exitCode = '${{ steps.cost.outputs.exit_code }}';

            let costTable = '';
            try {
              const data = JSON.parse(process.env.COST_JSON || '{}');
              if (data.resources && data.resources.length > 0) {
                costTable = '| Resource | SKU | Monthly Cost |\n|----------|-----|-------------|\n';
                for (const r of data.resources) {
                  const type = r.resource_type.replace('Microsoft.', '');
                  const cost = r.monthly_cost > 0 ? `$${r.monthly_cost.toFixed(2)}` : (r.note || 'N/A');
                  costTable += `| ${type} | ${r.sku} | ${cost} |\n`;
                }
              }
            } catch (e) {
              costTable = '_Could not parse cost details._';
            }

            const status = exitCode === '2' ? '⚠️ Over Budget' : '💰';
            const body = `## ${status} Cost Estimate: **${zone}**

            **Estimated Monthly Cost: $${total}**
            Resources analyzed: ${resourceCount}

            <details>
            <summary>Cost breakdown</summary>

            ${costTable}

            </details>

            > _Estimates use the Azure Retail Prices API (list prices). Actual costs may differ based on EA/CSP agreements, reserved instances, and consumption._

            ---
            *Generated by [Cost Estimate Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(`Cost Estimate: **${zone}**`)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
