name: loom-parity-autopilot

# WS-10.5 — Parity Autopilot (BTB-12), scheduled.
#
# Playwright capture (Track-0) → AOAI vision diff vs the parity docs →
# plan-model → auto-filed gap issues. Runs on the in-VNet gh-aca-runner (the
# console + its private KV are private-link only) with the SAME minted-session
# auth chain as loom-ui-verify:
#   1. OIDC federated credential → azure/login@v2 (no client secret on disk)
#   2. az keyvault secret show → SESSION_SECRET (masked immediately)
#   3. scripts/csa-loom/parity-autopilot.mjs mints a loom_session cookie, drives
#      e2e-receipt.mjs for the capture, and POSTs to the console run route.
#
# The AOAI vision diff, the plan-model, and the GitHub issue filing all happen
# SERVER-SIDE inside the console (which already holds LOOM_FEEDBACK_GITHUB_TOKEN
# + the AOAI deployment) — so NO GitHub token is needed in this workflow. When
# either is unconfigured the run is honest-gated (recorded in the run ledger),
# never fabricated (no-vaporware.md).
#
# One-time setup mirrors loom-ui-verify (docs/fiab/agent-unattended-access.md):
#   - SP with a GitHub OIDC federated credential for this repo + Key Vault
#     Secrets User on the loom KV.
#   - GH secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   - GH vars:    LOOM_VERIFY_URL, LOOM_AUTOMATION_*, LOOM_KV_NAME (optional).

on:
  workflow_dispatch:
    inputs:
      slugs:
        description: 'Comma-separated parity-doc slugs to audit (e.g. governance-overview,lakehouse). Ignored when "all" is true.'
        type: string
        default: 'governance-overview'
      route:
        description: 'Route to capture (e.g. /governance). REQUIRED unless the doc declares a navigable Route: line (most cite source files, so pass this).'
        type: string
        default: '/governance'
      all:
        description: 'Audit every parity doc that declares a Route: line (capped by max).'
        type: boolean
        default: false
      max:
        description: 'Max number of surfaces to process.'
        type: string
        default: '8'
      theme:
        description: 'Capture theme (light or dark).'
        type: string
        default: 'light'
      console_url:
        description: 'Loom console URL (blank = LOOM_VERIFY_URL var).'
        type: string
        default: ''
      kv_name:
        description: 'Key Vault name for the session-secret (blank = auto-discover).'
        type: string
        default: ''

  schedule:
    # Weekly on Tuesday 05:30 UTC — after loom-ui-verify's Monday smoke, so a
    # freshly-verified console is audited for parity drift.
    - cron: '30 5 * * 2'

permissions:
  id-token: write   # OIDC token for azure/login
  contents: read

env:
  LOOM_URL: ${{ inputs.console_url || vars.LOOM_VERIFY_URL || 'https://csa-loom.limitlessdata.ai' }}
  LOOM_AUTOMATION_OID:  ${{ vars.LOOM_AUTOMATION_OID  || '' }}
  LOOM_AUTOMATION_UPN:  ${{ vars.LOOM_AUTOMATION_UPN  || 'parity-autopilot@automation.local' }}
  LOOM_AUTOMATION_NAME: ${{ vars.LOOM_AUTOMATION_NAME || 'Loom Parity Autopilot [automation]' }}
  KV_SECRET_NAME: 'session-secret'

jobs:
  autopilot:
    name: 'Parity Autopilot (unattended)'
    runs-on: [self-hosted, loom-aca]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Key Vault + fetch SESSION_SECRET
        env:
          INPUT_KV:     ${{ inputs.kv_name }}
          VAR_KV:       ${{ vars.LOOM_KV_NAME }}
          VAR_ADMIN_RG: ${{ vars.LOOM_ADMIN_RG }}
        run: |
          set -euo pipefail
          KV="${INPUT_KV:-${VAR_KV:-}}"
          if [[ -z "$KV" ]]; then
            if [[ -n "${VAR_ADMIN_RG:-}" ]]; then
              KV=$(az keyvault list -g "$VAR_ADMIN_RG" --query "[0].name" -o tsv 2>/dev/null || true)
            else
              KV=$(az keyvault list --query "[?starts_with(name,'kv-loom') || starts_with(name,'loom-kv')].name | [0]" -o tsv 2>/dev/null || true)
            fi
          fi
          if [[ -z "$KV" ]]; then
            echo "::error::Could not resolve a Key Vault name. Set LOOM_KV_NAME or pass kv_name."
            exit 1
          fi
          echo "Using Key Vault: $KV"
          SS=$(az keyvault secret show --vault-name "$KV" --name "$KV_SECRET_NAME" --query value -o tsv 2>/dev/null || true)
          if [[ -z "$SS" ]]; then
            SS=$(az keyvault secret show --vault-name "$KV" --name "loom-session-secret" --query value -o tsv 2>/dev/null || true)
          fi
          if [[ -z "$SS" ]]; then
            echo "::error::Could not read '$KV_SECRET_NAME' from $KV. Ensure the SP has Key Vault Secrets User."
            exit 1
          fi
          echo "::add-mask::$SS"
          echo "SESSION_SECRET=$SS" >> "$GITHUB_ENV"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install console dependencies
        run: pnpm -C apps/fiab-console install --frozen-lockfile

      - name: Install Playwright browsers (Chromium)
        run: |
          if [ -d "/ms-playwright" ]; then
            echo "Browsers baked into the runner image — skipping install"
          else
            pnpm -C apps/fiab-console exec playwright install --with-deps chromium
          fi

      - name: Run Parity Autopilot
        run: |
          if [ -d "/ms-playwright" ]; then export PLAYWRIGHT_BROWSERS_PATH=/ms-playwright; fi
          ARGS="--theme ${{ inputs.theme || 'light' }} --max ${{ inputs.max || '8' }}"
          if [ "${{ inputs.all }}" = "true" ]; then
            ARGS="$ARGS --all"
          else
            ARGS="$ARGS --slug ${{ inputs.slugs || 'governance-overview' }}"
            if [ -n "${{ inputs.route || '/governance' }}" ]; then ARGS="$ARGS --route ${{ inputs.route || '/governance' }}"; fi
          fi
          echo "parity-autopilot $ARGS"
          node scripts/csa-loom/parity-autopilot.mjs $ARGS
        env:
          SESSION_SECRET:       ${{ env.SESSION_SECRET }}
          LOOM_URL:             ${{ env.LOOM_URL }}
          LOOM_AUTOMATION_OID:  ${{ env.LOOM_AUTOMATION_OID }}
          LOOM_AUTOMATION_UPN:  ${{ env.LOOM_AUTOMATION_UPN }}
          LOOM_AUTOMATION_NAME: ${{ env.LOOM_AUTOMATION_NAME }}
          CI: 'true'

      - name: Upload captured receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loom-parity-autopilot-${{ github.run_id }}
          path: |
            apps/fiab-console/test-results/receipts/
          retention-days: 14
