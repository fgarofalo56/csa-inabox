name: deploy-uat-jumpbox

# CSA Loom — one-shot deploy of a Playwright-equipped jumpbox in the
# DLZ workloads subnet. Used for end-to-end UI testing of the
# VNet-internal Loom Console.
#
# Spend: Standard_D2ads_v5 ~$70/month. Tear down when UAT complete.

on:
  workflow_dispatch:
    inputs:
      admin_group_id:
        description: 'Entra group object ID to grant VM Administrator Login'
        type: string
        required: false
        default: ''

permissions:
  contents: read

env:
  AZURE_LOCATION: eastus2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - name: Setup Bicep
        run: az bicep install
      - name: Deploy jumpbox to DLZ workloads subnet
        run: |
          set -e
          DLZ_RG="rg-csa-loom-dlz-single-${AZURE_LOCATION}"
          VNET_NAME="vnet-csa-loom-dlz-default-${AZURE_LOCATION}"

          az deployment group create \
            --resource-group "$DLZ_RG" \
            --name "loom-uat-jumpbox-${{ github.run_id }}" \
            --template-file platform/fiab/bicep/uat-jumpbox.bicep \
            --parameters location="$AZURE_LOCATION" \
                         vnetName="$VNET_NAME" \
                         vnetRgName="$DLZ_RG" \
                         adminEntraGroupId='${{ inputs.admin_group_id }}'

          VM_ID=$(az vm show -g "$DLZ_RG" -n loom-uat-jumpbox --query id -o tsv)
          echo "::notice::Jumpbox VM ID: $VM_ID"
          echo "::notice::To Bastion-SSH (AAD):"
          echo "::notice::  az network bastion ssh --name bastion-csa-loom-${AZURE_LOCATION} \\"
          echo "::notice::    --resource-group rg-csa-loom-admin-${AZURE_LOCATION} \\"
          echo "::notice::    --target-resource-id $VM_ID --auth-type AAD"
