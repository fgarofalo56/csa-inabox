# CSA Loom console — build gate.
#
# WHY THIS EXISTS:
#   The repo's required PR checks are Python / dbt / lint / secret-scan — none
#   of them COMPILE the Next.js console in apps/fiab-console. So a TypeScript /
#   bundling break (e.g. an import of a file that was never committed) passed
#   every required check and only blew up later in the Docker image build inside
#   loom-roll-and-validate / deploy-fiab-*. This workflow runs the SAME build the
#   Dockerfile runs (`pnpm build` == `next build`, node 20, pnpm 9, 4 GB heap),
#   so module-resolution / bundling failures are caught at PR time instead.
#
#   next.config sets typescript.ignoreBuildErrors + eslint.ignoreDuringBuilds, so
#   this mirrors deploy exactly: it does NOT fail on pure type/lint nits, but it
#   DOES fail on anything that would break the real production build (unresolved
#   imports, bad JSX, server/client boundary violations, etc.).
#
# Path-filtered to apps/fiab-console/** so it only runs when the console changes.
name: CSA Loom Console Build

# NOTE: this job is a REQUIRED status check. It must therefore run (and report)
# on EVERY pull request, even ones that don't touch the console — otherwise a
# bicep/workflow-only PR deadlocks: the required `next build (node 20)` context
# never reports and the PR can never merge. So we DON'T path-filter at the `on:`
# level; instead the job always starts and an internal change-detection step
# skips the heavy install/build (reporting green) when apps/fiab-console is
# untouched. When the console DOES change, the full real `next build` runs.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: next build (node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/fiab-console
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Detect console changes
        id: changed
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" >/dev/null 2>&1 || true
            range="$base...HEAD"
          else
            range="HEAD~1...HEAD"
          fi
          if git diff --name-only "$range" 2>/dev/null | grep -qE '^apps/fiab-console/|^\.github/workflows/fiab-console-ci\.yml'; then
            echo "console=true" >> "$GITHUB_OUTPUT"
            echo "Console changed — running full next build."
          else
            echo "console=false" >> "$GITHUB_OUTPUT"
            echo "No apps/fiab-console changes — skipping build, reporting this required check green."
          fi

      - name: Use Node.js 20
        if: steps.changed.outputs.console == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Item-route persistence guard
        if: steps.changed.outputs.console == 'true'
        working-directory: apps/fiab-console
        # Fails if any editor's useItemState(<type>) lacks a matching
        # /api/items/<type>/[id]/route.ts (GET+PATCH) — the silent edit-loss
        # class the 2026-06-04 scaffold audit caught. Pure node, no install.
        run: node scripts/check-item-routes.mjs

      - name: No bare server-fetch guard
        if: steps.changed.outputs.console == 'true'
        working-directory: apps/fiab-console
        # Fails if any server module in lib/azure/** or lib/install/** does a bare
        # global fetch( instead of fetchWithTimeout — the "no-timeout" defect class
        # PR #1198 eliminated. Keeps "every server caller inherits the ceiling"
        # true going forward. Pure node, no install.
        run: node scripts/no-bare-server-fetch.mjs

      - name: Install pnpm
        if: steps.changed.outputs.console == 'true'
        run: npm install -g pnpm@9

      - name: Circular-dependency guard (lib/editors)
        if: steps.changed.outputs.console == 'true'
        working-directory: apps/fiab-console
        # rel-T29 / B13: run the `guard:circular` script that was defined in
        # package.json but never wired into CI. Fails if a NEW import cycle
        # appears in lib/editors beyond the documented baseline (the phase3
        # per-editor split + barrel could silently reintroduce one — it already
        # caught the paginated-report-editor ⇄ barrel cycle once). Uses madge via
        # npx; needs no project deps, so it runs before the heavy install/build
        # and fails fast.
        run: pnpm guard:circular

      - name: Install dependencies
        if: steps.changed.outputs.console == 'true'
        # Match the Dockerfile (`pnpm install --no-frozen-lockfile`) so CI builds
        # exactly what deploy builds.
        run: pnpm install --no-frozen-lockfile

      - name: Build (next build)
        if: steps.changed.outputs.console == 'true'
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # 6144 matches the Dockerfile/ACR build heap — 4096 OOMs since the
          # console grew past ~117 editors (FATAL: JS heap out of memory).
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm build

      - name: Lint (next lint)
        if: steps.changed.outputs.console == 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        # next.config sets eslint.ignoreDuringBuilds so `pnpm build` above does
        # NOT lint. This runs the ESLint gate explicitly (rel-T26 / B13): the
        # console's .eslintrc.json extends next/core-web-vitals with a few noisy
        # rules downgraded to warnings, so this FAILS only on genuine lint
        # errors (missing keys, comment-in-JSX, parse errors), not on the ~600
        # existing style warnings.
        run: pnpm lint

  vitest:
    name: vitest (node 20)
    runs-on: ubuntu-latest
    # 25m (was 20m): v8 coverage instrumentation with all:true adds a few minutes
    # over the ~3m bare suite; keep generous headroom on the slower CI box.
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/fiab-console
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Detect console changes
        id: changed
        working-directory: ${{ github.workspace }}
        # Same change-detection as the build job: this job always starts (so it
        # can safely be wired as a required check without deadlocking bicep- or
        # workflow-only PRs) but skips the heavy install/test — reporting green —
        # when apps/fiab-console is untouched.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" >/dev/null 2>&1 || true
            range="$base...HEAD"
          else
            range="HEAD~1...HEAD"
          fi
          if git diff --name-only "$range" 2>/dev/null | grep -qE '^apps/fiab-console/|^\.github/workflows/fiab-console-ci\.yml'; then
            echo "console=true" >> "$GITHUB_OUTPUT"
            echo "Console changed — running vitest."
          else
            echo "console=false" >> "$GITHUB_OUTPUT"
            echo "No apps/fiab-console changes — skipping vitest, reporting this check green."
          fi

      - name: Use Node.js 20
        if: steps.changed.outputs.console == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install pnpm
        if: steps.changed.outputs.console == 'true'
        run: npm install -g pnpm@9

      - name: Install dependencies
        if: steps.changed.outputs.console == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Run vitest (with v8 coverage floor)
        if: steps.changed.outputs.console == 'true'
        env:
          # The console's specs cold-transform a large TS dependency graph; the
          # 6144 heap matches the build job and prevents OOM under parallel forks.
          NODE_OPTIONS: --max-old-space-size=6144
        # --coverage runs the suite ONCE with v8 instrumentation and enforces the
        # ratcheting floor in vitest.config.ts (rel-T28) — the job fails if
        # coverage drops below the floor. This step only runs when the console
        # actually changed (the change-detection above), so bicep-/workflow-only
        # PRs never pay the instrumentation cost.
        run: pnpm vitest run --coverage

  tutorial-coverage:
    # Audits visual-tutorial coverage across ALL THREE dimensions (B-9):
    #   items + features are parsed from source; apps are audited against the
    #   checked-in fixture scripts/csa-loom/fixtures/apps-catalog.json (generated
    #   from CATALOG_META ∩ listBundleIds(), the exact set the live
    #   /api/apps-catalog surfaces). Pure node, no install.
    #
    # The fixture is BLOCKING-verified for freshness (the drift check below) so a
    # new curated app can never silently escape the apps coverage audit.
    #
    # The coverage REPORT itself is non-blocking *until reviewed screenshots are
    # published*: captures are produced by an operator running the
    # csa-loom-tutorial-capture workflow against the live console and reviewing
    # them behind the Azure-imagery privacy gate (publish-tutorials.mjs), so the
    # published set legitimately lags source until that credentialed run lands.
    # The instant the first reviewed captures are committed under
    # docs/fiab/tutorials/items/, make this a hard gate by adding `--strict` to
    # the coverage step below — that single edit permanently enforces
    # "every item/app/feature has a screenshot set".
    name: visual-tutorial coverage (report)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Verify apps-catalog fixture is in sync with source (blocking)
        # FAILS the build if a new app was added to CATALOG_META/index.ts without
        # regenerating the fixture, so the apps dimension stays auditable + honest.
        run: node scripts/csa-loom/gen-apps-catalog-fixture.mjs --check
      - name: Report tutorial coverage (items + features + apps)
        # Non-blocking until reviewed captures land — add `--strict` here to enable
        # the blocking gate in the same change that commits the published captures.
        run: node scripts/csa-loom/check-tutorial-coverage.mjs --apps-catalog scripts/csa-loom/fixtures/apps-catalog.json
