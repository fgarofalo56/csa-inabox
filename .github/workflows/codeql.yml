name: "CodeQL Analysis"

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'portal/**'
  # rel-T27 / B13: also analyze on PRs so security findings surface BEFORE merge,
  # not only after landing on main / on the weekly cron. Path-filtered to source
  # for both analyzed languages (python + javascript-typescript) so doc/bicep-only
  # PRs don't pay the ~build+analyze cost. Not wired as a required check here —
  # the orchestrator owns branch protection.
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.mjs'
      - '**.cjs'
      - 'portal/**'
      - 'apps/**'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '37 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@e46ed2cbd01164d986452f91f178727624ae40d7 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v3
        with:
          category: "/language:${{ matrix.language }}"
