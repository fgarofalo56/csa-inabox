name: deploy-fiab-commercial

# CSA Loom — deploy validation against Azure Commercial.
# Per PRP-11. Uses the existing `limitlessdata_deploy` SP.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'whatif-only validates Bicep + auth (no spend); full provisions + smokes + (conditionally) tears down.'
        type: choice
        default: whatif-only
        options:
          - whatif-only
          - full
      keep_resources:
        description: 'Keep resources up after smoke test (full mode only). USE WITH CAUTION — incurs ongoing spend until manually torn down.'
        type: boolean
        default: false
      allow_existing_hub:
        description: 'topology=tenant only: bypass the "hub already exists in target sub" guard to idempotently reconcile/retry a partially-deployed hub (e.g. after a mid-deploy failure). Does NOT stamp a second Console — the incremental deploy reconciles the existing admin RG. Leave false for first-run installs.'
        type: boolean
        default: false
      purview_enabled:
        description: 'Deploy the shared Purview governance account. Set false when the target region lacks Purview (e.g. centralus) — the Loom catalog falls back to its Azure-native backend (AI Search / Cosmos) per no-fabric-dependency; add Purview cross-region later.'
        type: boolean
        default: true
      azure_maps_enabled:
        description: 'Deploy the Azure Maps account for the Geo editors. Set false when the target region lacks Azure Maps (e.g. centralus) — the Geo editors honest-gate; add Maps cross-region later.'
        type: boolean
        default: true
      firewall_enabled:
        description: 'Deploy the hub Azure Firewall (egress filtering). Set false to skip — nothing else consumes it, and it avoids the FirewallPolicyUpdateFailed re-PUT error on idempotent reconcile passes. Add it back once the rest of the stack is stable.'
        type: boolean
        default: true
      deploy_apps_enabled:
        description: 'Create the Container Apps (loom-console + siblings) pointing at images in ACR. Requires images already built/pushed (run full-app-deploy build first). Off by default = infra-only.'
        type: boolean
        default: false
      skip_role_grants:
        description: 'Skip RBAC role-assignment creation (set true on a re-deploy where grants already exist, to avoid RoleAssignmentExists).'
        type: boolean
        default: false
      front_door_enabled:
        description: 'Deploy Azure Front Door (public entry + custom/vanity domain) in front of the console. Requires deploy_apps_enabled + containerApps. Off by default.'
        type: boolean
        default: false
      # Setup Wizard browser-driven deploy passes these (app/api/setup/deploy → workflow_dispatch).
      topology:
        description: 'Explicit topology (audit-t156). Overrides deployment_mode. tenant = first-run hub install (DMLZ console + shared only). dlz-attach = add ONE DLZ to an existing hub (no Console is stamped). single-sub = dev/demo all-in-one. Empty = derive from deployment_mode. A second Console can never be stamped — the guard rejects topology=tenant when a hub already exists in the target sub.'
        type: choice
        default: tenant
        options:
          - ''
          - single-sub
          - tenant
          - dlz-attach
      target_subscription:
        description: 'dlz-attach: the NEW subscription the DLZ is provisioned into. The deploy identity needs Contributor here.'
        type: string
        required: false
      subscription:
        description: 'Target Azure subscription ID (from the Setup Wizard).'
        type: string
        required: false
      region:
        description: 'Azure region (e.g. eastus2).'
        type: string
        required: false
      deployment_mode:
        description: 'single-sub or multi-sub.'
        type: choice
        default: single-sub
        options:
          - single-sub
          - multi-sub
      dlz_domain_name:
        description: 'Data Landing Zone domain name(s), comma-separated.'
        type: string
        required: false
      capacity_sku:
        description: 'Fabric/OneLake capacity SKU.'
        type: choice
        default: F8
        options: [F2, F4, F8, F32, F64, F128, F512]
      vanity_domain:
        description: 'Optional vanity URL for the console (e.g. csa-loom.contoso.ai). Deploy emits the CNAME + _dnsauth TXT to add at your DNS provider.'
        type: string
        required: false

permissions:
  contents: read
  issues: write

env:
  AZURE_CLOUD: AzureCloud
  AZURE_LOCATION: ${{ inputs.region || 'eastus2' }}
  CSA_LOOM_BOUNDARY: Commercial
  CSA_LOOM_DEPLOYMENT_MODE: ${{ inputs.deployment_mode || 'single-sub' }}
  # audit-t156 — explicit topology; empty falls through to deployment_mode in bicep.
  CSA_LOOM_TOPOLOGY: ${{ inputs.topology || '' }}
  CSA_LOOM_CAPACITY_SKU: ${{ inputs.capacity_sku || 'F8' }}
  # Wizard-provided overrides consumed by the deploy step's -p flags.
  CSA_LOOM_TARGET_SUBSCRIPTION: ${{ inputs.target_subscription }}
  CSA_LOOM_SUBSCRIPTION_OVERRIDE: ${{ inputs.subscription }}
  CSA_LOOM_DLZ_DOMAIN_NAMES: ${{ inputs.dlz_domain_name }}
  CSA_LOOM_VANITY_DOMAIN: ${{ inputs.vanity_domain }}

jobs:
  deploy-validate:
    name: Deploy + validate CSA Loom in Commercial
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (Commercial)
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Setup azd
        uses: Azure/setup-azd@v2

      - name: Setup Bicep
        run: az bicep install

      # audit-t157: enforce the same "second Console is impossible" invariant as
      # the UI/orchestrator at the CI layer. A topology=tenant run that targets a
      # subscription already holding an Admin Plane RG is rejected; a dlz-attach
      # run must target a NEW subscription via target_subscription.
      - name: Topology guard
        id: topology_guard
        run: |
          set -e
          TOPOLOGY="${CSA_LOOM_TOPOLOGY:-tenant}"
          echo "topology=$TOPOLOGY"
          if [ "$TOPOLOGY" = "dlz-attach" ]; then
            if [ -z "$CSA_LOOM_TARGET_SUBSCRIPTION" ]; then
              echo "::error::dlz-attach requires target_subscription (the new DLZ subscription)."; exit 1
            fi
            echo "deploy_sub=$CSA_LOOM_TARGET_SUBSCRIPTION" >> "$GITHUB_OUTPUT"
          else
            # topology=tenant: refuse if an Admin Plane (hub) RG already exists
            # IN THE TARGET SUBSCRIPTION. The guard is scoped to the deploy sub
            # (not tenant-wide) so a deliberate migration to a new hub sub is not
            # blocked by an old hub still running elsewhere as a UAT/staging ring
            # (audit-t156 D3/Q10). The "one Console per tenant" end-state is then
            # reached operationally by tearing the old hub down after cutover.
            # This still prevents the common footgun: re-running a tenant deploy
            # against a sub that already holds a hub (an accidental double-stamp).
            SCOPE_SUB="${CSA_LOOM_SUBSCRIPTION_OVERRIDE}"
            EXISTING=$(az graph query ${SCOPE_SUB:+--subscriptions "$SCOPE_SUB"} -q "ResourceContainers | where type == 'microsoft.resources/subscriptions/resourcegroups' | where name startswith 'rg-csa-loom-admin-' | project name" --query "data | length(@)" -o tsv 2>/dev/null || echo "0")
            if [ "${EXISTING:-0}" != "0" ] && [ "${{ inputs.allow_existing_hub }}" != "true" ]; then
              echo "::error::A CSA Loom hub already exists in the target subscription (found $EXISTING rg-csa-loom-admin-* RG). A second Console cannot be stamped into the same sub — use topology=dlz-attach with target_subscription to add a DLZ, or target a fresh subscription. To idempotently reconcile/retry a partially-deployed hub in this sub, re-run with allow_existing_hub=true."; exit 1
            fi
            if [ "${EXISTING:-0}" != "0" ]; then echo "::warning::Reconciling existing hub in target sub (allow_existing_hub=true) — incremental deploy, no second Console."; fi
            echo "deploy_sub=${CSA_LOOM_SUBSCRIPTION_OVERRIDE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Register resource providers + features (deploy sub)
        run: |
          # Best-effort: register the resource providers + the BYO-public-IP
          # feature the admin-plane/DLZ bicep needs, on the actual deploy sub.
          # A fresh subscription often has these unregistered, which surfaces as
          # SubscriptionNotRegisteredForFeature / preflight RP errors mid-deploy
          # (found on the DMLZ-hub clean rebuild). Never fails the run — the
          # provision step still surfaces anything genuinely missing.
          set +e
          DEPLOY_SUB="${{ steps.topology_guard.outputs.deploy_sub }}"
          [ -n "$DEPLOY_SUB" ] && az account set --subscription "$DEPLOY_SUB"
          echo "Registering providers on sub $(az account show --query id -o tsv)…"
          for ns in Microsoft.Network Microsoft.Web Microsoft.Kusto Microsoft.Databricks \
                    Microsoft.Synapse Microsoft.EventHub Microsoft.DocumentDB \
                    Microsoft.CognitiveServices Microsoft.App Microsoft.Cdn \
                    Microsoft.Storage Microsoft.KeyVault Microsoft.Insights \
                    Microsoft.OperationalInsights Microsoft.Purview \
                    Microsoft.MachineLearningServices Microsoft.ContainerService \
                    Microsoft.Dashboard Microsoft.ManagedIdentity Microsoft.Sql; do
            az provider register --namespace "$ns" >/dev/null 2>&1 &
          done
          wait
          # AllowBringYourOwnPublicIpAddress is a feature flag — register it, wait
          # for Registered, then re-register Microsoft.Network so it takes effect.
          STATE=$(az feature show --namespace Microsoft.Network --name AllowBringYourOwnPublicIpAddress --query properties.state -o tsv 2>/dev/null)
          if [ "$STATE" != "Registered" ]; then
            az feature register --namespace Microsoft.Network --name AllowBringYourOwnPublicIpAddress >/dev/null 2>&1
            for i in $(seq 1 30); do
              STATE=$(az feature show --namespace Microsoft.Network --name AllowBringYourOwnPublicIpAddress --query properties.state -o tsv 2>/dev/null)
              echo "[$i] AllowBringYourOwnPublicIpAddress: $STATE"
              [ "$STATE" = "Registered" ] && break
              sleep 20
            done
            az provider register --namespace Microsoft.Network >/dev/null 2>&1
          fi
          echo "Provider/feature registration complete (best-effort)."
          exit 0

      - name: Bicep what-if (preview)
        id: whatif
        run: |
          az deployment sub what-if \
            --name csa-loom-ci-${{ github.run_id }} \
            --location $AZURE_LOCATION \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/commercial.bicepparam \
            --parameters location="$AZURE_LOCATION" \
            --parameters purviewEnabled=${{ inputs.purview_enabled }} azureMapsEnabled=${{ inputs.azure_maps_enabled }} hubFirewallEnabled=${{ inputs.firewall_enabled }} deployAppsEnabled=${{ inputs.deploy_apps_enabled }} skipRoleGrants=${{ inputs.skip_role_grants }} frontDoorEnabled=${{ inputs.front_door_enabled }} \
            --parameters adminEntraGroupId=${{ secrets.FIAB_ADMIN_GROUP_ID }} \
            --parameters loomVanityDomain="$CSA_LOOM_VANITY_DOMAIN" \
            ${CSA_LOOM_TOPOLOGY:+--parameters topology="$CSA_LOOM_TOPOLOGY"} \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION" attachDomainName="$CSA_LOOM_DLZ_DOMAIN_NAMES"}

      - name: Provision (idempotent)
        id: provision
        if: github.event_name == 'schedule' || inputs.run_mode == 'full'
        run: |
          set -e
          DEPLOY_NAME="csa-loom-ci-${{ github.run_id }}"
          # az deployment sub create — directly provisions Bicep. azd up
          # would also need pre-built container images for the service
          # deploy phase, which we don't have in CI yet (PRP-16 builds
          # them). Infra-only validates the entire Bicep stack end-to-end.
          # dlz-attach targets the NEW subscription (target_subscription).
          DEPLOY_SUB="${{ steps.topology_guard.outputs.deploy_sub }}"
          az deployment sub create \
            --name "$DEPLOY_NAME" \
            --location "$AZURE_LOCATION" \
            ${DEPLOY_SUB:+--subscription "$DEPLOY_SUB"} \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/commercial.bicepparam \
            --parameters location="$AZURE_LOCATION" \
            --parameters purviewEnabled=${{ inputs.purview_enabled }} azureMapsEnabled=${{ inputs.azure_maps_enabled }} hubFirewallEnabled=${{ inputs.firewall_enabled }} deployAppsEnabled=${{ inputs.deploy_apps_enabled }} skipRoleGrants=${{ inputs.skip_role_grants }} frontDoorEnabled=${{ inputs.front_door_enabled }} \
            --parameters adminEntraGroupId=${{ secrets.FIAB_ADMIN_GROUP_ID }} \
            --parameters loomVanityDomain="$CSA_LOOM_VANITY_DOMAIN" \
            ${CSA_LOOM_TOPOLOGY:+--parameters topology="$CSA_LOOM_TOPOLOGY"} \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION" attachDomainName="$CSA_LOOM_DLZ_DOMAIN_NAMES"}
          CONSOLE_URL=$(az deployment sub show --name "$DEPLOY_NAME" --query "properties.outputs.consoleUrl.value" -o tsv 2>/dev/null || echo "")
          echo "console_url=$CONSOLE_URL" >> "$GITHUB_OUTPUT"
          echo "deploy_name=$DEPLOY_NAME" >> "$GITHUB_OUTPUT"
          echo "::notice::Console URL (VNet-internal): $CONSOLE_URL"

      - name: Post-provision validation (from inside cluster)
        id: validate
        if: steps.provision.outcome == 'success'
        continue-on-error: true
        run: bash .github/scripts/fiab-post-provision-validate.sh
        env:
          RG_NAME: rg-csa-loom-admin-${{ env.AZURE_LOCATION }}
          BOUNDARY: ${{ env.CSA_LOOM_BOUNDARY }}

      - name: External smoke test
        id: smoke
        if: steps.provision.outcome == 'success'
        continue-on-error: true   # Console ingress is VNet-internal; external smoke is best-effort
        run: bash .github/scripts/fiab-smoke-test.sh
        env:
          CONSOLE_URL: ${{ steps.provision.outputs.console_url }}

      - name: Teardown (full mode, unless keep_resources)
        id: teardown
        if: |
          always()
          && steps.provision.outcome == 'success'
          && (github.event_name == 'schedule' || (inputs.run_mode == 'full' && !inputs.keep_resources))
        run: bash .github/scripts/fiab-teardown.sh
        env:
          RG_NAME: rg-csa-loom-admin-${{ env.AZURE_LOCATION }}

      - name: Note resources kept (manual teardown required)
        if: steps.provision.outcome == 'success' && inputs.run_mode == 'full' && inputs.keep_resources
        run: |
          echo "::warning::Resources KEPT per workflow input. Tear down manually when done:"
          echo "::warning::  RG_NAME=rg-csa-loom-admin-${AZURE_LOCATION} bash .github/scripts/fiab-teardown.sh"
          echo "::warning::Daily spend estimate at F8 capacity SKU: \$200-500."

      - name: Note dry-run completion
        if: success() && inputs.run_mode == 'whatif-only'
        run: |
          echo "✅ whatif-only complete. Bicep + auth validated; no spend."

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 279,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ deploy-fiab-commercial failed in run ${context.runId}. Check workflow logs.`
            })
