name: deploy-fiab-commercial

# CSA Loom — deploy validation against Azure Commercial.
# Per PRP-11. Uses the existing `limitlessdata_deploy` SP.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'whatif-only validates Bicep + auth (no spend); full provisions + smokes + (conditionally) tears down.'
        type: choice
        default: whatif-only
        options:
          - whatif-only
          - full
      keep_resources:
        description: 'Keep resources up after smoke test (full mode only). USE WITH CAUTION — incurs ongoing spend until manually torn down.'
        type: boolean
        default: false
      allow_existing_hub:
        description: 'topology=tenant only: bypass the "hub already exists in target sub" guard to idempotently reconcile/retry a partially-deployed hub (e.g. after a mid-deploy failure). Does NOT stamp a second Console — the incremental deploy reconciles the existing admin RG. Leave false for first-run installs.'
        type: boolean
        default: false
      purview_enabled:
        description: 'Deploy the shared Purview governance account. Set false when the target region lacks Purview (e.g. centralus) — the Loom catalog falls back to its Azure-native backend (AI Search / Cosmos) per no-fabric-dependency; add Purview cross-region later.'
        type: boolean
        default: true
      azure_maps_enabled:
        description: 'Deploy the Azure Maps account for the Geo editors. Set false when the target region lacks Azure Maps (e.g. centralus) — the Geo editors honest-gate; add Maps cross-region later.'
        type: boolean
        default: true
      firewall_enabled:
        description: 'Deploy the hub Azure Firewall (egress filtering). Set false to skip — nothing else consumes it, and it avoids the FirewallPolicyUpdateFailed re-PUT error on idempotent reconcile passes. Add it back once the rest of the stack is stable.'
        type: boolean
        default: true
      deploy_apps_enabled:
        description: 'Create the Container Apps (loom-console + siblings) pointing at images in ACR. Requires images already built/pushed (run full-app-deploy build first). Off by default = infra-only.'
        type: boolean
        default: false
      skip_role_grants:
        description: 'Skip RBAC role-assignment creation (set true on a re-deploy where grants already exist, to avoid RoleAssignmentExists).'
        type: boolean
        default: false
      front_door_enabled:
        description: 'Deploy Azure Front Door (public entry + custom/vanity domain) in front of the console. Requires deploy_apps_enabled + containerApps. Off by default.'
        type: boolean
        default: false
      # Setup Wizard browser-driven deploy passes these (app/api/setup/deploy → workflow_dispatch).
      topology:
        description: 'Explicit topology (audit-t156). Overrides deployment_mode. tenant = first-run hub install (DMLZ console + shared only). dlz-attach = add ONE DLZ to an existing hub (no Console is stamped). single-sub = dev/demo all-in-one. Empty = derive from deployment_mode. A second Console can never be stamped — the guard rejects topology=tenant when a hub already exists in the target sub.'
        type: choice
        default: tenant
        options:
          - ''
          - single-sub
          - tenant
          - dlz-attach
      target_subscription:
        description: 'dlz-attach: the NEW subscription the DLZ is provisioned into. The deploy identity needs Contributor here.'
        type: string
        required: false
      subscription:
        description: 'Target Azure subscription ID (from the Setup Wizard).'
        type: string
        required: false
      region:
        description: 'Azure region (e.g. eastus2).'
        type: string
        required: false
      tenant_admin_oid:
        description: 'Bootstrap tenant admin — your Entra USER object id (az ad signed-in-user show --query id). Members bypass the feature-permission gate so the first human admin can open /admin/*. Empty → the deploying principal becomes the bootstrap admin (deployer().objectId), or set the FIAB_ADMIN_GROUP_ID secret for a group.'
        type: string
        required: false
      deployment_mode:
        description: 'single-sub or multi-sub.'
        type: choice
        default: single-sub
        options:
          - single-sub
          - multi-sub
      dlz_domain_name:
        description: 'Data Landing Zone domain name(s), comma-separated.'
        type: string
        required: false
      capacity_sku:
        description: 'Fabric/OneLake capacity SKU.'
        type: choice
        default: F8
        options: [F2, F4, F8, F32, F64, F128, F512]
      vanity_domain:
        description: 'Optional vanity URL for the console (e.g. csa-loom.contoso.ai). Deploy emits the CNAME + _dnsauth TXT to add at your DNS provider.'
        type: string
        required: false

permissions:
  contents: read
  issues: write

env:
  AZURE_CLOUD: AzureCloud
  AZURE_LOCATION: ${{ inputs.region || 'eastus2' }}
  CSA_LOOM_BOUNDARY: Commercial
  CSA_LOOM_DEPLOYMENT_MODE: ${{ inputs.deployment_mode || 'single-sub' }}
  # audit-t156 — explicit topology; empty falls through to deployment_mode in bicep.
  CSA_LOOM_TOPOLOGY: ${{ inputs.topology || '' }}
  CSA_LOOM_CAPACITY_SKU: ${{ inputs.capacity_sku || 'F8' }}
  # Wizard-provided overrides consumed by the deploy step's -p flags.
  CSA_LOOM_TARGET_SUBSCRIPTION: ${{ inputs.target_subscription }}
  CSA_LOOM_SUBSCRIPTION_OVERRIDE: ${{ inputs.subscription }}
  CSA_LOOM_DLZ_DOMAIN_NAMES: ${{ inputs.dlz_domain_name }}
  CSA_LOOM_VANITY_DOMAIN: ${{ inputs.vanity_domain }}

jobs:
  deploy-validate:
    name: Deploy + validate CSA Loom in Commercial
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Coordinates exported for the chained post-deploy bootstrap (rel-T34).
    outputs:
      admin_sub: ${{ steps.bootstrap_coords.outputs.admin_sub }}
      dlz_sub: ${{ steps.bootstrap_coords.outputs.dlz_sub }}
      region: ${{ steps.bootstrap_coords.outputs.region }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (Commercial)
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Setup azd
        uses: Azure/setup-azd@v2

      - name: Setup Bicep
        run: az bicep install

      # audit-t157: enforce the same "second Console is impossible" invariant as
      # the UI/orchestrator at the CI layer. A topology=tenant run that targets a
      # subscription already holding an Admin Plane RG is rejected; a dlz-attach
      # run must target a NEW subscription via target_subscription.
      - name: Topology guard
        id: topology_guard
        run: |
          set -e
          TOPOLOGY="${CSA_LOOM_TOPOLOGY:-tenant}"
          echo "topology=$TOPOLOGY"
          if [ "$TOPOLOGY" = "dlz-attach" ]; then
            if [ -z "$CSA_LOOM_TARGET_SUBSCRIPTION" ]; then
              echo "::error::dlz-attach requires target_subscription (the new DLZ subscription)."; exit 1
            fi
            echo "deploy_sub=$CSA_LOOM_TARGET_SUBSCRIPTION" >> "$GITHUB_OUTPUT"
          else
            # topology=tenant: refuse if an Admin Plane (hub) RG already exists
            # IN THE TARGET SUBSCRIPTION. The guard is scoped to the deploy sub
            # (not tenant-wide) so a deliberate migration to a new hub sub is not
            # blocked by an old hub still running elsewhere as a UAT/staging ring
            # (audit-t156 D3/Q10). The "one Console per tenant" end-state is then
            # reached operationally by tearing the old hub down after cutover.
            # This still prevents the common footgun: re-running a tenant deploy
            # against a sub that already holds a hub (an accidental double-stamp).
            SCOPE_SUB="${CSA_LOOM_SUBSCRIPTION_OVERRIDE}"
            EXISTING=$(az graph query ${SCOPE_SUB:+--subscriptions "$SCOPE_SUB"} -q "ResourceContainers | where type == 'microsoft.resources/subscriptions/resourcegroups' | where name startswith 'rg-csa-loom-admin-' | project name" --query "data | length(@)" -o tsv 2>/dev/null || echo "0")
            if [ "${EXISTING:-0}" != "0" ] && [ "${{ inputs.allow_existing_hub }}" != "true" ]; then
              echo "::error::A CSA Loom hub already exists in the target subscription (found $EXISTING rg-csa-loom-admin-* RG). A second Console cannot be stamped into the same sub — use topology=dlz-attach with target_subscription to add a DLZ, or target a fresh subscription. To idempotently reconcile/retry a partially-deployed hub in this sub, re-run with allow_existing_hub=true."; exit 1
            fi
            if [ "${EXISTING:-0}" != "0" ]; then echo "::warning::Reconciling existing hub in target sub (allow_existing_hub=true) — incremental deploy, no second Console."; fi
            echo "deploy_sub=${CSA_LOOM_SUBSCRIPTION_OVERRIDE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Register resource providers + features (deploy sub)
        run: |
          # Best-effort: register the resource providers + the BYO-public-IP
          # feature the admin-plane/DLZ bicep needs, on the actual deploy sub.
          # A fresh subscription often has these unregistered, which surfaces as
          # SubscriptionNotRegisteredForFeature / preflight RP errors mid-deploy
          # (found on the DMLZ-hub clean rebuild). Never fails the run — the
          # provision step still surfaces anything genuinely missing.
          set +e
          DEPLOY_SUB="${{ steps.topology_guard.outputs.deploy_sub }}"
          [ -n "$DEPLOY_SUB" ] && az account set --subscription "$DEPLOY_SUB"
          echo "Registering providers on sub $(az account show --query id -o tsv)…"
          for ns in Microsoft.Network Microsoft.Web Microsoft.Kusto Microsoft.Databricks \
                    Microsoft.Synapse Microsoft.EventHub Microsoft.DocumentDB \
                    Microsoft.CognitiveServices Microsoft.App Microsoft.Cdn \
                    Microsoft.Storage Microsoft.KeyVault Microsoft.Insights \
                    Microsoft.OperationalInsights Microsoft.Purview \
                    Microsoft.MachineLearningServices Microsoft.ContainerService \
                    Microsoft.Dashboard Microsoft.ManagedIdentity Microsoft.Sql; do
            az provider register --namespace "$ns" >/dev/null 2>&1 &
          done
          wait
          # AllowBringYourOwnPublicIpAddress is a feature flag — register it, wait
          # for Registered, then re-register Microsoft.Network so it takes effect.
          STATE=$(az feature show --namespace Microsoft.Network --name AllowBringYourOwnPublicIpAddress --query properties.state -o tsv 2>/dev/null)
          if [ "$STATE" != "Registered" ]; then
            az feature register --namespace Microsoft.Network --name AllowBringYourOwnPublicIpAddress >/dev/null 2>&1
            for i in $(seq 1 30); do
              STATE=$(az feature show --namespace Microsoft.Network --name AllowBringYourOwnPublicIpAddress --query properties.state -o tsv 2>/dev/null)
              echo "[$i] AllowBringYourOwnPublicIpAddress: $STATE"
              [ "$STATE" = "Registered" ] && break
              sleep 20
            done
            az provider register --namespace Microsoft.Network >/dev/null 2>&1
          fi
          echo "Provider/feature registration complete (best-effort)."
          exit 0

      # GAP 1 FIX — dlz-attach hub coordinates (cross-sub).
      # A dlz-attach deployment is submitted AT the DLZ (target) subscription scope,
      # but the existing hub (admin plane: Console UAMI, hub VNet) lives in a
      # DIFFERENT subscription — `inputs.subscription`, the hub sub. main.bicep needs
      # these hub coordinates to (a) make the reverse hub→DLZ VNet peering land in the
      # hub VNet/sub (dlzAttachHubPeering, scope=resourceGroup(hubAdminSubscriptionId,
      # adminPlaneRgName)), (b) update the hub Console's DLZ env (dlzAttachHubConsoleEnv,
      # same scope, run as the hub Console UAMI), and (c) grant the hub Console UAMI
      # data-plane RBAC on the new DLZ resources. Without them, hubAdminSubscriptionId
      # falls back to the DEPLOYMENT (DLZ) sub and effHubVnetId/effHubConsoleUamiId are
      # empty → cross-sub peering + console-env wiring silently target the wrong sub.
      # We discover them live from the hub admin RG (rg-csa-loom-admin-<hub-region>) in
      # the HUB sub. The hub region == AZURE_LOCATION (the consistent region for the
      # whole tenant); the dlz-attach deploys into target_subscription at that region.
      # Prefer the hub deploy's topologyManifest output when a recent successful hub
      # deployment is found; otherwise query the resources directly.
      - name: Discover dlz-attach hub coordinates (hub sub)
        id: hubcoords
        if: env.CSA_LOOM_TOPOLOGY == 'dlz-attach'
        run: |
          set -uo pipefail
          HUB_SUB="${CSA_LOOM_SUBSCRIPTION_OVERRIDE}"
          if [ -z "$HUB_SUB" ]; then
            echo "::error::dlz-attach requires 'subscription' (the existing HUB/admin-plane subscription id) so the cross-sub hub peering + console env land in the right sub."; exit 1
          fi
          HUB_RG="rg-csa-loom-admin-${AZURE_LOCATION}"
          echo "Hub sub=$HUB_SUB  hub admin RG=$HUB_RG  region=$AZURE_LOCATION"
          az account set --subscription "$HUB_SUB"

          HUB_VNET_ID=""; HUB_UAMI_PRINCIPAL=""; HUB_UAMI_CLIENT=""; HUB_UAMI_ID=""; HUB_UAMI_NAME=""
          # (1) Prefer the most-recent SUCCEEDED hub deployment's topologyManifest.hub.
          MANIFEST=""
          DEP_NAME=$(az deployment sub list --subscription "$HUB_SUB" \
            --query "sort_by([?properties.provisioningState=='Succeeded' && properties.outputs.topologyManifest != null], &properties.timestamp)[-1].name" \
            -o tsv 2>/dev/null || true)
          if [ -n "${DEP_NAME:-}" ] && [ "$DEP_NAME" != "None" ]; then
            MANIFEST=$(az deployment sub show --subscription "$HUB_SUB" --name "$DEP_NAME" \
              --query "properties.outputs.topologyManifest.value.hub" -o json 2>/dev/null || true)
          fi
          if [ -n "${MANIFEST:-}" ] && [ "$MANIFEST" != "null" ]; then
            echo "Found hub topologyManifest from deployment '$DEP_NAME'."
            HUB_VNET_ID=$(echo "$MANIFEST" | python3 -c "import sys,json;print(json.load(sys.stdin).get('hubVnetId',''))" 2>/dev/null || true)
            HUB_UAMI_PRINCIPAL=$(echo "$MANIFEST" | python3 -c "import sys,json;print(json.load(sys.stdin).get('consolePrincipalId',''))" 2>/dev/null || true)
            HUB_UAMI_CLIENT=$(echo "$MANIFEST" | python3 -c "import sys,json;print(json.load(sys.stdin).get('consoleUamiAppId',''))" 2>/dev/null || true)
            HUB_UAMI_ID=$(echo "$MANIFEST" | python3 -c "import sys,json;print(json.load(sys.stdin).get('consoleUamiResourceId',''))" 2>/dev/null || true)
            HUB_UAMI_NAME=$(echo "$MANIFEST" | python3 -c "import sys,json;print(json.load(sys.stdin).get('consoleUamiName',''))" 2>/dev/null || true)
          fi
          # (2) Live-query fallback for anything the manifest didn't supply.
          if [ -z "${HUB_VNET_ID:-}" ] || [ "$HUB_VNET_ID" = "null" ]; then
            HUB_VNET_ID=$(az network vnet show -g "$HUB_RG" -n "vnet-csa-loom-hub-${AZURE_LOCATION}" --query id -o tsv 2>/dev/null || true)
            [ -z "$HUB_VNET_ID" ] && HUB_VNET_ID=$(az network vnet list -g "$HUB_RG" --query "[?contains(name,'hub')].id | [0]" -o tsv 2>/dev/null || true)
          fi
          if [ -z "${HUB_UAMI_ID:-}" ] || [ "$HUB_UAMI_ID" = "null" ]; then
            UAMI_NAME=$(az identity list -g "$HUB_RG" --query "[?contains(name,'console')].name | [0]" -o tsv 2>/dev/null || true)
            [ -z "$UAMI_NAME" ] && UAMI_NAME="uami-loom-console-${AZURE_LOCATION}"
            UAMI_JSON=$(az identity show -n "$UAMI_NAME" -g "$HUB_RG" -o json 2>/dev/null || true)
            if [ -n "${UAMI_JSON:-}" ]; then
              HUB_UAMI_NAME="$UAMI_NAME"
              HUB_UAMI_PRINCIPAL=$(echo "$UAMI_JSON" | python3 -c "import sys,json;print(json.load(sys.stdin).get('principalId',''))" 2>/dev/null || true)
              HUB_UAMI_CLIENT=$(echo "$UAMI_JSON" | python3 -c "import sys,json;print(json.load(sys.stdin).get('clientId',''))" 2>/dev/null || true)
              HUB_UAMI_ID=$(echo "$UAMI_JSON" | python3 -c "import sys,json;print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)
            fi
          fi
          if [ -z "${HUB_VNET_ID:-}" ] || [ -z "${HUB_UAMI_ID:-}" ]; then
            echo "::error::Could not discover hub coordinates in $HUB_SUB / $HUB_RG (hubVnetId='${HUB_VNET_ID:-}', consoleUamiId='${HUB_UAMI_ID:-}'). Confirm the hub (topology=tenant) is deployed in 'subscription' at region '$AZURE_LOCATION'."; exit 1
          fi
          echo "hub_admin_sub=$HUB_SUB"          >> "$GITHUB_OUTPUT"
          echo "hub_vnet_id=$HUB_VNET_ID"        >> "$GITHUB_OUTPUT"
          echo "hub_uami_principal=$HUB_UAMI_PRINCIPAL" >> "$GITHUB_OUTPUT"
          echo "hub_uami_client=$HUB_UAMI_CLIENT"       >> "$GITHUB_OUTPUT"
          echo "hub_uami_id=$HUB_UAMI_ID"        >> "$GITHUB_OUTPUT"
          echo "hub_uami_name=$HUB_UAMI_NAME"    >> "$GITHUB_OUTPUT"
          echo "::notice::Hub coords — sub=$HUB_SUB vnet=$HUB_VNET_ID uami=$HUB_UAMI_NAME ($HUB_UAMI_PRINCIPAL)"

      - name: Bicep what-if (preview)
        id: whatif
        run: |
          # Assemble the dlz-attach hub-coordinate params only when topology=dlz-attach.
          HUB_PARAMS=""
          if [ "$CSA_LOOM_TOPOLOGY" = "dlz-attach" ]; then
            HUB_PARAMS="hubAdminSubscriptionId=${{ steps.hubcoords.outputs.hub_admin_sub }} hubVnetId=${{ steps.hubcoords.outputs.hub_vnet_id }} hubConsolePrincipalId=${{ steps.hubcoords.outputs.hub_uami_principal }} hubConsoleUamiName=${{ steps.hubcoords.outputs.hub_uami_name }} hubConsoleUamiAppId=${{ steps.hubcoords.outputs.hub_uami_client }} hubConsoleUamiId=${{ steps.hubcoords.outputs.hub_uami_id }}"
          fi
          az deployment sub what-if \
            --name csa-loom-ci-${{ github.run_id }} \
            --location $AZURE_LOCATION \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--subscription "$CSA_LOOM_TARGET_SUBSCRIPTION"} \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/commercial.bicepparam \
            --parameters location="$AZURE_LOCATION" \
            --parameters purviewEnabled=${{ inputs.purview_enabled }} azureMapsEnabled=${{ inputs.azure_maps_enabled }} hubFirewallEnabled=${{ inputs.firewall_enabled }} deployAppsEnabled=${{ inputs.deploy_apps_enabled }} skipRoleGrants=${{ inputs.skip_role_grants }} frontDoorEnabled=${{ inputs.front_door_enabled }} \
            --parameters adminEntraGroupId=${{ secrets.FIAB_ADMIN_GROUP_ID }} \
            ${{ inputs.tenant_admin_oid && format('--parameters loomTenantAdminOid={0}', inputs.tenant_admin_oid) || '' }} \
            --parameters loomVanityDomain="$CSA_LOOM_VANITY_DOMAIN" \
            ${CSA_LOOM_TOPOLOGY:+--parameters topology="$CSA_LOOM_TOPOLOGY"} \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION" attachDomainName="$CSA_LOOM_DLZ_DOMAIN_NAMES"} \
            ${HUB_PARAMS:+--parameters $HUB_PARAMS}

      - name: Provision (idempotent)
        id: provision
        if: github.event_name == 'schedule' || inputs.run_mode == 'full'
        run: |
          set -e
          DEPLOY_NAME="csa-loom-ci-${{ github.run_id }}"
          # az deployment sub create — directly provisions Bicep. azd up
          # would also need pre-built container images for the service
          # deploy phase, which we don't have in CI yet (PRP-16 builds
          # them). Infra-only validates the entire Bicep stack end-to-end.
          # dlz-attach targets the NEW subscription (target_subscription).
          DEPLOY_SUB="${{ steps.topology_guard.outputs.deploy_sub }}"
          # dlz-attach: pass the cross-sub hub coordinates discovered above so the
          # hub-side peering + hub-console-env modules (and DLZ RBAC) target the HUB
          # sub, not the deployment (DLZ) sub.
          HUB_PARAMS=""
          if [ "$CSA_LOOM_TOPOLOGY" = "dlz-attach" ]; then
            HUB_PARAMS="hubAdminSubscriptionId=${{ steps.hubcoords.outputs.hub_admin_sub }} hubVnetId=${{ steps.hubcoords.outputs.hub_vnet_id }} hubConsolePrincipalId=${{ steps.hubcoords.outputs.hub_uami_principal }} hubConsoleUamiName=${{ steps.hubcoords.outputs.hub_uami_name }} hubConsoleUamiAppId=${{ steps.hubcoords.outputs.hub_uami_client }} hubConsoleUamiId=${{ steps.hubcoords.outputs.hub_uami_id }}"
          fi
          az deployment sub create \
            --name "$DEPLOY_NAME" \
            --location "$AZURE_LOCATION" \
            ${DEPLOY_SUB:+--subscription "$DEPLOY_SUB"} \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/commercial.bicepparam \
            --parameters location="$AZURE_LOCATION" \
            --parameters purviewEnabled=${{ inputs.purview_enabled }} azureMapsEnabled=${{ inputs.azure_maps_enabled }} hubFirewallEnabled=${{ inputs.firewall_enabled }} deployAppsEnabled=${{ inputs.deploy_apps_enabled }} skipRoleGrants=${{ inputs.skip_role_grants }} frontDoorEnabled=${{ inputs.front_door_enabled }} \
            --parameters adminEntraGroupId=${{ secrets.FIAB_ADMIN_GROUP_ID }} \
            ${{ inputs.tenant_admin_oid && format('--parameters loomTenantAdminOid={0}', inputs.tenant_admin_oid) || '' }} \
            --parameters loomVanityDomain="$CSA_LOOM_VANITY_DOMAIN" \
            ${CSA_LOOM_TOPOLOGY:+--parameters topology="$CSA_LOOM_TOPOLOGY"} \
            ${CSA_LOOM_TARGET_SUBSCRIPTION:+--parameters targetSubscriptionId="$CSA_LOOM_TARGET_SUBSCRIPTION" attachDomainName="$CSA_LOOM_DLZ_DOMAIN_NAMES"} \
            ${HUB_PARAMS:+--parameters $HUB_PARAMS}
          CONSOLE_URL=$(az deployment sub show --name "$DEPLOY_NAME" --query "properties.outputs.consoleUrl.value" -o tsv 2>/dev/null || echo "")
          echo "console_url=$CONSOLE_URL" >> "$GITHUB_OUTPUT"
          echo "deploy_name=$DEPLOY_NAME" >> "$GITHUB_OUTPUT"
          echo "::notice::Console URL (VNet-internal): $CONSOLE_URL"

      - name: Export bootstrap coordinates (for the chained bootstrap)
        id: bootstrap_coords
        if: steps.provision.outcome == 'success'
        run: |
          # The active login sub == the admin (hub) sub for the app-bearing
          # tenant/single-sub path the chained bootstrap targets (dlz-attach does
          # not stamp a console, so it never chains). Real sub id (not a secret
          # literal), so it flows safely into the reusable workflow's `with:`.
          ADMIN_SUB=$(az account show --query id -o tsv)
          echo "admin_sub=$ADMIN_SUB" >> "$GITHUB_OUTPUT"
          echo "dlz_sub=${CSA_LOOM_TARGET_SUBSCRIPTION:-$ADMIN_SUB}" >> "$GITHUB_OUTPUT"
          echo "region=$AZURE_LOCATION" >> "$GITHUB_OUTPUT"

      - name: Post-provision validation (from inside cluster)
        id: validate
        if: steps.provision.outcome == 'success'
        # rel-T29 / B13: NO continue-on-error. This in-cluster probe is now the
        # REAL deploy gate — it retries loom-console /api/health from inside the
        # VNet and exits non-zero if the console never serves, failing the deploy.
        # (It replaces the old external-curl smoke that could never reach the
        # VNet-internal ingress and so was pinned continue-on-error = a no-op.)
        run: bash .github/scripts/fiab-post-provision-validate.sh
        env:
          RG_NAME: rg-csa-loom-admin-${{ env.AZURE_LOCATION }}
          BOUNDARY: ${{ env.CSA_LOOM_BOUNDARY }}

      - name: External smoke test (best-effort)
        id: smoke
        # Best-effort ONLY: this from-scratch estate's console ingress is
        # VNet-internal, so an external runner genuinely cannot reach it. The
        # authoritative gate is the in-cluster validation above; this stays
        # continue-on-error and just records whatever it can see from outside.
        if: always() && steps.provision.outcome == 'success'
        continue-on-error: true
        run: bash .github/scripts/fiab-smoke-test.sh
        env:
          CONSOLE_URL: ${{ steps.provision.outputs.console_url }}

      - name: Teardown (full mode, unless keep_resources)
        id: teardown
        if: |
          always()
          && steps.provision.outcome == 'success'
          && (github.event_name == 'schedule' || (inputs.run_mode == 'full' && !inputs.keep_resources))
        run: bash .github/scripts/fiab-teardown.sh
        env:
          RG_NAME: rg-csa-loom-admin-${{ env.AZURE_LOCATION }}

      - name: Note resources kept (manual teardown required)
        if: steps.provision.outcome == 'success' && inputs.run_mode == 'full' && inputs.keep_resources
        run: |
          echo "::warning::Resources KEPT per workflow input. Tear down manually when done:"
          echo "::warning::  RG_NAME=rg-csa-loom-admin-${AZURE_LOCATION} bash .github/scripts/fiab-teardown.sh"
          echo "::warning::Daily spend estimate at F8 capacity SKU: \$200-500."

      - name: Note dry-run completion
        if: success() && inputs.run_mode == 'whatif-only'
        run: |
          echo "✅ whatif-only complete. Bicep + auth validated; no spend."

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 279,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ deploy-fiab-commercial failed in run ${context.runId}. Check workflow logs.`
            })

  # rel-T32/T34: auto-chain the post-deploy bootstrap after a REAL, app-bearing,
  # KEPT deploy. Runs the ONE reusable bootstrap (secrets: inherit) with computed
  # coordinates + boundary=Commercial. Guard rationale:
  #   - run_mode == full         → not a whatif-only preview (nothing to bootstrap)
  #   - deploy_apps_enabled      → a Console Container App actually exists to wire
  #   - keep_resources           → the deploy did NOT tear down (teardown skips on
  #                                keep_resources), so the console is still live
  # dlz-attach never stamps a console, so it never satisfies deploy_apps_enabled
  # here — those operators run csa-loom-post-deploy-bootstrap.yml manually with
  # explicit admin/dlz subs.
  post-deploy-bootstrap:
    name: Post-deploy bootstrap (Commercial)
    needs: deploy-validate
    if: ${{ inputs.run_mode == 'full' && inputs.deploy_apps_enabled && inputs.keep_resources && needs.deploy-validate.result == 'success' }}
    uses: ./.github/workflows/csa-loom-post-deploy-bootstrap.yml
    secrets: inherit
    with:
      boundary: Commercial
      region: ${{ needs.deploy-validate.outputs.region }}
      admin_subscription: ${{ needs.deploy-validate.outputs.admin_sub }}
      dlz_subscription: ${{ needs.deploy-validate.outputs.dlz_sub }}
