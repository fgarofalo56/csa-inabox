name: deploy-fiab-commercial

# CSA Loom — deploy validation against Azure Commercial.
# Per PRP-11. Uses the existing `limitlessdata_deploy` SP.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'whatif-only validates Bicep + auth (no spend); full provisions + smokes + (conditionally) tears down.'
        type: choice
        default: whatif-only
        options:
          - whatif-only
          - full
      keep_resources:
        description: 'Keep resources up after smoke test (full mode only). USE WITH CAUTION — incurs ongoing spend until manually torn down.'
        type: boolean
        default: false
      # Setup Wizard browser-driven deploy passes these (app/api/setup/deploy → workflow_dispatch).
      subscription:
        description: 'Target Azure subscription ID (from the Setup Wizard).'
        type: string
        required: false
      region:
        description: 'Azure region (e.g. eastus2).'
        type: string
        required: false
      deployment_mode:
        description: 'single-sub or multi-sub.'
        type: choice
        default: single-sub
        options:
          - single-sub
          - multi-sub
      topology:
        description: 'Explicit topology (audit-t156). Overrides deployment_mode. single-sub=dev/demo; tenant=DMLZ console+shared only; dlz-attach=landing zone only (no second console). Empty=derive from deployment_mode.'
        type: choice
        default: ''
        options:
          - ''
          - single-sub
          - tenant
          - dlz-attach
      dlz_domain_name:
        description: 'Data Landing Zone domain name(s), comma-separated.'
        type: string
        required: false
      capacity_sku:
        description: 'Fabric/OneLake capacity SKU.'
        type: choice
        default: F8
        options: [F2, F4, F8, F32, F64, F128, F512]
      vanity_domain:
        description: 'Optional vanity URL for the console (e.g. csa-loom.contoso.ai). Deploy emits the CNAME + _dnsauth TXT to add at your DNS provider.'
        type: string
        required: false

permissions:
  contents: read
  issues: write

env:
  AZURE_CLOUD: AzureCloud
  AZURE_LOCATION: ${{ inputs.region || 'eastus2' }}
  CSA_LOOM_BOUNDARY: Commercial
  CSA_LOOM_DEPLOYMENT_MODE: ${{ inputs.deployment_mode || 'single-sub' }}
  # audit-t156 — explicit topology; empty falls through to deployment_mode in bicep.
  CSA_LOOM_TOPOLOGY: ${{ inputs.topology || '' }}
  CSA_LOOM_CAPACITY_SKU: ${{ inputs.capacity_sku || 'F8' }}
  # Wizard-provided overrides consumed by the deploy step's -p flags.
  CSA_LOOM_SUBSCRIPTION_OVERRIDE: ${{ inputs.subscription }}
  CSA_LOOM_DLZ_DOMAIN_NAMES: ${{ inputs.dlz_domain_name }}
  CSA_LOOM_VANITY_DOMAIN: ${{ inputs.vanity_domain }}

jobs:
  deploy-validate:
    name: Deploy + validate CSA Loom in Commercial
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (Commercial)
        uses: Azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Setup azd
        uses: Azure/setup-azd@v2

      - name: Setup Bicep
        run: az bicep install

      - name: Bicep what-if (preview)
        id: whatif
        run: |
          az deployment sub what-if \
            --name csa-loom-ci-${{ github.run_id }} \
            --location $AZURE_LOCATION \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/commercial.bicepparam \
            --parameters adminEntraGroupId=${{ secrets.FIAB_ADMIN_GROUP_ID }} \
            --parameters loomVanityDomain="$CSA_LOOM_VANITY_DOMAIN" \
            ${CSA_LOOM_TOPOLOGY:+--parameters topology="$CSA_LOOM_TOPOLOGY"}

      - name: Provision (idempotent)
        id: provision
        if: github.event_name == 'schedule' || inputs.run_mode == 'full'
        run: |
          set -e
          DEPLOY_NAME="csa-loom-ci-${{ github.run_id }}"
          # az deployment sub create — directly provisions Bicep. azd up
          # would also need pre-built container images for the service
          # deploy phase, which we don't have in CI yet (PRP-16 builds
          # them). Infra-only validates the entire Bicep stack end-to-end.
          az deployment sub create \
            --name "$DEPLOY_NAME" \
            --location "$AZURE_LOCATION" \
            --template-file platform/fiab/bicep/main.bicep \
            --parameters platform/fiab/bicep/params/commercial.bicepparam \
            --parameters adminEntraGroupId=${{ secrets.FIAB_ADMIN_GROUP_ID }} \
            --parameters loomVanityDomain="$CSA_LOOM_VANITY_DOMAIN" \
            ${CSA_LOOM_TOPOLOGY:+--parameters topology="$CSA_LOOM_TOPOLOGY"}
          CONSOLE_URL=$(az deployment sub show --name "$DEPLOY_NAME" --query "properties.outputs.consoleUrl.value" -o tsv 2>/dev/null || echo "")
          echo "console_url=$CONSOLE_URL" >> "$GITHUB_OUTPUT"
          echo "deploy_name=$DEPLOY_NAME" >> "$GITHUB_OUTPUT"
          echo "::notice::Console URL (VNet-internal): $CONSOLE_URL"

      - name: Post-provision validation (from inside cluster)
        id: validate
        if: steps.provision.outcome == 'success'
        continue-on-error: true
        run: bash .github/scripts/fiab-post-provision-validate.sh
        env:
          RG_NAME: rg-csa-loom-admin-${{ env.AZURE_LOCATION }}
          BOUNDARY: ${{ env.CSA_LOOM_BOUNDARY }}

      - name: External smoke test
        id: smoke
        if: steps.provision.outcome == 'success'
        continue-on-error: true   # Console ingress is VNet-internal; external smoke is best-effort
        run: bash .github/scripts/fiab-smoke-test.sh
        env:
          CONSOLE_URL: ${{ steps.provision.outputs.console_url }}

      - name: Teardown (full mode, unless keep_resources)
        id: teardown
        if: |
          always()
          && steps.provision.outcome == 'success'
          && (github.event_name == 'schedule' || (inputs.run_mode == 'full' && !inputs.keep_resources))
        run: bash .github/scripts/fiab-teardown.sh
        env:
          RG_NAME: rg-csa-loom-admin-${{ env.AZURE_LOCATION }}

      - name: Note resources kept (manual teardown required)
        if: steps.provision.outcome == 'success' && inputs.run_mode == 'full' && inputs.keep_resources
        run: |
          echo "::warning::Resources KEPT per workflow input. Tear down manually when done:"
          echo "::warning::  RG_NAME=rg-csa-loom-admin-${AZURE_LOCATION} bash .github/scripts/fiab-teardown.sh"
          echo "::warning::Daily spend estimate at F8 capacity SKU: \$200-500."

      - name: Note dry-run completion
        if: success() && inputs.run_mode == 'whatif-only'
        run: |
          echo "✅ whatif-only complete. Bicep + auth validated; no spend."

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 279,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ deploy-fiab-commercial failed in run ${context.runId}. Check workflow logs.`
            })
