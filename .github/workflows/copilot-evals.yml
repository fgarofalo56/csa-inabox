name: Copilot Evals

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/copilot/**'
      - 'csa_platform/ai_integration/rag/**'
      - 'pyproject.toml'
      - '.github/workflows/copilot-evals.yml'
  push:
    branches: [main]
    paths:
      - 'apps/copilot/**'
      - 'csa_platform/ai_integration/rag/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # sticky PR comment with deltas

jobs:
  evals:
    name: Copilot Evals (dry-run + gate)
    runs-on: ubuntu-latest
    # Slim install (~90s) leaves plenty of headroom for the eval harness
    # itself.  See the ``copilot-evals`` extra in pyproject.toml.
    timeout-minutes: 15
    env:
      # Force the deterministic scorer so CI is fully reproducible.
      COPILOT_EVALS_DETERMINISTIC: "true"
      # Disable OTel export in CI — we still exercise span code paths
      # but nothing is shipped off-box.
      COPILOT_OTEL_DISABLE: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Use the slim ``copilot-evals`` extra (no pydantic-ai, no cloud
          # LLM providers).  The full ``copilot`` extra triggered 25-min
          # timeouts because pydantic-ai-slim pulls in 17 cloud-provider
          # extras (cohere, anthropic, vertexai, mistral, ag-ui, ...).
          # The eval harness uses DryRunAgent + a lazy openai import only.
          pip install -e ".[dev,copilot-evals]"

      - name: Lint new code (ruff)
        run: |
          python -m ruff check \
            apps/copilot/evals/ \
            apps/copilot/prompts/ \
            apps/copilot/telemetry/

      - name: Type-check new code (mypy)
        run: |
          python -m mypy \
            apps/copilot/evals/ \
            apps/copilot/prompts/ \
            apps/copilot/telemetry/ \
            --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests
        run: |
          python -m pytest \
            apps/copilot/evals/tests/ \
            apps/copilot/prompts/tests/ \
            apps/copilot/telemetry/tests/ \
            -v --strict-markers

      - name: Run eval harness (dry-run) — corpus_qa
        run: |
          python -m apps.copilot.evals run \
            --goldens apps/copilot/evals/goldens/corpus_qa.yaml \
            --output evals_out.json \
            --dry-run \
            --concurrency 4

      - name: Run eval harness (dry-run) — multi-turn conversations
        run: |
          python -m apps.copilot.evals run \
            --goldens apps/copilot/evals/goldens/conversation_multiturn.yaml \
            --output evals_out_multiturn.json \
            --dry-run \
            --concurrency 4

      - name: Run eval harness (dry-run) — refusal cases
        run: |
          python -m apps.copilot.evals run \
            --goldens apps/copilot/evals/goldens/refusal.yaml \
            --output evals_out_refusal.json \
            --dry-run \
            --concurrency 4

      - name: Regression gate (corpus_qa baseline only — others lack baseline yet)
        run: |
          python -m apps.copilot.evals gate \
            --current evals_out.json \
            --baseline apps/copilot/evals/baselines/baseline_v0.1.0.json \
            --max-score-regression 0.02 \
            --max-latency-p95-regression-pct 10

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: copilot-eval-report
          path: |
            evals_out.json
            evals_out_multiturn.json
            evals_out_refusal.json
          retention-days: 30

      - name: Post sticky PR comment with score deltas
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: copilot-evals
          message: |
            ## Copilot Evals

            Dry-run eval report uploaded as artifact `copilot-eval-report`.

            Regression gate status: ${{ job.status == 'success' && 'PASS' || 'REGRESSION DETECTED' }}

            Baseline: `apps/copilot/evals/baselines/baseline_v0.1.0.json`
            Thresholds:
              - `max_score_regression`: 0.02
              - `max_latency_p95_regression_pct`: 10%

            See the workflow summary for the full gate output.
