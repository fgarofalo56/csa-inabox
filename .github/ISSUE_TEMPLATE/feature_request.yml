name: Feature Request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Portal (Frontend)
        - Portal (Backend API)
        - Infrastructure (Bicep/IaC)
        - Governance
        - Platform Services
        - CI/CD
        - Documentation
    validations:
      required: true
