version: 2

models:
  - name: brz_invoices
    description: Bronze invoices — raw invoice records with ingestion metadata.
    columns:
      - name: invoice_id
        description: Unique invoice identifier from the billing system.
        tests:
          - not_null
          - unique
      - name: order_id
        description: FK to sales orders. Null for manual invoices.
        tests:
          - relationships:
              to: ref('brz_sales_orders')
              field: order_id
              config:
                severity: warn
                where: "order_id IS NOT NULL"
      - name: customer_id
        description: Customer identifier.
        tests:
          - relationships:
              to: ref('brz_customers')
              field: customer_id
              config:
                severity: warn
                where: "customer_id IS NOT NULL"
      - name: _dbt_loaded_at
        description: dbt ingestion timestamp.

  - name: brz_payments
    description: Bronze payments — raw payment records with ingestion metadata.
    columns:
      - name: payment_id
        description: Unique payment identifier.
        tests:
          - not_null
          - unique
      - name: invoice_id
        description: FK to invoices.
        tests:
          - not_null
          - relationships:
              to: ref('brz_invoices')
              field: invoice_id
