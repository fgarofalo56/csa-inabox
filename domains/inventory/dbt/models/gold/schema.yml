version: 2

models:
  - name: dim_warehouses
    description: >
      Warehouse dimension. Valid warehouse records from Silver.
    columns:
      - name: warehouse_sk
        description: Surrogate key.
        tests:
          - not_null
          - unique
      - name: warehouse_id
        description: Original warehouse identifier.
        tests:
          - not_null
          - unique

  - name: fact_inventory_snapshot
    description: >
      Inventory snapshot fact table. One row per product-warehouse
      combination with stock status classification and reorder flags.
    columns:
      - name: inventory_sk
        description: Surrogate key from Silver.
        tests:
          - not_null
          - unique
      - name: stock_status
        description: Stock level classification.
        tests:
          - accepted_values:
              values: ['OUT_OF_STOCK', 'LOW_STOCK', 'ADEQUATE', 'WELL_STOCKED']
      - name: needs_reorder
        description: TRUE when available stock is at or below reorder point.

  - name: gld_reorder_alerts
    description: >
      Products needing reorder, enriched with shared dim_products.
      Cross-domain join to shared.dim_products.
    columns:
      - name: alert_severity
        description: Alert urgency level.
        tests:
          - accepted_values:
              values: ['CRITICAL', 'URGENT', 'WARNING']

  - name: gld_inventory_turnover
    description: >
      Inventory turnover analysis with valid inventory health metrics.
      Note: demand-related columns (daily_demand, days_of_supply, supply_demand_status)
      are NULL because product-level order data is not available.
    columns:
      - name: inventory_status
        description: Inventory level classification based on reorder points.
        tests:
          - accepted_values:
              values: ['STOCKOUT', 'LOW_STOCK', 'ADEQUATE', 'WELL_STOCKED']
