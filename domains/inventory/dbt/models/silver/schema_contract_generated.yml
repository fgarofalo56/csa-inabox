version: 2
models:
- name: slv_inventory_snapshot
  description: 'Auto-generated dbt tests from data contract ''inventory.inventory_snapshot'' v1.0.0. DO NOT EDIT -- regenerate
    with: python -m governance.contracts.dbt_test_generator --write'
  columns:
  - name: inventory_sk
    description: Surrogate key from Silver inventory.
    tests:
    - not_null
    - unique
  - name: inventory_id
    description: Unique inventory record identifier from the WMS.
    tests:
    - not_null
  - name: product_id
    description: FK to shared.products.product_id.
  - name: warehouse_id
    description: FK to inventory.warehouses.warehouse_id.
    tests:
    - not_null
  - name: warehouse_sk
    description: FK to dim_warehouses surrogate key.
  - name: warehouse_name
    description: Warehouse display name (denormalized from dim_warehouses).
  - name: warehouse_region
    description: Warehouse region (denormalized from dim_warehouses).
  - name: qty_on_hand
    description: Current quantity physically in warehouse.
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: qty_on_hand >= 0
  - name: qty_reserved
    description: Quantity reserved for pending orders.
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: qty_reserved >= 0
  - name: qty_available
    description: Available quantity (qty_on_hand - qty_reserved).
    tests:
    - not_null
  - name: reorder_point
    description: Threshold below which a reorder alert is triggered.
    tests:
    - not_null
  - name: stock_status
    description: Stock level classification based on quantity vs. reorder point.
    tests:
    - not_null
    - accepted_values:
        values:
        - OUT_OF_STOCK
        - LOW_STOCK
        - ADEQUATE
        - WELL_STOCKED
  - name: needs_reorder
    description: TRUE when available stock is at or below reorder point.
    tests:
    - not_null
  - name: last_restocked_at
    description: Timestamp of the most recent restocking event.
  - name: days_since_restock
    description: Number of days since the last restocking event.
  - name: snapshot_date
    description: Date of the snapshot.
    tests:
    - not_null
- name: slv_inventory_turnover
  description: 'Auto-generated dbt tests from data contract ''inventory.inventory_turnover'' v1.0.0. DO NOT EDIT -- regenerate
    with: python -m governance.contracts.dbt_test_generator --write'
  columns:
  - name: product_id
    description: Product identifier (FK to shared.products).
    tests:
    - not_null
  - name: product_name
    description: Product display name (from shared.dim_products).
  - name: product_category
    description: Product category (from shared.dim_products).
  - name: unit_price
    description: Unit price in USD (from shared.dim_products).
  - name: total_on_hand
    description: Sum of qty_on_hand across all warehouses.
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: total_on_hand >= 0
  - name: total_reserved
    description: Sum of qty_reserved across all warehouses.
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: total_reserved >= 0
  - name: total_available
    description: Sum of available stock across all warehouses.
    tests:
    - not_null
  - name: warehouse_count
    description: Number of warehouses stocking this product.
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: warehouse_count >= 1
  - name: inventory_status
    description: Inventory level classification based on reorder points.
    tests:
    - not_null
    - accepted_values:
        values:
        - STOCKOUT
        - LOW_STOCK
        - ADEQUATE
        - WELL_STOCKED
  - name: daily_demand
    description: 'Average daily demand (currently NULL -- requires product_id in fact_orders to enable product-level demand
      attribution).

      '
  - name: days_of_supply
    description: 'Estimated days of supply remaining (currently NULL -- requires daily_demand calculation).

      '
  - name: supply_demand_status
    description: 'Supply vs demand classification (currently NULL -- requires demand data).

      '
- name: slv_reorder_alerts
  description: 'Auto-generated dbt tests from data contract ''inventory.reorder_alerts'' v1.0.0. DO NOT EDIT -- regenerate
    with: python -m governance.contracts.dbt_test_generator --write'
  columns:
  - name: inventory_sk
    description: Surrogate key from fact_inventory_snapshot.
    tests:
    - not_null
  - name: inventory_id
    description: Unique inventory record identifier.
    tests:
    - not_null
  - name: product_id
    description: FK to shared.products.product_id.
  - name: product_name
    description: Product display name (from shared.dim_products).
  - name: product_category
    description: Product category (from shared.dim_products).
  - name: unit_price
    description: Unit price in USD (from shared.dim_products).
  - name: warehouse_id
    description: Warehouse identifier.
    tests:
    - not_null
  - name: warehouse_name
    description: Warehouse display name.
  - name: warehouse_region
    description: Warehouse geographic region.
  - name: qty_on_hand
    description: Current quantity in warehouse.
    tests:
    - not_null
  - name: qty_reserved
    description: Quantity reserved for pending orders.
    tests:
    - not_null
  - name: qty_available
