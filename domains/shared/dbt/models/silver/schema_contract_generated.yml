version: 2
models:
- name: slv_orders
  description: 'Auto-generated dbt tests from data contract ''shared.orders'' v1.0.0. DO NOT EDIT -- regenerate with: python
    -m governance.contracts.dbt_test_generator --write'
  columns:
  - name: order_sk
    description: Surrogate key (md5 of order_id). Generated in Silver.
    tests:
    - not_null
    - unique
  - name: order_id
    description: Unique order identifier from the commerce system.
    tests:
    - not_null
  - name: customer_id
    description: FK to shared.customers.customer_id. Null for ~5% of test rows.
  - name: order_date
    description: Date the order was placed.
    tests:
    - not_null:
        severity: warn
  - name: total_amount
    description: Order total (USD).
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: ">= 0"
        config:
          severity: warn
  - name: status
    description: Order lifecycle state.
    tests:
    - not_null
    - accepted_values:
        values:
        - PENDING
        - CONFIRMED
        - SHIPPED
        - DELIVERED
        - CANCELLED
        - RETURNED
  - name: is_valid
    description: True when every quality flag is clean. Gold filters on this.
    tests:
    - not_null
  - name: validation_errors
    description: Human-readable '; '-joined list of validation failures.
