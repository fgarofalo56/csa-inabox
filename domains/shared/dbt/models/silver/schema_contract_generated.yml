- name: slv_orders
  description: 'Auto-generated dbt tests from data contract ''shared.orders'' v1.0.0. DO NOT EDIT -- regenerate with: python
    -m governance.contracts.dbt_test_generator --write'
  columns:
  - name: order_sk
    description: Surrogate key (md5 of order_id). Generated in Silver.
    tests:
    - not_null
    - unique
  - name: order_id
    description: Unique order identifier from the commerce system.
    tests:
    - not_null
  - name: customer_id
    description: FK to shared.customers.customer_id. Null for ~5% of test rows.
  - name: order_date
    description: Date the order was placed.
    tests:
    - not_null
  - name: total_amount
    description: Order total (USD).
    tests:
    - not_null
