version: 2
models:
- name: slv_customer_lifetime_value
  description: 'Auto-generated dbt tests from data contract ''shared.customer_lifetime_value'' v1.0.0. DO NOT EDIT -- regenerate
    with: python -m governance.contracts.dbt_test_generator --write'
  columns:
  - name: customer_id
    description: Unique customer identifier from the CRM.
    tests:
    - not_null
    - unique
  - name: first_name
    description: Customer first name.
  - name: last_name
    description: Customer last name.
  - name: email
    description: Customer email address.
  - name: total_orders
    description: Total number of orders placed.
    tests:
    - not_null
  - name: lifetime_revenue
    description: Total revenue from all completed orders (USD).
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: lifetime_revenue >= 0
  - name: avg_order_value
    description: Average order value (USD).
    tests:
    - not_null
  - name: customer_segment
    description: 'Activity-based segment: active, at_risk, churned, never_purchased.'
    tests:
    - not_null
    - accepted_values:
        values:
        - active
        - at_risk
        - churned
        - never_purchased
  - name: value_tier
    description: 'Revenue-based tier: platinum (>=10k), gold (>=5k), silver (>=1k), bronze.'
    tests:
    - not_null
    - accepted_values:
        values:
        - platinum
        - gold
        - silver
        - bronze
  - name: monthly_revenue_rate
    description: Average monthly revenue since customer creation.
