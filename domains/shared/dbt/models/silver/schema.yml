version: 2

models:
  # slv_orders is defined in schema_contract_generated.yml (auto-generated
  # from data product contracts). Do not add it here — run:
  #   python -m governance.contracts.dbt_test_generator --write

  - name: slv_customers
    description: >
      Silver layer: Cleansed customer records. Deduped, standardized
      casing, validated email format, surrogate-keyed. Every row is
      kept, with is_valid / validation_errors flagging records that
      failed quality checks (see Archon tasks 310b5446 and 0ac384b5).
      Gold models filter on is_valid = true.
    columns:
      - name: customer_sk
        description: Surrogate key (md5 of customer_id), generated in Silver per 310b5446.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Natural customer identifier from Bronze.
      - name: email
        description: Customer email (lowercased)
      - name: is_valid
        description: >
          True when the row passes every quality check (missing id/name,
          invalid email, missing created_at). Gold models should filter
          on this column.
        tests:
          - not_null
      - name: validation_errors
        description: >
          Human-readable '; '-joined list of failed quality checks for
          rows with is_valid = false. Empty string for valid rows.
      - name: _is_invalid_email
        description: Quality flag - true if email fails regex validation.
      - name: _is_missing_id
        description: Quality flag - true if customer_id was null or empty in Bronze.
      - name: _is_missing_name
        description: Quality flag - true if both first_name and last_name are empty.
      - name: _is_missing_created_at
        description: Quality flag - true if created_at was null in Bronze.

  - name: slv_products
    description: >
      Silver layer: Cleansed product records. Deduped, standardized
      casing, validated prices. Every row is kept, with is_valid /
      validation_errors flagging records that failed quality checks.
      Gold models filter on is_valid = true.
    columns:
      - name: product_sk
        description: Surrogate key (md5 of product_id).
        tests:
          - unique
          - not_null
      - name: product_id
        description: Natural product identifier from Bronze.
        tests:
          - not_null
      - name: product_name
        description: Product display name (trimmed).
      - name: category
        description: Product category (uppercased).
        tests:
          - accepted_values:
              values: ['ELECTRONICS', 'CLOTHING', 'HOME', 'BOOKS', 'SPORTS']
              severity: warn
      - name: unit_price
        description: Unit price in USD.
      - name: is_valid
        description: >
          True when the row passes every quality check.
        tests:
          - not_null
      - name: validation_errors
        description: >
          Human-readable '; '-joined list of failed quality checks.
      - name: _is_missing_product_id
        description: Quality flag - true if product_id was null.
      - name: _is_missing_name
        description: Quality flag - true if product_name was empty.
      - name: _is_invalid_price
        description: Quality flag - true if unit_price <= 0 or null.
      - name: _is_missing_category
        description: Quality flag - true if category was empty.
