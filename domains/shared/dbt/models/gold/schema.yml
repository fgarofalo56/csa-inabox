version: 2

models:
  - name: gld_daily_order_metrics
    description: >
      Gold layer: Daily order aggregations for operational dashboards.
      Filters out records with quality issues (negative amounts, future dates).
    columns:
      - name: order_date
        description: Calendar date
        tests:
          - unique
          - not_null
      - name: total_orders
        description: Count of orders for the day
      - name: total_revenue
        description: Sum of order totals for the day
      - name: avg_order_value
        description: Average order value for the day
      - name: cancellation_rate_pct
        description: Percentage of cancelled orders (0-100)

  - name: gld_customer_lifetime_value
    description: >
      Gold layer: Customer lifetime value metrics with segmentation.
      Combines customer and order data for analytics.
    columns:
      - name: customer_id
        description: Unique customer identifier
        tests:
          - unique
          - not_null
      - name: customer_segment
        description: "Activity-based segment: active, at_risk, churned, never_purchased"
        tests:
          - accepted_values:
              values: ['active', 'at_risk', 'churned', 'never_purchased']
      - name: value_tier
        description: "Revenue-based tier: platinum, gold, silver, bronze"
        tests:
          - accepted_values:
              values: ['platinum', 'gold', 'silver', 'bronze']
      - name: lifetime_revenue
        description: Total revenue from all completed orders
      - name: total_orders
        description: Total number of orders placed
      - name: monthly_revenue_rate
        description: Average monthly revenue since customer creation

  - name: dim_customers
    description: >
      Gold layer: Customer dimension (SCD Type 1). Flattened customer
      attributes for star-schema joins.
    columns:
      - name: customer_sk
        description: Surrogate key from Silver layer.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Natural customer identifier.
        tests:
          - unique
          - not_null
      - name: full_name
        description: Concatenated first + last name.
      - name: email
        description: Customer email (lowercased).
      - name: region
        description: "Derived business region: WEST, SOUTH, CENTRAL, EAST, INTERNATIONAL."
        tests:
          - accepted_values:
              values: ['WEST', 'SOUTH', 'CENTRAL', 'EAST', 'INTERNATIONAL']

  - name: dim_products
    description: >
      Gold layer: Product dimension. Flattened product attributes for
      star-schema joins.
    columns:
      - name: product_sk
        description: Surrogate key from Silver layer.
        tests:
          - unique
          - not_null
      - name: product_id
        description: Natural product identifier.
        tests:
          - unique
          - not_null
      - name: product_name
        description: Product display name.
      - name: category
        description: Product category (uppercased).
      - name: unit_price
        description: Unit price in USD.
      - name: price_tier
        description: "Derived price tier: premium, standard, value, economy."
        tests:
          - accepted_values:
              values: ['premium', 'standard', 'value', 'economy']

  - name: fact_orders
    description: >
      Gold layer: Fact table at order grain. Joins Silver orders with
      customer dimension for star-schema analytics.
    columns:
      - name: order_sk
        description: Surrogate key from Silver orders.
        tests:
          - unique
          - not_null
      - name: order_id
        description: Natural order identifier.
        tests:
          - not_null
      - name: customer_sk
        description: FK to dim_customers.
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_sk
              severity: warn
      - name: order_date
        description: Date the order was placed.
        tests:
          - not_null
      - name: total_amount
        description: Order total in USD.
      - name: order_status
        description: Current order status (uppercased).
      - name: order_year
        description: Year extracted from order_date.
      - name: order_month
        description: Month extracted from order_date.
      - name: order_quarter
        description: Quarter extracted from order_date.

  - name: gld_monthly_revenue
    description: >
      Gold layer: Monthly revenue metrics by country/state. Aggregates
      fact_orders into monthly cohorts with status breakdowns for
      executive dashboards and financial reporting.
    columns:
      - name: month_key
        description: Composite key (YYYY-MM-country-state) for merge.
        tests:
          - unique
          - not_null
      - name: revenue_year
        description: Calendar year.
      - name: revenue_month
        description: Calendar month (1-12).
      - name: revenue_period
        description: First day of the month.
      - name: gross_revenue
        description: Total revenue including cancellations and returns.
      - name: net_revenue
        description: Revenue excluding cancelled and returned orders.
      - name: total_orders
        description: Count of distinct orders.
      - name: unique_customers
        description: Count of distinct customers.
      - name: cancellation_rate_pct
        description: Percentage of cancelled orders.
      - name: return_rate_pct
        description: Percentage of returned orders.

exposures:
  - name: executive_revenue_dashboard
    type: dashboard
    maturity: medium
    description: >
      Power BI dashboard showing monthly and quarterly revenue trends,
      regional breakdowns, and year-over-year comparisons. Used by the
      executive team for board reporting and strategic planning.
    owner:
      name: Finance Analytics Team
      email: finance-analytics@contoso.com
    url: https://app.powerbi.com/groups/csa-inabox/dashboards/revenue
    depends_on:
      - ref('gld_monthly_revenue')
      - ref('fact_orders')
      - ref('dim_customers')

  - name: customer_360_report
    type: dashboard
    maturity: medium
    description: >
      Customer lifetime value analysis, segmentation, and churn
      prediction report. Powers the customer success team's outreach
      and retention workflows.
    owner:
      name: Customer Success Team
      email: customer-success@contoso.com
    url: https://app.powerbi.com/groups/csa-inabox/reports/customer-360
    depends_on:
      - ref('gld_customer_lifetime_value')
      - ref('dim_customers')

  - name: sales_operations_dashboard
    type: dashboard
    maturity: high
    description: >
      Daily operational dashboard for the sales team showing order
      volume, average order value, cancellation rates, and pipeline
      health. Refreshed daily at 07:00 UTC.
    owner:
      name: Sales Operations
      email: sales-ops@contoso.com
    url: https://app.powerbi.com/groups/csa-inabox/dashboards/sales-ops
    depends_on:
      - ref('gld_daily_order_metrics')
      - ref('fact_orders')
      - ref('dim_products')

  - name: finance_aging_report
    type: analysis
    maturity: medium
    description: >
      Accounts receivable aging analysis consumed by the finance team
      for cash flow forecasting and collections prioritisation.
      Refreshed daily from the finance domain Gold layer.
    owner:
      name: Finance Team
      email: finance@contoso.com
    depends_on:
      - ref('gld_monthly_revenue')
