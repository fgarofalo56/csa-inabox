# HIPAA Security Rule (45 CFR 164.308 / 310 / 312 / 314 / 316) — Control Mapping
#
# Authoritative reference:
#   45 CFR Part 164 Subpart C — Security Standards for the Protection of
#   Electronic Protected Health Information.
#   https://www.hhs.gov/hipaa/for-professionals/security/index.html
#
# HIPAA structure:
#   - Administrative Safeguards — §164.308
#   - Physical Safeguards      — §164.310
#   - Technical Safeguards     — §164.312
#   - Organizational           — §164.314
#   - Policies & Documentation — §164.316
#
# Each HIPAA standard has "Required" or "Addressable" implementation
# specifications. We note (R) / (A) in the title.
#
# Schema identical to nist-800-53-rev5.yaml.

