# CMMC 2.0 Level 2 — Practice Mapping Manifest
# Maps each CMMC 2.0 L2 practice to NIST SP 800-171 Rev 2 (the direct source)
# and to the CSA-in-a-Box implementation evidence.
#
# Authoritative references:
#   CMMC 2.0:     https://dodcio.defense.gov/CMMC/
#   NIST 800-171: https://csrc.nist.gov/publications/detail/sp/800-171/rev-2/final
#
# CMMC 2.0 L2 = 110 NIST 800-171 r2 controls (1:1 mapping). We include all
# 110 with direct evidence where available. Where status = INHERITED or
# PLANNED, we note the gap or upstream responsibility.
#
# Schema identical to nist-800-53-rev5.yaml (see that file for docs).

framework: "CMMC 2.0 Level 2"
